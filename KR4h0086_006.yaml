body:
  text: 草堂雅集卷六元顧瑛編陸德源字靜逺吳郡人甫里先生之後好學博古尊敬師友雖資瞻力給謙恭若出諸生之下憤甫里之學不傳遂作甫里書院於城南撥良田以給學徒有司聞其事遂命其長是院後升徽城教官以疾終家有杞菊軒吳人稱為杞菊先生云送徽紙昌園梅且索和顧陸從來同里閈定交何必要通名桃花流水二三月著我扁舟聽雨聲玉色疇能比硬黃酸辛敢擬出青房品題奕奕歸年少慚愧華顛作漫郎玉山謝紙曰蜀郡金花新著樣剡溪玉版舊齊名荷君寄我黟川雪猶帶漣漪瀉月聲又謝蜜梅曰江南煙雨未全黃誰使青酸墮蜜房嫵媚已能知魏證典刑時復見中郎和題新安梅花次韻東風一夜渡江新開遍梅花照眼勻何遜從來有才思題詩不待廣陵春送陳敬初秀才北上江南八月鴻雁飛故人挾䇿遊京師為郎作簿雖可期老懷與爾寧分違憶昨同舟風雨夕胥江委蛇嚴灘白紫陽之山千里隔何曽笑我微官斥歸來吳城又半年攬袪結佩仍周旋陳膠雷漆非偶然拍肩笑語忘其顛秋風蕭蕭吹去舟征衣蓐食還依劉芙蓉照波生逺愁欲别未别難為留玉堂金闕有耆舊草詔紬書當在手乘時薦剡如轉丸兀兀園非所守子之行兮良不茍張舜咨字師夔錢塘人由行省宣使調休寧簿居官有能稱政事之暇焚香閉閣哦詩對卷翛然無塵想修潔可知也送子庭柏上人東歸賀公吳語尚清狂上疏黃冠乞故鄉柏也東歸何所有畫圖詩卷滿奚囊寄玉山索蘭花許我猗蘭葉有光報君墨竹節尤蒼秋期坐對文峯下清閟幽香道味長題竹四首萬里髙風不自由琅玕掀舞一天秋何人笙鶴歸來晚縹眇仙城十二樓右風雨重篔簹翠實寒柳隂野色與檀欒結根牙谷専清閟似厭人間道路難右雨土地肥磽自不齊蒼岩瘦石故相宜繁華坐見成秋苑獨立空山閲嵗時右老苔緑生香石有文駢頭下見錦綳孫夢中倣佛東橋路沽酒人家小角門右嫩次李士亷韻柬玉山書樓棐几石嶄然晴雪飛來太華顛墨本祕函枯樹賦牙籖插架白雲篇清心求友先同調華髮逢人耻問年共惜分隂珍雅玩封侯擬不到鳶肩用韻寫柏子庭卷之子庭前柏含暉蓄景光託根當太白何口得雌黃大道從行食深禪坐亦忘自憐塵鞅客擾擾自蜂房玉山詩曰虗舟元不繫湖海至今稱悟得庭前柏方為物外僧空空無我相落落有誰應肯向東山住東山氣倍增明海歌贈寶明海大明麗天雲海空榑桑倒景三韓東八紘磅礴俯仰內萬境膏沐鴻濛中梵宫髙標跨溟渤嵒嶝杳絶煙霏濛時時雲氣趨羣龍龍君夜出流光從道人深禪入水觀要探衆寶馮夷宫手書貝葉睒金碧身翳雨花紛翠紅君不見俗緣千劫塵網蒙鏡象不離生龜筒乂如磨牛履陳迹究竟彼岸無終窮人心至善奧冥通尚需法語開盲聾便從穴紙逃癡蜂泠然空飛御天風寄廣西白歸思迢迢不奈何寄聲珍重病維摩風帆明日春江上回首蒼山緑樹多題新安方丈梅花新安堂上梅花新南枝北枝開未勻渠儂切莫訝渠瘦中藏萬斛江南春熊夢祥字自得江西人博讀羣書旁通音律能作數體書乘興寫山水尤清古無庸工俗狀以茂才舉教官不樂拘制輒棄去以詩酒放浪淮浙間卜居婁江上扁得月樓與豫為忘年交曠達之士也號松雲道人題管夫人竹夫人寫竹何縱橫錯刀離離光怪生安得月明招白鳳玉闌西畔聽秋聲題二色芙蓉便面曽障西風十二闌亭亭醉醒碧波寒月邊青鳥無消息流落人間作畫看題趙子昂蘭石泛晴湍兮潺湲乘芳馨兮嬋娟望九嶷兮眇眇思公子兮未敢言趙翰林桃花馬圖風翻細雨入天間貌得權竒電影寒鳳閣春深人已逺空餘精彩匹曺韓題李息齋竹薊丘道人寫瀟灑煙寒兔齒石蒼蒼素娥剪翠雲葉亂三十六陂春水香題邊伯京畫盤松圖居震宫受秦封乘元氣超穹窿又何獨羡夫梁棟之質莫測夫神竒變化之功夫然後知其為龍松題柏子庭枯木鐵珊瑚樹飛鬼蝶王子敝舄不許躡乞與海神神不收湧樹雪晴光煜煜何人潑墨淡復濃使我一見成心獵便令退從未畫前無孔笛中宫徴叶題張叔厚描琵琶士女剪燭填詞明皓齒是非恩愛從兹始莫將貶竄立人倫世上伊誰魯男子題畫山礬傍路依山到處生只因樵牧慣相輕若教塵俗如桃李未必梅花肯作兄題王元章梅紫禁春醲雪未消年年香冷只飄颻許身入畫酬清賞不嫁東風過小橋客懷奉柬玉山我昔離家七月強只今十月隕清霜可慚濁酒黃花興應悔青鐙白髮長翠袖天寒修竹暗綺忩日暖碧茸香夜長枕上揚州夢江北江南是故鄉玉山戲答詩曰秋水藍橋一尺強愁聞玉杵搗玄霜東籬老子烏紗薄西郭佳人翠袖長古寺竹深禪榻靜晴忩花落研池香西風鶴背三更夢笑看璚花作醉鄉題王元章畫梅花水影清光為寫神當時巳是失天真一從殘角吹新曲幾向寒溪覓故人縞袂歸來猶有月佩環飛去更無塵莫言醉魄空離落信把和羮屬大臣趙奕字仲光吳興人魏國文敏公仲子作詩為文翰墨遊藝皆有家法尤好古雅不事進取與豫特友善相去雖數百里必一月一致書其天質秀雅如芝蘭玉樹王謝佳子弟也玉山與郯九成自姑蘇來吳興僧可傳邀豫陪遊辨山之黃龍洞時有紫霞同席遂分韻得花字盤屈度崎礒􅋂崯復谽谺龍居潛石洞花暖集蜂衙峭壁生蒼蘚清泉長赤砂松濤響雲壑竹翠滴桃花杖履丹梯險籃輿緑磴遮攀藤嘯猿狖並草卧麕麚絶頂望笠澤傾溟想女媧遙天連島嶼逺水接蒹葭道士來邀坐仙童為煮茶林深多虎迹地僻少人家對景詩情逸尋芝道氣遐忩幽塵不到境勝興無涯堪種茅山术宜栽邵圃瓜寶書傳正法靈劍挂青蛇徑􅉸﨑尤峻苔荒突又窪淙淙流暗澗聒聒閙鳴蛙下嶺日欲落登舟路更賖平田飛白鷺别墅宿歸鴉犬吠柴門近鵑啼野樹斜菜畦黃撲簌麥壠碧交加老態慵登涉衰形獨嘆嗟山翁荷鋤鍤村婦倚籬笆駐舫携紅袖停杯挾紫霞金爐薰篤耨玉手㺯琵琶鑿落傾香釀玻璃插艷葩歌姬聲縹眇醉客笑喧譁擊柝城將閉吹笳鼓尚撾卷簾風滅燭濕幔雨垂麻今日雖云樂他年還共誇更闌歸去速燈影照籠紗雨忩寫懷幽忩談笑話平生三十年間幾度更白髮滿頭今巳老青山排闥故多情桃花灼灼應無語春雨蕭蕭尚未晴明日扁舟携好酒南村筍蕨正堪烹春日書懷忙衷過韶華東風日易斜黃梁應未熟白酒尚堪賖蝶魄迷幽夢蛛絲絆落花百年能有幾隨分度生涯送聞梅澗住辨山祥應宫石磴懸崖人迹稀林深地僻絶塵機井邊丹竈千年冷忩外山雲盡日飛老虎每來廊下走黃龍常向洞中歸先生有道開門坐松響瑶笙月滿衣倪瓉字元鎮毗陵人酷好讀書尊師重友操履修潔詩趣淡雅如韋蘇州作小山水如髙房山自號經鋤隱者家有雲林隱居與豫有葭莩之親纍辱見招規往而每不果然多得其所作故并刻云聽袁子方彈琴蕙帳凝夕清髙堂流月明芳琴發綺席列坐散煩纓回翔别鵠意縹眇孤鸞鳴一寫氷霜操掩抑寄餘情送别甘允從來從墨沼雲林下共愛女蘿緣石牀喚人鸚鵡語猶澀當户枇杷子半黃奉橘定應題百顆籠鵝即欲寫千行蘭亭書法人間少好去山隂泛野航奉懷張外史隂壑慘慘緑苔生碧雲亭亭多逺情松杉鶴去轉蕭瑟洲渚花落自縱橫從君下榻住十日看我鼓枻出層城洞口菌巢無恙否定應閉閣著書成次韻薩天錫寄張外史谷口路微山木合濕衣空翠不曽晴飢猿攀檻為人立寒犬號林如豹聲小閣秋深聽雨卧長空日出采芝行道心得失巳無夢沐髮朝真候五更題所畫喬林澗石山家日出無行蹤雲林煙蘿逺且重不見鹿眠盤石上提壺自挂一長松題柯敬仲竹書達兼善祕書後誰能寫竹復盡善髙趙之前文與蘇簡韻蕭蕭人品係篆籀渾渾書法俱奎章博士生最晚耽詩愛畫同所趨興來揮灑出新意孰謂髙趙先乎吾達祕書曰堤栁拂煙踈翠葉池蓮過雨落紅衣娟娟唯有忩前竹長是清隂伴夕暉又梁王宅裏參差見山簡池邉爛漫栽記得九霄秋月上滿庭清影覆蒼苔題所畫雲林小景圖赤城霞暖神芝秀洞裏桃花不記春何事却將山水腳鍾陵市上踏紅塵馮文仲自玉山來携向畫雲林小景圖復求題詩因用前韻憶昔舟歸雪浦濵松陵瑶草欲生春間拈逸筆圖清思今日披圖似隔塵題自畫竹東海有癡夫自稱繆且迂書壁寫絹楮豈其狂之餘寄懷鄭徴士谷口子真今最賢久别鬱鬱夢相牽好營秫田多釀酒欲買茒屋尚無錢兄病每書賖藥劵客來唯候煮茶煙闔閭城東有艇子憶爾青燈相對眠賦句曲外史精舍書在虞伯生張仲舉後道士朝乘白鶴還樓臺金碧鎖空山半天花雨飛幢節萬壑松風雜珮環丹井夜寒光剡剡石壇春靜蘚斑斑飄然便擬從君隱分我玄洲一半間伯生詩曰隱居聞道無人迹麋鹿來依積雪深每占雲氣得芝术莫怪丹光穿樹林茅君自騎一虎下木客或與羣猿吟知爾此時最相憶想豫飛矯度千岑仲舉詩曰玄洲别塢鬱巃嵸滿谷蜷雲養萬松外史編圖金匱鑰隱居留誥玉泥封丹池雨現龍無角瑶草春肥鹿有茸擬借一龕為洞吏與君來往大茅峯次韻郯九成見寄郭外青山舊結廬微茫野徑望中無殘生竟抱煙霞癖好事猶傳海嶽圖夜壁松風懸雅樂秋池菊水酌商觚倘從世外求玄賞好趂輕舟看浴鳬送徐元度還江西悠悠西江水綿綿江上山借問離羣鶴孤飛幾時還白雪亦忌潔青雲安可攀時時王子晉吹笙向人間九日登華氏溪亭茱萸黃菊稍斑斑野水寒煙蒼莽間送客歸來逢九日華家亭上獨看山吾友陸友仁甫舊得古銅印一紐以示豫辨其文曰陸定之印以名其子而字之曰仲安友仁既歿仲安求為賦焉吾友友仁甫覽古閔世盲示我古印章始得自幽并辨之曰定之釋義為爾名既名字曰安朂哉在敬誠友仁今則亡緬懷涕沾纓繄昔黃太史結交漢米生手持玉刻文螭紐交縱橫上有元暉字印刓與弗輕殷勤字其兒祖武冀可繩允以學業懋繼述暉芳英書比二王迹價重十連城髙躅思仰止景行爾其行張心逺訪郯九成因書以寄州府今為掾風埃多厚顏香芹渾滿澗去鶴未巢山思逐春雲亂心隨野水間張君應話我樗散碧巖間為馮文仲畫山水小幅知君近住西湖曲湖水淪漣似輞川忩下青松髙百尺時時落雪滿琴絃題曲江洗馬圖校獵上林苑洗馬昆明池霜威肅笳鼓雲氣畫車旗馬班陳賦頌衛霍綏蠻夷王風既未逺文明方在兹逶迤霄漢上鳳皇尚來儀賦居延王孫德新小隱軒志隱寧須分小大不論城市與山林橘中之樂固不減洞裏有春藏更深奕戲自能忘世事酒尊聊用散沖襟傅説巖築茍無遇豈有朝堂論道心題水仙曉夢盈盈湘水春翠虬白鳳照江濵香魂莫逐泠風散擬學黃初賦洛神蘇臺懷古望中煙草古長洲不見當時麋鹿遊滿目越來溪上水流將春夢過杭州送甘允從朔鴻縱髙姿流水去不息枉道别友生揚舲望京國婉孌前途憩蕭條餘景匿神京衣冠會左右金張宅驅馬流星繁乘軒春霧集嘉子玉質朗早通金閨籍行逢明主顧入補詞臣職束帶向晨趨陪燕終日昃芳年易為晚所願崇令德英英白雲飛渺渺青山隔秋風應節起萬里思親客遊子返舊居銜枚數相覿再用歸字韻寄張貞居栁太常鄭明德華陽外史從幽討谷內髙人亦賦歸遙憶愚溪對山坐何時菌閣看鴻飛荒荒旭日晞玄髮潏潏流泉浣素衣寂寞松忩懸榻處塵生塵尾不堪揮送元度北遊荷鍤空林春雨餘艤舟沙岸燕飛初去尋天上仙人珮肯顧山中隱者居霜月四更提劍舞田園二頃帶經鋤蘭榮栁密南簷下佇子雲間枉尺書送章鍊師遊七閩髙士不羈如野鶴忽思閩海重經過舟前春水他鄉逺雪後晴山何處多觳觫卧雲芳草細鈎輈啼樹野煙和武夷九曲最清絶落日采蘋聞棹歌再和虞道園題劉宗師畫像焚香坐石孤峯月飛珮朝天萬壑風邈爾空歌傳碧落飄然流響振金宫神君降服玄霜劑聖主能延緑髮翁共道乘鸞去無迹祥雲繚繞畫圖中九日自笑不能孤九日一壺濁酒對西山遙憐玉樹秋風裏靜看冥鴻落日間草木蕭蕭雲更碧山川漠漠鳥飛還長途誰是陶彭澤被褐行吟意自間鄭遂昌隱居梁鴻山以詩寄之伯鸞近在東山陲室無孟光唯兩兒草堂資煩王録事蓮社緣依逺法師迎我掃除松下雪因君起寫壁間詩便知從此遂真隱深谷紫芝堪療飢林下遣興眼見藤梢已過墻手拈書卷復堆牀聊因水檻親魚鳥欲出柴扄畏虎狼冠製不嫌龜殼小衣裙新剪鶴翎長從來任拙唯踈放一月秋隂不下堂賦謝陸繼之紫蟹黃柑之貺吳郡舟中闔閭城外皆秋水斜日維舟方醉眠携手故人驚夢裏送書飛雁落尊前黃柑開裹煩相贈紫蟹傾筐也可憐憶爾獨居湖上宅晴忩竒石晝生煙首夏即興呈貞居鵝鴨如雲散碧陂來禽青李壓低枝深林汲澗常聞虎清晝焚香獨下帷路出城東無十里燕來堂下不多時可憐稚笋都成竹忽見春蠶已吐絲春日贈張茂實久客東海上秋風吹練裙放言愛莊叟笑癖如陸雲採藥清晨出哦詩靜夜聞滄浪可濯足吾與爾為羣悼宋髙士秋日髙人逝微霜蕙草摧鵝羣空碧沼鶴影自層臺應馭泠風出疑隨密霧來松杉暮蕭瑟撫事有餘哀十月十三日蕭間館夜坐隱几忽不寐竹露下泠泠青鐙淡斜月薄帷張寒廳躁煩息中動希靜無外聆窅然去虗際誰知有身形曲彥逺寄茗裹賦此道謝且求致梨栗木瓜繞屋青山謝朓居木瓜梨栗種扶踈不妨暇日騎官馬自喜清時少薄書九月授衣霜欲落百年回首雁初飛猶憐踽踽空山客茗裹封題逺慰豫寄段吉甫昔年段干木踰垣避其君冥翳不可干清風扇炎氛德綿百世下吉甫賢且文神鸞養竒采芳芷結幽芬回視當世士雞鶩政紛紜區區事夸奪子獨志不羣舍瑟作而嘆此道誰復云章鍊師由蘇州訪鄭有道而歸良覯忽云阻桐花今亦繁落日滿泗渚揚舲念孤鶱因懷息機叟藴真從灌園晨拂石上雲佇子接清言送髙侯之秦郵秦漢置牧守猶古之侯伯封建而郡縣仁政固不易漢宣知所本留意二千石慎哉髙侯車願循古轍迹惻惻行并序三月十五日陸元素將從梁鴻山歸吳淞之上是夕坐至夜分始別豫入舟賦此追至梁鴻山寄之以定及冬重來之約惻惻復惻惻幽思從中發感子逺來訪畏子遽言别不有同心人何以慰孤寂矧兹夏春交蕭艾盈路側江水亦浩漾風雨還飄突行將阻携手轉覺意忽忽交好匪在今髙誼敦自昔人生寧無别所悲嵗時易坐嘆辛夷紫還傷蕙草碧僕夫竊相告怪我悲憤塞山中梁鴻棲江上陸機宅井臼今蕪穢鶴唳且寂寞子往經其壖徘徊但陳迹天地真旅舍身世等行客泛泛何所損皎皎奚自益修短諒同歸數面聊歡懌送李徴君過荆溪訪王司丞何處尋狂客故人王子猷花落庭前樹風吹溪上舟紫筍生春雨緑蘋滿芳洲心隨酒船發悵望不能休李徴君將還揚州因言沈郎官在吳下賦此以寄二月桃始花淮南客還家階前踈雨落堂上春衣薄為言沈約在吳中玉壺青絲酒如空春風相過蕙草緑芳菲滿堂樂未終醉歌行次韻答李徴君春日過草堂賦贈一首杜陵昔年有茆屋浣花溪邉錦江曲古人不見春風來桃李無言自山麓石牀蘚澀青泥乾決渠流水夜潺湲可憐寶劍埋黃土空餘山月照波間今我不樂空懷古短世長年誰比數花下那知李白來山鳥恣歌童亦舞酒酣大笑五情熱作相形求築巖説夷齊相逝居首陽逍遙采薇飽芳潔勿歌虞夏神農詩賢愚等是百年期魯連耻秦亦蹈海笑爾局促商山芝少文壁間對圖畫莫待老來難命駕仰看翕忽浮雲馳安得乘螭與之化漠漠楊花縈逺天迸壑晴雷驚醉眠李侯神爽色不動手中茶雪落輕煙逢君此樂誠草草便欲携君赴煙島海上千年白鶴飛世人胡為空自老玉壺中插瑞香水仙梅花戲咏一首寒梅標素豔幽卉弄妍姿團團紫綺樹共耀青陽時折英欲遺逺但恐傷華滋置之玉壺氷芳馨消歇遲雪中折枇杷花寄吳處士一首雪中自折批杷花走寄城南處士家明朝雪晴定相顧兩株松下煮春茶擬隂常侍一首奉寄到祕監趙員外幽并遊俠地都城百雉連河漢瞻疑近雲鳬信是仙樓分霞欲曙花將月共妍摛毫傾藻思獻賦足為傳還知跨烏鵲夜宿綵雲邉秋夜賦清漏下數刻踈鐘仍獨聞零露漙夕影端居澄俗氛恬淡斯寡欲榮名非所欣樂哉咏王風忘年栖白雲秋答寅夫對雨見懷溽雲變隂晦零雨隨風濤的皪集蓮沼飄颻灑蘭臯朱絲緩瑶瑟緑錢生寶刀撫事生慷慨端居倦遊遨處世每慚栁懷人徒詠陶脆質愛靈藥間情宣弱毫古意一首次韻答曹德昭齊王好竽客鼓瑟操瑟何以干齊門古人結友多豪傑况爾封君之子孫王國陳詩終大雅楚俗尚鬼悲招魂相思日暮不可見鴻飛冥冥目力昏雲槎軒已比溝中斷空思海上浮隨雲秋泛泛貰月夜悠悠無路通河漢憑誰問女牛漂搖非有待吾道付滄洲題陳氏齋壁愛爾茆齋少塵雜時來下帷清晝眠風流政思書裙去懶惰惟知坦腹便林間病鶴尚俯啄池上山雞徒自憐何為當年種桃者移家偶脫區中緣悼頂山寺清上人二首幽曠山中樂飄颻物外蹤梵餘間憩石定起獨哦松花落春衣靜雲垂澗户重依依種蓮處林暝只聞鐘杯渡前溪見水源偶來佩芷服蘭蓀香臺猶帶山忩影經卷長依松樹根雲起晴峯還有觸雪消春野不留痕倐然我已忘言説翠竹黃花自滿園送張伯雨還山日暮書傳青鳥使華林瑶草待君歸挾舟蜿蜿雙龍出背雨寥寥一鶴飛秋水琢成蒼玉佩朝霞補作紫煙衣山中長吏來相覔應借忩間白羽揮雪後謁陳子真陶公卜宅南村裏快雪初晴思一遊樹辨微茫來獨鶴櫓搖欹側散輕鷗墨池絶霤春氷滿塵榻翻書夕照收相見惘然如有失掉頭吟咏出林丘晨起一首寄丹丘竹忩晨起聞幽鳥深巷絶無車馬喧多病馬卿非不遇歸田陶令自忘言墻隂薯蕷苖方茁雨裏櫻桃花正繁二月隂寒少晴日坐看秋水上柴門雨後雨後循除泉亂流落花時節緑隂稠石尊貯酒供抔飲素壁圖山入卧遊翳日長林藏伏虎際天春水浴輕鷗幽棲四月饒櫻筍醉裏題詩一散愁寄王叔明幾夢山隂王右軍筆精墨妙最能文每將竹影模秋月更愛山居寫白雲祕笈封題饒古迹雅懷蕭散逸人羣今年七夕聞多事曝畫翻書到夕曛寄吳孟思并懷張外史江海風流吳孟思十年不見鬢成絲舊同野老松花供今寄仙君石室碑秋日滿船初晒藥晴雲浮水獨臨池南山樹裏孤栖鶴爾去何當一問之送劉彥文為浙西憲司掾并簡貞居落日采蘋溪水緑目追帆影先飛鴻寄書為覓仙人隱種杏久居丹井東逺道悠悠宵入夢晴波洶洶晝多風鳴珂使者清無事爾得優遊羣掾中八月十八日蕭間道館聽袁南宫彈琴是日風雨蕭然有感而作玉琴轉清亮風雨更飄颻踈桐蔭髙館朱槿耀芳條生物曷可遏撫事發長謡弱齡陪清宴循髮想垂髫相見日巳老離居夢且遙秋江渺雲水去鶴影搖搖余與元鎮初識時元鎮始弱冠余年六十今余年八十有六而元鎮四十餘矣蕭間館東齋庭下向見盛鍊師手種二桐忽已十五年今桐隂可蔽十車地因誦桓司馬樹猶如此人何以堪之語元鎮復賦此詩相與諷詠為之泫然袁矩書寄王叔明能詩何水部愛石米南宫允矣英才最居然外祖風釣絲煙霧裏船影畫圖中他日千金積陶朱術偶同題米南宫石刻遺像南宫遺像刻堅珉猶在荒城野水濵絶嘆莓苔迷慘淡細看風骨尚嶙峋山中仙冢芝應長海內清詩語最新地僻無人打碑賣每懷英爽一傷神寄張貞居不但入城蹤迹少南林野老見猶稀狂歌鳴鳳聊自慰舊學屠龍良已非蒼蘇渾封麋鹿徑白雲新補薜蘿衣羊君筆札誰能寄欲讀靈文一叩扉過薩判官齋聽其鼓琴薩公能琴賢且文城闉一遇何歡欣髙堂掃榻新雨霽為鼓瀟湘之水雲竹林蕭瑟風嫋嫋山日暗靄波沄沄曲終推琴意愈淡忍即别去隨飛蚊戲題嚴録事所集書畫藪雨館晝逢嚴録事手持書畫索題詩金題玉躞齊梁迹墓刻石鐫秦漢碑把玩始驚繁卷軸品量還愧拙言辭古人冷淡今誰尚漫葺殘編慰所思薩仲明為丞相府掾時僦居京師其軒曰半野後買宅延陵亦揭是名於軒因雨宿其下遂為賦詩云何意開軒名半野身存魏闕思江湖斜侵瓜圃通花藥稍傍薇垣近竹梧千里秋風催斫鱠九霄晨露浥飛鳬如今别買荒城宅自掃風林候野夫十一月二十三日率性德源共載過林下而豫適不在遂返棹竟還明日詩來因次韻重邀之雲林風雪興不孤指顧可求塗豈迂兩忘主賔政自好一以禮法何其拘我方飄忽念嵗月子乃踈豁笑人奴再為理棹急相就放筆為寫狂遊圖次韻德源率性所賦十二月四日雪海宇希微隱一毫行舟氷膠夕停篙愁看寂寂雙峯並細數紛紛亂石髙豈有風塵勞白羽謾思文采照宫袍雪融二月溪流合洞口誰尋千樹桃餘不溪辭餘不溪水涵緑蘋微風吹波蹙龍鱗看山蕩槳不知逺兩岸桃花飛接人溪回路轉松風急竹林華房霞氣濕忽逢道士頎而長疑是韓國張子房相期飄拂紫煙裏下攬滄溟浮玉觴義興吳國良用桐煙製墨黑而有光焰膠法又得其傳將遊吳中售諸隱君輒賦詩速其行云生往荆溪上桐花收紫煙墨成羣玉祕囊售百金傳孰謂奚圭勝徒稱潘谷仙老松端愧汝桐法更清妍聽秋軒聽秋軒裏聽秋雨定起山僧坐翠微隱隱煙濤搖夜席濛濛花雨著人衣驟如崖瀑衝雲落宛似湘波鼓瑟希六用根塵今已淨松篁隂下共香霏友人期過寺中不至山寺擁罏夜風聲如怒濤獨吟何水部還思王騎曺曠達豫所羡阻别心增勞來兹慰幽寂輕舟可即操贈天寧寺福上人荆溪霜落後銅官日出初自櫛頭上髮更理篋中書上人從定出詠言方繞除邂逅發微笑幻身同太虗李文逺製墨以贈吳寅甫次韻潘衡墨法老坡傳承晏相承又幾年獨依山室燒桐子贈與仙人寫內篇石竈霞光存活火夜帷雲影泫清煙要知文字遺不朽猶向詩中咏墨仙奉題曺文貞公墓道奉先亭奉先亭子山之隂雲氣低徊何處尋烏啼隧道風林靜蘚剝龜趺雨後深故老猶言前日事鯫生漫感二毛侵河山流峙英靈在世事紛紛一短吟曺文穆公既歿韓伯髙參政為其子買宅京口清貧我早識尚書身後韓公為結廬可使家聲今不替也趨禁直未全踈忩臨墨沼揚雄宅郭映雲林謝朓居共愛諸郎遊息地風雩間詠暮春初十二月七日與季堅與之夜坐走筆書贈與之僧扉共卧風雨夕嶽生清真何太顛持家有弟足自慰沽酒無錢殊可憐梅蕊衝寒欲放白燈花惱人故生妍孰知旅枕作孤夢周處祠前行買船遊善權寺冒雪還重居東院來窺善權洞一上李公樓水玦簾前引雲旌松際浮燃燈長不夜垂釣只虗舟欲讀吳朝刻真成冒雪遊十七日過與之洛澗山莊留宿復大雪作及明起視户外岩岫如玉琢削竹樹壓倒徑無行蹤飄瞥竟日至暮未已雪深尺餘賦詩留别世途縈荏苒嵗晏不知歸密雪竹林夜挑燈共掩扉稍移神慮靜髙咏玄言微遇此岩中賞初心悵多違贈墨生岩谷春風起桐花落澗紅隔水輕煙發收煤石竈中豹囊祕玄玉鵝池生白虹湯生法潘谷千載事同風次韻重居寺柯博士壁間舊題至正辛卯初月五日春意動逺水蕩漾晴如何鏡中羞見白髮短栁上愁看青眼多起拂緑琴歌楚調為留明月挂松蘿弭棹溪南一杯酒他年浪迹倘重歌題曺僉事畫溪山春霽圖荆溪之水清漣漪溪上晴嵐紫翠圍連舸載書煙渚泊提壺入林春蕨肥身逺雲霄作幽夢手栽花竹映山扉磯頭雪影多鷗鷺也著狂夫一浣衣示友人子處窮愁際我居憂患中貪殘墮鬼國喜怒屬狙公莫笑淮隂俯誰同鮑叔風雪汀留雁迹飛舞任西東至正十年十月二十三日豫以事來荆溪重居寺主邀豫寓其寺之東院凡四閲月待遇如一日豫歸命大覺懴除垢業使悉清淨乃為寫寺南山畫已因畫説偈我行域中求理勝最遺其愛憎出乎內外去來住止夫豈有礙依桑或宿御風亦邁雲行水流遊戲自在乃幻岩居在於室內照胸中山歷歷不昧如波底月光燭眄睞如鏡中燈是火非紿根塵未淨自相翳蔽耳目所移有若盲瞶心想之微蟻穴隄潰囅然一笑了此幻界為方崖上人畫山就題摩詰畫山時見山不見畫松雪自纏絡飛鳥亦間暇我初學揮染見物一似癡郊行及城遊物物歸畫笥為問方崖師孰假孰為真墨池浥涓滴寓我無邉春初書記以詩來别且諄諄開諭深見方外之情因走筆次韻奉謝并期面别但知四大皆假合順境逆途非樂憂夢中妄想驚得鹿海上忘機思狎鷗舉世何人到彼岸獨君知我似虗舟詩來説法能開諭頑礦無情也點頭題方崖墨蘭蕭散重居寺春風蕙草生幽林蒼蘚地緑葉紫璚莖早悟聞思入終由幻化成虗空描不盡明月照敷榮題方崖臨水蘭蘭生幽谷中倒影還自照無人作妍暖春風發微笑二月二十四日潘子素王叔明來慰藉臨别為寫水傍樹林圖并賦詩積雨開新霽汀洲生緑蘋臨流望逺岫歸思忽如雲絶句三首秋水清空似泛槎此生汩沒似無涯蕭間堂上收書坐八月芙蓉始著花芙蓉花下坐鳴琴疑在瀟湘斑竹林翠節霓旌煙雨濕秋來江水不知深嶽王孫子最清顛袁老彈琴和澗泉一簀松肪初釀得賸將醉爾竹林前鄭明德新居僦居吳市仍栽竹挂榻髙齋獨待豫風引香煙金鵲尾雨添書水玉蟾蜍仲舉未應治一室更生何用博羣書繞牀阿堵那嫌俗每罄金錢一飯餘潘純字子素淮西人世儒業博學通古今善談笑作詩為文逈出流輩壯遊京師名公大人無不與文晚居淮浙間名重一時云題周公瑾墓伯符早世將軍死鄴下羣臣賀魏公石馬荒涼眠道左紫髯倉卒帝江東二喬信是傾城色甲第空規建業宫百尺孤墳蓋春草逺林寒食紙錢風山行即事石子路三義居人八九家緑分鄰寺竹紅出矮墻花野老能娛客山泉自煮茶茜裙誰氏子赤腳髻雙丫題嶽武穆王墳二首海門寒日淡無暉偃月堂深晝漏稀萬竈貔貅江上老兩宫環珮夢中歸內園羯鼓催花發小殿珠簾看雪飛不道帳前敕勒舞有人行酒著青衣湖水春來自緑波空林人迹少經過夜寒石馬嘶風雨日落山精泣薜蘿江左長城真自壞鄴中明月竟誰歌惟餘滿地萇𢎞血草色年深碧更多送顧仲父赴廣東市船提舉合浦明珠久不還使君風采動羣蠻鮫人把臂來城裏荔子堆紅出坐間江映蕉花鸚鵡緑雨昏榕樹鷓鴣斑昔年駿馬經行處父老那知得重攀題蘇伯修滋溪書堂華屋書充棟清溪樹拂簷波光浮藻井雲影亂牙籖四世風流在諸生禮數嚴歸來謝賔客長日下踈簾題伯修春風亭青陽動微和條條原上來緑池解輕氷芳庭散香埃粲粲桃李花照耀初日開永懷亭中人春服宜新裁送杜元父赴南臺掾故國江山在行臺地望優顧瞻烏亦好却憶鳳曽遊寺隱清溪曉蟬聲玉樹秋郎官多古意莫上最髙樓題豫章楊季子水北山房舊聞楊季子水北有山房竹色長年緑松隂五月涼雨絲深釣渚風帙散書牀亦欲相從去江波不可航送金溪道士南歸南州髙士芰荷衣賣藥都門盡不知手種溪頭千樹杏花開正是到家時送諸葛子熙關中打碑漢苑秦宫生緑蕪斷碑殘刻墨糢糊應從三峽浮船下欲問君家八陳圖送路吏張蒼麓又别號養晦循國忠烈王諸孫寂寞麒麟閣浮沉雁鶩行已聞書上考猶不負前王古井宮槐冷空山海檜長歸心似潮水日日向錢塘送杭州經歷李全初代歸東家老人語且悲衰年却憶垂髫時王師百萬若過客青蓋夜出民不知巷南巷北癡兒女把臂牽衣學畨語髙樓急管酒旗風小院新聲杏花雨比來官長能相憐民間蛺蝶飛青錢黃金白璧馱西馬明珠紫貝輸南船繁華消歇如翻掌官中賦斂年年長里巷蕭條去不歸華屋重門結蛛網語中嗚咽不欲聞道旁狼虎方紛紜麒麟鳳皇那復得使我益重髯參軍參軍在官近一考素髮蕭蕭坐成老上官掣肘下吏罵賴有閭閻獨稱好杭州公事天下繁大才處決無留難參軍纍官日益貴何術可使斯民安桐花煙為吳國良賦常聞吳剛上天去手斫嫦娥宫裏樹調向人間作散仙陽羡州中水邉住曽見玉兔搗玄霜三生悟得燒墨方墨成得錢即酤酒那知世有白玉堂百年生計萬慮息身不求知名四集卧吹長笛看青天嵗掃桐煙三百石周郎昔斫長橋蛟腹中有白凝為膏石牀暖傾玉髓滑竹屋夜搗山月髙江南李墨人共惜安得今人不如昔君看鬱鬱歙州山山上青松盡千尺題顧周道畫濯足圖脫屨白石上濯足清泉中悠然天際想木末生微風題髙宗二劉妃圖秋風落盡故宫槐江上芙蓉並蒂開留得君王不歸去鳳皇山下起樓臺題趙子固蕙花蛺蝶圖江上青山日欲晡幽花小紙墨糢糊華清宫殿生秋草零落滕王蛺蝶圖題王若水幽禽圖花間幽鳥愛幽棲揀得春風最好枝只有江南王若水白頭描寫是徐煕贈歌者杜氏入道夜涼瑶珮玉丁東月下焚香禮碧空願逐吹笙王子晉並騎丹鳳彩雲中簾壓濃寒晝掩門沉香火暖淡氤氲舊時衫子渾無用剪作仙家百衲裙雲髻髙梳鬢不分掃除虗室事元君新糊白紙屏風上盡畫蓬萊五色雲秋日奉陪徴君李先生遊華山輕雲淡秋色涼日靜琳宮水落白石上人行深樹中悠悠坐長嘯肅肅來清風仙人不可見芳草碧叢叢題巾子山房僧室清江抱禪栖山頂在屋下朝霞生庭户老樹立石罅日出漁舟集日入市賈罷僧子獨何為長年事間暇送海東之西省出戍窮猿憑險弄干戈五月樓船奏凱歌自古蠻夷多反側只今州縣重差科漢家循吏文翁少亮府謀臣馬謖多莫道鮫人居水底海中曽見不揚波題劉高州國初運糧文卷後帝室經營始髙州饋餉多猶存數紙在已是百年過勳業麒麟閣英雄敕勒歌漢廷功第一只合數蕭何草堂雅集卷六

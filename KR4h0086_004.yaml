傍時復過人看不是姚江摸金手扁舟載翁入畫圖空江無人釣影孤前汀後渚雪相失雲水一片光糢糊釣魚未得清興足歸路何愁徃来熟野橋酒斾晚不收黒處炊烟是茅屋李太白觀泉圖玻瓈杯中春酒緑醉墨淋漓牡丹曲平生合置七寳牀白紵烏紗美如玉阿瞞荒宴百不理寜計宫花銜野鹿何物老嫗生此兒偷向金雞帳中宿髙将軍纔奴𨽻耳誤使脱鞾吾所辱要留汗韈踏鯨魚䑕子何堪煩一蹴尋常溝瀆不可濯何處容仲遭汙足翻然却下匡廬雲五老峰前看飛瀑文敏公畫馬囘紇牽者為玉山題君不見漢家將軍求善馬戰骨縱横血流野歸来作歌薦宗廟寜悲鬼哭宛城下何如聖代徳所懐入獻磊落皆龍媒右牽者誰鬈且䰄萬里知自流沙来眼光鏡照蹄腕促老奚識性仍善牧時巡之外㳺幸稀飽秣原頭春苜蓿吴興學士藝絶倫妙處不減曺将軍只今有馬無此筆誰與寫之傳世人為君甘老駑駘羣題雪溪待渡圖晋陽山下蒲村渡斷阪連岡叠烟樹横汾水落流更急客子西歸廹秋暮朔風轉雨作雪飛倚盖沙頭泥沒屦後来者誰須我友望望津船出前溆濕雲撲地邊鴻驚危橋挂岸征馬生樵家有逕凍葉平土牀火煖無人聲亂峰倒倚白石爛空壑半壓氷楂横歸来想像由眼底詎擬褐夫能貌此溪明雪净古色起一片荒寒在忩几嵗晚逺㳺吾倦矣華岳江城秋晚圖巉然壁立邊江城黄州鄂州勢相争石根半挿沙水底蒸土睥睨鐵作成江上風起波浪湧江頭日落鼓角動吴艎蜀艑慘不發氣逼蛟鼉寒更重汊前汊後攅千桅逺帆側欹搶岸来亂山截斷暮色𦂳飛鳥去盡秋聲哀州中監門老落魄今無行人門尚開隔江漁村亦斷渡落木黒入荒烟堆上流形勝有如此今日蕭條空城壘想當乗興盤礴時半在經營詩句裏田家始識華子崧老我對此精靈通鄉来漂泊古城下一柁秋濤曽阻風長孫皇后諌獵圖黄門曉出西清仗秋色滿天鷹犬王虎落遥連渭水南鸞旗直度河橋上日邊雲起五色文虬鬚天子真天人羽林猛士森成列六馬不驚清路塵太平無征帝神武豈為禽荒將按旅已知賢后佐興王不數樊姬能霸楚從容數語即罷田六宫迎笑花如烟蹕廻那待外庭䟽聽諌由来同轉圜天寳神孫隳大業錦繡五家争蹀躞可憐風雪驪山宮政與真妃從射獵題華山圖贈天台陳應榮仁本華岳連天向西起澒洞秦川三百里巨靈仙掌削芙蓉影落黄河一絲水雲臺霧谷巢神仙羽衣金節時周旋道人失脚白騾背歸来石上長鼾眠千載悠悠寄𤣥賞裔孫風骨猶蕭爽逺從丹丘渡滄海追挹神蹤欲長徃何人想像圖真形叠崖隂洞髙林青上摩金天之帝京下攬玉女之明星峰耶雲耶兩莫極虎豹叫絶烟霏𠖇仙家樓觀超然住遥認㣲茫是征路丹梯鐵鎖不可攀直喚茅龍上天去題玉山所藏唐人呈馬圖天育驥子初長成廐官引轡将進呈頭如游龍兩耳聳青絲絡腦屹不動君王一顧生光輝黄帕已盖銀鞍歸當時四十餘萬匹此馬權竒當第一曺將軍畫老有神龍眠居士尤得真兩家翰墨嗟已矣今之筆跡無乃似黄門從令森羽儀遺事可按開元時古来良馬多泛駕振鬛長鳴思御者君不見材士不可羈寜肯進呈如此馬六月二十六日泛湖遇雨忽雷矆睒奔雨急山靈晝藏水仙泣蝃蝀下飲湖水立恍惚疑有蛟龍入疾風吹裂南天青芙蓉放香薫水腥吴歌楚舞方爛漫更盡花間雙玉瓶舜舉二馬喜摩怒齧馬真性角壯難馴非馬病羈銜乍脱秋田收蹴踏八蹄騣凶鬯匕尾映世人但識驪與黄天機黙識誰能量已從畫手失錢選可信善相無孫陽秋岸行旅巻錢郎筆底秋萬斛蒼茫染出苕溪曲苕花吹老鯉魚風石底沙茸出叢緑野橋横岸向何處浮玉山前水如玉宛然柳惲乘馬歸望入溪山吟不足我来江北見此畫快意頻挼雙倦目頓令幽思滿吴中舒巻烟雲慰羈束自然新句贈霜葉幾度詩成鞭影矗相期歸去白蘋洲手採秋茸葺為屋髙彥敬山水房山得法黄華山筆力斷取青孱顏居然真境開九瑣中有美人茅屋間羽人訪道不辭逺一劍江湖㳺未返時從畫裏到家林老木清溪照層巘我思鄧葉兩隱君天壇石室多白雲紛紛相尋採芝去寄聲黄鵠君應聞三友圖青松磥砢蒼筠扶南枝玉立春風腴氣陵嵗寒林壑重影落太空霜月孤三生石上同友于蒼顔翠䄂相紛敷似君兄弟長相合更勝韋家蛱蝶圖蟠松引何年風雨拔老湫乾卧千嵗長黄虬垂胡磥砢髯怒磔雷火不敢燒其瘤卒然一見勢欲攫况可手捫雙角觩縣知根受元氣大跁跒力争厓石礙樛枝互錯横鐵鉗弓紐弛張欹羽盖低無𤣥鶴寄巢居幽有蒼䕫出光怪故人語似靈岩山卧雲之樹同屈蟠身横百圍容客踞聲入半空生晝寒畢宏韋偃世無有畫史掉首應嗟難彼當為甲此為乙造化偏鍾兩竒崛愛之我欲重摩挲圖讃還湏怪魁筆君不見龍門寺千丈齊聳巄嵷䕃白日題髙侍郎竹石髙侯畫石聊信筆更著數竹穿雲根豈如王宰湏五日率爾意到精靈奔東齊野人開一樽想見盤礴須眉掀破泓秃穎發光采渭川太華相雄吞竹如劍拔石虎蹲濃雨晝黟蒼烟渾淋漓滿紙元氣濕尚帶當時紅酒㾗只今作者漫紛紛前軰風流無復存君不見寂寞雲山烟霧裏古苔空卧老龍孫題玉山所藏魏國夫人趙管墨竹夫人手冩坡詩竹後自京師寄子仲光龍香煖脱青螺靨麝劑光凝生漆㸃玉臺迎曉畫眉殘紫硯新磨𤣥染一枝戯寫碧嬋娟冷雨欲飛粘濕烟雲忩霧閣春窈窕恍如移置苕溪邊苕溪綿綿秋水隔滿眼京塵𣺌相憶微綃一㸃氷雪生弱蕙幽蘭少顏色書中曽有衞夫人畫裏何如崇徳君林下風神元散朗尚從墨妙見天真陳所翁畫九龍戯珠圖兩龍頡頏出重淵白日移海空中縣一龍廻矯一倒起側磔胡髯怒歕水大珠炎炎如彈丸爪底雲頭争控摶一龍仰首逆鱗露兩龍旁睨蒼崖蟠怪風狂電浩呼洶天吴猝立八山動一龍後出尤崛竒半尾戲繞蜿蜒兒兒生未角已神猛一顧却走千蛟螭陳翁硯池藏霹靂往往醉時翻水滴便覺天瓢入手来雨氣糢糊渾似墨我常見畫多巨幅簸蕩驚濤駭人目何如此筆窮變化三尺微綃形勢足是翁前身定龍精故能吸歘奔精靈巻圖還君慎封鐍但恐破壁飛空𠖇題李早畫女真三馬圖金源六葉全盛年明昌正似宣和前瑶書玉軸充内府時以李早方龍眠想當畫院供奉日飽閲天閑萬竒骨䓁閒㳺墨落宮扇逸氣凌空欲超忽露鬛風鬃剪剔新郎君馬上玉為人四帶紗巾綉衣領醉鞭踏盡燕臺春一聲白雁黄河暮豈料征蹄競南渡囘首西風障戰塵女仙空抱琵琶去題林若拙畫孤山圖孤山處士孤吟處水影月香餘妙句鶴聲呌絶陵谷秋修竹祠空幾愁暮白雲生根著湖水力盡西風飛不去何人鞭石下崔嵬中流截斷魚龍路丹青楼觀花如霧葵麥無情憶前度何似槎牙半死枝百年猶是咸平樹荒烟壊栁斷橋氷宿葑田深散鷗鷺畫船歌舞不須㬰落落詩名自如故野人亦有滄洲趣安得數椽相近住長待天寒欲雪時杖藜来訪梅邊墓題趙仲穆怪石竒木君不見岳陽城老樹能化人又不見北平路草中銕石如卧虎樹逢岩客授還丹石誤將軍飲飛羽海寜太守提健筆與丹通靈箭角力山精木魅寒睒睗千年醜怪匿不得銜瘤半裂雷火出隱入雲綃露竒磧天機所到無徑畦氣盡畫工俱辟易掛之髙堂風動揺古色一片秋蕭蕭待侯硯池捲東海歸掃榑桑與沃焦留題蒲禧湄洲島天妃廟飛舸鯨濤度杳𠖇祠光壇上夜明星蛟龍筍虡縣金石雲霧衣冠集殿庭萬里使軺絶游觀千秋海甸仰英靈臨流欲借天風便髣髴神山一髪青題吴性存所藏趙仲穆竹枝雙蝶圖與玉山同賦滿叢鮮碧露團香院落春紅過野芳蛱蝶一生花裏活飛來還戀竹風凉顧瑛詩曰閣道春風度湘簾晝景斜初晴雙蛱蝶也解逐羊車題看雲圖歩入溪南水盡頭青松白石淡於秋片雲似解幽人意自在山椒去復留題竹枝便面白團横出碧参差恰似天壇石上時月色夜凝風不動一枝倒影入圜池草堂雅集巻四

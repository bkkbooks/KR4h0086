body:
  text: 草堂雅集卷四元顧瑛編張翥字仲舉晋寜人由國子助教起家仕至翰林待制送玉繼學憲使之官淛東滄海遥東析木津太㣲光動婺華新吏来逺驛迎官舸使出南臺捧帝綸酒浸别筵秋滿樹弩驅前馬路無塵玉堂學士如公幾咫尺朝廷屬舊臣早秉鈞衡翊聖朝逺移繡節下雲霄君王當宁思賢佐父老連城望使軺船壓魚龍江水伏旌軒鳥隼海氛消應憐寂寞垂綸者白首滄浪不見招石頭城次薩天錫韻坡陀石路帶城遥古寺殘碑蘚半凋一自降王歸上國空餘故老説前朝壊陵鬼剽傳金盌畫壁仙妝剥鳳翹更欲留連盡竒觀夕陽江上又生潮臺城運盡黄旗晋祚開天星俄復坼三台方驚掘地雙鵞起即見浮江五馬来草暗離宫碑卧土雨殘戰地骨生苔當時一掬新亭淚誰信清談自有才辱井石䦨好事能收斷石存摩挲堪惜古雲根樓空野寺鐘何在宫浸寒蕪井已眢古篆半餘䦨上字妖姬猶有夢中魂試捫窪處紅猶濕不是臙脂是血㾗鹿苑寺周處讀書臺陪觀志能薩天錫飲千古南朝幾刼灰蕭梁寺額獨崔嵬化蛇妬婦餘空井刺虎將軍有廢臺江口山紅寒照沒石頭樹白暝烟来滿衣落葉西風急更使憑髙送一杯贈元谷胡生生住黄山第幾谷結茅石上獨探𤣥豹藏曉霧文章潤鶴起秋空羽翮鮮朝市誰歌大招隐星辰自斷小行年秣陵城裏一相别明日将詩還卜錢寄志能天錫二臺郎玉臺新唱錦囊文長憶風流二使君齊國徒知賔孟子漢廷還許吏朱雲斗牛夜氣浮空見江海秋聲隔樹聞幾擬雙魚通逺信石城潮上月紛紛送陳敬甫太祝肅穆齋宫進冊時舎人舊已習朝儀五雲光動君王署萬嵗聲傳祝嘏辭春岳泥金随部帳夜壇爟火望華旗布衣亦有鐃歌曲安得因君到帟帷題嚴次平畵寒林雪霽圖峯前峯後雪新晴茅屋林深凍葉平依人應有麋鹿到隔屋逈無烟火生溪舫礙氷魚未得野橋見路客初行鄉来一段荒寒意曽在江南眼為明王侍御所藏商尊商鼎商爵焜煌緹几見商尊得自西周之古墳不著瑶舟麗雞鳥獨留畵象煥山雲器来鎬鼎非遷洛字紀商年政事殷我欲興懐一盛酒醉摩遺刻弔姬文古於玉敦與琱戈世質如無欵識何鑄想禹金還郏鄏列曽湯廟薦猗那龍文舊象光如拭豕腹遺烟墨不磨珍重傅巖人去後鹽梅今復待誰和此爵何年出商邑定知神物䕶飄零苔侵寳骨斑渾漫土蝕蒼銅色絶腥朱字僅分科斗勢赤雲猶飾鳳凰形與公侑坐儕三雅合與尊前醉不醒見雁雁行新自雁門来逺度平沙陣勢開光禄塞空霜氣冽受降城廢水聲哀烏孫公主歌難和猿臂将軍射未囘今日客中腸易斷不湏更上最髙臺送柯敬仲之京師給事先皇禁邸中歸来空抱小臣弓魚龍夜落黄河水鴻雁秋征白霫風郢國善歌推宋玉漢廷能賦待揚雄如君必用才猷進重見金閨盡籍通説劍論文每㑹心相知惟我最情深同行巳愧非連璧一諾還期重百金雨後沙堤車似水日邊天闕羽如林笑談即此成千里囘首飛雲繞故岑送唐子華赴江隂教授廣文三絶畫尤工合置江山勝槩中故塚尚遺黄歇邑諸生常薦素王宫市饒稻蟹秋田熟潮動㠶檣夜閘空别後想君書到日苕花吹過鯉魚風徐子英畫燕雛寓意屬予題之曽立庭隂看燕雛羽毛長就色如濡恩深卵翼渾㤀報愁絶雌雄漫自呼楊栁影空遺殻在蒺蔾魂斷舊巢孤憑君莫為㤀情嘆畫取林間返哺烏吴江王氏水雲深處湖平天濶開詩境宜著幽亭俯碧潯閒許釣徒分半席浄饒沙鳥占全林青連河漢秋無極黒入菰蒲晚易隂更好扁舟明月夜醉擕長笛寫龍吟鳳山衰草寒煙老木風南朝佳氣落秋空璧来山鬼遮秦使盤泣銅仙别漢宫壊埒尚傳祠乙鳥荒池曽見射飛鴻騷人自古多才思長在登臨感慨中西湖氷合父老傳六十年不見矣西湖雪後凍徹底行人逕度如平川風吹鹽池結隂滷日晚玉田生暖烟魚龍穴底寒更縮鷗鷺沙頭饑可憐安得長氷過滄海我欲三島求神仙有懐建康三友祝蕃逺時正郡學聖皇端拱致時平妙選羣才属汗青一代彌文懸日月萬方同軌走雷霆敢希太史紬金匱更待中郎寫石經出處與君俱有道不煩猿鶴謝山靈氷蟾為金齊賢賦老蟾素魄禀金精千嵗玻瓈幻結成明水夜零隂燧凍丹書秋滿肉芝生腹凝寒露藏虚白影入銀河浴太清擬問嫦娥乞靈藥與君騎向廣寒行分題初陽臺送西湖楊貫道方士来居最上峰白泥丹竈錬芙蓉火符入夜廵金虎日暈浮溟馭赤龍天逕有雲来羽駕地靈無草沒仙蹤何當與子凌千仞飛佩朝霞可上從分題投書渚送沙彥文架閣江南髙人豈作致書郵盡棄封函向石頭故跡不随烟草沒遺風長與楚江流悲臺鷹下川雲暮别國龍囘嶽雨秋君過渚涯須艤棹題詩相寄莫沉浮劉商觀碁圖鶴髪羅衣四老仙空山流水境蕭然松根柯爛人忘世石上棋歸洞有天刻本只今追粉墨遺蹤何處沒雲烟信知甲子須臾事又數龍眠二百年上元夜雨門外東風驚落塵夜寒街鼔斷無人江山長抱千年恨雨雪虗銷一月春紅蠟光深行酒罷玉龍聲急落梅頻隣翁聞說兒時事何異繁華夢裏身呉興公修禊扇頭觴咏羣賢意態俱青林叠嶂細縈紆蘭亭勝㑹當時重蠒紙遺書絶代無紈扇秋風生翠袖玉華仙露濕金盂髙人約入天機巧更覺風流映畫圖送錢思復之常熟州從段吉甫判官招凉風震澤正芙蓉客次詩才足自供賔主東南知盡美雲龍上下喜相從雁飛驛路三秋雨楓落江橋半夜鐘念子逺逰勞夢想親庭囘首故山重寄題薛𤣥卿瓊林臺學道空山謝世縁築臺先近蔚藍天掌中露堕朝和藥鶴背笙来夜望仙漱齒下尋丹井水存神對坐石爐烟知君自食琅花實小閲人間五十年題傅髙士太古樓羽客栖𤣥紫極宫樓居三景自玲瓏㳺神宛在鴻荒世探道元居恍惚中隔檻人烟南浦樹過忩帆影上江風如何燕坐忘機者千刦塵縁一息空送徐庭玉知事之官兩淮廣教府公府初開象教崇羨君髙選過淮東放龜溪暗帆檣雨騎鶴城荒鼔角風官次暫須從事幙願香仍結梵王宮定知詩酒尋僧社共醉春園芍藥紅壬申元日大雪二日立春晴景豁然春讌有作白雪青天映日紅樓臺髙下玉山重盤蔬曉送氷絲脆釵荇春生蠟蔕融北斗龍杓廻後夜東皇鸞輅駕靈風何如得接雲霄上一看烟花繞禁宫松雪齋墨芷花使節来書大士碑滿岩芳草正花時移将怪石山僧供寫入幽蘭醉客題香斷海雲人𣺌𣺌葉稀秋露墨離離玉堂名筆今尤絶留取緗囊慰所思無題見時畧畧望迢迢有月䦨干待袖招得巧蜘蛛絲縷細傳聲鸚鵡舌闗嬌仙家絃管寜無譜天上星河亦有橋雲雨或時消息斷不如朝暮石城潮上清山中烟景空明石路㣲千年草木駐光輝山中宫闕金銀氣天上神仙黼黻衣赤日大溪魚欲化青雲𤣥圃鶴長飛只今浩刦頻来往未信滄洲與願違昭真觀天壁中開古木寒日華金榜敞𤣥闗神君仗節龍髯下仙子吹笙鶴背還隂洞夕嵐凝石頂丹池秋水注雲間欲憑靈藥生毛羽遂向青山結珮環青山道中獨騎瘦馬吟歸去路遶荒山暝不分霧中早日白於月木際寒松多似雲龍蛇大澤蟄未起雞犬前村聲亂聞来徃風塵祗自老金堂石屋有徴君送彭大年逺㳺袖有神方煉紫荷暫封丹檢出烟蘿仙人海上追黄鵠道士山中認白螺棗木斗盤藏霹靂楊枝瓶水瀉天河只因小閲開星刦一劍秋空處處過癸卯嵗八月十六夜月蟋蟀梧桐秋滿庭浮雲散處見踈星仙人修月渾無跡使客乗槎自有靈一道銀河通碧海三更白露下青冥西風忽起吹黄鵠夢斷瑶池醉未醒秋暑喜雨寄柯敬仲赫赫秋陽無奈何西風忽起夜深多星郎牽犢飲河去神姥騎龍行雨過啼螀落葉兩蕭索飛電流雲相蕩摩睡美不知忩月曙楚人已唱雞鳴歌時中博士見示大事諸篇奉題駐蹕原頭奏事時六飛前路擁旌旗雲随豹尾瞻朱輦日近龍顏賜玉巵羲仲重頒堯典厯叔孫舊掌漢官儀知君才調宜歌咏第入郊壇雅頌詩題胡漢卿參政祈雨詩卷明公誠意與天通帝勅江湖解雨封大地風雷驅旱魃重淵雲霧起神龍涸泉已發缾罍溢焦土還滋草木濃聞道四方猶苦旱更傾河漢救三農寄陳子平時寓揚州常以所作瓊花詩見示鳳在陽岡鶴在臯相思空遣夢勞勞簫吹夜月江橋酒槎泛秋風海市濤故國山川吴分野美人詞賦楚離騷璚花新製人争寫應使揚州紙價髙送宋員外調閩選畢還京師聖主求賢禮數崇䇿名髙歩冠南宫乗槎析木天津上奏賦甘泉鹵簿中染翰墨凝仙掌露䕶衣香散御爐風只今帝業熙千古正待儒臣黼黻功寄别陳渭叟空山花開春事幽道人結屋居上頭胡麻随水有時得杏子成林誰敢偷金銀氣襍丹光見澗壑響帶松聲流寄詩黄鶴一相别獨立滄浪歌逺㳺拜祖塋我祖神靈如在上曽孫来此獨踟蹰佳城白日三千嵗喬木蒼烟四十株天逺難歸華表鶴客㳺終作首丘狐生平不觧青囊術自愛溪山正向隅郡城晚望覽臨武堂故基全晋山川氣象開滿城烟樹擁樓臺土風舊有堯時俗人物今無楚國材千嶂晚雲原上合兩河秋色雁邊来昔賢勝賞空陳迹落落登臨畫角哀林椿銀瓜圖老圃筩瓜白銀色味好不弱秦東陵輪囷一蔕卧朝雨蕭索幾葉抱秋藤金盤玉井若為薦蒲鴿黄斑何足稱嗚呼畫史覷天巧使我肺渇思浮氷春日有懐柯敬仲博士建章鶯囀曙光初上直開門漏㸃踈花擁西清森仗衛星臨東壁煥圖書漢庭長者多推轂楚國騷人久卜居為問五雲仙閣吏綵毫春咏近何如夜思月落未落山四更雞啼不啼霜滿城起看北斗寒挂地俯聽長江流有聲今夕何夕耿無寐千古萬古難為情欲持心事出門去哀歌坐待東方明行窩有雙燕來愛而賦之我屋非王謝何堪供汝栖落花新過雨芳草未成泥故國滄溟逺危簷夕照低墻東有閒樹更乞夜烏啼南園燕集雨後有作驟落菰蒲雨遥生菡萏風歸雲龍井黒倒照鳳山紅簾暮舟頻引衣凉酒屢空歌聲未可放花底有驚鴻九日行湖上是節最闗情随山得散行西風片雨過落日半湖明野菊黄堪把官醅緑可傾坐来無限思散入逺鴻聲賦句曲芹塘華陽深處有詩家小築方塘不種花絶似青泥坊裏住一杯野飯煑春芽桃源春晚圖為玉山題流水空山幾度春白雲隔斷世間塵桃花一放漁舟入不是秦人是晋人清明日舟次京口即事細雨斜風欲斷魂客塵聊復縱芳樽舟人也作清明節花挿船忩栁挿門水複岡重路欲迷人家籬落酒帘低江南處處春相似躑躅紅邊蜀鳥啼邯鄲畫軸等是邯鄲道上人黄粱炊老百年身從渠説破功名事猶自痴兒認作真露坐官街人静鼔鼕鼕獨坐中庭滿扇風堕地一絲和露濕青蟲懸在月明中宋徽宗畫梔禽龍沙魂斷夢華空遺墨凄凉扇面中三十六宫恩怨盡更無花鳥訴秋風奉和王繼學参政見寄天上文章帝杼機矞雲長繞日光飛誠知五色山龍線不補山人薜荔衣馬上望江南諸峯浮雲散盡暮天空遥見江南數十峯安得夸娥兩神力為分蒼翠過淮東宿㑹食村老翁稚子笑牽衣盡向龍祠念佛歸溪水不明林樹黒繞船螢火作團飛畫犬恣態生獰不可羣向人勢欲起狺狺何因與䑛丹砂鼎飛上仙家吠白雲孫康映雪圖膏火蕭然四壁貧書忩有雪夜堪親先生清莭千年上不作梁園授簡人文敏公畫馬未放龍媒十二閑塵沙吹滿汗溝間奚官牽向天池浴應是長楊校獵還送陳克讌㳺錢塘謁陳仲舉筆底縱横五色文故家才子少如君令人怕折江橋栁風起飛花攪白雲許由棄瓢巻瓠落空瓢亦解鳴先生那得耳根清縱令擲向溪流去猶有風聲與樹聲朱翁子負薪巻富貴危機解殺身是非千古付樵人當時長史魂應悔不向山中只負薪鄰園白白紅紅綵鳳花黄葵開滿竹籬笆莎雞栁蟄渾相託一片秋聲響絡車子昂蘭梅為玉山題佩纕零落墨香存
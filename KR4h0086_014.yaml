body:
  text: 草堂雅集卷十四元顧瑛編釋餘澤字天泉姑蘇之吳江人幼棄俗從覺王法研究教乘尤博儒書長遊京師名王大臣無不敬禮晚住吳之大𢎞教寺與余為物外交云送趙季文之湖州知事日暮江南歌采蘋春風催起宦遊人鷗邊水葉侵衣碧馬首山花照眼新公子文章應獨步恭軍案牘漫相親也知伯仲能忠孝堂上潘輿送喜頻題界溪顧處士竹逸亭築室臨溪界兩分修筠回繞翠如雲何當一舸東風便載酒來尋抱節君題顧處士梅隱齋雪後園林散策時橫枝踈蕊浸漣漪花間幽士身強健世故紛紛總不知次韻屬柏子庭首坐誰傳西祖意庭柏著徽稱吳下無尊宿鄞東有此僧遇緣隨所住與道最相應翰墨人爭玩年來氣益增次韻屬師夔典簿水東行幕下就見喜和光洗盞傳芳醁披圖閲翠黃宦情殊不薄道術淡相忘相業今誰似令人憶子房那希顏字悅堂四明人幼悟禪旨博聞強記寬厚好士王公大人無不折節敬禮奉母尤致孝住玉峰薦嚴寺與余草堂相去無一舍交往尤密云題界溪顧處士竹逸亭界溪分得渭川種直節虛心耐嵗寒月落林風吹酒醒詩成吟對翠琅玕題界溪顧處士梅隱齋竹外橫斜一兩枝花敷不與衆芳齊孤山月下無多樹分得仙姿在界溪釋寶月字伯明姑胥人明敏讀書幼從天泉座下得悟教旨住玉峰報國寺余凡往來經從必下榻談詩云題界溪顧處士竹逸亭梅隱齋二詩竹色圑蒼翠溪光凝碧流徵君頭半白于此獨夷猶橫斜一枝春清淺半溪水幽人樂間居暗香透窗几月明雪初晴爽氣動髮髓脫巾調素琴渺渺天如洗釋祖柏字子庭四明人故宋史魏王後幼從禪學有詩聲江湖間來往經余草堂多所留詠秋夜長柬玉山秋夜長秋夜長青燈半灺玉漏未央雲葉揚影露華凝光戲題隂涼室階前芭蕉新種芭蕉繞石房清隂早見落書牀根霑零露北山潤葉帶濕雲南澗涼得地初依蒼石瘦抽心欲並緑筠長雨聲夜響顛崖瀑晴碧朝浮海日光樗櫟自慙全壽命楩楠合愧托岩廊觀身正憶維摩語草字寧追懷素狂白晝栖遲吾計拙青霄偃仰汝身強嵗寒要使交期在莫畏空山有雪霜暮春雍熙寺訪沈自誠不遇暇日逺相問古寺幽且深青苔餘華落雙樹一鶯吟爐存散微篆茗熟獨成斟明當持山酒慰子客居心題趙仲穆看雲圖舊遊清苕上愛看辨峰雲稍將春雨度始見逺林分起滅悟真理逍遙遺世紛於焉自怡悅永懷陶隱君虎溪三笑圖境緣心妄起心悟境自忘三老同一笑物我兩茫茫月照清溪水風散白蓮香無端一笑已千古笑何長題倪雲林為韓復陽寫空山芝秀圖每憶雲林子隱居清且間褰裳采芝秀倚杖自秋山微雪松隂暝青苔石上斑韓康偏有意時復到柴關誠道原溪山晚霽圖道原隱于芝阜微雨過溪上青山草閣前牛羊知返徑童稚喜歸船煙樹村村鳥春泉處處田披圖憶芝阜頭白尚安眠題松溪漁隱圖老樹驚鵲枯莎怨螿幽人對景炯不寐西風一疊神凄涼我欲渡河無梁我欲濟津無航攀鱗附翼愧凡骨化金點石無仙方腰金秉象兮我貌弗揚剸蛟縛虎兮我機弗張有弓無由挂扶桑夜光明月孰辨昔那子黃河太華誰是今歐陽天寬地大若無礙無處可著詩人狂西風再疊兮形無爾傷黃鵠可跨兮蒼虯可驤南箕可簸兮北斗可漿所不可以智力而致者惟命之常何聖賢亦不能免于厄兮或毁于臧或畏于匡然大人虎變有不可得而測者豈非尋常之中而有築巖之傅釣磻之吕卧廬之亮納履之良者耶西風三疊兮聲始洋洋黃金滿地山花香呼童重洗琥珀觴籬菊已露螯已霜樂天知命兮吾亦從此逝矣相與忘形乎無何有之鄉也歌欲斷夜將半拔劍起舞無人伴却對嫦娥影凌亂君不見芙蓉曉夢萬花酣有人却恨春宵短效劉屏山作十二相屬歌鼷鼠不發千鈞機釁鐘無罪牛何之大人虎變不可測狡兔死窟元來癡龍梭懸壁風雷起常山蛇行首應尾服車良馬時使歟觸藩羸羊勢然耳楚人冠猴事有無雞肋取食難為圖纍纍堪笑喪家狗慎勿逺效遼東豬題闕蒲萄帳送玉山闕壁闕未落龍怒拏闕眼欲脫武陵春色正繁華勢闕頭活春無盡意不餘子生孫又孫生子箇箇闕釋良琦字元璞姑蘇人自幼讀書學禪白雲山中性操溫良淡然無塵想詩聲尤著江湖間與楊鐵崖郯九成纍過余草堂超然物外人也夏日招張師聖文學二首初夏稍清暢山茨景彌新桐花落井幹鳥語喜歸人苔石當坐卧松枝堪挂巾髙士一來此忘言道愈真雲深岩寺古復此涼雨積樹密聽猿啼苔深斷人迹觀理間慮逺懷君苦情役觴酒對幽花徘徊候山屐苕溪客館寄沈自誠處士秋齋人罕至落葉沒行屨旅宿將就途懷抱不可語偶有山中酒而無池上侣遲子一來過鈎簾對疏雨春夜宿海雲寺喧靜同一致大隱即山居乃知道者流所止恆晏如煌煌舊吳會鬱鬱髙人廬山閣花霧暝池館緑隂初復此涼夜長禪影流碧疏素友愜清會境寂鐘磬餘離坐忘言笑超然悟玄虛不卧如有愧塵路何馳驅題黃雲卿林屋先塋圖雲卿祖居洞庭後遷婁東懷其祖父寫圖以自慰楊鐵崖嘗題其卷云江夏先塋林屋洞七十二峰碧參差竁道冥冥雲作蓋秋畬淰淰樹成帷海鄉西望空情事江水東流永孝思好在披圖思禰祖楊侯佳句有深期送端上人歸松陵兼柬杭野雪上人富子微鍊師擕手玉山滄海東歸心潮水忽匆匆龍當艇子浪雨白燕拂袈裟海日紅林下固應留闕市人闕公多情闕我昔楚江上釣船時往還長歌送落日濯足對青山魚遊春草裏鳥去白雲間此意孰能解忘言心自間魚虎子圖翠羽畫殊絶窺魚秋水深忽來知險意靜立見機心沙白霜初落溪寒日易隂何當隨啄木除螙向髙林婁江西門夜泊明日將歸省有懷吳水西良夜維舟次題詩最憶君微鐘花外度清笛月中聞燈報庭闈喜杯從故舊分西城駐馬日還與入山雲遊慧聚寺和唐人詩海上玉子岡中有古佛牀娑羅晚猶翠薰陸靜逾香浮空諸天樂出夜神火光安能駐金錫居兹妙覺場寺闓江水近山沒海雲吞亂葉階前雨長藤石上根風帆知别浦煙樹見遙村載拜嚮師座天花滿洞門送濤雪江上人住淞江時思教寺古剎吳淞上東南第幾峰入雲山舞鳳奔海水如龍先哲行斯道玄談闡妙宗花飄金地靜月映寶林重之子稱才職于時合奮庸瓶盂曽萬里鐙火足三冬粹照還齊駕生融可躡蹤孤標同玉樹大器比金鏞髙遁因人出名山喜自逢紅衣明海旭鐵錫挂雲松聞法羣官集聽經萬指從鼉鳴初講鼓鶴散下堂鐘龍女珠應獻天厨飯亦供幸當昭代日復見德人容風雨春寥落江河浪折衝題詩一相送霄漢雁噰噰春日有懷郯九成春雨晝連夕間愁鬢欲蒼鶯聲在官栁草色映書牀每念庭闈逺仍憐簡帙荒却思摩詰室清坐只焚香為后蒼筤題李隴西所畫墨蓼花雙鳬玉山同賦李老畫精妙寫生尤出羣秋花照秋水川鳥亂川雲歷歷丹砂顆明明錦繡文詩成思獨往把釣大江濆顧瑛詩曰洞庭湖中曉揚舲楚郎唱歌越女聽沙上雙鳬忽驚起蓼花蘋葉滿秋汀過臨平山臨平山髙出雲霧下有澄江帶楓樹煙中漁子叩舷來竹裏樵兒唱歌去客行輕帆如鳥翰南風小雨生朝寒荷花浮水照征袂碧峰白雲當飯盤昔人經過題句好我不能詩空自老客路青山不及登紅塵明日錢唐道送王可舉之雲南省恭政張掖崑崙北燉煌僰道西酋官元鑿齒部落雜雕題分政恭華省殊恩拜紫泥鐃簫江月靜旌節塞雲迷荔浦飛鸚鵡榿林蹲兕犀威聲楊僕舊勳業武侯齊萬里連煙火三年絶鼓􅎏行看披玉籍按召步金閨招復見心書記見心豫章人時留山中逺公菴坐對芭蕉樹題詩憶豫章髙秋居石室落日卧藤牀衣薄雲霞濕心清草木涼亮公名不忝逺老約難忘柏子香煙細蓮花漏刻長了知無罪懴底為有身忙苔色青當檻桐隂緑覆岡能來一談笑共待月流光秋雲亭為茜涇楊道士賦茜溪之西隱者居竹間亭子最清虛窗寒似積隂崖雪路暝應迷過客車青青玉映題詩處細細香揚卷幔初便擬東遊走相問鶡冠久著道家書題仲義江居圖洞庭夫椒青插天湖水東與吳江連三髙堂西我昔住茅屋深入楓林煙是時吳子顏如蓮吟詩飲酒夜不眠緑水蕩舟花滿渚紅橋吹笛月當筵朅來留滯婁江邊吳也與我忘歸年沙雲海鳥雖可樂山光林影情相牽矯矯松鶴之癯仙跨鶴忽下崑丘巔手持幽居畫一幅把手展畫心茫然大峰岞崿溪洄沿翠竹白石鳴春泉不意僑居荒海上山與故人來眼前尋窗數户重歎息蘿磴雲迷舊行迹坐令清思落蒼靄七十二峰凝黛色人生何處非吾鄉男兒墮地志四方我將飛錫覽八荒乘風萬里同翺翔和答程用昭舍人見寄兼謝州太守諸官見過山中傳呼五馬出郊遲恰是從容政暇時鶯囀秋林華似雪龍回隂壑雨飛絲敲棋響落松間子命酒觴浮竹下池擬解衲衣酬玉帶山人却愧老元師相門玉樹長新枝况際清朝全盛時花映春庭趨綵服日明公館寫烏絲雪堂屢欵參寥室山簡頻遊習氏池好及秋風數來往釣船茶竈約漁師次韻程太守宿壽安寺行幕昏從梵剎歸坐聽蓮漏夜遲遲金鳴紫殿風微處香散珠林月皎時到寺題詩韓最好尋僧借榻杜嘗宜却憐林壑秋寥落此日須公政澤施郯九成吳竹里相期不至反有詩見招復用其韻草堂逺在白雲坡長夏歸來攬薜蘿修竹出牆黃鳥語青山當户緑隂多東林載酒能忘約竹里題詩許見過不有故人相軫念淮南桂樹為誰歌題初士元所畫雙樹圖時吳寅夫先生自梁溪來吳會于市樓居同題其畫梁溪溪上曉揚舲吳人竹枝自可聽不得回船繫崖石寺門松樹為誰青題初士元松亭圖蓮花一峰煙際青澗水松風長茯苓定復還山有佳句寄在支公放鶴亭次韻寄柯丹丘博士鼎湖龍去邈殊庭供奉歸來兩鬢青閣下天髙太白月江南人識少微星春泥下馬穿花入夜月吹笙隔竹聽惟有鷗波慰寂寞相看潔白映青冥書唐仲實寄題紫陽山興道觀詩後山有華屏峰道家祠宇瀛洲近才子文章逸氣飄虛白月明秋似水華屛雲色曉如潮虎蛇猶護蒼精劍鸞鳳應隨碧玉簫乘興幾時還獨往浮丘終隱不須招苕溪道中遊子看山溪上過雙溪昨夜雨添波長髯黃帽搖烏榜矮髻輕衫采緑荷楓葉岸頭秋色靜桂花天氣夕陽多太湖西畔饒生計好向漁磯坐釣蓑歸西山道中有懷自誠水西二友婁柬放棹歸來日水緑溪深逺映山新樹隂中啼鳥靜落花風外釣船還喜聞沈老鄰居近苦憶吳郎客舍間終擬暮年同結社杖藜來往白雲間栁暗江深積雨晴知君獨放綵船行歸心自為青山動客思都從芳草生新葦交加鷗渚沒飛花淡宕燕風輕桃莊回首雲迷路我亦懷人勞逺情春日寄柬趙仲光沈自誠二友二月湖州動客心青山粉堞帶春隂溪溪漁屋桃花靜面面歌樓栁色深西府門間鷗自到東林酒熟客誰斟風流二妙如相問為道清吟瘦不禁二妙謂韓濟之趙彥榮題春山飛瀑圖憶昔東留雪竇寺寺門瀑布兩峰懸銀漢翻濤迸落地玉龍破山飛上天洗盞每臨春澗曲翻經時坐古松前披圖不覺塵夢醒日暮空堂生海煙冬日過練川黃東溪隱居嵗晚來尋黃處士小艇曉入東溪雲水生栁下鵝鴨喜日出沙頭鷗鷺分枸杞子香浮茗碗枇杷花氣雜爐熏却憐清會難頻得明日南江又憶君冬日羅居士見過婁東寓所暉暉寒日照霜筠晨起開門見故人雙鬢已斑粗覺老一官初滿尚然貧船中書籍教兒讀篋裏詩篇得意新且盡茅堂一樽酒梅花栁眼不勝春題錢伯珍所藏草堂圖錢郎讀書性間雅草堂隨處卜雲林周顒不遂山居志梅福仍兼吏隱心玉洞桃花春霧暝石田芝草暖雲隂澗西一徑通深竹還許支公日見尋七月十五夜三賢閣望月有懷士瞻翁留匡廬璧月當江夜不收萬峰髙處獨登樓山河潔白非關雪草木凄清已是秋仙珮泠泠回海鶴星槎眇眇遡河流匡廬九疊雲開錦何許猿聲動客愁松下淵明圖謝安却為蒼生起陶令何辭印綬回若使生逢聖明世青松老盡不歸來次九成韻柬劉西村經歷海上煌煌漕府開幕中從事得賢才法流水寺談詩罷愛看秋山上馬回月浦道中江似三巴曲星隨獨樹斜客行猶轉柁秋盡尚迷家白漲寒沙霧紅生曙海霞故人驚見面老大惜年華夏夜山中山空素月出天淨涼雨住羣蟬鳴已息靈籟稍微度筧竹咽逺水鄰燈映深樹念兹栖栖者何由了玄悟題張元傑草堂讀書圖昨日雨晴歸碧山桃花滿澗水潺潺嵐光入壁圖書潤草色侵帷枕席間莫問山靈嫌客至偏憐松月待人還張郎有志能遺世白髮相期水竹間秋夜與程太守山中同坐鼓角聲髙秋滿城空山夜坐不勝清星臨瀛海三洲靜月出長山萬島明幾處風煙驚絳帕此方歌吹樂蒼生羡君美政如黃霸不負明君屬望情題倪雲林小幅山水雲林隱者絶風流嘗到澗西僧寺遊下馬脫巾青竹裏題詩寫畫野泉頭房山墨法誰能得謝朓襟懷自可侔便擬梁溪一相覔桃花春水隔芳洲題馬公振畫竹馬氏白眉者隱居婁水湍間將筆五色醉掃玉千竿露重鳳毛碧月明龍氣寒春山歸正好稚子喜相看送四明孫明逺道士道士度海去此時秋正清天青一鶴過江急亂山傾服食太霞氣彈琴流水聲相思何許在矯首古鄞城四明我昔到萬山霞霧隂青峰橫玉几雪瀑照珠林餌藥且延壽燒丹應煉心他時一相問春洞桃花深題蕙蘭圖蕙蘭生深林結根同芬芳緑葉緣風轉羣葩耀春陽飄飄青霞袂粲粲雕玉璫貞哉不自獻宜為王者香念彼君子德比之惟允光持以遺所思交好勿相忘夜坐雨入寒竹響風吹枯桑疾微燈照孤坐餘香閟清室念斂塵慮泯神明定光出同體不同知兹理一何密送慧上人海上歸崑山就遊吳門西山袖卷金經便作歸海光晴日宕清輝鯨魚載足如船穩龍女將花出浪飛玉阜寺門欏樹緑琴臺雲崦橘林稀故人相見應相問為道淮山獨掩扉秋日有懷吳水西昆仲古寺栖遲秋已分閉門無那思紛紛故人應在碧山裏清夢還來滄海濆浦口潮洪檣似戟苑中草緑馬如雲如何數月音書絶啼雁南飛只漫聞遊西沙興教寺海村嵐氣鬱蒼蒼金剎開基始巨唐紫閣乘隂龍徙窟石臺分食鳥歸廊六時或下諸天樂五色長浮古佛光我躡星槎一來過濤花吹度白雲裳送暄上人歸槎川南翔寺有序上人乃南翔道韻士也留海上董氏觀堂修白業三載今年冬言歸鄉里索詩為别因知東林勝上人與鄉之善士追逺法師結社故事章彥圭為之開講遷恆心歸雲卿諸公必同會焉漫賦唐律二首以餞上人且柬諸故舊云讀罷龍王宫裏經便飛孤錫向青冥金銀光擁千年寺河漢槎流五夜星空室禪栖花寂寂長廊句寫竹青青憑君為問曽遊地雲護南江舊草亭聞説東林大社開名僧談法聚羣才經床茶器池邉設酒榼籃輿竹裏來道氣即今髙士少古風須仗哲人回南望令余起遐想散花應自接天台送柏上人入京紫煙曙氣浮丹極瑤島春光暗碧霄立志不栖幽側地觀光還及盛明朝五方花發人調馬八月霜髙客御貂愧我一丘成鈍質清時誰賦小山招秋日歸虎丘懷銛仲剛書記虎丘共作五年留幾度相携上小舟楊栁春橋半塘寺芙蓉夜月百花洲長林放鶴間支遁一室編蒲老睦州此日獨歸懷往事空山草樹不勝秋題柯丹丘梅竹丹丘歸老江南日每話奎章儤直時一夜春寒愁漠漠白雲蒼雪共襟期釋文信字道元永嘉人幼警悟不喜塵俗遂出家從浮圖氏既悟禪旨兼通儒老善屬文詩尤清峭不為世俗聲住石湖寶華禪寺每與談詩令人灑去塵想古婁顧仁山於其所居植竹數百本竹中作亭日逍遙其間乃署其亭曰竹逸嗚呼古之賢者必有寓若顧君寓于竹不亦賢乎哉為賦詩一章以頌之時維青陽彼花競英雨雪飄飄我竹青青於彼竹中曰構我亭我琴既絃我酒既清以遨以遊以樂我情豈不爾思於焉孔寧君子之心惟以是貞題顧處士梅隱齋夷齊首陽餓黃綺橘中樂軒冕豈不榮物性各有託顧君幽隱地種梅良不惡獨芳洞皎潔桃李流光薄師雄悟翠羽何遜吟東閣冥言適至理曷用調鼎擢嵗晏氷雪繁隂雲蔽河嶽豈無凡草木愛爾抱貞慤贈劉法官黃冠鶴氅玉珮齊拜壇夜起天門低鐵牌落潭水蛟死霜劍出匣山魈啼松下摘芝露滴滴澗邉煮石風凄凄欲知乃祖有玄德北海太守曽留題釋子賢字一愚天台人幼聰悟絶人禪定之外肆志作詩最為鐵崖楊公所稱賞云送葉明齋如京墨突不暇黔孔席不暇暖周流天地間微蹤何蹇蹇邇來千百年懿德人所範送爾默無言山城春日晚傷君逺行邁白日何凄其微陽漏林光稍稍照人衣天髙鳥垂翼風緊花落枝荒臺俯流水萬里長相思題緑筠樓緑筠樓外玉參差坐愛檀欒曉霧霏五色雲開丹鳳下九天風動翠蛟飛江波渺渺湘妃泣羽斾娟娟帝子歸我為玉人歌此曲山城秋日淨暉暉為文中上人題唐子華畫江岸潮生白煙鐘樹杪撞漁舟浮箇箇沙鳥去雙雙野曠雲橫樹天青月墮江看圖思長史獨倚暮樓窗華頂雲遊江西幾點青青峰頂雲乾坤萬古結絪緼扶桑舊挾蒼龍馭華嶽還依白鹿羣江漢凄涼望霖雨匡廬盤薄度朝曛錦囊盛拾蓀蘭秀續取離騷弔屈文日照香爐縹眇峰半天萬仞金芙蓉上盤劍氣干星極下有隱士巢雲松澄潭湛湛龍歸窟細草青青鹿養茸好去海東詩畫客采蘭江口聽煙鐘擬鐵笛先生遊虎丘得開字韻九月九日天無雨擕妓遊山亦快哉鐵笛一聲崖石裂銀尊多為菊花開空池劍氣干丹極古寺芙蓉照紫苔愛殺月明江路靜畫船簫鼓緩歌回寄敏仲謙于洞庭翠峰寺敏公遙住洞庭西咫尺煙波路欲迷落日斷霞山疊疊揚舲鼓角風凄凄魚龍出沒隨潮上橘柚參差壓樹低東崦人家更清絶也思來此作幽栖題顧仲瑛玉山佳處玉峰佳地小徘徊霞氣丹光接上台白日山移蓬島去紫宫花繞蘂珠開雲邉青鳥迎人語溪上黃童採藥回昭代衣冠非辟世憑軒泚筆寫仙才奉上鐵崖先生文署晏嵗曽逢張外史梅邉日日説廉夫文章氣逸江東李作字工專海上蘇把酒逺山當夕照彈琴修竹散煩紆不才駑馬勞青眼更作人間汗血駒與白雲山人夜坐山人將歸天台即席賦此送之桫欏樹頭月皎皎共坐論詩天欲曉大星飛落滄江前小蟲啼遍牆根草我愛髙人白雲姿對客長賦白雲辭漫遊羣仙白銀闕拾得碧海珊瑚枝又載雲軿下塵世涼飈微動青霞袂一聲鐵笛徹長霄鸞鳳和鳴滿雲際髙人讀律仍讀書白頭在堂辭我歸殷勤綵服壽春酒江城八月秋暉暉送李提舉歸蜀白帝城邉落木秋峨眉山上月如鈎少陵野老曽為客太白仙人舊所遊玉峽樓船煙雨暝錦官臺殿夕陽收他年百丈牽江上訪子殷勤到益州題王元章墨梅我家繞屋梅花樹况在清溪白石邉雲霽月明疏影小讀書猶記十年前釋來復字見心送馬元臣僉憲淮西吳船八月過丹陽雁子啼霜木葉黃淝水東來淮海迥蜀山西入楚雲長九霄風翮搏鷹隼五色天章下鳳凰圖治只今勞聖主諫書何日獻明光遊石湖蘭若柬瀚上人荷花蕩西湖水深上有蘭若當髙岑客吟時見猿鳥下僧定不聞鐘磬音雨香秋林橘子熟雲落空澗棠梨隂間來掃石坐竹裏靜與山人論素心五龍之峰雲作屏雙崖削出芙蓉青何人澗底拾瑤草有客松間采茯苓林風不驚虎卧谷山雨忽來龍聽經吳王臺榭今寂寞秋香薜荔花冥冥送瑗上人還廬山兼柬星書記匡廬佛寺金為國杖錫南歸訪薜蘿山擁重雲開玉峽江分九道落銀河蛟龍聽法乘潮起林虎依禪嘯月過為問東林星外史冥栖消息近如何寄贈洞庭葉隱君一舸南歸鬢欲華買山湖上卧煙霞尊如北海應多酒園擬東陵亦種瓜丹壑泉舂雲碓藥橘林風掃石牀花傳家自與鄰翁異見説藏書有五車釋自恢字復元雜言五首世事競紛紜人生若愚蔽汩汩利欲懷區區衣食計贏羡校分銖得失勞夢寐寡欲味道真誰能薄浮偽富厚苦營營寒微何戚戚機巧勞百慮困此朝與夕虧盈有常數得失無定迹百嵗同歸盡泯滅淪木石羣音瓦釜鳴衆色紅紫爛澆漓日以滋淳朴日以散滔滔萬派分隄決何由扞黃鍾祕太朴棄置誰能玩援琴寫素心清風邈雲漢釣渭卧蓬萊耕莘飽藜藿遭時困顛危斯民墜溝壑風雲際良會雨露悉磅礴如何懷寵榮諛佞出然諾勢隆還復傾委棄等鼠雀軒裳詎云惡斧鉞良難嬰獨有忠義心不隨生死傾行虧名節毁寧不愧爾情襟裾混庶類空有斯人形碧山歌贈朱隱君紫陽山人碧山住卧雲遙在山深處種杏雲林不計年花繞東風千萬樹雲中之山碧嵯峨錦屏百疊翻翠波秀出芙蓉九霄上青猿白鶴啼煙蘿瀛洲東望不可到珠館珊瑚隔滄島聞有仙人王子喬海上青田種瑤草我愛碧山人長嘯碧山春手持玉拄杖頭戴華陽巾鍊精御氣顏色好朝餐每拾安期棗有時間與八公徒玉檢丹經細論討黃精壓酒春滿壺呼兒取醉不用酤浩歌舉觴酹巢許掃花磐石相歡娛浮名不直一杯水肯向權門曳珠履但願長乘白鹿車笑折三花紫煙裏題唐子華畫山水江門如雪樹高低竹裏人家傍水西滿地松隂春雨過好山青似若耶溪雲分晴磴樹交加蘿屋隂隂石腳斜絶似龍門三尺路一溪紅雨漲桃花送海上人還荆門遍禮南朝古佛宫荆岑春去百花濃江通楚蜀波濤壯山入湖湘紫翠重拄杖穿雲隨白鹿軍持分水浴蒼龍欲知後夜相思夢月落啼猿滿竺峯草堂雅集卷十四

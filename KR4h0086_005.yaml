body:
  text: 草堂雅集卷五元顧瑛編張雨字伯雨錢塘人博覽羣書故其詩清曠俊逸時輩不能及始隱茅山後徙杭之靈石澗與趙魏公虞翰林友善詩名震京師自號句曲外史云玉笙謡我有紫霞想愛聞白玉笙縣匏比竹無靈氣昆丘採此十二莖鳳咮銜明珠凰翼排素翎金華周郎妙宫徴子晋仙人初教成月下吹參差羣雛亦和鳴緱氏山頭白雲起七月七日來相迎長謝時人一揮手飄下滿空鸞鶴聲題理妝士女誰見新妝出繡幃辛夷花下六銖衣莫教蜂蝶知蹤跡閒與鄰娃鬪草歸燈花聫句有序永嘉李季和自金陵持趙凉公書來屢宿菌閣下十月三日夜天始霜殊寒雨燈並作花遂聫句於酒間星閣迎寒閟霜鐘動夜摐孝光酒深燔术火漏下續蘭釭寸草熒芝小雨丹葩瑞蒂雙金枝交婉孌孝光銀粟亂鬃鬞䗶結飛蛾笑雨膏融吐鳳􅋏永珠光透鏡孝光火齊幻垂幢的的輝青瑣雨淫淫颭玉釭燭龍擎紫蓋孝光翹燕綴紅􅭾鄰眼書窺隙雨仙眉墨暈忩狂吟心蕊發喜聽足音跫孝光折堲風吹座鈎簾月墮江雨青藜如見遇揮手出紛哤孝光延陵公承慶堂詩大江蒼方兀龍虎輔元之家百神俯望拜受釐若稽古上清真人閲衆甫新宫潔齊𨗳天語紛雲郁霞錯承宇虗皇穆然陽衛武左歘右飇降軨羽縣鐘鏜鏜迅擊鼓赫金祭服赭朱户雙珠月明帶寶璐挾以流黃玉櫑具既竣大禮私事舉吉日宗族奉爵爼青紫系地簮綬組魏張帶劍新捧土饒國開觀治宿莽報君親師物咸覩撫巳一念或未溥西壁孝書元範府寒氷層隂發春煦日幽若明沐仁雨道德大非方仙伍月佩六印非適取持旌趨名迹旁午下土滓壒寧久處天闕㑹規足蹈矩願天願地多黍稌畢志萬年奉明主小史作詩孰敢侮吁嗟厚德畨之祖集太白語酬僧淨月主人碧岩裏為豫話幽栖真訣自從茅氏得風流還與逺公齊滿堂空翠如何掃而君解來一何好白玉麈尾重談𤣥琉璃硯水常枯槁蒼蒼雲松拂彼白石世人聞此皆掉頭就中與君心莫逆袖拂紫烟去空中聞天雞借問蘇耽鶴早晚向江西鐵崖先生跋曰豫觀貞居子集句詩政如冶城銅象捧額珠蓮座於長干也可寶可玩太白見之當曰吾錦千萬機衣被天下詩人烏得割截如此貞居子其慎取之哉勿俾責償也㑹稽楊維楨跋棹歌暇日拏舟出郭門觀風聊采野人言借車踏水半陂麥打鼓賣魚何處村光隂轉比中年促生聚唯餘西浙繁政使枋榆安斥鷃又從倦鳥返丘園强行之常州教授聞道詩書種南方有此强才名文學掾步武紫薇郎家與臯比近槃餘苜蓿長諸生時列坐亦足奉華觴道園先生詩送張元朴還龍虎山有云麈尾每懷張外史鵝羣今屬薛元卿元朴索次韻想見先生戴笠行黃茅岡上看隂晴承聞祖道同疏傅鄙說還鄉似長卿海內好詩元自少江西行李不嫌輕謫仙愛與元丹語烟子而今亦有名雪圖絶句貌得王維三尺圖姑山無此雪肌膚瓊臺玉樹參差是祗缺芭蕉一兩株𤣥覽堂絶句簾櫳低亞小梅枝快雪時晴緑滿池鈴索不搖鸚鵡睡客來假寐亦多時次韻段推官觀潮雪濤捲入白螺杯雲夢吞將灔澦堆陳馬直從天漢落颶風先自海門來青山一面開銀壁黃繖中央立露臺如在畫圖留壯觀江頭白首不堪回鐵崖新居曰書畫船亭作詩以寄蘇州去訪揚雄宅近水樓居似月波東府官曹知者少西山爽氣望中多臺招天上仙人鳳池養山隂道士鵝誰和凉風吹鐵笛莫愁艇子栁枝歌玉山詩曰錦衣坊口揚雄宅飲馬闕水波風信東來春事早湖光西去夕陽多館娃隔水啼鶯燕弟子填門列鳳鵝無那老狂狂更甚劍簫猶倚小紅歌和虎丘寺壁東坡韻日出東海頭虎氣踞兹嶺渴心我生塵邂逅轆轤井寧若將軍拜奔泉酬老耿莽丘專鬼物隂壑雜蛇黽歐冶千金鑄百錬豈重礦似聞神物化後日屬吳猛怪蟒既血刃大道就爭騁我行試勃窣鳩杖先祝哽小旲不滿眼坐納三萬頃風髙塔鈴語石迮羅衣冷松水翰歸吳愚溪栁遷永吾非若人徒短句惜流景茶煙寄禪榻弄我鬢絲影散人號江湖奚必煩上請題春溪晚渡怪底朝來雲氣升雨痕洗遍碧崚嶒山腰行李去未逺谷口人家呼即譍倣佛簫臺凌鳳吹安排春水理魚罾卧遊已愜平生志深負牀頭六尺藤題沉香山圖珊瑚鐵網枝柯爛沉水假山煙霧濛甲煎相和作庭燎奢淫龜鑑畫圖中題王若水梨花山鵲山雀語查查驚飛白雪花清明人載酒寒食客思家題大癡畫山水獨得荆關法金壺墨未多異時傳畫譜誰識病頭陀雲林席間懷鐵笛簡草堂花朝無花也可憐桃李矜持不作妍懶聽雨聲眠白晝夢乘艇子上青天閒居尚肆浮雲志老病難趨卜夜筵絳帳先生唯寂寞後堂自理琵琶絃題漁父圖我本𤣥真老孫子從事綸鈎相娛嬉浮玉山前一瓢酒頗恨時無顏太師題李遵道竹閒步風篁嶺上來蕭然衣袂上莓苔只因悮向東樓醉又為黃岩夢一回題李遵道古木圖毫染墨池風露足絶憐長釣拂珊瑚靈和殿前好垂栁肯來相伴橛株拘題薝蔔花錦雞圖六出花繁幽塢靜雄雌聊戲竹間雲楚人重價山雞得只為胸中錦繡文題商德符秋山圖雲擘蒼崖瞰草亭飛雲如雪照岩扄素琴不是便山水要舞胎仙獨自聽題許飛瓊圖寫韻彩鸞騎虎去吹簫弄玉跨鸞歸昭華玉琯青天上好在飛瓊獨自飛題吳彩鸞圖小㸃紅鸞寫四聲於菟何事載娉婷不如相伴騰空子來往匡山九折屏錢塘醉歸湖上鴉啼暮雨微歸鞭忙趂落花飛若教秃鬢翁能飲肯羡山人倒載歸題碧筒酒采緑誰持作羽觴竹林人共晚樽涼玉莖沁露心微苦翠蓋承雲手亦香飲水龜藏蓮葉捲吸川鯨恨藕絲長傾杯誤展淋浪袖笑絶耶溪窈窕娘山中一枝石瘦如麟角六出花開似麝臍隨意莓苔一杯酒也勝騎馬聽朝雞鶴冢鶴壽千年定有無羽衣全脫雪糢糊樵人為裏𤣥黃幣少保親傳粉墨圖尺土未乾春草短三山何在白雲孤夜寒蕙帳應岑寂别向華亭覔鳳雛三香圖秋水為神玉為骨山礬是弟梅是兄國香零落王孫逺依舊江南春草生梅竹雙清圖竹外一枝斜更好自有此詩無此畫承平公子翰墨林寫影圖香戲春夜分明簸弄明月珠賈胡不識千金價達祕書詩曰氷魂無夢到瑶階翠袖雲鬟並玉叉青鳥莫銜紅綬帶夜深重認合歡鞋題嶽家舊藏髙尚書雲山圖猶是相臺故物如許雲山有情老我慧因澗上猶夢尚書履聲題顧定之竹毗陵參軍顧定之為豫醉掃風竹枝參軍久留坐深夜要看官奴秉燭時題文與可竹伯仲唐人蕭協律政爾奴𨽻王黃華三百年間一枝玉石室往矣令人嗟用韻送淨月上人隂崖顛風無時興篁竹偃地虎晝行層氷積雪卧空谷春至唯聞禽鳥鳴華陽南便洞忩小香烟西放峨眉道神僧問訊破孤寂把臂入林一傾倒帕頭䝉寒驢背馱泥滑穩於杯渡波寄謝少年王敬和獨行其如法汰何題倪元鎮畫為覓髙人梁伯鸞遺墟井臼已凋殘天寒日暮一瓢酒采藥行蹤卷裏看題張溪雲畫鈎勒竹為愛風篁手自摹不煩把燭倩官奴須當白戰篔簹谷羞殺江南沒骨圖和倪元鎮寄鄭有道失喜聞遷水竹居一篷烟雨正愁豫便思袱被熏金鴨要看臨池洗玉蜍絳帳後堂聞女樂青帘畫舫載圖書虎頭食肉還公等苜蓿晨飱自有餘天池石壁嘗讀枕中記華山閟中吳神泉發其巔青壁繚其隅春風四山來羣緑互紛扶羽觴曲折行浮花與之俱採芝搴薜荔洗玉弄芙蕖聱叟頗好名石窪作漁湖鴻乙志草堂掃烟遂成圖而此滌煩磯閲世如摴蒱發興雲林子盥手與我摹居然縮地法挈入壺公壺贈别休休菴了堂上人老僧草年不出户袈裟搭架風披披祖衣留在阿蘭若佛法傳過髙句麗客牀雪鍊一甌茗經藏苔昏三尺碑不向鄰房看偃蓋卷中原有古松枝和東坡書蔡端明詩二放營妓詩三虞伯生所題詩四凡九首日將公事湖中了醉入重城列炬明自古大藩財賦地古人偏得賦閒情謝女嬌吟雪比鹽北臺馬耳見雙尖衲衣正索歌姬笑不道春寒繡被添寫韻軒中塵不驚與誰同躡鳳凰翎彩鸞可惜情緣重只合清齊寫道經叉頭新緑荔枝紅却與江桃色味同聞道端明新進譜一時殿閣起薰風香辟春寒玉辟塵流蘇斗帳醉和春一雙明月都無價寂寞人間第一人江南春盡水如天浪迹先生不上船近就闔閭城下宿可憐霜月夜娟娟青城樵者一衰翁寫罷烏絲滿袖風消得玉堂金研匣至今傳入畫圖中雪煮龍團怯醉魂分茶故事與誰論纖纖玉腕親曽見只有春衫舊酒㾗白公種竹蘇公栁談笑功名後世誇依舊葑雲三萬丈斷橋誰與築堤沙乙酉元日試郭杞墨書三韻山寒靜雞犬爆竹動比鄰倦踏街頭鼓稍還林下人前身病居士猶不失冠巾澗北梅樹䕃於屋垂陽景罕曜嵗三月始華以五言𨗳其生意隂澗殘梅枿臨流一向欹但存孤注在敢恨一生遲凍雨如相煦春寒不受吹後時翻見獨宰物遂成私咏緑萼梅華山中古仙子無言春寂寥玉容淡朝雨翠氣濕微霄凌風快玩影弄雪妬攀條解覔何郎句還憑舞袖招題黃子久畫中峰大面削鐵如巖岫綺錯非一途上連閣道旁屋廬尋忩數户愁﨑嶇米顛所製三尺圖筆力視此微粗踈閬風之臺遲子久不歸正為松江鱸答楊亷夫見寄弄水摘花春可憐風雨倦尋茒步船我家南塢有靈石龍井西頭無杜鵑野鶴扶雛畏人過弱栁委地趂蠶眠子雲胡為甘寂寞後世何人知太𤣥摘阮圖四言長松結隂芳草如莽丘中微吟有天際想彼玩者誰阮生撫掌一鳥不鳴衆山俱響汪復心遣姪彥維自歙求詩汪倫自愛桃花水張翰秪思蓴萊湖九十山翁莫相惱題詩元沒得工夫寄韓介石并送白蓮丈八荷溝喬木材蘂珠偏向夜明臺綘綃龍君服日去碧眼侍郎騎雨來天水染雲如淨練落花飱玉似空杯韓家弟子多才思乞與香奩相對開茅山新居十絶崇𤣥館主在齊梁乃有元之吳郡張相望八百四十載我歸鶴臺如故鄉事見茅君九錫碑望見飛簷松杪花下盤隂洞石聱牙老樵迷路驚相問若箇江東道士家風水所言惟理氣眼明此術未全踈景純解道游仙句信是青囊有異書近受草廬吳先生郭璞書肯借山中步障錦與作天下庇寒裘三尺忩櫺萬株木那怕霜寒到上頭縹眇洞庭連白雲緑橘黃柑能見分昨日扁舟尋好事明年處士比封君谷中僅有一庵住壇上唯餘數石陳杖隨流水過鄰舍席與長松分主賔已拜茅君為座主從稱外史作官銜道家六經發願寫深向石頭藏一函屋壁置書碑板多雄虹光怪鳳皇阿看盡空山十日雪竈突無烟奈爾何鳯凰阿𤣥洲地名只有天公終可倚我作巢居名倚天未必髙居無事業終日讀書兼打眠龍虎山中薛元子瓊林築臺詩亦工應接菌山聊爾爾非關千里事同風題畫屛一幅面屛秋月圓荻花楓葉滿江天江州自是無司馬多少琵琶過别船答楊亷夫黃篾樓中唯飲酒樓下長溝鳬雁多灣頭橋斷迷青草湖面風來生白波饞奴競煮脫䙀笋老魚戲唼如錢荷詔書寬大到海角河北饑氓爭倒戈題子固墨寫水蕉因依水石閒小蕉露如洗聊以觀我身浮脆政如此平原佳公子泚筆寫蘭茝君看數寸碧氣壓凡花卉贈漁樵侶郁闕坑前負薪者道士磯頭垂釣翁我輩與結平生友夫君還有古人風水羞凉味蒲芽白野飯晝香松菌紅借問行藏多嵗月不離三泖九山中悼薛外史元卿難再得本是餐霞人髙懷獨超物洞鍳亦絶倫君自江東我吳下早嵗聫翩待金馬御榻賜書凡一束仙苑偷桃動盈把紫虗元君之玉訣青城先生教我者感君多道氣探懷為君寫學士承㫖平原公許我與君楊許同一時標名兩外史玉樹蒹葭立下風我還句曲餘草載君乘輶軒歷四海歸景橋西結草樓樓中襆被長相待風烟山水共追尋福臨洞口話離心年深書字化為碧白首蒼茫成古今聖井山崩數千尺君從羣龍去無迹困頓鹽車篠嶺頭此日思君復何益題趙善長小景杳靄仙雲小鳳池朝來翰墨有光輝湘湖為愛屏風叠夢趂秋湖夜夜歸懷茅山我有草堂南洞門常時行坐虎同羣丹光出林掩明月玉氣上天為白雲閒憶田泉洗蒼术更思陶澗采香芹歸來掩户應髙卧莫遣為人書練裙道言造物於我厚一切使我薄瓶中有儲粟持此卧雲壑敝廬能茍完得味在藜藿花鳥與豫友尊酒不獨酌牀頭堆故書敗履置牀腳未嘗身沒溺何與世濁惡政如敗牛馬不識羈與絡異時老髑髏㑹有南面樂奔月巵歌答鐵崖所作甓社明珠奔入月脫殼政似風蟬潔漁網出之不敢視滌盡含沙光不滅文昌四星吞在腹一一金晶大如菽蜃物還來作飲器日夜雄虹亘茅屋一扇桃核寬有餘半葉蕉心卷未舒飲非其人躍入水怪雨凄風生坐隅置之天上白玉盤斗柄挹酒長䦨干李白跳下鯨魚背持勸我飲相交歡幽宫馮夷為豫泣酌盡海水百怪出還我平生老蚌胎許君醉卧鮫人室衛青玉印公主家奴尚公主刻玉姓名奚足多為問任安門下客大將軍去更如何王時敏聽雪齊頑寒贔屭河流澌銀濤鐵騎交奔馳玲瓏淅簌瓦溝滿坐忩已有幽人知東家暖客紅醅凝嘈雜新聲迷聽瑩後園壓折萬琅玕雪多政自無人聽我時空山夜寂寥風篁雪竇篩璚瑶希聲疏越不可盡鳴球戛擊如聞韶憶昔齊宫困學翁大書聽雪煩楚龔百年勝事將毋同不傳師曠傳王恭鶴氅明朝行雪裏須辨龍頭煎雪水牀下何人聞鬪蟻喚起春雷來洗耳鮮于太常聽雪齊龔聖豫大篆題榜皆陳迹矣萹中借以發端云贈鄭明德五季雖無人獨行唯鄭張與子載同世而我匪異鄉薦明吾弗如子則雲叟强嘉子行祕書以腹為笥箱操觚仍尚左立辭多惡方吳兒命乞錢掉臂輒相將智如泥中龜處汚深蓋藏烟庖縣大胾蠡屋排積倉兩兒稍卷婁一老足倣徉適經吳市門要我羅酒漿聫句吟吻健敵棋貪計忙删詩借河潤作序分壁光寒林踰正色國艷終媚香狷者有不取聖罔念作狂願子朂明德豈惟家之慶異時同傳好咄哉無歐陽伯雨至正十年秋歿於錢塘開元宫葬南山靈石塢豫偕楊亷夫袁子英祭墓下復得其詩用刋於左彭南陽真人雲窩煉丹之所石枰餘子皆生路洞室藏書盡隱丈誰與解酲千日酒我來分住一窩雲虎龍金碧親承訣鸞鵠青冥動作羣莫向爐中參火候定知此事屬彭君送鄭明德過越四十日春草日雨問花尋栁意茫然竹根卧瓶髙筆冢竈下生薪連术烟茅家名餘鐵罏步龍井氣脅金沙泉稽山酒船速回棹遲子歸來烹蕨拳吳宗師嶽宮行香次韻元日朝元回羽隊東華門外踏春陽還趨岱嶽祠宫閟遙識仙官劍珮香國有蓍龜金作鑑年登耆艾鬢如霜老人星在薇垣內可是人間化日長贈納琳大監論卷聚書三十萬錦江江上數連艘追還教授文翁學重歎徴求使者勞石室談經修爼豆草堂迎詔樹旗旄也知後世揚雄在獻賦為郎愧爾曺請以蜀文翁之石室揚雄之墨池杜甫之草堂皆列學宫又為甫得諡曰文貞以私財作三書院遍行東南收書三十萬卷及鑄禮器以歸虞奎章記其事邀豫賦詩如上次韻答薩天錫見寄推敲指㸃據銀鞍苦為搜詩夢不安誰㑹鳯凰臺上意手挼黃菊看鍾山秋日晚興暝色入林烟火微暮雨欲來如有期野雀喧爭楝樹子幽人行把菊花枝山空始見水泉涸寒至乃索衣裘遲莫謾題詩將寄逺不多故舊在京師巢雲樓初陽臺上白雲多雲裏層層玉樹柯栖息一枝元自穩飛翔千仭奈渠何雨中幕燕雷驚去峰頂鸞笙月送過好在丹梯無百尺屋頭展盡白鷗波閬州瓢閬州瓢是仙家具壺嶺仙人逺寄將凍芋抽萌元自短鳳笙排管未成行瓠尊甚大浮江海斗柄空長挹酒漿樹響風聲非外物許由何事不相忘泗州磬玉聲試叩極清圓琢就魚形也可憐前日泗濵求樂石異時堂上奏宫懸師襄入海誰從問荷蕢行歌老更顛法駕前頭親導引鳳鸞音節若為傳松化石鐵面那知是木腸髮毛無復舊蒼蒼鍊形千載徂徠上洗髓三生琥珀香大節堅完餘鶴骨長虹光怪奪砂牀白羊卧護金華洞不屬牛家甲乙藏次趙伯常運使留題澗阿莫笑坳堂水膠杯泉頭落木動成堆天寒政使蛟龍卧日短何煩駟馬來杖䇿東坡靈石塢留題外史讀書臺舉觴賔客風流甚老子游山第一回危太朴以史事南來搜書風雨宿南澗明日追寄布衣走下雲林顛檢閲經書天子筵去家昔踰半萬里别我經今十九年輶軒使者采圖籍龍門太史行山川澗阿一宿慰風雨起視留墨心茫然寄劉伯溫大監臺閣如公最有稱軺車􅔕馬數能乘校書在昔専劉向祕監於今復魏徴汗簡削成金作匱泰階平處玉為繩信有山人唯寂寞側身長倚白雲層次韻黃伯成見寄金錯松林黃葉樹三義路口問吾廬青山對話惟捫蝨落日催歸獨跨驢土木形骸嵇叔夜波瀾文字木𤣥虗殘年書札相存問莫道天寒無鯉魚剪韭亭剪韭亭下看春雨剪韭雨肥含土膏不緣纎手青絲菜獨愛美人金錯刀隱居拔薤那能數於陵灌園徒爾勞明朝韭長復須剪眼中荼蓼若為薅惠山贈孟宗鎮惠山西澗多喬木望見茅堂在水濵鄒嶧世家猶閥閲春申祠宇是比鄰深林暝色牀敷暖微雪朝光户牖新不為茶經求陸子端從蓮社拜遺民次韻虞公和斷江和尚松詩松下微吟怯病悰支離潦倒似支公頂因巢鶴翻成結心為依禪畢竟空陸子壇前春古淡葛翁井上雨青葱茯苓乞與楊員外誰與緘詩過浙東和虞公韻耽耽千柱壓城西志肅祠官倐忽歸暮把瓊芳迎太乙朝陪羽仗謁凝暉白雲青嶂天機熟老樹顛崖目力微敕賜榑桑朝日暈天光傾向紫金衣和僧游西山我愛飛來與靈鷲古洞嵌空爭穴穿壞衲深依蕭寺住老猿寒抱白雲眠百年山中皆樂土二月江南唯雨天遲晴一過翻經室肯為挈壺從幻仙寄楊亷夫褚君登善為鄰曲司馬天台是我師閉閣時須薰篤耨清齊還許食伊尼五湖烟水舟無恙一月春寒栁未知生世不逢賢者識從來誰問五羊皮寄楊亷夫鄭明德快雪時晴春意動歸舟移纜向芳塘走尋飲伴雞豚社悮落詩名錦繡坊子雲竒字誰能問鄭老襟期獨不忘闔閭城中可終老安得西歸買滄浪次倪元鎮送子還山韻烏蜀先生相見稀鍾陵初載索書歸江南蕭艾作人立卷裏盧龍看雪飛巳瞻元亮有道氣重惜子真猶布衣去去空山相憶夜朱絃三嘆為君揮水仙芳草有時歇無此金玉相一枝和月露持奉水仙王南真館池上橘花花攢嘉樹雪鬅鬙遮斷蓬山小朵青答報風光先醉去穠香吹過却全醒仲穆蕙花空谷幽芳絶代姝紛披翠袖不勝扶金屏芍藥三千朵合讓光風轉蕙圖雲槎軒壁米家畫船虹貫月得似雲槎一小軒閲世浮雲坐枯木此生何必窮河源餞陳子原赴官台州寄語天台馬子微金堂玉室未成歸此行却羡陳夫子瀑布岩頭攬布衣𤣥覽堂絶句殷勤老去惜年華午夜張燈繡幕遮吹遍玉笙天上曲空將列炬照林鴉題調馬圖新進驊騮步未勻風塵馳驟乍離羣奚官老臂千鈞力不許飛騰去籋雲賦鶴巢贈趙伯容次虞伯生韻仙人有騏驥結巢華頂松上覆三素雲下立千仞峯笙吟微度曲雪步稍留蹤羽衣何頎然云是趙伯容左帶明月璫右佩蒼精龍誰令三青鳥銜花以相從鑿户繩樞澀藏書玉檢重悵望浮丘伯人間倘再逢題李遵道蟠松造物何知曲全意世人尚怪支離形中茅嶺上蒼髯叟卧護東南半壁青題顧定之竹石龍孫乍脫䙀兒錦石面多皴彈子窩畫妙通神欲飛去虎頭癡絶奈渠何鵲華秋色圖有序吳興公自序云公謹父齊人也余通守齊州罷官來歸為公謹說齊之山川獨華不注最知名見於左氏而其狀又峻峭特立有足竒者其西則鵲山也乃為作鵲華秋色圖張雨賦詩於左辨陽老人公謹父周之孫子猶懷土南來寄食辨山陽夢作齊東野人語濟南别駕平原君為貌家山入囊楮鵲華秋色翠可餐耕稼陶漁在其下吳儂白頭不歸去不如掩卷聽春雨漢銅馬式曽同避世東方朔此馬見之金馬門一自露盤辭漢去銅駝荆棘幾消魂餞魯子升之維揚憲幕頭銜新署似氷清蘭省超遷分外榮代北衣冠傳舊族淮南草木借先聲大鵬徙海扶搖上􅔕馬追風次第行久疾辱君深料理老懷此日若為情惠山泉水品古來差第一天下不易第二泉石池漫流語最勝江深湍激非自然定知有錫藏山腹泉重而甘􅉸如玉調符千里辨淄澠罷貢百年離寵辱虗名纍物果可逃我來為泉作解嘲速喚㸃茶三昧手酬我松風吹豪寄題清隱齊住向壺中多嵗月市㕓蹤跡漫相猜閒眠政使書裙去徑造唯應看竹來數葉水蕉籠筆格一牀山罽裹琴材白鷗信是無機事每共臨池日幾回次鄭明德韻衣桁長容蛛網懸石牀渾讓女蘿牽道術何煩孔郎祀屋廬政用郗超錢泉奔澗底歸樵路雨壓厨頭蒸术烟誰見西林拆書夜一枝風竹鵓鳩眠書懷二十韻奉呈虞集賢昭代千齡運斯文一柱功初當延祐日晚識廣平公朝士因推轂先生猥擊䝉暌乖逾草載寤寐接孤風太史山川彥仙儒館閣崇置身清切上用志窅冥中句法黃初過才名冀北空朔南馳使節江漢借歸篷酒問餘杭姥泉尋六一翁境非秋水觀寺即紫微宫侍坐要王逺移居近葛洪於焉承咳唾足以振罷癃卓爾身為貴胡然老見攻戰肥終道勝德重豈途窮玉趾閒紆步麻衣病鞠躬茶烟忩冉惹墨沼樹玲瓏飢甚無瑶草招來有桂叢輸心何落落把袂輒匆匆易進乘軒鶴難追戲海鴻明朝去吳㑹長嘯為誰雄題看雲圖亭子荒凉竹樹根隔溪遙見白雲屯坐來捫蝨談何事著我青山酒一尊題趙松雪畫竹枝扇面阮咸便面如團月誰掃竹枝團月中識得吳興有聲畫為君箕踞寫松風李仲賔寫竹新縑黯淡何人墨四十年前老薊丘向使戴家多種竹雪中那肯便回舟倪元鎮小幅林石誰可米顛相伯仲風流還只數倪迂應將爾雅蟲魚筆寫此喬林澗石圖王蕺松寫水仙剡藤政索山隂畫月佩風裳滿眼飄記得年年春雪後金鴉觜斸水精苗織成仙山圖便面鮫室氷絲翠織成胎禽珠樹儼長生采雲小隊霓旌節曽伴紅鸞扇影行金人出獵圖小隊鳴笳曉出圍地椒狼籍獸應肥上皇久厭紅羊炙故遣蕭郎擊豕歸芍藥白圖妥帖紅雲朵迷離玉兒揚州行樂地惆悵鬢成絲桂花下約王晋卿飲翡翠黃金屑檀欒秋後開一杯持問月更待賈淳來述古十二首不愛昆岡玉不愛江漢珠愛巳一蒼璧有之利有餘吾生為我有其利當何如論爵不足貴論富不能踰達性命之情順生以自娛荆人有遺弓索之將奚為且荆人遺之乃荆人得之孔子聞之曰去其荆可耳老聃聞則曰去其人可矣天下有至公孔聃得其理天地且弗有莫知其所始堯昔讓許由朝之於沛澤若曰日月出爝火乃不息天下既巳治歸矣奚復益遂之箕山陽飲水耕而食怡然終其身無有天下色魯君䀻顏闔踰垣避使者我非惡富貴君乎獨不捨全生以為上迫生以為下當知得道人治國其土苴墨子歎染絲所歎一何長染於蒼則蒼染於黃則黃奚獨染絲然染國在所當有染如伊臯禹湯稱聖王殷紂染惡來既染國亦亡染士如孔聃死久道彌光虞人百里奚所鬻五羊皮有得其說者乃是公孫枝獻之秦穆公四境不足治賢者倘不遇後世誰當知昔者齊桓公往見小臣稷一日凡三至欲見且弗得驁爵固輕主驁霸亦輕士夫子縱驁爵驁霸吾敢爾所以終見之不為從者止誰云內行缺論志亦可矣桓公遇寧戚飯牛中夜起賜之以衣冠一說境內理再說為天下桓公以師事衛與齊不逺安用疑客子不患有小醜所患亡大美且人固難全用長當若此嘗聞柱叔厲早事莒敖公敖公不為禮入海滅其蹤及聞公有難辭友往死之昔我之去彼自已為不知今而不往死是真知我非節行在所勵君心徒自欺業煩則無功禮煩則不莊令苛則不聽禁多則不行國人逐狡因之殺子陽嚴刑無所赦適足召亂亡齊有善相狗假買取鼠者數年不取鼠畜之不如捨相曰實良狗志在麞麕鹿欲觀取鼠能請桎其後足桎足乃取鼠淹爾驥獒氣安得忘言徒喻此鴻鵠志燕雀爭善處處在大屋下姁姁甚相樂子母得相哺一朝竈突决火炎屋棟燬燕雀色不變不知禍及子人臣私聚斂速國壞綱紀孰謂斯人智不如燕雀耳觀雲軒為盧伯融賦泰山膚寸雲翻手為白衣朝旦雲出户景落雲守扉我家東海上開軒人跡稀觀物有成壞觀雲無是非一塵迷衆目野馬隙中飛所以子壺子示我衡氣機游龍井方圓菴閲宋五賢二開士像獨尋招提游果得世外歡昔賢所栖集畫象藏屋端山僧啓鎖魚不待啜茗乾修廣各異製精采俱生完堂堂蘇長公英氣邈難干笻杖紫道服天風吹袖寬清獻薄須眉示我鐵肺肝尚餘所施物片石橢而寒侍郎胡金華髙括侍中冠眉間可容掌手板出中單潁濵與淮海秋色亞層巒參寥獨緇衣頷髭茁茅菅最後辨才師文茵髙座安空山一室內舉目皆龍鸞再拜傾挈壺喜極更悲酸去之三百載歸路何漫漫斯人為列星下視蟲沙繁寧不念學子道術救凋殘抵舍亟摹貌微哉難控搏夢中倘未遇展詩時一觀游西山靈鷲諸剎碎此空青寶納此黃金龕水流淡無與石色終懷慙顯途讓羣趨幽罅恣窮探紅泉浸短竹翠雨淋長柟靈運久成佛妙語將同參猿公亦自慰復聆勝士談前旌罔兩避後乘拙术驂周旋蟻封中丘垤皆精藍菜肚乃知足為目庸非貪維南専一壑歸路瞻浮嵐閒止齊詩為張子英賦張侯溫玉質被服謝紈綺居然冠蓋族渺若山林士昔人亦有賦閒居因拙仕自無止水鑑何以止衆止攬芳玩華藥探𤣥味圖史子孫遺以安考祥視所履若將與日競付之當塗子明靜院夕佳樓西山朝氣爽南山夕氣佳朝爽人共欣夕佳吾所懷山僧閲世久結廬深避乖蕙樓方對峙菌閣亦雙排維南有崇阜不受烟嵐霾我亦遲莫人心跡倦鳥偕兹焉託髙躅庶與靜者諧無波古井水古井何泓然不食自甘冷去來絶攀援挽斷轆轤綆唯有中宵月圓中時照影丙戌元日齊居寒澗去年水氷華殊未銷亦知餘臘在凍雲晝封條春王謹嵗始由來重三朝野褐無朝次端居唯寂寥罏焚芳氣達榻暖术烟飄頺齡諒難制修短寄一瓢幽人保貞吉無庸干山樵趙千里聚扇上寫山次韻題翠水丹山氣磅礴幾叠香痕經手握何年破鏡飛上天吳淞水剪并刀薄江南寶繪多遺餘王孫不歸恨蘼蕪蘼蕪消歇秋風起班姬為我歌烏烏鄭明德倡曰宋諸王孫妙盤礴萬里江山歸一握卷藏袖中紆在手清風徐來縠衣薄文采於今零落餘雕䦨玉砌凄烟蕪至寶不隨黃土化門上空題頭白烏倪元鎮和曰誰見解衣乍盤礴卷懷雲烟歸掌握春雨冥冥江水波竹間日暮衣裳薄零落王孫翰墨餘越王臺殿久荒蕪要知人好畫亦好愛此當年屋上烏陳子貞和曰苧衣春暖初盤礴㸃綴溪山不盈握白雲隔浦見桃花坐使凉風起林薄故物凋零百嵗餘王孫有恨迷平蕪衡門今日看真蹟始與人辨雌雄烏次韻虞道園懷張秋泉真人短歌贈其從子戴士安研山蓋其傳寶云曽見研山如見畫蒼龍一泓在其下真人氣岸雄且堅此石精英可方駕掉三寸舌帝者師入不言兮出不辭手把瓊芳迎太乙江南草木回春姿更借龍泓涓滴水天藻亭中筆新泚題詩何必見安道從子風流政如此半雲歌四明之客半雲叟要我為作半雲歌丹山赤水一百八十里山川出雲何其多其下澒洞根溟波其上泛濫支銀河唯當半雲間仙人道人常婆娑雲之莫兮海為岸日蒼凉兮雲之旦芝宫與貝闕乃在雲之半我來為指雲間路中分茅屋東西住待得還丹草創成定將雞犬雲間去登善精舍葺治茍完賦七絶句故山破屋誰來補辛苦經營拾燕泥幾樹桃花相送老不消更著子規啼澗中采石重鋪徑坡上移花小築墩深結雲嵐為保障賸培松竹當兒孫梓桞都移五十栽稚松千箇緑毰毸旁人莫笑千年計萬一他時化鶴來就暄前坐開陽室北牖來乘水洞凉憂世何關吾輩事有時蒿目據胡牀玉鈎橋水如凝碧才過牀頭瀉瀑雷恰是東風太薄劣逆流花片出牆來故向山椒冠小亭諸峯收拾入簷楹行人指㸃藤蘿外不道薔薇澗底行一生坎壈不稱意政是此春風雨天稍使桑榆見殘日也勝中酒過年年山居十詠用張率性韻先世守清閥而我益孤寒依彼桑及梓樹彼芷與蘭太上詎忘情護養老黃冠髙明鬼闞室敝廬方茍完右登善庵朝氣雜非烟初陽發晨霞指顧烟霞中締構即吾家同口净鉏草岡頭增築沙未睹隔几石先見隔垣花右烟霞同折流十丈强赴此作甘冷如曳白練裙美人延修頸日曝老蛟涎雲排斷虹影不比玉鈎斜此地極深靜右玉鈎橋靈泉非外得清徹見泓底木根深糾蟠恆恐龍蛇起為君挈茶具煎茶要煎水平生張又新續記自此始右小龍泓芝生𤣥嶺隅置之讀書堂雖匪照乘珠幽谷有耿光我聞隆漢日丹碧生齊房小草不異昔於以表時康右紫芝館隨山皆北面此室就陽明翻翻披竹素種種羅芝英內償首丘願外了遺世情奉君茅簷日亦足寓吾誠右開陽室几榻枕泉上竹樹破崖根清風無時來白晝為掩門崖根立香爐泉上出窪尊考槃獲長年何有嗜欲昏右澗阿亭鑿池象弦月一水來不緩但令驗盈縮奚必分半滿差差篁竹凉漾漾芹藻暖臨池學書者詎識崇𤣥館右半月池何年洞庭波伐此青山骨其姿絶清溫其氣殊崒兀下將壓神鼇上欲攀棲鶻盍觀道之凝雲氣從此發右凝雲石池上冢纍纍而有此仙客自無一丘樊何以容六翮泠然合喙鳴月露浩以白矯首太清家歸路才咫尺右來鶴亭吳大宗師索賦河圖仙壇下圓池為愛靈泉來弗竭一池新鑿向丹丘靜同太極渾淪體動合滄溟浩瀚流大珠往往爭明月清鏡時時㸃白漚聞道仙壇碑絶妙蛟龍文采照千秋研山圖淮隂龔聖豫題十詩于上南宮米老書無敵同盟亦有薛河東研山自昔懷清賞石友令人拜下風絶頂方壇承露潔游神空洞與天通平生古學龜城叟一一題詩取次工屯江元戎村樂亭行營好在春江上村樂亭前芳草柔門有在官蛙鼓吹時無久戍蝨兜鍪水流翻動魚龍窟沙汰洗空狐丘借我清談白羽扇還君暖老黑貂裘寄同别峯賀監湖頭實非夢春林林下迹還稀隂雲鰻井層層上落日龜山故故飛布襪青鞋身向老赤髭白足意多違牟尼政使無人識護取傳家大布衣夏商隱還京師試華判憲墨扈蹕行營三十載侯門不肯曳長裾閒從甪里先生飲與說圯橋老父書花外飛丸紅叱撥月中采藥白蟾蜍殘骸倘有刀圭分㑹向南山覔敝廬段宰吉甫金壇回舟有詩次韻不肯折腰彭澤令清風留與後千年雪殘鳷鵲人回首路近蓬萊風引船故篋書隨朝服解老梅枝映燭花然天下竒才段公子未應歸問酉陽田趙伯容入都翩翩濁世佳公子玉立身長要羽衣野鶴樊籠那肯住鯉魚尺素莫教稀八分字許千金直萬斛舟隨五兩飛對御談𤣥能事了明年春早約來歸雪景三香圖紹興待詔修武郎梅和寫生雪羽相呼雪意濃國香狼藉暝烟叢倩誰與剪吳淞水愛爾能吟栁絮風翠袖佳人玉條脫平頭奴子錦薰籠劍南畫手看前輩著粉施朱或未工僧擇中送龍翔遺書浙東回求詩大夫公有遺書札送得元沙白紙來飛錫應真攜衆接燒香侍者拆封開繞渠薜荔牀三匝進我胡麻飯一杯已是人間觀小劫麒麟髙冢盡莓苔馴鷺孑然馴鷺雪霜明下瀨求魚照影行碧玉燈檠雙足瘦白麻衣袂一身輕海鷗見事應何晚凡鳥題門也不情輸我鴛行舊儔侶舉頭寥廓總雲程鼇峰宜晚亭鼇峰亭子偏宜晚約下風煙與細看獨鶴歸時煩寄語夕陽舂外一憑䦨昔游謝朓空陳迹回首敬亭生暮寒萬一桑榆容倦翮西飛㑹訪毛公壇早春偕張率性贊府游大滌山春日春隂人日雨溪頭第一畨春船山中惟知許史貴我輩還同李郭仙長夜詎能勝樂酒獨醒不復廢清眠才情合讓張從事白雪貞松取次妍晨興聊與梅花說嵗窮真成古木共衰翁百年勳業何煩爾一世雲山不負公寒夢漸消忩影上春容已在雨聲中晨興陡覺詩神旺未放韶華角長雄道館雅集聽琴次楊彥常韻幽蒿細竹滿墻間雨後危墻似斷山一室了忘塵世隘諸君能賞病夫閒池巡野鶴魚苗緑土蝕秋蟲菜甲斑我不鼓琴偏識趣絶憐失勢重躋攀讀戴帥初剡源集剡源詩卷落吾手便似移家太白峰學道昔慚山世逺知人今愧郭林宗空山樂書有遺譜白日天馬無留蹤皆集中譜太息斯人不可作厭將兩耳聞寒蟲老學齊書懷寄京師故人手種羣松數尺圍草深南澗客來稀一經斷送垂垂老萬事安排念念非晨待樵蘇才蓐食凉驚絡緯尚絺衣蓬萊坊裏清宵月也到山家白板扉中庭古柏庭中異柏前朝物銅柯石幹兀青蒼雲壑終憐老蛟卧珠樹獨留威鳳翔月上圓隂移覆砌雨餘古香飄近牀支離踈老深根在閲盡世人還久長李遵道寫湖石好石昔聞牛相國寫竹今唯李使君能消龍尾一螺墨與染蛾眉半朵雲瑶草種來秋著露昆刀藏去玉成文堂上朝來有佳氣淮南獻壽獨殷勤張彥輔雪山圖清才絶似王摩詰愛向髙堂寫雪山華蓋洞中如屋裏赤䦨橋外是人間瓊樓祗許飛仙住珠樹應留織女攀莫信寒泉傷玉趾最宜清暑聽潺湲萬竹亭髙懷思得去人羣馬馱沙頭竹似雲亭子當江偏窈窕主人遮道欲殷勤日中見斗青霄立月下吹簫碧洞聞渭川自足封侯擬未數零陵萬石君絶句白足過橋三峽雪蒼頭吹笛滿林風狂花也有凌霄意飛上松頭爛漫紅謝僧送柑肚能堅束三條篾手亦親栽兩顆梨珍重黃柑三百顆好山多在洞庭西殘梅皎皎當忩萼緑華滿懷幽恨付山家春風春雨匆匆去一㸃殘香啄暮鴉野桃花野桃無語最含愁若箇林間得放牛比似落英歸糞草不如流水出香溝白雲半間圖陶隱居别號外兵白雲住處不曽扄割取西偏著外兵伸腳三條椽下卧任君裘蓋洛陽城歸自天柱山招朴菴僧仙人住近餘杭姥得酒移瓶上野航踏雪能來傾一􅊦風流不減在餘杭三香圖凌波仙子塵生襪空谷佳人玉鍊容不奈天寒風露早日髙猶傍錦熏籠筲箕吟書黃山人石壁石為箕不可以簸揚箕盛水瓢飲足濫觴一漱一咽洗髓腸載援斗柄挹天漿半夜箕犯月大風捲地我欲狂起騎箕尾跨石梁長嘯應谷驚下方張皇醉降黃姑房哆然大笑箕口張水流月明天蒼蒼冬日五言雨雪衡門晏隂景薄山阿飛鳥各謀食愧此養微疴餘生轉晦昧芳嵗亦蹉跎勿云幽疾久去疾將如何雪作夕寂微生聽寒頑稍使猜明珠交撒帳銀甲整銜枚厲鬼鋒令挫東皇駕即回眼中紛物色白戰若為裁澗阿對雨山雲油然作山雨來不緩既霑靈石塢遂灑寒鴉館落木遽如許衆草行復爛有酒不斟酌無物堪把玩與聞季長笛寧從中散鍛代謝夫如何徒為白首嘆步歸靈澗幽泥染居士屩不知嵐雨深稍怯布衣薄拂牀次羣帙掃徑堆脫籜清坐亦偶然吾非慕仙爵九日風雨清齊中林授衣節寒氣早已集牖户薄裘褐凡百闕治葺窮居味時序頗訝光景急叢篁助幽翳灇瀨發空寂水禽穿屋過岩樹排簷入陶幘既塵清墨突亦面立遐思把菊詠端處掬溜室空言非藥餌殆不廢九日嵗暮忽忽嵗云暮徒興白首嗟山留待伴雪春禁隔年花把卷因遮眼分餳且膠牙自緣身懶惰莫遣送窮車草堂雅集卷五

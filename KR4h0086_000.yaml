body:
  text: 草堂雅集總集類提要臣等謹案草堂雅集十三卷元顧瑛編瑛早擅文章又愛通賔客四方名士無不延致於玉山草堂者因仿段成式漢上題雜集例編唱和之作為此集自陳基至釋自恢凡七十人又仿元好問中州集例各為小傳亦有僅載字號里居不及文章行誼者蓋各據其實不虛標榜猶前輩篤實之遺也其與瑛贈答者即附録已作於後其與他人贈答而其人非與瑛遊者所作可取亦附録焉皆低書四格以别之蓋雖以草堂雅集為名實簡録其人平生之作元季詩家此數十人括其大凡數十人之詩此十餘卷具其梗槩一代精華略備於是視月泉吟社惟賦田園雜興一題惟限五七言律一體者賅備多矣是書世罕傳本王士禎居易録記朱彛尊於吳門醫士陸其清家僅一見之此本紙墨猶為舊鈔疑或即陸氏本歟乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6da1a9a353e028da32f29539dc5de254596a9424767344579328bb3baea42c26

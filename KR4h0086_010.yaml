body:
  text: 草堂雅集卷十元顧瑛編姚文奐字子章崑山人聰敏好學過目即成誦博涉經史搢紳先生咸加推重辟浙東帥閫掾雖公事旁午不廢吟咏把酒論詩意氣豁如每過豫草堂必有新作故所録尤多家有書聲齋野航亭自號婁東生云題髙宗詩意便面畫裏山河尺五天傷心莫説靖康年迢迢古木連雲色何處思陵起暮煙題章氏園亭七首種德堂春風堂下流芳地種穀何如種德宜會見青青雙玉樹百年無數長孫枝水心亭卜築中流便翼然窗開面面見清泉微風淡沱生文采如坐米家書畫船壺中堂身在蓬瀛亦醉鄉清氷出壑置髙堂誰知天上風雲闕不似人間日月長江山清氣亭卜宅龍江第一灣天開突兀見南山琴書闕間看漁樵自往還明逺樓水光山色照簾櫳極目秋毫迥碧空身世凌空欲飛動何人闕付長風闕亭闕亭下花如錦野蝶山蜂總不知獨把一杯芳晝永美人闕我唱楊枝晚香亭百花開盡菊盈枝三徑歸來酒滿巵老圃秋容清馥馥西亭宜客賦新詩書聲齋即事書聲齋底有新涼行李挑詩上夜航月色滿襟隨我去秋花如玉為誰香十年客路知今日百里胥門尚故鄉朝野太平沾寸祿不愁白首未為郎題馮文仲畫秋亭野望黃葉蕭蕭聲似雨西風夜作離人語秋亭野色滿江南誰搗玄霜千萬杵送人之江東典史海上潮生書畫船秋風此别遂三年青山近郭客攜酒緑水小橋人採蓮笑我間居隨造物看君髙步似神仙江東故舊還相問白雪新來欲滿顚月伯明講經與玉山各賦二絶以寄玉笛飛空過洞庭西山不改舊時青短長橋下風雨夜知是老龍來聽經月闕影散閻浮樹風送將開智慧花闕約清秋闕列毗闍玉山賦詩曰纖月微微轉石牀紺宫秋夜著新涼雨花不許一塵染吹作滿天風露香又詩曰江納潮音秋浩浩空涵月色夜冥冥香隨花雨天分供光發寶珠龍聽經時月伯明住崑山報本寺西園分韻得何字秋日西園萃森爽乘間領客徑相過洑池新水浮皋陸石闕華闕幔坡自笑謬稱三語掾誰能更作五噫歌晚來幽思政傾倒跋馬且歸愁奈何來鶴亭得飛字韻挹闕來鶴亭主人闓竹扉鶴來為客舞玄裳縞其衣客起為鶴歌相與淡忘機况兹暮春候微風蕩晴暉摘花散闕飲芳而食菲古香襟龍麝新茗試槍旗真樂足清賞闕玄微作者紀七人分題詠而歸明朝當復來故恐闕紅稀為君引橫玉再奏鶴南飛書聲齋鬮韻得長字昔我去西齋含悽逐飄蕩今我歸西齋觸情集遐想氣節忽變遷宇宙一俯仰我書時復讀我琴久絶響凱風自南來户庭颯以爽搔首佇良朋於焉共清賞歡將酒洽浹愁借酒滌蕩慨彼岐路人行行屐幾緉豈不念厥初胡為紲塵鞅永懷柴桑翁庶其觸類長題熊松雲畫茅山秋色圖闕先生傳茅仙闕何年山青雲白秋如畫此闕第八天茅山山雲護芝田山雨清菌閣中有學仙人吹簫待鸞鶴吳仲圭畫折枝竹鳳去梁王宅苔荒習氏池阿誰春雨裏見得翠蛾眉婁東園分韻得四字至正八年夏六月日踰四故人海上來朋遊若雲萃置酒婁東園清隂障囂滓談鋒落秋霜炎飈變涼思盤飱襟果蔬令舉飛觴至豈無絲與竹相與樂文字西亭及野航于焉得晚涖新題到畫壁草木亦蔥翠浮生一萍流歡會良未易載歌秋水篇周還緩歸轡招飲髙君自家會招此真率賓昔人酒令圖一行當一新少焉日卓午飛馬秋風塵國色明皓齒天香隨舞裀秪愁草茅士形穢珠玉濱題張戡瘦馬圖稜稜出神骨翼翼照龍光顧影時思戰長鳴勢欲驤征鞍闕兒女逺道負餱糧歸到龍沙日秋風苜蓿長題嶽王墓旌忠函骨北山根一過西湖一斷魂獨掃金人歸朔漠長驅鐵馬到中原姦邪百代空遺臭父子終天尚雪寃墓木屯隂森戰戟蕭蕭風雨泣黃昏秋日宴古塘蘭若分韻得入字秋日上闌干秋風下原隰萍流三十年豈不念鄉邑歸來南山下故壟謀稍葺一錫借招提松光照書籍闕有闕良朋偶雲集解襟納新涼開樽攬芳裛起處適自如獻酬不拜揖于時發清豪分韻紀雅什樂哉固無涯所貴相講習西林趣鳴禽翳翳景將入次韻索居郭外景蕭疏况是秋風落木初少出不知今日事老來猶讀古人書題詩逺寄何煩爾載酒相過尚憶渠見説汾陽多貴客問君誰是馬相如題虞瑞巖描水仙花離思如雲賦洛神花容婀娜玉生春凌波襪冷香魂逺環珮珊珊月色新題書扇圖蘭亭墨本摩挲盡老我愁書咄咄空一自蕺山題扇後千年誰復寄清風題西園雅集圖宋家全盛日戚里肅髙風四海才華萃西園爽氣濃衣冠名教異興趣一時同雅好隨賓客風流是主翁珍藏出古物能事競新功離席髙談永行厨異味重臺池迷逺近杖屨任西東竹色仍多碧蕉花也自紅文章關世道富貴感秋蓬良會難為數清歡未易窮蘭亭修褉事金谷綺羅叢回首俱陳迹君看圖畫中題畫雞冠花何處一聲天下白霜華晚拂絳雲冠五陵鬬罷歸來後獨立秋亭血未乾題倪元鎮雲林圖昔從雲林遊靈光散霞外回薄萬古情逍遙五噫態臨流以濯纓息隂為解帶浩歌激清商參差動天籟和韻天清望不極逸興晚來多新月弦初上秋華酒半􅋳水光搖玉麈山色舞金鵝坐久衣裳冷移舟向澗阿竹枝詞儂家只在斷橋邊勸郎切莫下湖船湖船無柁難輕托白日風波在眼前晚涼船過栁洲東荷花香裏偶相逢剝將蓮肉猜拳子玉手雙開各賭空氷肌玉骨自清涼藕花十里錦雲香一朵紅衣初脫卸却將蓮子打鴛鴦家住西湖第四橋自從丱角學吹簫年來愁得兩鬢雪吹盡春風那得消郯韶字九成吳興人好讀書慷慨有氣節辟試府掾不事奔競淡然以詩酒自樂作賦不習近世體欲追唐人之盛楊鐵崖先生以為與北州李才相上下駿馬新鑾蹄駸駸未可知也題柯丹丘墨竹玉文堂上寫琅玕只作吳興老可看一夜秋風動寥廓綵雲零落鳳毛寒題王元章畫萬玉圖一湖千樹玉交加清夜掀篷看雪花狂殺山隂王處士興來放筆掃橫斜題美人琴阮圖金谷花飛春半時花間鶯語太遲遲美人心事渾無賴忍把柔情摘阮絲題宋高宗詩意便面深宫華氣接蓬萊日日題詩上紫苔一夜雨聲無處著盡將秋色過江來和張伯雨雲林席間韻句曲先生世所憐新詩字字總清妍楚江秪漫聽春雨蜀土那知有漏天樹隔青山迎好客華開白日照芳筵髙居更憶雲林子目送冥鴻揮五絃題柯博士梅竹圖天王宴罷奎章閣博士歸來兩鬢絲寫得寒梅與修竹照人清影尚參差題浴馬圖花落春雲滿御堤晚涼試浴躍龍池五王未許爭飛鞚先賜承恩太僕騎題朱澤民山水洞庭南下水如天篷底看書白日眠我亦憐君愛山色直須買酒過秋船題顧定之竹吳下幾人能畫竹風流只數顧參軍都將數尺雲煙思寫作當年篆籒文題唐子華山水東風吹雪嫩寒生有客騎驢畫裏行今日相看渾似舊江南何遜獨多情湖州東門即事和玉山韻路入仙源一水分雞鳴犬吠自成村晚風忽送青天影吹落匡廬九疊雲玉山詩曰郭外青山兩岸分桃花流水帶漁村紫霞仙子坐船上笑看春風吹白雲遊辨山李雲山點杜鵑花與玉山同賦金井西頭蕚緑仙霞裾風度影翩翩隴西才子多清思謾把春雲染杜鵑玉山詩曰山花開滿枝遊子竟忘歸東風灑猩血吹作杜鵑飛寄逺曲二首突騎破天驕將軍賦大刀隴頭嗚咽水一夜夢臨洮朔雪滿天山征人去不還惟應隴頭月照見玉門關題趙魏公畫漢家宫闕盡蒿萊煙雨蒼茫護石苔惟有金河舊時雁年年秋色過江來用楊鐵崖新居書畫船亭韻與玉山同賦越來溪上暮潮過飲馬橋頭春水波出郭喜知塵事少吹簫無奈月明多華飛斷岸衝歸燕栁蔭長溝泛白鵝擬送一琴臨水榭叩舷同奏竹枝歌卜築喜過揚子宅城居曲曲抱溪流夕陽在波人影亂秋水上簾竹色幽載酒過門從問字據牀吹笛不驚鷗月明後夜溪山雪乘興還能具小舟次韻陸友仁吳中覽古一首赤闌橋下記停橈細雨菰蒲響暮潮説與行人莫回首故宫煙栁正蕭蕭過石塘洪亂石成孤嶼中流截巨濤水清時見底沙淺不容舠度鳥窺天影遊鱗觸澗毛前村江路迥纖月在林皋過漁浦江水飛花作雪輕月明似入剡溪行可憐一夜天涯雨又聽春潮打櫓聲題仙山樓觀圖漢主離宫最上頭昔年曽侍翠華遊青天半落銀河水白日髙懸華嶽秋花隱儀闕臨閣道仗移闕瀛洲三山更在齊州外遙認蒼煙九點浮送姚子章之浙東帥掾海右桓桓大府開勝中雲氣近蓬萊借籌底用平蠻䇿草檄須煩倚馬才玉節旌麾江上見明珠翡翠日邊來遙知博望沙頭月為照乘槎萬里回寄南屏精舍諸友山中遺老凋零盡太息於今復數誰東郭幽人頻曳履南岡諸子總能詩夜窗燈影分書幌午榻茶煙揚鬢絲何處令人發深省永明湖上立多時同報復元上人登南岡文筆峰兼柬句曲外史橘林風細涼颸生石磴雨滑褰衣行雙肩正如野鶴立左耳忽若秋蟬鳴孰云耽詩並齊已我愛玩世惟彌明對牀著屐歌楚語若箇扶藜來細聽題王仲𢎞縣尹所藏髙彥敬尚書巴陵山水圖尚書愛畫水落筆生逺色微茫洞庭野逈與湘渚隔青山迤邐盤春空江波欲落江樹重望中雲夢開七澤猿啼直與巴陵通王郎家住巴陵道按圖只説巴陵好巴陵女兒歌竹枝微風落日行人少山中春雨生石田柴門流水聲濺濺釣竿長日倚沙樹扁舟中閣生晴煙愛此只合山中住十年作官不歸去髙堂見畫夜夢之夢中離離濕秋露白頭官滿思轉多江南酒美仍蹉跎人生得意夜行樂酒酣且和巴陵歌王郎王郎奈爾何龍門山中即事雷雨過崖驚落湍空林白晝忽生寒隂隂草閣開尊坐細細山雲卷幔看落日樵聲經木末青天鳥道挂簷端亦知吏隱非吾事直欲從兹賦考槃和仲舉張博士見寄一首金溝河上栁千條濯濯輕隂覆畫橋華夾御城涵曉日波回仙沼應春潮曽聞獻賦趨三殿想見承雲麗九霄欲聽鈞天塵夢隔蘇臺涼月夜寥寥曉發商溪戲柬玉山且索和商水西頭花滿煙畫船銀燭理絲絃翠屏何處驚殘夢卧看青天春月圓玉山詩曰岸花如霧隔春煙畫舫琵琶第四絃翡翠驚飛不知曉五更殘月向人圓送丁彥祥入京兼呈危太朴應奉畫角城頭烏亂啼客行秋日思悽悽黃河一水青天上蔥嶺諸山大漠西飲馬窟深沙草淺射雕風急暮雲低經時不見危供奉想候都門踏雪泥寄句曲外史掬溜室中清夜分相過曽此説幽文園池星斗當窗見枕席波濤隔樹聞頭上鶡冠朝老子手中龍節候元君欲從世外求玄賞雞犬岩頭有白雲鄭蒙泉鍊師子午谷圖子真今住子午谷乃在蛟門西復西繞屋長松落晴雪倚天絶壁立丹梯春回大壑三芝秀月滿空山一鶴栖歸去看圖望瀛海定應沐髮候天雞和報復元秋興一首大星出海芒角稀新月隔林光景微空山無眠雞犬靜獨樹忽驚烏鵲飛已喜朝廷寬賦斂側聞南國尚戎衣釣竿早晚落吾手日日放船來水扉天平山西來山勢森如戟上與浮雲石棧連華蓋九峯當絶壁龍門一道落飛泉幽穿石洞潛通穴下俯天池冷積淵更欲振衣千仞表側身東望洞庭煙谷口谷口大星稀蒼茫夜景微草驚知鹿過潭響覺龍歸楚舞誰相狎商歌自攬衣鹿門應有待莫遣壯心違題趙魏公竹鳳閣春雲細瑤階碧霧深輕風來委佩旭日上朝簪歷歷衷賢思依依戀闕心竹枝同古調千載有遺音寄經鋤隱者倪元鎮谷口青松夾徑生鶴巢松頂雪初晴此時知有經鋤者獨抱長鑱嶺上行寄文煥章揚子橋邊送客舟秣陵煙樹不勝秋征鴻過盡無消息注目寒江水倒流月夜有懷報復元上人門外天低南斗橫戍樓風急打三更絶憐此夜長松下正好哦詩踏月行送趙季文之湖州知事側聞大郡元僚佐江左文繁費剚裁殷浩固稱多士選郗超元是濟時才題詩金井穿雲洞下馬窪尊坐石臺兼有故人資碩畫春風日日好懷開移家霅溪溪上頭苔
侯天開赤水浮仙島日出滄溟沒蜃樓東府故人姚記室定應騎馬日從遊題步愚懶道士青松障子青澗長松積雪深白雲千里護空林石泉自彈流水操天籟時聞大雅音貞白洞前風細細葛洪井上晝隂隂茯苓滿地知愚懶日抱長鑱何處尋寄唐子華縣令兼柬趙季文從事鄉里衣冠日巳疏歸來俯仰十年餘蒼筠獨喜經秋後白髮休嫌把鏡初猶子總傳韋偃畫諸孫只守鄴侯書西鄰從事耽詩癖日日過門應下車和鄭遂昌初度有感六月六日逢初度白髮朝來把鏡看稚子攤書誦麟趾仙人承宴擘龍肝玉壺送酒春長好青竹題詩墨未乾久識先生甘隱遁蕭然林下古衣冠和鄭遂昌苦雨家住越來溪水頭草堂六月雨生秋風兼大澤隂霾湧水合長河濁浪流后土何由見白日故人相憶在滄洲明朝欲向東吳地江草江華笑客愁送僧遊廬山將之西蜀謁玉泉尊者聞道上人廬阜去逺從西蜀陟崔嵬舟行五月瞿塘險天入三巴鳥道回蘭若清猿聞苦竹袈裟細雨憶黃梅玉泉智者還相見應説鄉人海上來小隱為居延王孫德新賦草堂三日風雨驚閉户不聞車馬聲書簽頗怪燕泥濕井屋忽看春草生王孫亦在城西住手種團團青桂樹朝來讀書不下堂自寫淮南小山賦投贈兼善都水尚書北柱最清髙持節東南護水曹千載河渠數劉向一時詞賦重王褒玉垣天近含雞舌阿閣朝回拾鳳毛更憶龍池舊時栁年年雨露浥宫袍視草堂深近玉除每從進講佩銀魚南宫晝漏通青瑣東壁奎文煥石渠古篆久知通史籀新詩端擬過黃初茂陵多病緣何事惟待青冥薦子虛送廣德程萬户弟從軍桓桓程將軍年未三十氣如雲一朝詣闕襲父職獻書討賊爭功勛朝廷恩深禮數厚授鉞前驅那敢後雲鳥天青沒畫旗轅門月黑鳴刁斗將軍有弟才且賢從兄萬里何翩翩看雲倐爾歸奉母如此一門忠孝全楊花三月潼川暮揮戈又指湖南去吹笛髙城破敵風飲馬長江洗兵雨學書學劍真男兒功名拾芥須爾為長歌更勸一杯酒歸來細頌平蠻詩登姑蘇臺劉從事索賦二首送客古臺下繫馬古臺隂日落黃塵起馬嘶青草深古人俱白骨遺像空黃金撫事已千載徒傷千載心臺榭已蕪沒江山非昔遊鳥啼煙樹裏日落古城頭源水聞吳曲青楓繫越舟望中衰栁色知是舊長洲過南沙曹氏别墅會沈伯熙索賦虞山相對南沙口曲曲雲林似輞川隔岸花飛春片片開門青竹雨娟娟故人忽喜經年見清夢已驚三日前深夜一尊仍惜别還家又是月初弦沈伯熙云三日前曽夢余相見惠山次韻栁遵道待制留題二首晴山屹立九龍堆翠削芙蓉面面開千章灌木煙中合百谷流泉地底來人倚石牀題斷蘚僧歸紅閣禮殘灰杖藜不厭攀蘿磴一日須來一百回行盡空林黃葉堆青山九疊倚天開移家未學梁鴻去題石應傳米芾來天上遊絲春繞夢人間劫火冷飛灰無因十日雲房住為借支郎一鶴回題趙文敏公竹不見王孫三十秋白頭遺恨思悠悠似將一掬皇英淚夢逐湘江春水流次韻周子通應奉見貽文星一箇落南州太史今為萬里遊雲漢依然天北向風波已見海安流亦知王粲久為客惟有杜康能解憂欲問南山射虎者數竒何事不封侯送徐勉之慈湖山長北闕獻書今十年南州辟掾任才賢仍聞下第還鄉邑猶喜一官司豆籩學舍開時對山郭海潮平處是公田絃歌但使敦民俗冦盜于今已晏然送凌元之湖圑監稅草年作吏辭鄉邑十月司征去信州孫子斑衣方在膝慈親白髮已盈頭嶺煙散後人歸市春水生時客放舟莫為微官歎淪落江山如此亦清遊我居吳下君居越初未識君知姓名相逢一夕話鄉里託好十年如弟兄明日還過客星瀨故家近接上饒城江頭把袂不忍别歲晏商歌無限情望潮曲夕風吹白波江樹搖緑煙行人望潮水心與滄溟連榑桑東來三萬里曉看浴日重淵底乃知碧海與天通只隔銀河一絲水美人住在東海頭身輕嫁與千户侯頻年轉粟直沽口檣頭夜夜望牽牛贈琨努同知前宣文閣司鑰昔年進直宣文閣奉詔親從華底來魚鑰晝司宫漏永牙牌晨候閣門開九重清切通中禁百辟從容近上台白髮思親滄海上看雲日日望蓬萊題宋氏緑野莊暮泊蘭陵郡朝過緑野莊飛華渡江濶垂栁蔭門長掃地春隂合梳頭荷氣涼幾時重著屐來此話滄浪陸友字友仁姑蘇人幼聰敏好學作詩必擬古人不茍下筆故其詩皆有法度北遊京師館閣諸老無不愛重之惜其不永年故詩不多得云送趙季文之湖州知事共説佳公子翩翩清且賢傳家存舊笏載世有遺編鷗鳥衝波去苕花帶雨牽糾曹官事少揮麈看山川贈諸葛子熙聞道長安異昔時秋風落日草離離九成宫闕無尋處空有人來拂斷碑百二山河路欲迷荒林敗冢轉悽悽夜深曽過昭陵下風雨猶疑石馬嘶北堂萱草緑朵朵白髮慈顔不解憂盡賣刻辭供菽水誰憐跅足遍長洲題米元暉畫山水翳翳雲中樹亭亭江上山秋風生柁尾蕩漾碧波間題宋江三十六人畫贊憶昔熙寧全盛日百年曽未識干戈江南丞相變法度不恤人言新進多蔡家京卞出門下首亂中原傾大厦睦州盜起勢連北誰挽長江洗兵馬京東宋江三十六白日橫行大河北官軍追捕不敢前懸賞招之使擒賊後來報國收戰功捷書夜奏甘泉宫楚龔好古作畫贊不敢區區逢聖公我嘗舟過梁山濼春水方生何渺漠或云此是碣石村至今聞之猶褫魄送國王多爾濟就國奕世名王䇿駿功逺分茅土鎮遼東玉符金印傳孫子鐵劵丹書誓始終滄海斷霞通虎帳黑河飛雪暗雕弓莫忘聖武艱難日四傑從容執帛同桂之樹桂之樹褰我衣秋風昨夜起遊子送將歸明年春水盛鼓楫下江磯吳桓王墓見説桓王墓名因父老傳如何漢社稷竟作魏山川壤隧秋風入荒丘暮雨懸唯餘碑上字隱隱赤烏年送趙子期使交趾萬里交州道還聞虎節馳天王頒正朔使者護蠻夷瘴雨侵榕葉腥風度竹枝奉辭存大體定服逺人思見説幽并豪俠士新拜羽林郎夕接秦娥曲朝薰荀令香折花當閣道射栁傍宫牆見説紅城下今年春草長石民瞻作縣彭澤集賢趙子昻畫馬贈别後為他人持去二十年後復得之題詩以識之朝踏長安塵暮傾渭城酒風流趙集賢畫馬當折栁晚涼池上洗馬歸圉人控鞍不受羈此馬自是玉龍種想見明窗貌得時題詩人物不可作北雁南雲總離索舊遊回首二十年今日重看宛如昨春盡江頭生緑波青山滿眼故人多惟有當時陶令在奈此蕭蕭白髮何次張貞居所賦雲林松花新釀碧琳腴洗杓何妨起病夫菌閣下簾修隱訣雲林掃榻挂仙圖旋移竹近文書案自汲泉添刻漏壺聞説華陽多玉食洞中燕肉膩如酥泊虎丘晚泊虎丘山下村小舟搖蕩一溪渾遊人車馬各已散宿鳥池臺故不喧初月出林光照地亂雲入寺影當門千人石上平如砥良夜時聞歌吹繁王蒙字叔明吳興趙文敏公之甥強記力學作詩文書畫盡有家法尤精史學遊寓京師館閣諸公咸與交善故名重儕輩嘗過草堂所留詩止此云八月十五夜陪徐校書飲酒校書同是京華客共對月明懷故鄉光淪太液魚龍動風度長秋草樹涼莫使華燈繼尊俎不辭白露濕衣裳千門萬户秋聲裏玉漏沈沈夜未央海子橋暮登海子橋西繞紅門歸霜風著宫樹葉葉帶紅飛據鞍吹短笛乘月搗征衣江南氷雪裏音信寄來稀送許具瞻馳驛之鄞縣尹縣尹新承天子詔漢家舊制重郎官甬東羣盜知王式海內蒼生望謝安修竹故鄉山疊疊梅花驛路雪漫漫行春勸課無餘事得意新詩好寄看有感馴龍若御馬下上何足竒飄搖海東鶴司晨不如雞白雲本無心每與仙人期悠然岩壑姿卷舒豈無時偶來還自賞倐去令人思燕臺十二月雪沒黃金基正月河氷泮二月下流澌江南三月暮花落舞晴絲歸帆天際來煙雨渡江遲渌波映吳樹雙飛錦鸊鵜相思極春水一夕到天涯留别都門栁色黃我作江南客折栁送將歸玉壺况琥珀羡爾青雲士瓊鉤戛珠舄朝辭漢殿春暮就干時䇿聲名人所欽軒車日相索歸人夢還家五湖煙水汐何處我思君鶯啼栁花白調古世寡和才髙自無羣種玉祕竒術還丹隱玄文披裘負薪士拾金非所聞雖無箕潁節亦不慕髙勳石田長芝草暮春自耕耘曲肱枕耒耜長歌至日曛所樂良在兹沒齒復何云我本笠澤漁而來京國遊麋鹿樂茂草和鳴聲呦呦局蹐向樊籠徘徊如楚囚置之山谷中曠蕩獲自由富貴與榮華飄若水上漚百年既瞬息白駒豈淹留眇哉一身纍徒懷千歲憂惟持一尊酒日夕相勸酬故山叢桂樹葉茂枝已稠茍遂攀援願此外復何求昻吉字啓文西夏人登戊子進士榜授紹興録事參軍多留吳中時扁舟過余草堂其為人亷謹寡言笑非獨述作可稱其行尤足尚也樂府二章送吳景良吳門栁東風歲歲離人手千人萬人于此别長條短條那忍折送君更折青栁枝莫學栁花如雪飛思君歸來與君期但願栁花如君衣采采葉上蓮吳姬蕩槳雲滿船紅妝避人隔花笑一生自倚如花妍低頭更采葉上蓮錦雲繞指香風傳殷勤裁縫作蓮幕為君髙挂黃堂邊待君日日來周旋姑蘇臺送友人之京師送君姑蘇臺臺前日落雲帆開吳王宫殿已成土且復飲我黃金罍吳王宴時花滿屋半酣西施倚闌曲越兵一夜渡江來從此荒臺走麋鹿與君弔古登髙臺青天萬里雲飛回願君乘雲上天去思君遍倚臺前樹虎丘山送友人别君虎丘山歸雲如鴉松樹間生公聚石坐説法白虎臺前去復還至今臺下金精伏清氣瀟瀟滿林谷城中之人豈解事但見寒泉繞岩木君行慎勿停吳舠修名要與山齊髙酒酣君去我亦别後夜山頭望明月王禕字子充金華人晉卿黃先生門人與天台陳敬初遊京師為朝貴所重赴鄉薦歸江南余與定交時過草堂觴詠纍日吳中習舉業者多從之贈别周季長舍人赴淮西帥幕昔時紫綬侍雲霄今日春風換緑袍閫幕共誇從事重朝班猶憶舍人髙衣冠望族如麟趾伯仲文名比鳳毛回首京華寧久别看君辭采映東曹留别京師諸同志京都冠蓋盡才賢兩載追隨得後先朱履食魚春日上褐衣騎馬朔風前蘇公去蜀八千里杜子客京三十年從古辛勤有名譽却慙蚤賦式微篇寄題葛伯溫憲郎文窗十四韻中州勝槩説彭城戲馬臺髙俯大坰汴水北交河水濁淮山南入楚山青百年故老遺文氣今代竒才尚德馨喬木依依臨巷陌世家隱隱見門屏未妨仲蔚蓬生堵政喜濓溪草滿庭雨案藝香春辟蠧風簷竹暗夜藏螢圖書留意年華蚤燈火關心夢寐醒劉向謾登天祿閣揚雄自著太玄經常時下榻來今雨幾載驅車從使星浙水東西紆逸足雲霄上下振修翎才名要使囊穿穎宦業懸知刃發硎亦有倦遊天上客過從何日話飄零荆樹曲紫荆樹當軒青衆枝只共一本生去年風吹北枝損憔悴南枝顔色隕北枝今歲喜如前南枝顔色皆鮮鮮樹木無枝寧有意同本故應休戚繫君不見桃生露井上李樹生桃傍蟲來嚙桃根李樹代桃僵桃李異根尚如是况此一本相連理人家兄弟無則巳若有還須荆樹比江上曲木蘭舟繫門前樹阿郎今朝棹槳去去時為問歸幾時約道歸時日須暮江上風水不可期日暮不知歸不歸鄭守仁號蒙泉天台黃巖人幼著道士服長遊京師寓蓬萊坊之崇真宫不事干謁齋居萬松間一夕大雪填門公讀書僵卧自若京師號為獨冷先生至正間主白鶴觀危太朴應奉壽華蓋山前爽氣浮瑞鍾人品最清修汗青筆力齊班馬太白神光煥斗牛絳闕早朝香滿袖玉堂夜直月如鈎春風道上看紅藥政是斯文獨步秋和劉遵道僉憲韻題開玄道院呈王真人龜溪溪上開玄館玉靈仙人别洞天金碧樓臺深翠裏畫圖城郭淡煙邊桃花春晝霞千樹暖日東風錦一川人在歸根亭上燕香飄外國羃林泉柬杜清碧先生有元至正喜隆平偃武修文尚老成特遣皇華傳詔旨逺徵隱逸入神京草廬未許孔明卧萃野可容伊尹耕好駕蒲輪對宣室毋虛前席問蒼生一鳳皇臺和李御史韻夜深烽火東城鼓步絶金蓮春筍泥千載王風天轉北六朝文物日沉西江浮漢地淮山小鳥沒吳雲宫樹底獨足不回鳷鵲去雲臺今此讓烏棲謝黃德廣見贈韻幾載隨龍度兩京每慚服食在王庭論文心契危貞白志道神怡夏紫青騎馬歸來頭帶雪釣魚老去孰瞻星雲山江水秋無恙莫遣天書降浩冥和吳大宗師九日迎駕龍虎臺韻龍虎臺前鞠日時玄師迎上政棲遲皇皇車駕循彞典穆穆君臣好禮儀五色卿雲清廟瑟九光行殿錦氊帷山呼首效封人祝恭進蓬萊沆瀣巵至尊萬壽復神京中外臣僚極逺迎王道平平行鳳輦德音秩秩噦鸞聲堯天澄湛星辰列舜日昭融錦繡平最喜玄師承顧問還丹九轉眼重明深秋黃道翠華開輦路清光被草萊一地行宫成玉陛九天明月照金臺班趨文武紅雲合樂奏簫韶彩鳳來至正明仁希歷代詞臣樂頌太平回登桑乾嶺迎達禮部曉發桑乾嶺行行路入雲衆山皆在下惟我獨超羣馹騎天邊出楊花樹杪分老僧邀茗供坐石共論文和句曲張外史韻寄上清薛外史明月照寒水清霜積厚氷知君多念我為客獨依僧湖海十年夢詩書半夜燈忽聞江國雁寫寄剡溪藤上京懷張外史兩冬為客住龍沙長憶西湖處士家昨夜不知身萬里短窗明月夢梅花和沈自誠孤雁韻海國風髙失薊雲聲聲哀怨不堪聞自憐片影荒城月肯為飢寒向别羣和貢泰父待制上京即事野韭青青黃鼠肥地椒細細白翎飛郎君集賽今朝出請得官錢買酒歸金鞍寶馬女郎騎笑擁香車出內時齊到五雲新月下舉鞭相向始分離雨中海棠分韻得肉字花神泣向胭脂玉淚浥紫綿紅沁肉沈香亭北錦屏寒太真政在華清浴送任生之松江從學爾翁與我同兄弟乃父論交亦友生愧我江湖空老大喜君頭角又崢嶸蚤看器識如劉晏還擬文章似禰衡春雪一篷波萬頃栁條青眼總離情衛仁近字子剛雲間人學舉子業從楊鐵崖遊常以才子稱之此數詩皆其所寄云擬唐宫詞九重春色繞金鑾龍渴宫壺午漏殘犀押簾垂紅霧暝獸爐香盡碧雲寒隔樓度曲多西子别院吹笙是內官見説羊車明日過旋栽楊栁護雕闌奉寄楊鐵崖白髮揚雄三泖上樓船日日載青娥驪珠泣月夜光冷象管叫雲秋思多問字諸生頻載酒購書道士為籠鵝玄霜臺上涼如水好著吾儂拍手歌送劉主事北上曉漏沉沉禁籞清內班初進珮環鳴九重日月明金殿四海車書會玉京天子龍飛乾道正宰臣鵠立泰階平幾時我亦觀光去醉插宫花出鳳城秋夜曲誰家女兒青髻螺花前雙歌舞婆娑湘簾在鈎明月多奈此迢迢涼夜何銀河流光夜初靜姮娥娟娟度鸞影綺疏美人醉方醒倚闌吹簫更漏永草堂雅集卷十

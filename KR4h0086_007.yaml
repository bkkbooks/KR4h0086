body:
  text: 草堂雅堂巻七元顧瑛編鄭東字季明温州之平陽人幼酷嗜書明春秋後生學徒為舉子業者一經指授皆就繩墨作文為詩㫖趣髙逺别有文集行於時今所載者特與予家題品者耳題宋髙宗畫扇頭自題云萬木雲深隱連山雨未開多時海上日光催猶道千山雨未開總被浮雲能障斷龍沙不見翠華囘題葛仙翁移家圖多事移家向道塗定從何處覓深居無人占得神仙氣乞取青牛背上書題江貫道平逺圖飛烏欲沒暮烟稠落落人家竹樹秋絶似南徐城上望蒼茫野色入揚州題張戡瘦馬圖北風蕭蕭沙草黄天寒馬瘦骨如墻渾家兒女雕鞍上日日隂山射白狼題士宣杏花雙喜移時山鳥鬭芳叢深院佳人晝睡濃起立階頭驚碧草不縁風雨落春紅題李唐牧牛圖羡殺田翁不出村牛羣坡上散如雲買牛何日同渠牧短笛時吹向樹根懐舊滄江樓上酒初醒起視林花落曉星三月到京春雪霽太行山色馬前青送郭彥昭北游白面郎君好逺游却從遼海上幽州十日南風行萬里牽牛夜夜在檣頭天妃祠前潮已生踏歌搥鼓送郎行黒水洋頭好風色數過莱州五日程莫聽謳歌倚柁樓令人愁怨憶南州一片姑蘇城上月送郎直過界河頭寄郭熙仲兼簡郭彥昭翼也東吴彥孤標玉樹柯政須愁飲少且莫倚才多曉日開青嶂秋風連白波無人相問訊小阮近如何題報本寺迢逓珠林滄海邉参差緑水石渠連燈燃方丈開猊座屏擁罘罳䕶法筵天女時来花亂下龍君欲至風泠然金相夜凉遥共禮月華長照寳階前送何謙亨歸撫州二月離家作候吏長江行船興有餘文采曽承盧太史風猷不墜宋尚書豫章寳劍何由得東海明珠政不虗多時失奉髙堂饌歸釣寒潭一尺魚和郭熙仲毎愛揚雄能作賦不憂賈誼易遭讒蒼鷹拂拭黄金鏇駿馬光明白玉銜太乙頻来觀象帙麻姑相許寄銀椷獨愧才名難並立見稱龍尾也非凡寄呈梁承㫖太平天子重詞臣色爛宫袍寵澤新應對金鑾明日月歩趨玉署上星辰夜分執笏傳宣急晝永揮毫草誥頻自愧不才頭已白秋風垂釣大江濵贈墨生魏元徳之京昔年廣陵有魏翁隱居不出玉山中朝汲山下泉暮採山上桐手操玉杵不計工一日煑麋三日舂墨成包以錦十重色如犀角堅如銅魏郎傳家墨逾好我始得之如至寳喜聞學士延閣開驅車欲向都門道為君抱墨三歎息虞公目昏揭公老贈筆生陳重實吴興老馮善擇毫擇毫入筆銛於刀近年楊陸亦有法聲價直與馮齊髙陳生後出掩三子射利肯作庸工饕欣然為我開一東詎數豕鬛并貍毛纔濡入手即圓熟揮洒不覺運腕勞野人得此殊快意翰墨雖拙尤便操既不能寫蟲魚䟽又不喜書龍虎韜暮年但欲給生筆收拾遺史明誅褒顧無好句相報答且復浮以尊中醪氣酣耳熱秋風起江山如助詩人豪九龍山懐友風雨兩鄉難縮地山忩時讀去年詩九龍何處雲深淺一雁不来人别離老樹引藤秋結子黄猿窺果晝呼兒遥知句就無人解月落山靈堕淚時題楚江清曉圖樹碧江寒日出遲青山雲起亦多時幾人船屋縁貪睡佳氣朝来竟不知題朱澤民秋江獨釣圖山川無㣲雲萬物粲可數長江秋氣至美人在中渚凉風吹蘭舟木葉下如雨魴鯉豈必多書卷良可咀初非與世殊聊以樂空屢題張叔厚畫琵琶士女蝦蟇陵下春風夢潯陽江頭秋月愁莫怪青衫容易濕多情司馬雪盈頭題馮文仲畫山水六月凉風吹板扉蒼苔生滿釣魚磯人生抵死貪㣲禄如此溪山不肯歸題顧定之畫墨竹眼中得見珊瑚樹無乃佳人碧玉釵酒醒同誰歩清影不勝白露滿秋階題王若水畫棘針野雉雉於翔有煜其章隱而弗見於雉何傷一章雉於止翟翟其尾雖離於棘於雉何耻二章雉於雊孰捫爾噣凡民多言亦孔之疚三章題從子倫畫梅花家鳬池上花開如白雲碧波鵝鴨動成羣擬開水檻供垂釣日日春晴共汝分題盧尊師三香圖美服兮繽紛容佩兮氤氲咸告予以穀旦聊容與兮江濆爰周顧兮九野忽邂逅兮予昆季佇立以待予廼執予手而與言羌齒髪之未化尚偕老兮夫君題徽廟馬麟梅龍樓鳳閣美人歌賞盡瓊花碧玉柯驛使去時渾浪折江南春色巳無多題范寛小雪山圖雪壓寒林萬木垂經旬不與野人期蹇驢借得如黄犢猶怕山橋不敢騎題趙翰林桃花馬圖昔共將軍戰陣間髑髏濺血上斑斑昆明池上教人洗選入天家十二閑題趙翰林畫馬大宛前日進龍媒屹立天池駿骨開黄帕寳鞍纔卸却鑾輿八月上都廻題管仲姬著色竹圖賜讌曽陪玉座旁琅玕光彩映椒房秋風此日愁無限恰與苕溪秋水長題李唐秋山圖萬壑霜飛木葉丹石橋流水暮生寒却疑二月天台裏一路桃花照馬鞍題趙千里髙士圖題詩日日樹隂傍不斷清風洒石牀騎馬出門塵似海百年都只為官忙送郭彥昭歸吴中江清碧月出東垣良夜開樽修竹園天馬何年漢墀下爰鶋此日魯城門豈求碧海珊瑚樹貪看炎州茉莉盆定擬重来尋玉局容成洞裏與君論又外沙沙頭潮沒渚海壇廟前唱蠻歙政喜南風吹五兩不愁落日轉檣烏鯿魚一尺恰上釣吴姬二十獨當壚醉歌白雪誰能和擊碎筵中玉唾壺送日本僧之京萬里乗濤来絶海中朝冠盖盡相知丹丘博士與飲酒青城先生邀賦詩傳鉢底須歸故國把文遂欲動京師絶憐船上看春色二月官河水發時送駙馬西山公詩明侯徳美世莫儔麒麟之趾丹鳳咮黄流芬芳在尊㔽繅藉光彩收琳球王姬下嫁禮服優鋈金為車白玉輈閨中通籍孰與侔貴宜列爵同徹侯大布遂易狐白裘事業直擬追前修賦詩援筆思不留天機豈用加雕鎪衆觀后羿親射侯束手欲立江輒流法書一字千金酬玉釵之股珊瑚鈎大儒老師日與游論道極口稱伊周二年市官留小州政寛坐致東南酋三韓毛人及琉球行縢在股寳絡頭長風萬里驅大艘象犀珠貝充海陬貢之府庫常汗牛歸視其室唯蒯緱聖主在位將爾求出入王命為舌喉題畫山水歌君不見謝康樂短面長髯痩如鶴作郡安能棄丘壑又不見鴟夷子屬鏤飛霜赤心死一棹三江入烟雨我生千載下酷愛古人心本野老仙縮地誰得傳顛墨淋漓醉中洒幽幽樹意含暝雨朶朶山頭青欲雲横江依約度深谷三里五里東西鄰采芝定有商顏叟槲皮之裘槲葉裙神仙有無不可即杳杳路斷桃花津何人相期過西麓牲肥酒熟秋樂神祗知耕鋤及婚嫁廟堂黜陟那得聞扁舟從何来盈盈載秋碧嵐光忽已冷日暮問家室熒熒林隙燈火青雞黍家人具令夕終南相繼售卑價才薄官㣲遭箠罵久知富貴成茹荼吾獨愛山如食蔗家貧恰有買屐錢白髪漁郎許借船箕山潁曲命吾駕百嵗胡為堕機擭題王若水梨花山鵲圖庭北梨花爛漫開一雙山鵲忽飛来人生有幾清明節日日春風醉百廻李元珪字廷璧河東人端厚沉毅重然諾酷志讀書非其人不茍與交書法如困學凡所寄詩章多為好事者持去故所載不多云感懐異方久漂泊嵗晚羈吴門感慨俯流水悠悠度朝昏荆璞獻所知懐寳非有恩達人一傾顧至道千古存富貴易追逐安能效塵奔世態日已薄憂心向誰論一日復一日一日一日復一日百嵗能消幾雙屐玉龍嘶斷東溟波春風吹老南山石栁花著水流青萍琅玕弄影生秋聲霓裳短衣尚堪舞髑髏醜眼不再明竹馬兒童誇疾走檀板梨園歌白首桑根陵谷號飢狐一夜黄河向西吼芒碭山下赤龍子千古英雄魂不死崆峒重揖廣成公笑我擕来亂紅紫羲和盡意驅長雲有酒誰酹田文君燕雀紛紛戱鴻鵠古人道義今無聞東家嬌娥怯春老曉鏡畫眉鬬新巧開屛自語芙蓉秋妾顔不似當時好一朝一朝又一朝黄塵車馬長安橋麄衣藿食養心骨㑹看鵬背摩青霄題梅花士女夢裏尋香出曉城一聲殘角暗魂驚美人不作羅浮夢獨倚梅花看月明秋暮秋色已云暮天寒未授衣異鄉三載過倦客幾時歸交漆唯君久論心見面稀題詩寄清隱江國雁初飛送趙季文之湖州知事芙蓉幕裏舊叅軍文采風流思不羣執法憲庭名乆著分符水部政多聞今朝别酒聽吴曲後夜輕帆卸霅雲咫尺相思相憶處一琴一鶴獨隨君春日訪雲林隱君倪元鎮往嵗慕幽隱兹晨適雲林倒屣荷主意下榻情何深取琴為我彈唐虞有遺音感子曠達志滌我塵煩襟雨過池草生忩虗松竹隂倚檻俯流水開軒聽鳴琴芳春集嘉讌酒至還自斟愛客畏言别維舟睇遥岑南昌諸郎立春次日邀飲江閣置酒宴江閣濟濟皆郎官素心偶相惬氣味如芝蘭東風奏㣲和晴雲靄林端美人歌白雪玉筯行春盤焉知千里客共此一日歡夕陽下西麓徘徊更凭䦨冬日平江寄倪元鎮𤣥文館裏逢君日剪燭傳杯夜話時寒月半忩親下榻幽人滿坐共吟詩無兒守舎馮唐老有客分金鮑叔知咫尺維舟空悵望封題聊為寄相思雨中夜宿𤓰洲江浦春隂江浦易黄昏雨裏人家早閉門歸雁雲間知塞路過帆沙觜帶潮痕遥膽北固青山郭只隔南淮綠水村野寺踈鐘到孤枕閒愁清夜與誰論秋暮夜宿望亭茅屋沿堤密掩扉官橋昏黒泊船稀守關戍火明村塢隔岸魚燈照石磯寒木盡随溪雨落斷鴻猶趁野雲飛篷忩欹枕渾無寐倦聽人家夜搗衣贈伊遜秘書載書歸文翁石室一燈夢覺青藜杖長揖芸臺入四川載書深藏石室裏卜居還近草堂邉蜀臣漢士明日月文翁武侯相後先江上揚帆歸萬里幽花野草鎮經年梁溪春暮寄范徳原三月梁溪上徘徊憶故人客留山館雨花落野橋春媿我無兒子憐君有老親何時相對榻重與話酸辛梁溪留别虞彥髙野人情曠達志不在輕肥夜雨三更夢春江一棹歸神駒難並駕鷙鳥不羣飛老去纔聞道吾生漸覺非客海陵光孝寺秋深感懐二首簡盛克明海陵蕭寺裏獨客感秋深只有君知已更無人聽琴鶺鴒天共影促織夜偏吟囘首南塘路凋殘楓樹林孤燈照無寐飄泊寄僧房蕙草零秋露莎雞啼夜墻愁来嗟伯道老去憶馮唐曉把青銅鏡生憎鬢底霜次韻游虎丘寳刹近城郭峰從海湧来千人盤石側絶壁劍池開聞道吴王塚今為釋氏臺古碑題木客陳迹幾風埃題文湖州湘中推篷圖岳王樓前湖水邉離歌驚覺鷓鴣眠生綃一幅秋雲亂又上江南客子船江行春暮江岸薔薇也自紅可憐夜雨落花藂不如燕子知人意箇箇飛来近短篷白鷗幾箇白鷗真可愛碧波蕩漾即為家春江正喜中流急又趁潮頭過淺沙張渥字叔厚博學明經累舉不得志於有司放意為詩章時用李龍眠法作白描前無古人雖達顯人不能以力致之題所翁畫龍我聞真龍神變化呼吸風雲齊上下胡為却向九淵潜頷下驪珠光不夜一朝帝勅鞭雷霆秘怪恍惚無逃形蜿蜒千丈露頭角顛倒山岳翻滄溟乾坤澒洞日為黒元氣淋漓收不得願將㸃滴試天瓢草木晴光甦下國龍兮龍兮汝為龍攀之不見追無蹤何當飛空附其尾手接鴻濛究元始題金碧仙山圖丹崖翠壁五雲間此是蓬莱第一山笑指碧桃花發處玉鸞曽載月中還題明雪忩蘭援琴誰歎生空谷結佩應憐感逐臣九畹斷魂招不得墨花夜泣楚江春題百禽噪虎圖短草空山怒養威百禽驚噪向斜暉寢皮食肉堪憐處且喜將軍出獵稀題書扇一自蘭亭飛筆後昭陵風雨夜如何當年老嫗能知此扇出人間百價過題王元章梅照水疎花氷有暈横忩痩影玉無痕孤山月冷黄昏後拄杖曽敲處士門題趙翰林墨蘭白鷗波㸃研池清楚畹香風筆底生記得弁峰春雨後撥雲移種向南榮題昭君出塞圖黄沙漫海幽雲髙燕山雪凍春不毛其人生長獰如梟氈處肉食膽氣豪角弓羽箭花紋刀踴躍快馬騰飛猱𤣥旗樹日驚霜飇云是使者来漢朝漢宫佳人顔色嬌蛾眉顦顇髪無膏手揮琵琶響檀槽聲聲嗚咽寫鬱陶穹廬不暖鄉夢勞邉月長照非良宵天寒賜著灰色貂雙壺灔灔傾蒲桃金門玉殿心旌揺長安烟水空迢遥穹廬蹋歌嗾犬獒自憐耳絶聞簫韶畫工受賂死莫逃筆底妍醜移分毫掖庭舊好㤙不交在北雖恨寵可要和蕃計失令之驕干戈萬里紛擲跳廟堂老將蜀錦袍玉帳坐爵麾赤旄兜離碧眼滿近郊鳳凰之穴蟠蛇蛟北風動地吹黄茅獨留青塚狐狸號流魂千載誰能招嗚呼流魂千載誰能招題了堂上人鍊雪軒雪消成水固非異煑水作雪真為奇吾師悟此煎茶法掬泉敲火須臨時手搏清風㺯明月幻作一同滋味别試看椀面乳浮花濁惱消除置氷銕君不見達摩面壁雪山中至今直指傳宗風又不見玉川先生洛城裏軍將叩門日髙起何似松風堂上人不譚九轉丹有神嗽瓊嚥玉詩清新華池肥水常津津李瓉字子粲姑蘇人幼從元明余先生游資性曠達多才能讀書作文之暇旁通浮屠并漆園氏學凢有品題若不經意而穎脱過人與余友善故所寄尤多焉仙韶曲九天宫闕五雲西金門曉闢千官齊雲韶仙侣奏天樂聖王南面方無為八音克諧八佾舞風傳龍管雷鳴鼓至和薫蒸大樂舉羣生萌芽萬物覩聖人立極四海清咸英韶濩皆同聲億萬斯年垂鴻名遣興客舎沙南蒲子岡流光愁思共㣲茫疎林翠竹含溪影小樹紅梅播埜芳解樂師㐮方入海乗舟張翰謾歸鄉不如却學南山牧叩角浩歌清夜長因顔陋隱寄上清外史薛𤣥卿仙人薛外史髙隱在幽閒碧雲上清境浩月瓊林壇博雅坐虗室飛神修大丹彈琴松樹裏吹簫清夜間幾時訪山館相與遊三山立春奉寄海虞山人繆仲徳十韻嵗星司淑氣天造立王春草出金茸細梅開玉蕋新三陽仍及泰萬象始維屯綵勝皆題句金花亦記辰至音聞木甲厚味列盤辛江海恩波濶山川化日醇明時調玉燭聖徳降絲綸之子當全盛行歌就隱淪舉觴空顧影伐木獨懐人輾轉不能寢題詩慰所親春夜集諸奕友海濵初春夜寥間髙林蕭條羣籟寂蕭蕭㣲風吹繡衣悠悠明月生歌席諸君才氣何卓犖専心能繼奕秋學旗壘還如事攻掠黑白昭然見强弱清宵玉漏何遲遲笙歌滿座傾金巵坐中賔客亦皆醉霜落西樓烏夜啼春原林樾風初協村原泥正融香蕪連埜碧冶杏過墻紅塞鴈歸天末巴鶯出谷中春光濃若酒歡賞興何窮春初奉寄海虞山北聲九臯上人杖錫虞山北春風憶舊游翠厓雲毎集丹壑水争流染翰超懐素哦詩繼恵休何當上湖夜相與泛扁舟栁枝詞吴江緑水生春明江上栁枝今漸青栖烏啞啞中夜鳴愁絶東風長短亭栁枝當户森成束思婦正倚䦨干曲别情有恨不可解萬里相思淚盈掬愁多不織流黄機織得回文更慘悽功名悮人不足恃藁砧藁砧何日歸春夜懐豫章倪中豈并太原王本中二子皆客京師故詩及之耿耿春夜永迢迢更漏殘美人隔千里清月在江關舉桮不能樂援琴孰為歡悵望五雲外目送雙飛翰王子經緯學紬繹茫無端倪生富文史落筆囘狂瀾古劍沒豐城太璞昧荆山竒材每不識萬古一長歎而我困畎畆漂流吴楚間釡魚獨恒飢衣鶉毎懐單慷慨念二子頻年事征鞍庶幾抱瑟心不愧齊門彈題倪元鎮聽松樓昔者貞白隋梁間躬行道徳謝塵累隱居獨在華陽山好聽松聲白雲外泠然虗籟何蕭蕭刁刁清聲雜調調宛如王母揺玉珮想象子晉吹笙簫我亦從来愛幽險羨子結構尤髙逺巧言如簧獨不聞絶愛蒼髯鳴翠巘春林夜起颼飀聲天風海濤来青𠖇幾時相過一洗耳醉中同躡鳳凰翎春草曲春風百草生何許伊沅之洲澧之浦荃蘅蘭蕙與芳杜馨香采色紛無數鶗鴂先鳴衆芳舉萬緑如烟花欲語王孫游子去湘楚蘼蕪開謝山之阻春草無情情獨苦别離恨深乃終古春草生淚如雨江浦送别協風吹氷泮水色微茫緑沙融文禽集波暖白鷗浴之子逝將别分手愁局促離觴一何頻征舸嗟去速今日江浦東明朝闗山北棹歌不堪聞凄然淚盈掬歸鴻曲髙秋鴻雁来仲春鴻雁歸闗河道路逺沙場聲韻悲去年曽寄帛書去囘文織就相思句藁砧逺在邉城戍髙樓不見絶心緒愁多别乆淚䦨干何日歸来再合歡一聽歸鴻一生怨揚子江南春雨寒欲雨大埜積層隂油雲閣時雨蜉蝣出隂曀商羊頻自舞夕月離於畢土氣潤於礎及春望滂沱萬物盡興覩闗河栁關河春初官栁青上有栖烏啞啞鳴千樹萬樹恨如織水逺山長無限情栁絲忽換黄金色當時憶送游俠客去年驚心揚子南今年又恨沙塲北關河栁枝管别離離人一去何時歸折枝千里寄相思上亷訪監司圖嚕公聖主今堯舜賢臣昔禹臯風雲千里逈日月九重髙宰執仍銓注明公實俊髦上憂分閫轄威令樹旗旄㕘賛安藩翰論思並畧韜為邦過魏邴論事失蕭曺逺道驊騮迅長天鵰鶚翺浙河清泚泚風俗樂囂囂力穡甘耕耨條桑各繹繅人沾施澤恵國著秉鈞勞憲將俄優擢王言極寵褒豸官方就列鷹鏇忽辭縧稷契當朝著夔龍千載遭幸生交泰日下士荷甄陶滄浪亭蘇公昔在宋盛時文采才名動天地暮年築居向滄浪草聖相傳世尤貴積書為林墨為池長歌散髪鬢如絲風流百嵗不泯滅及此士論無磷緇憶昔嘗為吴下客刺船携酒訪陳迹却思重游不可得臨風悽然念疇昔遣興遲遲當麗日冉冉及陽春草色連烟翠栁條垂麴塵哦詩紅杏館漉酒白綸巾欲寫江淹賦悽然寄逺人鬢絲行君不見少年雙鬢如青絲骨格磊磈凌雲姿金鞍玉勒五陵道桓桓意氣不可羈功名未成淹嵗月短影蕭條如白雪忽然不知老將至滿目塵埃仍汩沒人生百年寜有待富貴功名豈長在何如日飲金尊酒醉學山公歸倒載淇緑堂緋桃淇緑春方麗緋桃滿樹枝繁香何冉冉穠蘂獨離離冶杏皆慙落殘梅只謾披擬携浮蟻酒與客醉金巵雉朝飛仲春風日生淑氣畦麥青青與天際一飲一啄性所同時哉時哉雙飛雉雄唱于前神不驚彼雌随後相和鳴雄雌頋盼各得意牧犢對此能無情人倫久廢禮義缺夫婦恩情易懸絶千年惟有杞梁妻生則異室死同穴擊檝行日華悠悠江色清碧波萬里生春明商婦琵琶别怨生擊檝渡江舟正行美人美人既無情澧蘭沅芷揚芳馨欲見不見心怦怦輕風吹羅裳擊檝且勿忙恐驚菰蒲中交頸雙鴛鴦莫學桃根與桃葉渡江一去音信絶江上春来復春去對此流光淚盈睫牡丹一章奉寄玉山公子巷南亭館春風樹魏紫姚黄取次開翠羽當忩林影麗紅雲繞坐國香来凝酥暖汎金壺醸羣玉晴籠錦障埃洧外何能夸芍藥番禺自足愧玫瑰竟湏髙宴煩燕女左手持花右酒桮暮春三絶句水生澤國徂春暮倚杖汀洲立恵風千樹桃花紅雨落滿林竹笋緑隂濃牡丹滿檻紅於錦栁絮隨風白勝緜何日扁舟釣湖上滄波深處一絲烟屈宋文章冠天下才華名譽本源流後人曷足能窺測權變經常乃不求戴勝吟江臯春暖桑盈墅三農耦耕蠺事舉嗟爾戴勝胡為来乃有鳴聲驚織婦戴勝来降於桑采采麗羽何清揚天時月令仍相當兹禽一鳴穀雨至農人聞之興耒耜蠶成繅絲秧及蒔種葵種葵南軒下葵長不盈尺芃芃初葉茂挺挺交柯直匪以花為美有取心向日孤忠類臣子恒性若有徳只恐秋風至蘭蕙同蕭瑟雖然遇彫落凡草孰可匹栁花澤國春餘江樹盡栁花無數沒鳬翁每當白日飛晴雪似與游絲逐恵風灞上啼鶯孤驛外隋堤歸馬夕陽中離人欲折還驚歎空對柔條恨不窮袁南宮江西歸吴門隱居短句奉寄江國徂春暮蘭苕生恵風佳人天之末髙隱林泉中有懐不能伸愁思渺無窮朱絃發清響大雅振黄鍾依依閭門栁去去塞北鴻永言寄歌詩用以慰幽悰搏熊婦關西幼婦如花容乃有猛力能搏熊徒手搏熊熊力窮神色不變如英雄嗟熊之力猛於虎初若恃强欺幼婦一市見之皆為驚玉腕朱顔那好武君不聞昔之猛虎嘗負嵎馮婦攘臂而下車千秋萬古稱善士嗟婦固與常人殊上崑山知州王世傑中原多異氣盛世産賢能事業人恒慕才華世所稱朝廷方海納名譽翕雲興讜議驚僚屬雄文播友朋為州宗敬義下令不驕矜舊染還思革仁聲信有憑明時當舉用善教任宣承梗治民俄變並縁吏所懲龔黄政教美杜召徳音𢎞聖主方前席行當瞻日昇芍藥恵風吹芍藥爛漫亞雕䦨緑葉生春末紅葩粲榦端穠桃空媿赧冶杏亦凋殘准擬携壺酒開軒醉玉顔春半水國春將半叢篁映白沙簷楹皆燕雀徑術接桑麻吟嘯分江色登臨愛日華何當學鄭子谷口問山家草堂雅集巻七

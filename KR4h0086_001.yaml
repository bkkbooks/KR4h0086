body:
  text: 草堂雅集卷一元顧瑛編陳基字敬初台之臨海人明敏好學受知於晉卿黃先生明春秋後以舉子業無益於學克志為古文詩章同輩雖極力追之不能及名重于時游京師公卿爭與之交而其德性慎重事親尤盡孝望而知其為君子也王氏三世孝感詩惟蜀嘉州有王氏在昔遭兵中流矢鏃入骨間創發髀疾在翁身痛居子恨不捐軀代翁死焚香籲天誠有以願減身年益翁齒天祚若翁旋病起他年翁子疽發背十竅聚攻復大潰翁孫赴神神請帝背忽無疽子亡斃孫獨何辜丁困窮一股不信瘝乃躬病莫出門憂患攻絶粒待盡兒忡忡念昔異疾纏二翁天實為之哀厥衷我獨能忘報父終一兄三季情所鍾蒲伏致禱精誠通步履復故行若風君家孝感能如許我一聞之淚交下孰則無兒孰無父王氏似孫孫似祖秦人棄恩如棄土箕帚耰鋤尚堪數僕嘗夜夢從彥成飲彥成曰此荔枝漿也飲之令人夀子能為我賦之當贈三百壺豫因口占一詩覺乃夢也及會玉山聞彥成釀酒果名荔枝漿白以所夢不覺大笑涼州莫謾誇蒲萄中山枉說松為醪仙人自釀貞一酒洞庭春色嗟徒勞璚漿滴盡生荔枝玉露瀉入黃金巵一杯入口夀千嵗安用火棗并交梨不願青州覔從事不願步兵為校尉但令喚鶴更呼鸞日日從君花下醉寄蕭尊師我昔山中尋紫芝道遇真人行若飛自言鍊骨有仙術曽事神農為雨師一從别後三千嵗不住塵寰即方外我昨題詩遺羡門為問真人定安在答云往日隱東蒙上下風雨騎蒼龍只今賣藥居靈越來往三吳弄明月天上非無十二樓人間乃復愛滄洲時時跨鶴乘雲氣歷覽無窮隘九州勞生苦為塵緣縛安得從之超廣漠手折三株海上花去隨鸞鳳巢阿閣寄姚子章聞君又作錢塘客多在青樓少泉石佳人姓蘇名小小占斷西湖好春色沙棠為舟桂為槳驚起鴛鴦飛兩兩有時醉倒百花間不記六橋新月上行樂須當少壯時英雄自古皆堪悲歸來莫負張京兆鸚鵡窗間喚畫眉偶成武陵溪水碧灣灣窈窕幽期不可攀戴勝桑間飛自得王睢洲上語相關歌成桃葉臨流和采得蘋花帶月還見說荔枝漿已熟不分涓滴到人間南州五月尚兼衣白苧窗間未脫機青李來禽書不至荔枝盧橘賦多違水晶簾箔圍晴晝艾納爐薰逗夕霏為問上都城裏客菖蒲花發幾時歸賦楊花巷南巷北晝冥冥搖蕩春風未肯停薄命不禁巫峽雨前身曽化楚江萍已於謝女詩中見更向劉郎曲裏聽腸斷不堪回首處並人飛過短長亭次錢伯行韻五月東林水竹涼新荷葉小栁絲長且臨大令鵝羣帖不戀尚書雞舌香楚客謾誇千樹橘杜陵共愛百花莊滿天風露枇杷熟歸奉慈親取次嘗次沈仲說韻棟樹飛花雪打篷居人行樂四時同波涵大澤平如掌雲割西山半入空金剎逺瞻樓閣壯畫船爭載綺羅紅如何越女承恩後不逐吳王住甬東送李録判之饒州閶門栁枝短君行不可緩贈君不折楊栁枝勸君飲此金屈巵丈夫將身誓許國安用當歌傷别為青絲絡控黃金勒逰宦鄱陽山水國何處春風最憶君琵琶洲上蘼蕪碧送曹生侍親還琴川愛此丹山五色毛綵衣初剪映仙桃奉親喜有銀絲鱠贈别慙無金錯刀洲渚春深生杜若江湖波暖漲蒲萄王褒擬奏賢臣頌肯學山人索價髙山行莫入山莫入谷車連連馬逐逐谷深無人山矗矗馬行不前車躑躅平原五月莎草緑黃羊有羔牛有犢居人養老無失肉山行不如原上宿原上宿一枕清夢長明朝我欲歸故鄉作書為謝右校王願君白首不相忘送俞紹芳還京兼寄沃哷元常翩翩南國佳公子犖犖髙懷不可羈相府蚤傳鸚鵡賦儒林曽睹鳳凰儀賈生名為吳公重李白才因賀老知賔主東南推具美雲龍上下喜相隨十年載筆依金馬萬里乘軺訪武夷朝野欣逢起遺逸關山寧復厭驅馳嵇康懶惰真成癖阮籍疏狂只自悲親老每蒙朝士問塗窮那免世人嗤黃河西畔平如掌泰華雲間翠入眉歸見燕山劉户部願將忠孝答明時寄危太朴楊季子兼呈惟中學士閣中危老近何如闕下楊生一字無未省何時度灤水可能八月到燕都筆削已聞歸太史論思猶喜及洪儒由來漢室文章盛只數班郎製作殊次韻笠澤漁隱二首隱君於此攬清華小築茅堂傍水涯蒲栁髙低迷曉岸鳬鷖來往弄晴沙輞川别置王維業竹徑深通蔣詡家復恐秋潮沒沙渚故安小艇當乘槎目斷江湖欲盡頭放船曽作渼陂游接䍦倒著山公帽紫綺時裁李白裘鮫室杼機風雨夜漁家燈火水雲秋舊時賔客多星散誰寫江南宋玉愁題笠澤福地笠澤真人福地深杖藜秋日此幽尋波涵太乙星辰動雲鎮蓬萊觀闕隂靈樹三花皆結玉丹砂五色總成金幔亭别有通仙路留與曽孫宴古今織錦圖佳人織錦深閨裏恨入東風淚痕紫三年辛苦織回文化作鴛鴦戲秋水秋水悠悠人未歸鴛鴦兩兩弄晴暉料應花發長安夜不見閨中腸斷時次韻趙君季文贈杜寬吹觱篥吟寒竹初裁蘆葉秋夜吹百花洲上樓千金縱有狐白裘難買杜寬一藝優妙知音律同齊鄒薛家小童安敢侔江空月白爛不收冥搜罔象悲陽侯哀泉嗚咽秦隴頭何年變曲為涼州神工太古開黃牛驚浪出峽風颼飀葉落秋隨渭水流渭水有盡情無休綿綿又若繭緒抽要眇寧以智力求須臾水激龍騰湫熊羆夜咆魑魅愁勸君不用皓齒謳側耳聽此消百憂寬也胡為此淹留自今天上參鳴球飄然我欲歸帝丘仙人張樂烟霧浮蒼龍為車挾翠虬千秋萬嵗遲子同遨遊寄友人扁舟三月到江城匹馬先尋北郭生雨過小樓春寂寂鳥啼修竹曉嚶嚶家無黃耳傳鄉信門有蒼頭記客名見說終南真可隱賸拚秋色為君清寄匡山人早春相見又經秋秋水迢迢阻泛舟每見玉山問消息荔漿何日寄江樓題曹將軍馬圖神駒生長渥窪中一匹能令冀北空貌得真龍九重上將軍筆法老逾工題葛仙翁移家圖是處青山可鍊丹問君拔宅向何山縱令兒女恩情重雞犬何心不肯還再題葛仙翁移家圖列仙之人其道無為超然物表游於希夷厚祿不足致好爵不足縻所以許由辭堯不受禪巢父聞之猶為洗耳河之湄奈何葛仙翁與世猶支離求為勾漏令所欲何卑微觀翁此行亦良苦妻子辛勤童婢飢翁知學仙不學吏委以民社將安施仙家雖云足官府奈此人間小黠并大癡君不見陶棄官歸故里又不見馬援謗興由薏苡縱得丹砂亦不多誰信翁心淡如水雲門山有靈藥歸去來山中樂牛羊任所之雞犬從人縛急將印綬送還官變却姓名稱抱朴奉和紅梅引緘情脈脈待春來差勝苦寒時節開丞相圃中香寂寞水曹亭畔錦培堆致身合在黃金闕濁世紛紛妬髙潔却施脂粉學時粧林下風神本清絶富貴西岡一夢醒獨憐標格尚分明認桃辨杏相嘲詠徒費詩人衆口爭春風如酒醉入髓暈上氷肌赬不俚化工於物豈容私暖在南枝真有幾和羮未說帝者師且先羣木占園池他年擬結羅浮好託以女蘿如兔絲兩家臭味元相似安用昆丘問玉巵雪後見梅有懷華屋邉頭春信早梅花樹樹向南栽主人每愛憑䦨看佳客從教著屐來風靜池塘鳴翠羽雪殘庭院見蒼苔閒居未許安仁賦天上黃金正築臺題杏花鬭鵲爾鵲莫逐朝飛雉雙雌爭雄俱鬭死爾鵲莫逐營巢燕吳宫失火難相見飲啄不離碧山阿棲止還依嘉樹柯王孫縱有黃金彈紅杏花間奈爾何題昭陵六馬圖秦王六馬一何驍生死同心鄂與褒酣戰每將戈止日並驅長使血生毛流傳弟子初名幹服事將軍老姓曹貌得真龍九重上昭陵刻石世同髙次韻武夷島梅花一灣新月浸瑤天琪樹花開朵朵妍帝子乘風游小水玉妃和露泣疏烟碧波夜濕清虛府緑渚春餘綽約仙若遇羅浮煩問訊少將華髮感流年顧瑛詩曰緑波蕩漾鏡中天瓊樹春回玉蕊妍苔雨青青空落月溪雲漠漠不成烟臨風望斷緱山侣照影疑逢洛浦仙王母欲來青鳥下暗香如水夜如年題匡山人所藏圖千尺飛流落半空散為烟雨晝濛濛草堂留在匡廬曲頭白歸來暗靄中君住耶溪南君住耶溪南我住耶溪北咫尺不知名采蓮始相識君愛蓮有花我愛蓮有實花實本同根君心勿相失送君當逺涉送君當逺涉蘭舟桂為楫君去不思家妾夢長相接采蓮將遺君采花不采葉妾貌不如花君心不如妾貞女慎行露貞女慎行露君子戒履霜嵗暮懷百憂離居增慨慷方舟豈無楫河水亦可杭臨流不能度佇立以倣徨芙蓉洲草亭寂寂倚中洲風景依依舊日游江女蕩舟歌水調溪翁結屋擬菟裘花迷島嶼紅雲暝香冷陂塘白露秋莫向山陽吹短笛晚來沙鳥不禁愁題柯博士墨竹京洛緇塵染素衣故園清夢苦相思歸來無限江南意寫作春風暮雨枝題徽廟馬麟梅內家春色少人知玉蕊氷蕤看轉宜說與宫中小兒女畫樓瓊琯莫輕吹題趙翰林畫桃花馬當時沙苑最權竒贈與吳興學士騎身上桃花千萬朵為渠圖寫墨淋漓題趙翰林唐馬王孫昔侍金鑾殿親見天街進馬來貌得權竒大宛種解教人世識龍媒題管夫人竹綺窗春影緑婆娑夢作輕雲覆碧波日暮是誰調錦瑟一江煙雨泣湘娥題趙千里臨李思訓金碧山水山上白雲朝暮生雜花流水總關情相思把筆題招隱千尺長松獨鶴鳴題朱澤民山水東曹興逐秋風起長揖齊王歸故里託言鱸鱠與蓴羮逺害全身良有以神交海上陶朱公遭世雖殊心則同讀書把釣松江尾仰看浮雲行太空八月嚴霜下喬木萬里青冥眇飛鵠為謝長安馬上郎世間何物為榮辱題漁亭秋望圖霜露洗空河漢濕西風蕭蕭江水潗緑洲孤亭小如笠上有髙樹皆森立九疑青青愁欲泣翠華零落何人拾寶瑟空彈鴻鴈斜蒼梧帝子不歸家題白描湘靈鼓瑟圖斑斑湘竹淚痕深望斷重華隔逺岑花落黃陵春水濶至今鼓瑟有遺音題雙雉圖馬蹄朝踏杜陵塵野雉飛來不避人况是太平遊獵少上陽風日自成春題王元章梅武陵溪上桃千樹亦有寒梅照水開一種春風標格在太平恩澤為栽培題從子倫畫風梅花鴨溪山風日兩相宜更著文禽泛緑漪自愧無才似山簡為君題作習家池題白描水仙汗漫海上期嬋娟池中影麻姑殊未來相思月華冷題二馬圖一種權竒産渥窪暖風晴日過平沙尋常不敢施鞍鞁知是君王白鼻騧題洪崖居士出山圖張公不出山出山動千嵗時騎白騾子狂歌每佯醉悵望王屋深緬焉起遐睇和新安梅韻寫玉山後月照山中梅蕊新暗香疏影兩相勻素衣不受緇塵染同是祇園樹裏春天然標格賦清新冷蕊疏枝不自勻久與梨花不同夢何勞惆悵惜芳春雪裏俄看一蕊新空花頃刻已俱勻不知色相皆虛幻那信優曇别有春玉山和張師䕫詩曰寶地生春玉蕊新苔烟如霧翠光勻山僧分得維摩供三素雲中别有春題凌波飛蓋落落秦大夫皎皎漢臯女賦質新且殊託根乃一所願結嵗寒心不憚風雪苦猶勝河漢間脉脉不得語題緑隂亭嘉樹䕃華屋空庭生晝涼端居宴冲穆餘響答滄浪月冷芙蓉帳雲深薜荔牆焚香坐深夕幽興似韋郎題水仙水蒼為佩玉為人素質娟娟不愛春終古關雎遺德化禮防游女漢江濵題山居圖曉出城南二里餘鳥啼花落暮春初杜陵韋曲山無數何處林塘可卜居題明雪窗蘭曾從北渚過君山更向黃陵廟下還帝子不歸芳草碧鷓鴣啼處雨斑斑題三白士女長松百尺吹天風仙人憑虛離紫宫明月掛樹雲容容褰衣獨憩流青瞳炯若秋水涵芙蓉𤣥霜未下珠露濃桂樹偃蹇山巃嵸烟蘿空青深太古薜荔吹香雜蘭杜渴飲石泉飢瓊蕊逍遙不比巫山女朝為行雲暮行雨人間回首空塵土何如丹丘與𤣥圃珊然玉珮風泠泠羣仙夜誦蕊珠經紫金之冠朝玉京青幢絳節鳳凰笙蓬萊弱水今淺清何當從之拾瑤英一往不死三千齡文殊寺髙閣何年蘭若倚崔嵬觀閣連天罨畫開澤國魚龍霜後靜關河鴻雁日邉回闌干迥遡虛空上嵗月深從浩劫來自信平生愛登覽夕陽髙處重徘徊重游文殊寺次錢伯行韻野舟閒艤白鷗沙同訪文殊大士家滿地夕陽人散亂一天秋色雁橫斜江楓冷墮蕭蕭葉山菊晴開細細花嵗晚登髙重懷古轉驚兄弟隔天涯鴻雁篇鴻雁雙雙度雁門相呼相喚不離羣晝銜蘆荻防繒繳夜宿關河同夢魂稻粱既足江南濶秋水增波葉微脫洞庭湖畔卧雲沙彭蠡磯頭弄烟月一朝無事忽相違一向東飛一向西西飛渺渺秦山曲東去悠悠滄海湄秦山滄海遙相望顧影徘徊各惆悵山有鼪鼯與網羅水有蛟鼉與風浪回頭却恨不同棲辛苦皆因獨自飛不問天南與天北何時相見得同歸寄錢伯行小堂閴寂俯漁磯江月留人坐不歸半吐野梅疑索笑並棲沙鳥忽驚飛孤煙隱隱團晴色修竹娟娟弄晚暉不是錢郎期不至也應安樂戀庭闈寄實喇卜伯溫祕卿君侯髙義重南金欲奉馳驅愧不任劉向傳經心獨苦馬遷載筆意何深朱幡未許分符出華髮懸知兩鬢侵日日燕山有飛雁帛書都不寄江潯遣懷䇿杖江臯每獨行園林二月未聞鶯紅塵陌上應千尺白髮春來又幾莖自分才疏甘屏迹久拚人棄任浮萍漢庭亦有中常侍安得才如馬長卿過袁靜春先生墓每讀遺文為悵然一杯今酹闕河邉空餘𤣥晏先生宅不見山隂道士船日暮蛟龍歸近浦春深鷗鷺散平川佳兒也復能傳業白首躬耕於墓田寄衍上人屏迹江湖懶曳裾縱觀物理愛逃虛清明已過百花盡穀雨又逢三月初豈有拾遺耽句癖漫慚中散絶交書只應為結廬山伴蓮社相從意有餘次韻袁仲長竹堂感興一曲桃源憶故人白頭詞客最傷春南柯已寤平生夢東海曽揚幾劫塵綺樹鶯花徒自好畫堂絲竹為誰陳不須聞此空惆悵且看瑤姬舞繡茵題雨竹二月江南春雨深帝子不來勞我心所思只在涔陽浦吹徹參差作鳳吟橫翠樓虛樓直上面羣峯積翠氤氲一萬重晴散岩扃時隱豹晝為雲氣或從龍寶花自落元無蒂天女空行不見蹤絶境世人應莫到漫聞烟際動疏鐘題柯博士畫丹丘仙子渺何之零落春風玉樹枝阿閣鳳凰無處宿漫勞湘管月中吹送危太朴四首兼簡金華黃先生蘭溪吳博士海內聞名二十年班荆長記客幽燕天官載筆推良史延閣談經列衆賢三月風花愁送别五湖春色好言旋只緣鞍馬勞王事未許扁舟聽雨眠故人迢遞日邉來駐馬江亭訪草萊談笑豈惟能愈疾歡娛兼肯共持杯李膺舟裏神仙侣郭隗臺中國士才芳草萋萋天欲暮送君南浦思徘徊壯懷犖犖負經綸匹馬翩翩走驛塵南國梅黃逢細雨上林鶯老憶餘春名山盡擬搜𤣥祕滄海寧忘問隱淪若著清朝耆舊傳金華遺得老成人泰伯城中五日游懶騎官馬厭登舟步尋鄭老通宵語坐愛黃山竟日留只把簡書詢故舊不將名姓答諸侯石榴花發緣江去應訪蘭溪一散愁寄鄭山人萬里江湖一羽毛相思終日阻波濤山光并入終南秀月色偏依少室髙天祿圖書通白虎蓬萊宫殿湧金鼇丈人不忝更生輩嵗晚寧辭讎校勞安石榴一首寄鄭山人江南朱夏石榴繁絳蕚紛披向日翻恩與荔枝登玉食榮兼蒟醬入金門偶聞六實同根蒂遂託千房詫子孫為謝漢庭張奉使相如白首向文園寄沃哷彥文幕下惟君最少年青春相憶路綿綿已推宋玉能為賦却笑揚雄尚草𤣥千里獨看吳渚月一書不寄楚江船致身好在青雲上莫漫登樓學仲宣次韻陳叔方見寄兼簡沈仲說二首作客不自慰懷人如酒中雨深芳草碧春老落花紅自笑嵇康懶誰悲阮籍窮知君情最重應念跡飄蓬把酒愁無賴看詩獨眼明性兼陶令達才共庾公清山暖櫻桃發江春杜若生思君臨水上沙鳥亦忘情次韻錢伯行飛雲樓小集懷王季野為惜春光一半過如澠美酒泛金波共知此會情偏重獨恨平生飲不多鼓瑟欲終仍緩節投壺才罷即髙歌却憐燕子樓中客蘇小橋邉奈樂何賦朝采江上蘋送陳伯善時伯善新婚朝采江上蘋蘋生江水濶采之欲何為言贈新知别新知行奉親綵服照青春不因裁剪好安得著來新去去辭南浦春波趁柔櫓還復念離居丁寧託鸚鵡珍重早回舟蘋花不奈秋但令潮有信莫倚草忘憂謝袁可立惠盧橘風露離離餘萬顆故人逺致自題封幸分嘉實當朱夏不負幽花款暮冬南國情多書漫答上林才薄賦難攻獨憐此日庭闈裏甘㫖全勝荔子濃寄朱元達扁舟西望渺無端萬頃波濤一釣竿杜若洲邉思謝朓鱸魚江上憶張翰蒼山著雨情逾秀緑樹藏雲晚更團乘興何時訪幽獨對眠江閣聽風湍題張鍊師所藏畫梅幻藥能招水月魂蓬萊宫殿集靈芬誰將處士明珠佩獨贈仙人蕚緑君海國有香飄艾納洞天無夢化梨雲春風想見瑤池會瀟灑真妃玉作羣送華亭杜縣尉六月松江如早秋木蘭為楫沙棠舟南郡神仙來作尉西都恩澤會封侯種栁暫隨陶令隱賦詩應共陸機游送君鸂鶒灘前路令我相思欲白頭寄葛子熙楊季民有序去年客京師與江西葛子熙楊季民飲于濟南張署令家以櫻桃薦酒時季民將赴灤陽屬豫賦詩而子熙為之書豫還江南一載而二子尚留京師張君亦未離太常感時撫事悵然興懷因賦長句一首奉寄去年京國櫻桃熟公子親沾薦廟餘色映金盤分處近恩兼氷酪賜來初酒酣惜與楊生别詩罷叨從葛老書今日江南春雨歇亂啼黃鳥正愁豫留别張熙載短棹攜書又入郛臨流分杖重踟蹰形容自笑如樵客行止誰令類賈胡緑渚風光回杜若白沙晴色上蘼蕪期君一日誠千里莫負翩翩汗血駒寄申屠彥德春風浩無蹤緑遍江上草遊子行未歸關山一何杳白日不可留朱顔豈長好按劒歌慷慨憂思結懷抱子桑獨何為簞食常不飽展禽亦三黜中懷惟直道貧賤豈足憂仁義乃為寶黃鵠棲崇丘嘉魚泳深藻所期乘風波萬里終可保次韻吳宗師生日感恩詩化國真人慶日長五雲晴色映金堂草徴漢室芝房瑞露浥堯時寶甕漿桂觀燕居凌倒影行宫齊宿候朝陽咏歌恩澤期天保傳到人間雨露香簡鄭山人國士文章海內傳丘園風雨故依然空聞太守延徐稚猶喜諸生禮鄭𤣥官樹鶯啼初繫馬講堂雀下或銜鱣廣文方築招賢館肯使先生老一氊送庸田司寶惟善經歷籍甚中朝彥翩然萬里情禮從蓮幕重詩到水曹清未雪辭吳會先春入薊城殷勤黃閣老能不問蒼生送姚子章調浙東帥府令史兼簡楊大中録判昭代眷東國土壤際窮髮開閫涖四明元帥秉節鉞所敦在詩書車馬時簡閲內以撫蒸黎外以綏頑黠辟置幕府下詎可非俊傑姚君古遺直豈肯事乾沒侯藩樹風聲漕府淹嵗月簡拔實至公一灑時論觖丈夫志卓犖誰能受羈紲但念儒冠微彌縫乃無闕祖道城東門君馬行已秣飲酒不盡歡贈言答敢輟野水泛勾吳名山滿甌粵相望各異鄉春漲溟海濶有懷楊功曹為政已英發君行當見之為我道離别送庸田劉運使赴閩三年溝洫敢論功恩與鹹臺禮數崇水部有詩皆似錦使君無馬不為驄勝游不憚三山逺薄賦欣逢四海同嘗罷檳榔有餘味佳人休說荔枝紅劉向平生經濟才獨違鵷鷺久徘徊鶴書又赴鹹臺去虎節還從水部來路入七閩連百粵心依五嶺望三台遙知别後書堪寄春近南雲有雁回次韻叔方寄沈仲說公子新成江上宅更依西渚結幽亭時清墟里還無警月黑柴扉不用扄流水暗和琴瑟響好山濃入畫圖青故人白雪歌難和孺子滄浪曲自聽每厭狂夫談酒譜還從處士授茶經庭前賸折忘憂草不負君家玉膽瓶八月十三夜泛姚城江二首畫船撾鼓唱回波皓齒青蛾不用歌好月愛看輪未滿清秋莫問夜如何明將織女機絲動寒恐姮娥白髮多天上清光應更足羽衣安得共婆娑何年江水出姚城轉覺東南地勢傾彩月夜當河漢動客星秋入斗牛明一波不起魚龍靜百穀初登海宇清生喜太平身少壯浩歌學楫豈無情次韻答張庸我行四方今始歸回視所歷皆堪悲關路﨑嶇望無極精魄摧喪難為持前瞻平陸若可取振轡頃刻俄已非嗟哉微命犯重險念此憂患何當違峥嶸亂石無改轍况復霜露沾裳衣天寒日暮豺虎呼山空木葉猩鼯飢長安薪米如桂玉環堵蕭然抱羇獨平地波濤劇艱阻豈但長溪與深谷雖無良田負東郭賴有詩書貧可讀平生志願在溫飽胡不還家共燈燭驅車不返竟何為妻子山中向天哭王侯第宅與雲齊五陵衣馬皆輕肥富貴由來歸世胄安用經術研精微故人張生非碌碌投我長謠兼短曲才華如此年尚少一掃能令千兔秃憂來為我發浩歌張生張生奈爾何人間岐路何其多次家兄之湖州兼簡同府判沃哷叔敬教授結髮相從讀父書故園茅屋總荒蕪漫嗟橐筆依公府終勝雕蟲作陋儒菽水粗能為母具菜羮猶可備兒需殷勤好去酬知己莫待秋霜上鬢鬚異鄉兄弟那堪别况是江空嵗晚時薄祿重為慈母計綈袍深戀故人知緑波亭下鷗盟近碧浪湖頭雁影遲為謝郡中賢判府此行應不負驅馳安定先生足典刑金源文學播芳馨己承博士尊三傳更飭諸生授五經馬氏有兄眉最白阮家諸老眼偏青水精宫裏神仙府為借清風送鶴翎西墅西墅幽期每自知晚來無物不宜詩白蘋㸃綴秋波逺紅樹留連落照遲親老正當貧賤日身輕深荷聖明時可能便把投竿手來問漁翁覔釣絲簡陳子貞丞相流風久未泯丈人才力老逾新周南每恨留司馬谷口誰能問子真九月風霜蟲亂蟄五湖煙水雁來賔相逢莫漫嗟遲暮欲把遺經究獲麟次韻錢伯行中秋玩月桂影婆娑白兔閒九霄風露滿江山斗牛直上天常近河漢西流夜莫攀織女機絲清淺際姮娥宫殿有無間坐看博望乘槎處安得相從萬里還臺觀參差近廣寒金莖承露玉為盤誰知天上中秋月却向人間獨夜看此夕屢驚烏鵲夢當時羞著鵕䴊冠可憐牛渚磯頭客不遇將軍興亦寬聽寧上人彈琴忽忽嵗將晏鬱鬱不自聊况兹霜露集驚飇振寒條之子從何來攜琴過蘅茆為我理素曲五音紛以調莊聽斂手坐幽憂為之消鸞鳳戲雲中餘音相與飄别鶴警宵露衆葩恱春朝婉麗不可極忽復變蕭寥清風散六合白日耀層霄流水一何深泰山一何髙聘魯慨觀樂適齊感聞韶疇知今日樂俯仰千載遙寤言欲報之愧乏英璚瑤秋日過杞菊别業二首扁舟逺赴故人期出郭東行慰所思甪里兒孫猶種菊􅜁川賔客總能詩尊前醉舞攜如意花下狂歌倒接䍦欲訪汾湖髙士宅隔江煙樹晚參差曽是吳松江上客片帆今日重來過未從地主求田舍先問溪翁覔釣蓑霜露滿洲丹橘熟烟波維艇白蘋多臨流為洗煩囂耳一聽滄浪孺子歌雲文閣為鄆伯常賦公子愛修潔宴坐焚椒蘭朱火生清煙絪緼升博山矞雲成五色佳麗不可殫忽然為芝蓋輪囷殊未䦨輕風散紛郁流芳花竹間曲户春窈窕綺疏日闌珊霏霏縈舞袖歡樂有餘閒夜坐懷二君子良夜殊未央明星一何爛懷人阻層城邈若河與漢棲鵲驚露叢落葉依井幹據梧不成彈惻惻空嗟歎許具瞻之官武義江水蕩蘭舟青山入畫樓邑人迎令尹還似魯中牟風水三年别兩地同明月不寄越西書令人生白髮莫訪赤松家休栽滿縣花甘棠如可護留與邑中誇題幽竹萱草圖為陳元禮作報妾平安信知君逺戍身好花難作佩留慰北堂親題鉤勒竹素節亭亭不可移珊瑚為幹玉為枝髙堂嵗晚看圖畫倣佛清風見伯時元夕畫堂燒燭照初晴緩節安歌間玉筝火棗種成𤣥圃樹芙蓉開滿化人城香飄洞府春迢遞月轉銀河夜淺清腸斷一聲金縷曲佳人疑是許飛瓊送韓與玉北上兼呈張先生仲舉總角曽為同舍生春風玉樹照人清關西早事張夫子洛下爭迎陸士衡草入瀛洲春漸緑日臨鳷鵲雪初晴漢家文物西都盛獨有甘泉賦未成南國髙人有俊才青春獻賦上蓬萊飄零不飲新豐酒慷慨還登郭隗臺太液恩波春瀲灔五陵佳氣日崔嵬北門供奉如相見好寄平安兩字來送韓執中同韓與玉北上春光三月滿神州公子翩翩逐俊游江漢不傳王粲賦關河同泛李膺舟玉城迢遞將烟繞金水縈紆並日流總是少年同舍客驪駒一曲迥添愁題四明悟真觀蕭爽軒白玉蟾嘗留題蕭爽東南福地開五雲樓觀鬱雀嵬逸人或佩蒼龍下王母時乘紫氣來山色巃嵸開菡萏地靈歘吸領蓬萊𤣥都壇上題詩客浩劫朝元獨未回寄王可矩尚書生逢堯舜坐明堂身佐䕫龍入廟廊每以經綸禆衮職豈惟文采動鵷行人來洛下無書寄春到池南有雁翔早晚定趨青瑣闥從容能不問滄浪寄沃哷元常御史布衣夙忝故人知痛飲狂歌不復疑白日看趨天祿閣青春催入鳳凰池三年江漢悲游子萬里關河眇夢思早報繡衣行郡邑為騎驄馬慰棲遲次韻錢伯行江上春暮太湖之水近當門荇葉芹芽暖正繁不問主人還看竹每逢鄰叟為開尊燕歸王謝江邉宅犬吠朱陳栁外村步屧春風歸去晚野童篝火候籬根澤國今年春雨多閉門春盡惜蹉跎雲飛越嶺無書至花落吳宫有雁過自笑塞翁猶失馬誰因內史誤烹鵝裁成白苧無人聽悵立東風獨浩歌送鴻山楊士可赴嵊縣巡檢公子翩翩去莫留好山無數剡溪頭清時不共伯鸞隱暇日還從安道游花底蕩舟歌越女尊前把酒看吳鉤臨風聽徹黃金縷折贈一枝安石榴送范德輝赴縉雲教諭兼簡髙則誠不逐扁舟泛五湖一官迢遞縉雲墟遺民世守軒轅鼎博士家傳魏國書夜月定聞鄰縣鶴秋風莫憶故鄉魚到州為謝髙書記日日相思賦索居題富鍊師仙山訪隱圖客有子微子學道居松陵身卧雪灘曲心將秋月明太湖烟水催揚舲去訪隱者尋仙靈桃花之源浪得名何如入海窺蓬瀛蓬瀛樓觀何嵯峨縹渺金碧之空青扶桑東枝掛白日巨鼇不動波濤平仙人王子喬乘風下青冥要君與君語欣然若平生飲君以沆瀣之微液贈君以琬琰之華英授君長生不死之奧㫖保君神明愈久而清澄丹丘羽客遙相迎足籋浮雲同上征蒼龍為車翠羽旍風伯前驅玉女仍直排閶闔朝紫清天上差樂人間苦君獨胡為思下土林屋深通水晶府敕制羣龍主晴雨指麾豐隆使擊鼓飛亷揚舲馮夷舞馮夷舞樂未央昔年往游今故鄉堯舜無為四海康千秋萬嵗下有巢許長徜徉黃雀行黃雀何飛飛雄鳴呼雌野草低暮歸莫向空城棲空城挾彈多小兒朝飛莫傍東家屋東家鷙鳥食爾肉不信但看梁上燕昨日養雛今不見不信更看桑間雉錦翼䙰褷爪中死東家公子非少恩彼鷙不仁誰敢嗔吁嗟爾生亦甚微彼鷙不仁謹避之慈烏曲有序至正十年夏四月詔賜髙年帛吳興沈右以純孝稱而其祖母夫人嵗九十前後被賜者三而恩有加君子既感國家忠厚之澤洽於天下又美君之孝樂其親之夀而榮其賜之侈也蓋觀感而有歆慕羡艷之心焉於是天台陳基為賦慈烏曲以歌之其辭曰慈烏尾畢逋朝夕且呼哺爾雛今日慈烏一何樂飛向樹頭兼屋角飛去飛來鳴且啄門前忽有吏言致篚與筐中有兩束帛爛爛生天光孫也出見吏再拜升母堂祖母康强年九十受帛拜天仰天立太平恩澤髙年及歡樂盈門動鄉邑殷勤裁剪製為衣長短於身無不宜母著衣孫起舜日日見烏來返哺萬嵗千秋荷明主送李彥章青絲絡馬頭游宦古蘇州蘇州城東萬斛舟前年運粟直沽口送别江亭折楊栁承恩頭插上陽花錫宴尊傾光祿酒江上今年楊栁黃辟書千里有輝光勇騎閫外將軍馬飽食閩中荔子漿閩中女兒歌白苧把酒勸君為君舞將軍好文不好武自古閩中稱樂土空明山人歌丹丘子空明生結髮為吏干公卿懸河之辨從復衡法家之書刑與名少年騎馬入公府白首尋真歸赤城赤城仙人下青冥手捧寶籙遙相迎虛皇敕住委羽洞服事劉郎為弟兄劉郎乘風朝紫清雲為旗兮霓為旌盡留璚田教種玉約以不死三千齡三千齡在何許來往東吳復西楚看成珠樹著三花笞鳳鞭鸞却輕舉玉簫引金華仙人周子竒能吹三十六琯之參差疏音間節傳自女媧氏上引浮丘公下接王子晉來往伊水之濵雒水湄緱氏山頭輕作别二子不知何所之空留子竒子與世同遨嬉歔商歙羽雜宫徴龍吟鳳噭能使鬼神上下莫得窺端倪昔年西王母翩翩會瑤池親遣侍女董雙成學得妙曲崑丘歸至今縹眇十二之玉樓餘音長繞蟠桃琪樹枝請君休汗漫我欲與爾期若非鈞天即洞庭仰參軒轅帝俯友虞廷䕫後天而老不死長追隨周子竒此曲莫向人間吹次韻鄭山人謝沈存齊贈檳榔木拄杖歌一首海南山青海波緑秀氣盡鍾嘉草木檳榔刻杖世罕見堅潤不數崑山玉沈君乃吾友鄭老真吾師沈君贈此不愛惜老子曳之行賦詩七尺之軀既貧且病足晚得此杖差勝桂林之一枝出門頓增百倍力入海欲踏金鼇脊又欲逐日窮西極翩然却去謁祝融正值檳榔秋有實剖而食之狀如火齊赤蠻烟毒霧不敢侵底用丹砂駐顔色擇地而行坎則息深山大谷俱躋攀此杖鏗然爪甲間山鬼見之莫敢奪泣淚化為妖血殷檳榔杖出南海安得進之於冡宰扶顛持危功用在空令此老杖于鄉上下古今千百載烏夜啼引為泰州趙子威使君賦有序閩人王㽘字季境為淮東帥府奏差被誣繫揚州録事司獄時趙公為泰州以亷能稱部使者移其獄使讞之遂乃反寃烏夜啼在庭樹烏啼啞啞天欲曙阿兒被誣身繫獄盡室煩寃受荼毒烏啼胡為繞吾屋下堂喚婦起聽烏忽喜淮南兒有書書中報道兒罪脫此樂欣欣天下無兒歸拜母為母說泰州使君當世傑執法霜臺舊司臬明如青天皎如月寃獄平反解縲絏已死復生誣得雪海可枯山可裂使君之德不可滅烏啼愛我庭樹枝我愛使君君不知使君歸朝奉天子日日聽烏為君喜白雁操有序梁君出獵其臣公孫襲善其君之聽其言而作有羣白雁王其弋諸蠢彼行者王其釋諸匪伊是釋惟王之德王德伊何曰宋景公一言之善上格帝衷人獵得獸於言何有王獵得言王千萬年鴻鵠操有序晉平公浮於西河感船人固桑好士之言而作鴻鵠于飛以翮非毳君子好士宜别其類鵠飛冲天其有以夫美哉山河守以士夫孰謂彼夫言有㫖夫送王本初縣尹赴鄆城兼簡磁州本中使君憶昔至正初北遊客京師辱交伯仲間日夕相追隨磊落青雲器聨翩丹鳳姿愧無髙山調酬君白雪辭俯仰八九年南歸滄海涯竊聞霜臺上風猷肅綱維允矣伯氏賢克當明主知仲氏二安陸重為人所推中朝名公後復始非君誰前年復至京伯也官於磁治州如室家撫民若嬰兒靈草育三秀瑞麥生兩岐伯也置不言獨詠豐年詩凜凜君子風不啻先公為政成報天子寵錫有光輝人言古循吏龔黃邈難追孰知忠厚化昔聞今見之仲也復為邑鄆城鬱巍巍朝廷重守宰簡書有程期一門雙南金共下白玉墀又如兩騏驥為主效驅馳河水昔橫濫生人四流移桑間為寇攘觸罪姦有司坐令齊魯俗探丸盈交逵今君寄民社所念當在兹願試父兄術為民療瘡痍君服亦已華君佩何陸離朝發江之滸暮宿河之湄行當見伯氏為我道暌違草堂雅集卷一

body:
  text: 草堂雅集卷十一元顧瑛編于立字彥成南康之廬山人故宋名將家幼明敏博學美談笑學道㑹稽山中得石室藏書遂以詩酒放浪江湖間長吟短咏有二李風多遊吳中與豫特交善故于玉山草堂有行窩焉法書名畫題品居多楊鐵崖先生以為如行雲流水無所凝滯遊方之外者也題天台採藥圖天台之山千崖萬崿下壓𤣥隂之九壘上通青天於一握長松古檜隂森蔽白日飛湍懸瀑澒洞振岩壑窮搜逺討不可極中有仙人在寥廓褰衣澗曲者誰子似欲長往窮冥漠石橋流水定何處鳥啼春暮桃花落但見霓旌飄飄集仙侣丹光翠色映樓閣授子素書仙可學况有瓊漿與靈藥雲霓衣裳上清樂瑤牀玉枕真珠箔此中居處良不惡胡乃區區念城郭世道日偷民德薄變轉更遷如六博人間不似山間樂嗚呼人間不似山間樂胡為丁令歸來化為鶴題子昂蘭石閒向江邊結佩蕤楚宫花草露離離王孫去後春風晚拾得幽芳欲遺誰題敬仲竹木洞庭秋盡水層波光動珊瑚碧樹柯夜半仙人騎紫鳳滿天清影月明多題墨雁黃沙衰草雪毶毶八月天山冷不堪昨夜朔風吹過影盡將秋色到江南題山居圖千澗淙淙一徑通長松盡入白雲中徵君更在山深處滿谷桃花爛漫紅題髙宗詩意便面當朝山色尚煙嵐近侍承恩罷早參邊奏不來春殿寂自將情思寫江南題凌波仙帝子乘風下九疑含情欲去更遲遲獨憐江草年年緑曽見凌波解珮時題趙子昂桃花馬學士當年侍武皇詔騎天馬入明光上林三月花如雨吹落金鞍片片香題松石匡廬道士山隂住繞屋青松箇箇長溪上一畨春雨過白雲滿地茯苓香題胡環瘦馬圖堅昆此去幾萬里荒草黃雲連白沙到得單于臺下日暖風開遍地椒花題振轡馬渥窪龍馬進來時奮迅長鳴不受羈詔與從官調得熟只教隨仗不教騎至元戊寅四月十九日風雷大作民以為龍王嫁女豫作詩以紀之西方龍君嫁龍女雷車彭彭載風雨神奸夜邀髑髏語碧草無光愁露渚鮫人獻綃珠淚泣鸞裾行烟翠痕濕阿鬟嬌小不成妝帝與桑田湯沐邑胭脂紫玉吹海腥陽侯擊浪玻瓈聲湖邉地皮薄如紙長堤捲作長河水夜夢家兄又夢陳敬初我來與君同作客前年共住江邊宅君騎快馬事逺游我亦流離去鄉國君家慈親猶未老眼前骨肉仍相保三人兄弟何人强之子文章最稱好我家老兄浙水濵老兄比弟家尤貧五年零落不可見迢迢歸夢還相親人聞夢中相爾汝傍人不知夢中語起來明月滿虛庭丹楓墮影天霜雨秋風江上生白波秋江蕭蕭鴻雁多遲君不來知奈何聊復慷慨成悲歌聊復慷慨成悲歌題顧仲淵烟雲軒與玉山同賦玉峯連天向天起秀色盤回三十里寒翠淋漓濕窗几影落明河一泓水明河之水清無底幽人結屋湖光裏溪南溪北花陳迷舍東舍西山烏啼夜來東風雨一犁滿川煙霧春雲低春雲無心無定處長在幽人讀書處未肯從龍行雨去窗前且伴幽人住顧瑛和曰春雲壓簷飛不起暖氣蘢葱百餘里桃花亭亭笑酣春溪邊浣花染溪水武陵才人碧窗底青霓衣裳白霞裏翠煙㸃㸃猩猩毛氷綃凝文露華洗山光入眼青迷迷小鳥向人啼復啼前村後村樹如蓋栁花起舞回風低雲師雲師浩無據驅雲勞勞向何處請君勸師一杯酒更借白雲簷下住題倪元鎮畫林泉城中對雨住十日雨晴出城山更幽入林下馬坐盤石綌衣紗帽思如秋題顧仲淵臨柯丹丘竹湖州去後丹丘老見此風枝露葉新千古中郎那可得虎賁猶是典刑人題墨戲秋荷水禽芙蓉老盡淡秋光翠羽依依愜晚凉欲製荷衣渾懶折只愁無葉蓋鴛鴦題墨竹種竹滿山阿蕭蕭風雨多㑹當成翠實鳴鳳一來過簡玉山我離城中五十日念子終日不相忘驛回隴首梅未發雁過沙頭書幾行田間雞黍酒正熟霜後園林橘半黃亦欲歸栖同一笑酣歌不减少年狂寄盧益修山中舊屋近如何想見凉雲長薜蘿剡水舟回應載雪山隂帖在可籠鵝相思坐使歲華晚顧影空憐月色多惆悵何人賦招隱淮南桂樹不勝歌美黃外史曽侍虛皇授玉經又從逸少寫黃庭月明神劍涵龍影雲起仙衣上鶴翎爐下火溫丹自熟松根石爛酒初醒鑑湖東畔山無數好結茅齊採茯苓題翟院深畫放牧圖村鼓誰家樂社神雨餘草木盡知春催科未動蠶桑了此是山中放牧人前山後山山鳥啼溪南溪北草離離秧田巳足三時雨此是山中放牧時楓林日落山徑微暝色欲合行人稀東家稚子候簷隙此是山中放牧歸隔浦晚煙迷逺樹滿川春雨長平蕪數家茅屋疏林外此是山中放牧圖題葛仙移家圖紫府青鸞下詔遲囊琴跨犢又何之空遺舊宅燒丹井寂寞長松叫子規題陳閎畫唐人呈馬圖大宛直在玉關西萬里風沙八駿蹄一自殿前隨仗立垂頭不肯向人嘶題李唐牧牛圖雨足秧田放牧時溪南溪北草離離長歌叩角無人聽閒卧斜陽把笛吹題趙松雪楚江清曉曽從江上繫孤舟渺渺清江萬里流兩岸青山春正曉一聲鳴櫓下揚州題文敏公墨蹟銀潢露冷夜霏微帝子乘風去不歸吹徹參差明月下滿江清影泣湘妃題趙千里臨李思訓煎茶圖山風吹斷煮茶煙竹外誰驚白鶴眠寫就淮南招隱曲松花離落石牀前題管夫人竹與玉山同賦煙空湘月明露下湘波冷翛然林下風吹折琅玕影顧瑛詩曰鳳毛輕染碧池春寫作琅玕紙上真試看腕中百斛力前身應是李夫人題李息齊竹薊丘最愛山隂道箇箇人家好竹林夜半翠烟三萬頃玉簫人倚鳳皇音題李遵道古木新篁山中昔日藏書處無數珊瑚並石根海上樵夫都不識斷雲碧蘚長秋痕題虞瑞岩白描水仙瀛洲之君號中黃雕冠翠帔懸明璫通明宫中拜帝觴帝遣換骨生天香醉後橫斜踏明月月明零亂如氷雪為傳清影落人間化作幽芳更愁絶官車曉過西陵渡貝闕珠宫鎖烟霧君王十二玉䦨干玉盤倒瀉金莖露江風吹斷舊繁華年年十月自春花寫成幽思無人省持獻瑶池阿母家題野鳬卷池上軒窗並水開鑑湖狂客酒船回鵁鶄鸂鶒知人意也為春暉日日來題陶穀郵亭夜宿圖行春使者惜春華處處春風楊栁花不向江南望江北却將恩怨屬琵琶題二馬圖明光殿前立仗馬盡日垂頭不敢嘶太液春波初浴起風烟慘淡八霜蹄題王元章梅老鶴歸來不受呼野橋江樹雪糢糊西湖處處皆桃李省識春風到畫圖題墨竹先生舊隱鑑湖曲無數琅玕繞屋生蕭蕭六月動秋思不是風聲即雨聲題柯石千岩夜半風雨裂古劍斫石生銅折寒潭影動月崢嶸碧蘚淋漓老蛟血題水仙夢落人間不紀年月明清影裊翩翩為問蓬萊幾清淺御風環珮欲泠然題西園雅集圖文章在世如元氣人物盛衰同一致開圖使我三太息乃知作者遺深意名園蕭瑟懸古秋白沙翠竹涵清流豈無尊爼寄幽賞况有文字能相酬花前美人美如玉翠痕冷透氷綃緑長帽先生正揮灑何處阮咸新度曲法書名畫總遊藝說有談空聊逺俗當時風流數君子千古何人繼髙躅君不見金谷荒園無草木又不見姑蘇空臺走麋鹿彼哉富貴等塵土何如斯人斯畫傳千古題東山圖玉山同賦不起謝安石其如天下何向來游賞地芳草落花多顧瑛詩曰江左風流第一人東山歌舞日紛紜當時不為蒼生起司馬山河總白雲題邊伯京畫萱竹雞鶼雲根翠竹依蒼石溪上戎葵映碧流自是鴛鴦元有侣不因芳草解忘憂題從子倫畫山水我本山中人頗有愛山癖何人寫秋山秀色如可食天河露下秋漢白挹露磨空洗秋色炯如洞庭水浸青芙蓉倒影天光湛虛碧又如飛龍天外來鱗鬛森森插霜㦸逺嶼瀰茫隔烟浦冷雲濕翠愁痕古便從海上訪三山又恐征帆迷處所若耶溪在何處歸去來山中住道逢仙人紫綺冠指㸃丹崖是征路寄書松竹問平安莫嫌老子來遲暮題錢舜舉畫雞冠花𤣥霜冷漬丹砂汁翠羽離披紫霞濕金烏海底浴神光絳幘雞人露中立玉笙謠玉山席上贈周生時鐵崖同賦十三學神仙十五能吹笙仙人王子晉同上鳳皇翎丹山鳳皇十七聲鈞天按節皆和鳴西游瑤池謁熊闕董家雙成最娉婷桂殿初凉濕秋露鵝管吹烟隔輕素縹眇新聲泛紫霞按曲每得周郎顧鐵崖仙人橫鐵笛幾度周郎䝉賞識同向緱山㺯月明九㸃齊州暮煙碧題米元暉墨山生來墮塵網苦為塵網縛暇日我早起騎驢出東郭城門老人髮半垂問我騎驢何所之為言欲向山中去茅屋正在清溪湄山中之人面如玉手把素書跨黃犢石泉夜煮茯苓香滿屋秋雲邀共宿緑蘿曉月懸松風縹眇惟聞煙外鐘十年往事一回首巳隔雲山千萬重潦倒狂吟頭半白把卷令人念疇昔石田瑶草近如何題詩好寄山中客題醉道圖君莫學伯夷不肯食周粟君莫學屈原死葬江魚腹人生富貴無百年身後聲名亦漫傳朝廷縱有賢良詔得似先生醉後眠題水竹居隱君溪上茅齊好繞屋竹林秋更清放艇莫驚鷗鷺宿吹簫還倚鳳皇鳴一川夜月芙蓉淨數畝凉雲薜荔生俗客不來清晝寂小窗瑤瑟間書聲送姚子章赴浙省計事同玉山賦之子東遊去神駒背若鴻天樞黃道外星使紫微中北岫雲雙屐西湖雪一篷重來舊遊地談笑莫匆匆顧瑛詩曰天府歸來寵數優又馳星檄過東甌旌旗影動扶桑曉鼓角聲懸海嶼秋緩帶元戎惟鎮靜操觚上吏足風流時清幕府文書少把酒吟詩好唱酬觀牡丹有感搖搖紅影一枝斜看舞東風兩髻娃堪笑年年未歸客借人池館賞春花寄陳敬初時敬初寫楞嚴經東海先生參白社山隂道士乞黃庭落花滿地無行迹寫到楞嚴第幾經暮春偶書沉沉栁巷無行跡惟見簾前落絮頻小雨欲晴先釀暖輕隂拂地不驚塵巳知春事無多日解醉花前有幾人深院時時剪刀響倩誰裁製小烏巾題錢舜舉畫青山白雲吳興山水天下無吳興畫手天為徒天河染露洗空碧輕煙薄素開新圖白雲欲散松風起回如丹丘隔海雪後寒糢糊溪光倒影丹翠濕又如洞庭水浸青珊瑚緑蘿吹香掛秋月小橋野徑相縈紆行人遙遙向何處丹崖石檢或有仙人居溪山如此無不好築屋臨流可投老春雲秋露石田腴我欲耕煙種瑤草春初至城尋敬叔不見明日將歸留詩城裏逢春住十日烏帽短靴塵土中喚取扁舟過湖去兩堤楊栁正東風寄陳敬初郭外何曽有杜鵑客中情緒自堪憐清明過了梨花謝風景依然似去年用陳敬初雨中見寄有過湖别墅意似聞茅屋傍清溪楊栁青青水拍堤醉裏不知家逺近望中惟見樹髙低溪雲出洞欲行雨江石穿波不染泥何日扁舟過湖去竹間取次著新題題熊自得畫丹岩圖混沌夜死元氣裂煉石穿絲補天缺誰將餘韛鼓八風一㸃元精鑄明月顧兔飛上天清光缺復圓嫦娥抱影空嬋娟一朝影落松風顛古佛龎眉兩癯肩築室勘道來何年摩尼寶光照濁水天花散落香爐煙溪上青山不知數日日春風長蘭杜褰衣便欲問真源斷猿疏雨青林暮松雲仙人披錦袍爽致寫入猩猩毛一川晴靄動空碧萬壑翠氣翻雲濤手擕緑綺琴為子彈鳴皋金樽瀉酒對山月仙之人兮如可招仙之人兮如可招汗漫與子同遊遨送趙季文赴湖州知事並簡趙仲光水部掾郎清似玉春風一舸向湖州舊聞能事才無敵新拜除書寵獨優辨嶺羣峰多北向苕溪百折盡東流懸知魏闕佳公子應有新詩日唱酬用丹丘子寄玉山草堂韻薄薄淡靄浮香雲仙家景物長如春山人不歸猿鶴怨野老忘機鷗鷺馴丹崖翠壁或有路白沙青石久無塵人生有酒萬事足但願日日邀比鄰擁翠堂詩卷幽人結屋江邊住俗聲不到題詩處門前惟有樹扶疏簷間只許雲來去落花如雨東風狂緑隂滿地春茫茫一聲啼鳥驚夢破翠屏淺印羣峰長海綃輕薄烟霏暝空碧無痕湛清影天風吹落竽籟寒嵐光濕透衣裳冷我生已有遺世心便欲長往窮幽尋微茫樓觀不可到雲林冥冥苔碧深贈松崖隱者滄江之水清如空長林沓嶂髙巃嵸何人於此憩幽寂白雲滿地迷行蹤層崕蒼蒼如積雪巨靈手擘芙蓉裂蒼官鬚鬛老歲寒地位清髙兩孤絶根蟠重隂神鬼㑹節抱太始氷霜結上有六月天風聲下有百尺之𤣥氷門前夜半山月落子規叫絶煙霏冥隱君之意人莫識髙比青松堅比石石上薜蘿聊可衣松根茯苓誰與食隱君隱君百不憂子之于世知何求棟梁砥柱或見用萬牛回首如山丘送趙克讓歸洛陽赴舉聖化開元極文星入上台梁王尤好賦賈誼獨多才江草迎人逺宫花近馬開君門多雨露得意早歸來范寬小雪山山人昔日住山中山中酒熟蒲萄紅山人醉卧呼不醒浩蕩十日吹天風夢駕天風度寥泬貝闕珠宫互明滅玉龍千尺擁氷髯手挹銀河㺯明月仙人勸我金屈巵更吹白玉雙參差東風琪樹花如雪千片萬片凌空飛恍恍魂神逐煙霧起來却踏孤山路瑤華滿地不堪拾騎驢直上梅花墓范寬善畫老有神恍然見我夢中身煩君更向溪橋畔為寫當時踏雪人題張戡獵兔圖八月九月天雨霜北風吹沙邊草黃騂弓白羽黃金鏑虎皮蒙鞍懸兩狼碧眼小兒家上谷生來湩飲常食肉彎弓射獵不遺鏃阿㕙但遣韓盧逐解鞍野食仍割鮮止息還依沙草邊燒春百斛賤如水醉來却枕穹廬眠嗟哉爾㕙良獨苦致身三窟知何補縱然用作管城君秦人少恩棄如土贈道士李虛白去年去謁大茅君曽得茅君授隱文虛室煉形人止止素書紬匱衆云云丹光夜發三花樹玉氣晴浮五色雲聖世無為尊道德竹宫佳氣日氤氲題羅漢老胡有法向誰說坐對碧空秋月圓待得眉毛垂著地不知鼻孔本撩天桐軒曉坐百尺東軒樹微飈散清影凉生氣候移露滴秋隂冷寥寥鳴鳳來歷歷啼烏靜徘徊未成詩明月下金井顧瑛詩曰庭樹長琅玕凉雲晝作圑倚䦨招白鳳舞袖拂青鸞夜色一簷碧秋聲六月寒娟娟金井月長向酒尊看題趙仲穆畫馬房星夜入水龍馬出渥窪西來幾萬里進入天王家公子重毫素慘淡生風沙明時不用武終然駕鼓車送柏子庭歸四明東風夜起江花落蕩槳過江江水香並人晴樹日杲杲隔岸烟草春茫茫題詩自有湯休句載酒寧無賀監狂菖蒲花發蒲萄熟思爾令人意不忘顧瑛用韻江上送君歸故鄉江風吹春如酒香長亭栁花雪衮衮大堤芳草烟茫茫青山入畫題詩遍緑水行舟載酒狂莫遣鐘聲到書枕空梁月落意難忘題旺扎勒蘭石明時宿衛選良材忽擁旌旗海上來天馬盡收西國種將軍新破粵蠻回弓懸蛇影弦初下劍發龍吟匣自開自古相門多作相五雲佳氣接三台平逺樓對酒川光濕鈎簾爽氣浮地從天際沒水近日邊流樹密烟藏寺蘋生緑滿洲幽人有佳興于此一登樓水殿圖羊車欲過玉䦨東雉扇微開水殿風白鳳徘徊金井月凉隂半在碧梧桐分得烏夜啼送朱長元赴膠州同知城頭烏夜啼還過上林栖上林髙樹多好枝歸飛啞啞東復西起看江月沉江底使君逺逰中夜起軟紅陌上踏青陽快馬猶龍車似水烏夜啼啼送君驅車出門風欲薰東方日出如車輪玉山分得前有一樽酒前有一樽酒酒痕清若空金波忽蕩漾酒面度微風酌酒持勸君為言贈離别明日到膠州還見尊中物丈夫多慷慨不為兒女憐但令潮有信應見月同圓桂棹木蘭舟行行渡淮水君恩如水流客行殊未巳題顧處士竹逸亭徵君結屋玉山裏箇箇修篁一尺圍秋聲六月起蕭瑟翠雨盡日生霏微仙人或送青精飯道士時來白羽衣清觴雅瑟在盤石坐看白雲天際飛題梅隱𤣥隂凍澤腹地底生初陽鼎中火力溫蒸蒸起微香萬木盡僵立南枝正芬芳幽人杜德機服食從中黃保此歲寒節與道常徜徉題錢景明德軒與玉山同賦門外清江百尺深道人軒檻倚江潯三山鼇抃波濤壯萬壑龍吟霧雨隂每愛南華說天籟更從大士問潮音直教聽到無聲處浩劫虛空不可尋顧瑛詩曰中天樓閣鬱崔嵬下有軒窗傍水開列子御風從此去陽侯擊浪有時來夜深龍挾千山雨地底鼉鳴萬壑雷我亦清秋望瀛海飈輪乘月過蓬萊題從序畫墨萱草階下宜男草新開幾樹花阿婆年八十遊子早還家送瞿慧夫京口教官京口去家三百里官清俸薄得長閒賡歌每作金石奏揖讓常居俎豆間波濤不盡大江水雲氣時昏北固山淮南木落初飛雁應有新詩寄得還題花蕊夫人像玉屑丹砂和獺髓一㸃殷紅養花蕊氷肌玉骨自生凉不信流年去如水火旗曉壓降王道貝闕珠宫長秋草摩訶池上又西風流紅不向人間老題蘇小小像花宫玉燕啼酣春春風勞勞驅夢雲夢嗔夢喜春不聞紅萱露滴真珠裙夜燕玎玲隔窗語碧紗凝烟咽金縷行雲妬殺巫山女芭蕉葉葉黃梅雨題桂花仙人像紫虛真人離紫宫流光夜下如長虹明珠結佩冠芙蓉鈞天廣樂來相從居然太虛幻為月中有瓊臺白銀闕羽衣霓裳歌合節玉杵搗碎黃金屑金屑霏霏滿下方倒吹露腳秋風香齊州一髮烟微茫但見萬國涵清光松風操寄題計籌山聽松軒山之松兮夭喬天之籟兮翏翏叶寥生于無聲兮亦無聲以消曲肱隱几兮獨與道超昔之人兮曽棄其瓢顧瑛詩曰何時種松子于今幾千尺真人守規中宴坐深深息清風若流水行住本無跡天籟生虛空還向空中寂題仲穆畫唐馬大宛千里馬朱汗翠連錢夜秣玉關下曉呈金殿前橫門花似雨韋曲栁如烟虢國爭馳道將軍避繡鞭次韻越中八詠種山青山削芙蓉上有浮雲生窈窕俯長流逶迤帶重城朝光散霞彩暮色涵空青鴟夷去不回遺爾千古名三山蓬萊失左股負以垂天翼中有仙人居珠宫燦瑤席凝雲不飛去化作輪囷石彈琴坐石上長憶三山客崇山㑹稽山水國崇山幽事多當時觴詠處春淨花顔酡磊落黃金罍玲瓏白玉珂行樂須及時美人在丘阿梅山梅山如積翠的皪手堪捧遙遙仙人尉盤盤故時隴丹泉清可鑑石乳甘于湩行將解塵纓于焉蹈髙踵鑑湖我愛鑑湖水明如照膽銅澄清若有待渾濁那能蒙當時賀知章富貴如苓通豈無一畝地來築仙人宫古城驅車曉行邁行行出郊郭斷岡屹崇墉虛籟殷靈壑雨深瑤草長風定松花落西山有爽氣逍遙倚晴閣縹碧樓樓居本髙明况在松竹間溪流深幾尺新雨過前山浮雲多變態好鳥亦間關偃蹇樓中人對酒還開顔芬陀室視心如蓮花淨明涵太虛出泥本無垢露體皆真如大千入一息宴坐忘百須陶公雖飲酒時能到林廬題超覽樓紅樓標勝槩髙倚越王臺水接三韓外山從百粵來御風凉滿袖問月酒停杯少待談空罷登臨亦快哉春還軒北風凝寒隂肅肅地底初陽光霅煜正如鼎內火力溫漸覺薰蒸起微馥遲遲宫栁著嫩黃稍稍亭皋換新緑舊時燕子巳重來何處鶯兒才度曲此時幽人坐軒裏有琴可彈書可讀但願日日酒盈樽不問勞勞車折軸君不見丞相胡椒八百斛又不見鄴下領軍鞋一屋當時富貴等塵土今日園池走麋鹿乃知清虛實近道熾心縱得何時足隂陽消長無停機日月推遷如轉轂靜中妙合天地心請君收視觀其復他年老我叩𤣥宗與爾相過跨黃犢胡琴謠贈張猩猩時西夏髙起文同賦絳綃羃帳春雲熱銀蠟搖光眼生纈猩猩對客軋胡琴紫龍銜絲度幽咽新鶯出谷調髙聲間關瀉出春風情珊瑚擊碎琅玕折鳯皇夜叫離鸞驚舞停回雪歌停扇一曲梁州猶未遍細數驪珠下玉盤百尺氷絲貫成串錦瑟無聲帝子愁湘波搖江江倒流西風忽起茯苓浦吹下滿天鴻雁秋張猩猩更坐調一曲玉軸銀絃再三促為君寫作胡琴謡西夏郎官面如玉草堂雅集卷十一

body:
  text: 草堂雅集巻十二元顧瑛編彭罙字仲愈廣陵人無書不讀通五經性行純謹言笑侃侃陳君敬初深敬事之來吳中予甥張大本首延致之授舉子業户外之屨常滿江左碩儒也巴陵女子行巴陵郡西江水渾赤沙黄壤東南奔邇來湜湜已百載中有婉孌之忠魂當時郡有賈氏婦志節凛凛摩乾坤家亡國破身執義不辱乃是韓魏國忠獻五世之曽孫臨平湖開石封發五陵氣盡天房昏甲馬三百萬北來正啍啍連城破竹勢迎刃牽羊係頸投冠解綬竄匿俱紛紛不意弱草中見此松栢根讀書不學曹大家事夫却是桓少君君臣大義本與夫婦一慷慨萬古保貞操視生死朝夕不啻富貴如浮雲恨不生為男横戈赴三軍栖栖臨絶音耿耿昭人文練裳縱横四百字上陳祖宗創業有至道下斥姦邪誤國偷生存吾詞既畢分已盡精衛何苦猶銜寃想當捐佩入不測幽光上浮白日銜隂魄直塞珠宫門湘靈罷瑟虙妃泣馮夷長嘯羣龍翻至今頌其詩感其事令人浩氣填膺那可捫或者疑之不能成人善謂其見夢于人不若效靈史氏為可惇嗚呼時無歐陽公斷臂之婦絶無聞何以愧賣降表貞節薄俗那能譏兔園我願然犀取靈骨封以夏屋旌以石表雙髙蹲奏之大廷布天下激厲臣子皆忠淳可以扶三綱正人倫謂予有不信請視賈娥墳怡雲軒歌為茂上人賦怡雲軒前古松樹日日雲來滿幽户怡雲野老對松眠看雲自來還自去非煙非霧流光晶白衣蒼狗倐多形有時驟雨動靈怪恐是老龍來聽經飢食坐單行復息心與浮雲兩無迹鉢中水是天上泉忩隙塵非山下石青天漫漫積空寥磅礴雲間無逺遙乘之瞬息千萬里靈鷲峰頭雪未消我樂在雲雲我悅相從不似長相别雲歸岩洞我還山碧潭夜夜看孤月送粹上人還天台養母讀書逝川無停波浮雲時獨飛十年出家去早著游子衣朝汎南海航暮采北山薇孰云方外樂倚門有遐思丸丸赤城山中有鳥烏慈娛嬉在昕昔况適静者期朔風吹大江越樹淡寒暉顧瞻東歸屐夢繞玉溪湄送丁好義晨登吳王臺蒼然望八荒大江東南去浮雲西北翔中有鵷雛飛前隨雙鳳皇梧桐正蒼翠亦待鳴朝陽白露湛清秋山花已黄黄折之欲相贈嵗晏同幽芳寄沈鼎臣中庭好花樹欲發遲良時春風一嘘拂粲粲已盈枝青實未堪摘苦心良自知朝榮暮憔悴物理固其宜願將合歡草持以遺所思宛陵大江左我家更在東憶子到縣時目寄孤飛鴻滄浪無釣艇海洋多颶風游鱗向何處逺將消息通嚶嚶雙黄鸝躑躅芳樹中聽之有深意白日已匆匆鄭氏義門詩有巋者門摩霄切雲丕昭人文鱗集而充櫛比而從伊鄭之宗桓桓其棖楔臬孔明載闢于行重慶在堂曽𤣥日昌有質必良父教子箴兄愛弟欽樂且弗淫服五而窮世九而同益衍以隆黼黻羽儀濟濟師師維禎之幾牛蹄角千其尨百牽共牢勿遷天將孔揚以顯休光聞于聖皇皇帝曰都爾嗣克圖宜旌爾廬絲出而綸玉輝㻞璘勅我子臣絢爛非烟膏露醴泉三秀植焉童齔耄期作息娛嬉益勸而規其規維何百忍一和永矢弗頗彼張顯唐此陳九江孰與比量噫􅐵汙流徳色鉏耰紾臂乾餱目貿于詹心瞢于慙弗死曷探江浦之源汗浩澄淵可挹其涓伊我人思孝友同歸天下無為斯門斯言千萬億年與國永傳芝山吟有序徐君勉之番陽人芝山在番郡之隂世傳山常産芝郡人徃徃以科第顯勉之兩舉鄉進士得山長慈湖人謂勉之若有不釋然者予故為道其所樂作芝山吟餞之西山有靈芝我來茹其芳吐氣為卿雲絢爛紛天章紫微上卿不敢惜手抉氛埃看五色虎豹衛關深九重倐爍電光迷白黑歸來不是故山遙天風巻幔正飄飄化作慈溪泮林雨坐令嘉植長春苗碧澗泠泠煮芹藻恰佀山中采芝好咀華滋味與人同粱肉朱門祗素飽闔閭城頭秋日涼停雲只隔錢塘江西山日夜生輝光山中紫芝煜煜長更結飛霞髙頡頏涂穎字叔良題韓與玉春山行旅圖枉路越川梁郊區綿海甸蘅臯望菌閣逺近皆可辨夕嶂青若藍春雲白於練去矣諒云遙聽鐘自忘倦欽察海子上醉卧藉芳草青天若穹廬頽然無所覺恍惚夢華胥日落大荒暮天清雲物虚不知飛雨來洒我貂襜褕起坐向滄海髙歌望天衢長懐既莫展此地聊自娛壮嵗思學劍閒來對呼盧潛蹤混羊豕何必事詩書鄭節婦詩上京人老而未獲旌表飲氷不為清食蘗不為苦白髪守孀閨含悲涕如雨常憐衰朽質蚤嵗喪其天粧臺掩明鏡翠閣棄華鈿自誓比共姜無兒哀伯道天命可奈何人心當自保南山石可轉此志終不移東海水可竭苦節終自持嗟彼薄俗中紛紜斁倫紀雖見旌異門多在王侯里誰知氷玉潔埋沒一何傷獨有中天月遙夜照肝腸牛羣頭懐鄉日出漭蕩外風生遼廓間將軍指大野游盼漠南山五月雪猶凍平沙春草寒駝鳴隴烟曙氈帳亂迴環行役方未巳羇懐恒鮮懽南禽戀越樹代馬思燕關悵矣風土異靦焉游子顏故鄉在何許灤水徒潺湲簡漕府劉經歴貢賦出天下東吳最豐贏連艘轉大海輸饋實瑤京天子方旰食屬念在羣生鸞臺輟英俊贊理慎王程肅肅公府靜悠悠蓮幕清攄誠閱簡牘思用致隆平中原乆荒蕩豹虎况縱横軍儲急㑹斂何以恤其情昨聞畿甸間詔令募民耕秋風熟秔稻委積若墉城並将資國用庶足緩繇征題山水圖憶昔灤陽八月歸北風吹雪洒秋衣槍竿嶺上停車望萬木蕭蕭落葉飛上京次貢待制韻海風吹雨度龍沙滿眼金蓮紫菊花日暮笙歌何處起髙低穹帳五侯家蓬萊仙子學長生羣帝朝天絳節迎昨日六龍迴北極雲裾霞珮集灤京竹宫窅窅秋風晚芸閣沉沉晝漏稀獨有蕃僧承詔寵紅衣白馬退朝歸借得仙人白鹿騎瀛洲真館住多時夜深忽見江南月却憶親知乆别離馬麐字公振崑山之東滄人幼酷志讀書多為搢紳所知好文尚雅以華其家聲與余有姻婭今之所録皆楊鐵崖所稱愛者春夜樂越羅複幔茱萸紅蹙金繡帶蟠雙龍銅盤膩燭傳香蠟簾箔星光釘文甲金刀割鮮翠釡烹豆蔲壓春赬玉罌神仙舞盤踏月行雁沙印雪留雲纓朱絲泠泠金粟柱風流上客瓊林主碧海烟中采香媍濕花仙骨沾春雨和楊廉夫新居韻楊子樓居飲馬河書舟日日艤晴波未論栗里功名薄總為夔州詩句多逺樹入簾秋若畫亂雲渡水白於鵞何當共把凌風袂醉和仙人鐵笛歌婁東園雅集分韻得雨字步出東郭門羲車籋雲上園容媚嬋娟海色射泱漭老仙瀛洲來鐵笛奮逸響好鳥啼木末驚起飛兩兩珍圖襍緗帙於焉得真賞清驩信浹洽閒情足蕭爽歸歟掩關坐俗駕毋勞枉獨酌謠獨酌謠獨酌當中宵中宵萬籟寂獨酌興歌謠玉露下金井銀河流素濤一酌再酌神思超安得十洲仙人共傾倒駕風鞭霆歴覽八極同遊遨魯戈莫麾斥羲車莫招搖便當甕頭醉笑解黄金貂君不見車輪馬足長安道雞鳴五更天未曉又不見北邙風雨跡如掃石駝斷碣眠秋草天飈泠泠吹我襟獨酌獨酌慰我心流光去人那復得洗盞自歌還自吟盧昭字伯融閩人僑居東滄從明師為舉子業詩文尤有法搢紳先生器重之余交于其父子間視伯融尤相愛重云酬楊子固我愛三山楊子固能詩似是謝惠連兩家通好只青眼十年不來今白顛故園春色烟塵際清夜好懐風雨前可耐明朝還欲别楊花飛送渡江船送清上人歸莆田有懐白髪中軍老飛錫泠然下翠微龍女細聽雙樹法天風不動五銖衣江頭日暮多塵土谷口春深長蕨薇故國蕭條丘壠在相逢猶憶未同歸送㑹稽朱景初游維揚日日長缾醉竹西朱樓九曲使人迷夜深應有慈親夢起看青山似㑹稽送道士之京五色雲衣襟珮璫大明宫裏拜君王金盤玉棗傳仙實龍簡瓊文刻帝章每候和鑾祠太乙總看鳴鳳下朝陽鑑湖一曲還歸老都道當年賀監狂題昭君出塞圖草黄沙白馬如雲落日悲笳處處聞此去妾心終許國不勞辛苦漢三軍關山北上幾時還一曲琵琶掩淚彈獨倚穹廬望征雁舉頭見月似長安采蓮曲六章送蘇彥章奉母歸汴江南可采蓮江北日復暮阿誰修饔飱拏舟渡江去昔日江上蓮蓮葉小如錢今見房中子含笑弄清漣濯濯秋水蓮采采遺慈母莫歎華色衰懸知子心苦蓮葉大如葢魴魚潛在隂魚潛尚知處吁嗟游子心食蓮先食菂踏藕先踏水菂苦心自知水深恨無底蕩舟遡洄渚零露沾我衣紅芳日以歇載之與同歸江水一百里送瞿慧夫江水一百里客歸春亦歸南國雙蛺蝶直是繞人衣江水一百里春帆五両輕遮莫潮來未須教醉裡行江水一百里江流曲似環殷勤問江水幾日送君還精衛辭有鳥志堙海銜石到海返石轉心不移但礪爾喙短日復夕海復逺石可竭海可滿精衛之恨何時斷擬烏夜啼悼從母弟曹生沒于陵河烏夜啼飛來栖我庭樹枝烏啼不祥母惡之母生季子年廿六買船海行輸豆粟昨日陵河有書至前月風波葬魚腹婦姑相持哭向天路逺不得收骨肉井羸其瓶水迺覆人生涉險終自椓魂招浦口悲風來烏啼遶樹聲更哀願摧四山填海水他人毋令有如此烏夜啼啼嗚嗚婦朝上堂再拜姑勸姑莫打枝上烏烏今反哺有是雛子胡不還母在家擬車遙遙送蘇彥剛奉母歸汴車遙遙幾千里朝發吳頭夕楚尾車中美人誰家子雲軿聨翩去無已驅車復驅車可使車無輗車無輗不行母無子何之臨岐商歌奉巵酒牽郎之車夀郎母酸風北來雨雪寒願郎嵗暮當知還車遙遙歸汴州投爾車下轄懸爾車上輈莫學從前事長游母之念兮朝夕不能休古意良人去悠悠出川還入洛不省道里逺但愁風水惡胡為不懐歸日夜苦棲泊道逺終致之車輪不生角楚楚生紵衣去時與郎著勿遣塵土緇塵緇徒澣濯妾言諒無訧生死将有託金多詎云貴飲水秪自樂題墨菜薇生西山阿荼生南原下結根各有地不與同甘苦薇老不可食荼今復如飴甘苦有時易貴在知者知擬同聲篇送瞿慧夫學錄鎮江幽谷答空響鳴鶴和在隂同聲自相應感兹意彌深子嘯我嘅歎我歌子援琴宫商諒相宣不如我同心維時文化洽貳教良所任爰有芹與藻采采樂且湛顧瞻白雲翔寧不懐故岑朂哉躅前修秩秩著徳音題海棠畫眉圖灼灼棠之花有鳥啄其英遺音求匹儔使我懐友生睠彼春載陽品彚咸欣榮如何梧桐上不見鳳皇鳴題梨花錦鳩圖山梨著花春渚曲鳲鳩樹頭啼角角文膺錦翼何䙰褷晴呼婦來雨逐之不如王雎在河滸關關和鳴還並處賦魯子昇檢校宅雪中紫牡丹拾遺門前車似水嵗暮傳看魏家紫獨持顏色犯氷雪不作春妍競桃李戔戔凌寒散晴葩洛中定應無此花滿堂雜珮亂葱玉一色碧雲承紫霞醉披鸘裘酌銅斗問渠可是華神手折華起舞奉郎母年年對華作長壽送清上人横陽覲母上人自是無家者甘㫖髙堂未忍違每有庭萱生客夢難将寸草報春暉江花繞水迎船下雲葉浮空近錫飛清夜寶洲心更切相期須及雁同歸賦牡丹煖風輕雨破花初仙態惺忪似索扶承露總看金作掌鎖雲深訝玉為盂香籠晝幄仍熏麝酒暈春容更㸃酥老去風流渾未減快傳綵筆倩官奴送駙馬觀稼軒同知辰州路使君南貳辰陽郡奕葉人傳舊相家莫向將軍問銅柱好從勾漏覔丹砂畬田五月多遺􅕗沅芷連天爛有花飲射早聞成雅俗遐荒今已似中華送鄭元永歸永嘉覲父中宵清夢落東甌不為青山一日留花過辛夷歸别墅風含杜若下春洲深懐置膝憐文度每愛將車從太丘釃酒髙堂真樂在江湖深為謝盟鷗次陳敬初送貢泰父海上回舟韵甬東陳生江海士歸來文采鳳毛新蕭蕭神駿不受縶肅肅驚鴻還避人待月瀛洲重視草望雲赤水竟回輪憐才獨爾中宵坐百過清詩不厭頻十年京洛負幽期此日相逢菊滿巵隔幔華星川上動近人凉月樹中移草𤣥自信愁方適嗜酒從嗔老更痴不有栖遲吳下客秋來那得慰愁離過吳淞江霜林
社燕千年喬木噪寒鴉江山風雨殊今昔文武衣冠起歎嗟扶䇿歸舟有孫子寧辭辛苦答春華次韵張田秀才見寄樹杪青蟲晴颺絲春城風物似年時貧餘許邁飡金法樂止陶潛飲酒詩芳草青青連野闊征鴻歴歴度江遲長洲故苑烟華外千里懐人入夢思紅梅九疑山中得道女春寒石上飲流霞不知遺却玉條脫獨倚東風暮竹斜寄學可二首九龍之山第幾峰曽看飛雪下長松小樓日夜聽春雨忘却溪頭尋暮鐘石上一杯清冷水傳是若冰小洞天借渠茗器登山去春雪正與梅爭妍寄阿山最憶鳳雛年十四臨池愛學漢中郎西齋舊種櫻桃樹今嵗還應共汝長次韻楊廉夫冶春口號八首姑蘇城北桃花塢日日敲門去問春自是狂夫被花惱求之不得亦愁人醉舞花前倒接䍦雙雙燕子共差池留連只恐春光暮芳露濕衣人不知石湖春水如酒濃玻璃萬頃開龍宫我時泛舟過湖曲無數桃花發舊叢近得𤣥洲飡玉法不用采石登崑崙景純解道游仙句海上鶴來傳到門江城雪夜深一尺欲問梅花馬不前袁生此時正髙卧不知春江有釣船玉壺春酒碧于海客至縱飲寧傷廉已無俗事惱真趣只有清香散寶奩緑暈雙蛾新畫眉風流堪賦比紅兒繡窓無人解春意行傍辛夷折栁枝吳姬殷勤折簡呼青錦坐褥花中敷聽唱梨園供奉曲新聲一串驪龍珠游石湖治平寺用唐人許渾所題詩韻湖上春雲挾雨來楞伽山木盡低摧吳王廢塚花如雪猶自吹香上舞臺閱真誥長史昔好道鍊真三秀峰夜感紫微仙降集華房中鸞鳥鳴素月翠旍颺琅風摛辭托諷寓讚揚皆真宗中有飡霞法可以回嬰童刻之白玉檢藏之華陽宫真人有仙氣乃得探其蹤我生慕𤣥素無由啓愚蒙嘯吟金玉章靈音朗九空懐仙起冥想䬃然精靈通焉能出囂滓歘忽驂雲龍次韻答强仲端花落紅雲島風生白玉堤真人不出户芳樹自成蹊掃地雨初歇巻簾鶯正啼此時不一見春思轉凄迷送王子充歸金華春入長洲苑東風已及時苑中垂楊樹吹作黄金絲送君出春城艤舟折柔枝以此聊贈逺相别仍相期君歸金華山當逢牧羊兒毋因入山去遂爾來遲遲楊栁飛花日待君同賦詩黄文徳汴中人號尚文子讀書能文侍父為玉山縣教官因錢洞雲游廬山歸故得詩于後云寄玉山草堂𤣥圃仙人吾未識聞說吳山種春色昨夜洞雲天際來明月空齋坐相憶自題曰予家汴中僑居閩之昭武甫官五溪適洞雲錢居士過我得覿仲瑛揮玉詞翰兼美雖未能識荆有不能忘情者賦二十八字附巻末他日洞雲歸淛當出此為顧君一笑且以期後㑹云贈錢洞雲玉峰古洞多白雲中有學道癯仙人問言盡日說空有一朝興入廬山春香爐峰髙虎溪逺石上秋深長苔蘚白蓮不老秋月明萬里浮雲自舒巻顧瑛詩曰廬山五老香爐峯紫烟縹緲青㝠中銀河光搖白螮蝀明湖影落金芙蓉當時送客過溪處至今古木號山風逺公香火有遺社白蓮墜露秋重重周砥字履道蘭陵人幼學舉子業且立意作詩不汎交來游姑蘇與予聚首彌月過草堂即往鴻山其與倪雲林最相友愛故其詩畫亦相似之夏日同强二秀才過鑑公山房因游仁壽精舍尋僧直到梵王家便汲山泉為煮茶阮籍從來無禮法湯休何用著袈裟醉眠石閣聽風樹步入松雲掃磵花與子歸時仍並轡蕭條墓道夕陽斜寄楊文可屋廬星散當山郭門前小溪相與通橘子壓樹千頭緑鯉魚跳波雙尾紅空梁寒月拱夜䑕傍壁燈火鳴秋蟲故人亦在他鄉住此時作客情思同贈俞逺明醫者乘雲行泥志所異著書賣藥情可同野老自惟捫蝨客徵君當是奪牛翁橘林華落丹井畔芝田鶴鳴雲氣中嗟乎濟人不求報我特聞此縁丁公寄周子羽乃翁天性唯真率縱酒狂歌老未休不是生前渾欲醉却縁客裡易為愁百年心緒留黄巻幾樹梅花共白頭昨過比隣司馬氏阿戎談論更風流春日空山寂寂行人稀岡頭落花如雨飛罷琴惆悵不能已故鄉寥落何當歸南去百粤羽書急北來三吳戎馬肥安得龍驤擁戰艦掃除俘冦揚國威寄鮑校書并簡强二秀才城邊楓樹葉欲赤涇上芙蓉花亦繁聊寫寒温傳逺意願逢顏色問𤣥言牙籤題字羣書整玉鼎焚香古制存時在髙齋住終日强郎詩律最堪論送福上人游江西西江江水漾明霞買得吳船泊晚沙春鳥銜花落經巻凉風吹月上袈裟廬山屹立千峰秀瀑布流傳一道斜愛爾心源絶清凈東林寺裏白蓮華題可意樓吳興山水稱竒絶愛汝樓居事事清花片拂雲飄几席湖光浮日動檐楹主人好學三冬足對客髙談一座傾樂事本來皆可意為君拈筆賦閒情題毛遂執劍圖六國爭雄勢若何紛紛劍客口懸河合從不作尊王計遂也何煩用力多題張道師所藏畫秋月無風渡海遲珊瑚玉樹碧參差明朝我亦三山去為借韓終白鹿騎寄張習之四首數日隂雨復寒凝沙邊草閣非倦登梅花蕭條竹枝瘦大似不禁風雪凌枇杷花開繞舍香竹枝披拂映滄浪舊雨故人不相遇亦可寄書來草堂空山寥寥獨抱琴時過谷口之雲林自從幽人采芝去不見鹿鳴雙磵隂夕陽在山雲在松松間石上憶相逢西林問訊屢有約且可㑹面得從容枇杷樹下懐葛石泉道士晒藥枇杷林秋陽滿山澤不知林間風吹花墮巾幘道心政散浪野性非頗僻不有孤桐琴何以寄逺客題倪雲林畫雲木蔽清野蛾眉横素秋一雨過大壑百川㑹新流未能聞至道寧即歌逺游嵗晏且歸去采芝南山幽題宫人行樂圖金宫游素女玉笛弄清暉月殿龍香度風簾翠影飛雲開移綵仗花落巻春衣莫買相如賦長門事已非庚寅嵗秋九月余邀張習之吕志學枉過雲丘志學過期不至獨與習之觴于紫霞丹房醉後因紀其事𤣥宫雲氣暖玉瓶春酒香亂山碧霞裏錦幛相低昻青童奏仙歌半空鸞鵠翔飄飄興方逸奕奕思何長便呼張仲蔚爾來共銜觴吕生褒衣人置之亦何妨謔浪古松下欹傾琪樹傍惟兹遂真性誰復笑楚狂嵩髙兩道士亦來與徜徉勸我飡金液遺以辟榖方于時政酣暢仰觀天茫茫不暇譚𤣥理邀之入醉鄉鳳笙篇贈紫霞道人鳳笙十三簧音響應天時自從軒轅調律後誰将絃管置之虞舜祠神人以和鳳皇來儀後來作者不復知頗聞仙人王子晉好作鳳鳴花下吹鳳鳴幾千載仙人吹笙至今在崑崙池頭看碧桃玉振金聲過東海過東海遊蓬瀛金霄㝠㝠鬱紫清空中嘹喨迴天聲三十六帝下雲軿中有綵女數百輩玉顏如花珠珮明手弄雲璈瑤瑟來相迎相迎向何許鳳笙鳴朝玉京送李生北上李生東吳人住在東吳市手持賈誼書去謁漢天子天子白玉闕虎豹守九關黄金爛初日照耀蓬萊山願為丹穴鳳飛入五雲間莫學襄陽孟夫子誦詩玉堂空放還勸爾一杯酒與爾作離别西風吹折楊栁枝八月燕山夜飛雪君當掛席大河去我還拂袖東山岑閉門自掃石上月緑蘿樹底彈鳴琴寄倪雲林魯連有志節蹈海不復還嚴陵不肯仕歸耕富春山兩公出處雖異代千古同髙天地間我識雲林子亦是隠者流一生傲岸輕王侯視彼富貴如雲浮鯨魚未化北溟水鳳鳥獨宿崑侖丘含光韜耀人所慕才華自可稱獨步手弄雲霞五色筆寫出相如大人賦雖無天子詔書徴不失前賢髙蹈名且須快意飲美酒醉拂石壇秋月明昨日相逢碧桃裏衣上春雲照溪水别君已是幾月來芙蓉忽然江上開知君此時卧烟島而我相思滿懐抱何當借騎茅君鶴共入𤣥都拾翠草胡獨商岩紫芝老寫懐寄吳下一二知已朔風吹庭樹寒雨集楊園此時懐故舊悽愴不可言憶向吳門道挾書訪遺老兩公即相知把袂日傾倒别來今幾齡白日不留停五見枇杷樹開花拂草亭相思亂心緒搖搖無定處飄若天上雲隨風忽東去知君卧紫烟清直如晉賢手持玉麈尾相對談重𤣥我苦不得志岩居非本意寶匣劍空鳴金尊日長醉吐氣如長虹古人敢追蹤子雲天祿閣宋玉蘭臺宫奈何出門去荆棘滿中路當伺天帝醉騎龍躍雲霧君非知我深何能說胷襟聊兹寫情素非為莊舄吟擬古迢迢逺别離相去幾萬里月照魯陽關風吹漢江水宵夢不可託路迷復中止登山還有屐涉水亦有舟我心如懸旌搖搖獨亡休常恐瑤華落春風不能留豈君弗識察故此長悠悠安得白鸚鵡銜書東海頭翠管鳴春暉瑤筝弄秋月孤鸞忽驚飛哀吟中夜發鄭衛乆足貴正始誰復陳若無琴與瑟寧知古風淳南國有佳人蛾眉艷清秋芙蓉含玉露不足比嬌羞明月照裳衣清霜肅衾裯因此貞潔性宜為君子逑置之昭陽殿飛燕焉足侔别君能幾時秋葉忽辭柯蠨蛸已在户流螢亦渡河感物抱悁結容華恐蹉跎黄鵠飛青雲游魚潛緑波豈不懐契闊慰此離恨多明月照機杼不織鴛鴦羅風吹原上樹緑葉如春烟枝條既繁茂根柢亦以堅如何兄及弟骨肉自相懸漢謠一尺布民歌上留田遐心賦脊令我心已悽然緬彼夷與齊千古稱聖賢殽黽無虎跡潁川有鳳音朅來千載後此風遂㝠沉騶虞固仁獸虺蜴亦何心不念君子懐暴物良以深浮雲西北來望之如作霖隨風忽飄散汗漫不可尋嗟哉古人逺寂寞甘棠隂峩峩崑崙山秀色翠如掃白鶴銜瓊花飛入紅雲島仙人駕采鳳手弄金芙蓉青童玉節舞鸞笙半空中遺予紫金丹服之壽無窮相攜凌倒景去入蘂珠宫翡翠栖蘭苕鴛鴦上錦機物固各有類寸心獨何依春色來幾日海燕忽雙飛迎風不須入塵滿青樓扉漢宫起秋風美人感團扇褰帷坐遙夜含愁獨長歎桃李笑白日垂楊拂青絲既受春風榮芳菲同一時茍欲令偏瘁造化庸可欺願君心如日照物無恩私大運有興廢日月不停留君看姑蘇臺至今麋鹿游漢家五侯宅富貴誰等儔白玉刻窓户黄金飾驊騮一朝天氣肅霜落五花裘風華不待晚露葉已驚秋所以賢達士志不忘林丘功成身自退嘯歌常悠悠北風送王宏也宏侍親江西故作是詩以送之勉孝心之無怠亦以自見也北風凄凄河水流澌子有行舟在水之湄嵗聿云莫逺游何之子曰從父于江之西朝夕承事則莫敢違敬有訓誨以培以養克恭清温淑慎几杖子有喬木予曷從而仰吁嗟我生繄獨何心送子于岐泣涕沾襟雲兮在山亦在于谷孝抑有怠嗟矣何及朂爾君子毋爾顛覆心焉允臧天錫之祿執手於郊飲餞于洲我有話言子應不可留江水悠悠何以寫憂壊室詩嗟哉强生性卓犖超忽榮觀甘菲薄不事繡衣與朱襮獨處壊室云自樂垣墻臲卼廬傾撲棟橈由來本末弱誰復椓葺聲橐橐東方日出明屋角烏號䑕走雞咿喔春風吹花隔疎箔或墮糞溷關籬落雨濕中霤碧蘚駁傴如病鶴時俛啄强生牽船㟁上泊垂首屈骼同束縛秸莞堅坐足仍縮左右圖史列几格探賾索隠博以約汲汲鉛槧筆匪閣如發霜硎耀氷槊南陽西蜀乆寂寞枯桑敝甕寧可噱古人見道實宏廓睢盱髙堅恒卓卓豈患齷齪困屯剥孰謂後來不復作朂哉强氏之子恪欲爾心志無隕穫苟能用此充而擴天地于吾一橐籥還復氣餒頓錯愕夢寐完美心灼爍雕墻峻宇豐醴酪若此安足置齗齶朂哉强氏之子恪春日對酒暄風蕩四極萬物皆涵春造化茍無私吾復憂賤貧衰榮各有運生死仍相鄰百嵗但勞苦胡不㑹其因對此一壺酒情性亦所忻同飲乏故舊鄰曲二三人既醉即就睡頽然忘我身淳源散已乆舉世失其真所以靖節翁自惟無懐民素抱委窮達邈哉難具陳送蔣士元歸秣陵得麗字伊人倦游歴逝將從歸計借問將何之秣陵有故第六朝乆湮蕪江山固非異悠悠傷古昔耿耿抱離思曜靈倐西馳川流復東逝人生匪金玉容顏豈恒麗對此心悁勞握手不忍棄芳塵初歇席迴塘轉艫栧音容雖已遙念念孰可既惟當慎所朂貞白乃吾志對雪懐張山人廬山雪凌亂暫宻還復稀縈空下脉脉著樹弄輝輝咸言綃幕覆復道玉塵飛野薺隠凍葉園梅墜夕霏悵予忽無緒對酒念暌違所欲駕髙榜嵗暮託因依先看王孝伯行披鶴氅衣題强都司燕喜堂堂上南風四月初隂隂榆栁䕃前除寵恩壽母尊榮盛㫖酒嘉賔燕樂餘窓近果園秋有橘門當溪水晚多魚閒情自可幽人賦孝友須看太史書送楊子固赴江淛鄉試因挈妻子歸閩中楊君才思山泉涌戰藝文塲力有餘雁塔定應題姓字鹿車先挽到鄉閭江連百粤風濤壯霜落三山草木疎看爾明年天上去杏園花發早春初題滄洲詩巻後騎鯨東海上豁然形神清仰看中天月逍遙吹玉笙凌晨歸返三山住銀闕珠宫渺烟霧東風吹亂碧桃花化作紅雲渡波去草堂雅集巻十二

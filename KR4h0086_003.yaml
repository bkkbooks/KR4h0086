body:
  text: 草堂雅集巻三元顧瑛編張天英字南渠温州人酷志讀書二十年通貫經史徴為國子助教性剛方不事趨謁再調皆不就游西浙多居吳下放肆為詩章尤善古樂府皆馳驟二李間時人多愛誦之與予最為友善凡有所作必馳寄草堂自號石渠居士云題萬竹堂芙蓉城中開紫府華盖飛飛翠娥舞仙人宴坐碧雲堂朝發蓬瀛莫𤣥圃昔將簫管御風吹散落人間鳯皇羽氷夷夜失珊瑚枝白日滄江啼黑雨龍賔十二行玉驄青士三千射金虎我欲從之游脫冠掛神武乘彼雙飈輪攀天叩天户願持萬丈竿為天掃塵土亭亭此君節何由獻明主紛紛鷹犬人徒費銀黄繫三組君不見古之仙千嵗一歸華表柱下視世人何足數題温日觀葡萄四首天末驪珠洒翠虬向人飛舞入瓊樓西風吹醒瑤池夢笑指青山似貝丘右風月宫仙子下瑤壇帝遣山中采木難夜半龍来作人語蜿蜒影上碧忩寒右月古根蟠結大宛西魚目搖光亞玉題舞劒醉留今雨客龍髯顛倒碧蛙啼右雨馬乳離離竹尾斜日西檐影落龍蛇醉中長記乗槎老教與仙人釀紫霞右霽題李息齋畫竹一枝十年不見李青蓮幾度溪頭共醉眠寂寞一枝江上影翛翛龍尾拂蒼烟識張魏公書心經後我家驪珠三萬斛閟在滄海之龍宫紫岩老仙補天手攀龍取日扶桑東袖握湘臯三百顆夢回山寺談空空赤氣浮江貫星月正色凜凜摩蒼穹千載幽光照人世海神出水啼青松題趙子固三香圖昔時我在桃花源羣仙呼我游崑崙飛佩凌波出湘浦月明同醉羅浮村江頭小白效矉者瓊蕤暗結心嬋媛紫皇召還蕋珠闕十年謫隠蒼龍門道人神游碧雲裏染霞能返三香魂玉骨千霜蛻幽影輕烟半濕鮫綃痕翠羽紛披向人舞金杯勸我開芳尊閬風迢迢隔銀漢安得下土同靈根海國天寒忽相見瑤瑟載鼓花能言思陵石詩黄帝騎龍去不還玉笙鶴上北風寒孤臣獨有心如鐵斵玉鐫詩泣露盤王宇玉手帖西漢文章二百年龍盤親賜蕋珠仙巫雲夢冷金壺墨誰補東南一柱天武陵春曉曲書于玉山佳處武陵春曉花冥冥漁歌蘭枻搖殘星溪涵山氣緑如酒幽禽啼破松烟青天上時聞鳯皇曲金門飛夢人初醒長嘯銀臺月中落空翠著衣香霧薄忽見安期蓬海東劍佩從風降𤣥鶴陽烏銜火懸扶桑袖巻紅雲朝帝旁手攬龍車覩天光下視蟻國空千霜題趙翰林畫立仗馬瓊柱花雲繡勒春霜蹄新刷紫霄塵月明曽弄瑤池影天廐傳呼五色麟題張涯描乗鸞月仙素女乗鸞月下飛飄飄環珮語相依帝家曽識乗槎客笑倚天孫錦字機題趙翰林畫蘭吳雲楚樹碧離離手折瑤花半醉時秋佩影搖湘浦月鳯皇翅冷玉參差題李龍眠畫衮塵馬明皇最愛玉華驄衮衮芳塵綉嶺宫一曲落梅驚起舞風摧龍翼戰塲空用玉山韻呈杞菊翁即陸静逺也識人須識元紫芝半生江海来何遲九天雲冷下孤鳯要借碧梧棲一枝送陸静逺教授徽州太湖流水清且碧衝波直上新安驛蓮花博士酒千壺芙蓉仙人劍三尺劍拂浮光盡西去酒瀉青天秋月白甞聞黄鶴山自古仙靈宅三十六華峯邈與世塵隔古鼎待軒轅于此鍊金液亦有小桃源長醉騎鯨客洞空閟煙霞夜嶺飛魚赤爾来五百年猶存釣遊迹君居廣文館相看足朝夕我欲與之俱雙翔鳯凰翮君不見紫陽夫子生其間言論惟應夢前席多士時登問政臺會吐胷中治安䇿君不見昉溪村上亷史君俯仰江山慨今昔歸時一棹輕鴻毛須載數方龍尾石題王景南山木圖千年古樹立蒼石三峯兩峯天出雲青溪道士坐船上自按玉簫人不聞題郭天錫畫古木木落空山憶五君髯虬飛影拂𤣥雲幾夜烟蘿月中立醉歌時見郭將軍題蒲萄竹筍圖王母初来漢殿時青鸞踏折掃壇枝天風吹老龍珠帳挂墜瑤簮醉不知題五王對博圖千官朝退下昭陽花萼樓髙碧樹香一擲乾坤呼五白玉人催進紫霞觴題李遵道畫古栢古栢亭亭一虎臣風雲長遶卧龍身石根霜榦心如鐵欲向曹瞞掃戰塵題李遵道畫松蒼髯鐵爪欲飛揚肯與人家作棟梁記得石橋明月夜一溪龍影茯苓香夏日寄王山人赤日行天氣欲焚樹根羣蟻正紛紛道人心在羲皇上睡穩青松一枕雲水仙操美人兮湘之湄駕白波兮驂蒼彲瑤佩兮冉冉翠旍兮離離紛昭質以遙睇兮夢靈修兮九疑逺别離桓山禽逺别離養汝羽翼長嵗莫將安之路難不顧返横絶四海湄昔年鳯死百鳥集白日哭弔聲悽悲賢聖聞之淚亦墮古人胡顔掩虆梩别離苦天夢夢孤墳萬里冠帶蒿蓬一劒挂樹哀鳴求雄寧辭父母體化為西飛鴻呼天泣以血月墜青城空山頭還見月東出何時見我泉下翁吁嗟乎蒼穹題石湖手帖五湖水遶城南邉愛湖老翁船上眠桃花出塢如火燃煉石去補東南天夀櫟春風五雲牋薛濤奉硯中書前翠蛟白鳯相蜿蜒瑤海細浪飛青烟見者如登羣玉府世人寳之賢十部翁攬龍髯天上下帝遣主司修月户笑殺猴冠餌秦虎朝拜金門暮黄土題釣月軒武陵溪上釣魚磯白雲青樹秋暉暉長竿倚石月初上新水滿池魚欲飛清郎笑奉長生籙夀客看舞斑斕衣風流一散何時見夢繞竹林行翠㣲題玉山草堂桃花溪上讀書亭海國光搖處士星三月東風迷錦樹半天南斗射青萍誰騎仙鶴吹笙過自醉山花枕石聴多有故人麟閣上帝前應說草堂靈畫山水歌題米元暉巻我有山水癖由来好幽棲十年游雁蕩五年游會稽或言秦王昔時愛仙術驅石下海如鳬鷖洞口誰来斸龍耳驪珠夜照天雞啼三峯參差九華老蛟龍鼔浪方壺低醉墨淋漓落吾手咫尺萬里雲淒淒初疑巨靈擘開翠巖濕馮夷擊碎青玻璃义疑劉阮雙行赤城下漁舟棹入桃源溪對此長歌發幽思便欲著屐来攀躋我家碧山最竒絶緑蘿萬丈縁丹梯憶昨金門拂衣去自種青松與人齊幾人欲畫畫不到惟有四時雲月可以相招攜吾負碧山此為客何異乎巢由軒冕行塵泥從吾好歸来兮題趙子固墨水仙青竹珠簾人似玉霧鬢風鬟綴靈粟一笑誤翻金叵羅香濕羣仙六銖服龍國朝回八風舞鳯池醉度凌波曲瑤瑟雙歌李白詞馮夷捧出蘭縑緑題趙翰林畫蘭水仙瑞香廬山仙人驂飛鸞翠雲之裘紫霞冠馮夷如花玉為骨龍綃抽巻清波寒湘客泠然水蒼翠紉以瑤舟雜珠琲月明攜手燕霜都當歌醉擊珊瑚碎帝將清氣結花山人自乗風夢鯨背徒勞王子晉老淚濕瓊簫年流物化人可招影落水花天星搖君不見銅駝道五陵桃李門如掃又不見龍芻草馬俠氣蹴崑崙倒我知雨露元不私蒲柳生來易衰槁願君採幽芳托根鳯麟島䕃彼三素雲瑶草琪花不知老題凌波飛盖圖蕋珠宫人駕雲軿山中翠盖何亭亭老龍飛騰作風雨八仙池上争娉婷金環瓊珮裛㣲露雙成躡墮青鸞翎酒星入水化為石寒玉夜語天泠泠白瑤城闕三萬里月照湘娥行洞庭題光風轉蕙圖蕙乃蘭之族一枝三四花誰將金莖露煉作紫河車白鶴銜之去飛獻玉宸家飄掃紫雲帶光風茁其芽吾將攬為幄山中卧烟霞題髙尚書青山白雲圖仙人中有琅玕樹吐作千峯落毫素峰上蒼蒼一尺天峯下雲行亦無數因憶曽為天帝客家在白雲深處住白雲隨龍飛出山我亦攀龍躡雲路青山笑人不早歸大笑龍為雲所悞變化無定端飛揚為誰故試問古共工何勞不周怒飄飄巢止翁肯受風塵汚安得兩齒屐載我逍遙步醉卧青山看白雲莫嗔老子来遲暮題竹石圖仙人手持青琅玕擲之飛上蓬莱頂玉簫綵鳯雲中鳴龍影醉眠山骨冷曲水辭羽觴汎曲水水性非自然紆迴白石中玉色何娟娟春風修竹下清流映羣賢揚波折瑤草逺寄蘭亭前侍從闕平苑歌闕平城中白日光太行迢迢萬里長黒金天柱上雲漢銀鞍鸞轂隨君王步輦龍樓宴苑西是時宫人醉如泥簫韶擁出瑤池路翠盖優游拂宫樹千官萬姓歌太平雪眉山人入山去浣紗曲溪頭浣紗女素足弄清波緑忩費纎手鳴機不停梭織成絺與綌貴之如綺羅持此寄逺客思君心緒多莫折花莫折花折花損新枝結根同美好忍此生别離不如坐花下長醉春風時玉泉山玉泉之水金為扉北風捲葉山無衣白馬雙行緑雲路渺渺秋蕪起烟霧姮娥有時騎白鸞弄水滿手驪珠寒老蟾泣中夜露滴飛盖鳴琅玕姮娥上天去一碧光搖鏡中樹石潭風雨忽驚人乃是神魚化龍處贈臨江潘雲谷玉笥山人入天禄遺我山中之𤣥玉鳯咮池頭風雨腥金霧青烟眩人目玉案蜿蜿蟻化龍夜黒雙龍啼入竹李白醉坐七寳牀噴洒驪珠三萬斛天家一顧人共知𤣥香太守潘雲谷靈岩寺千峯秀出青蓮宇下界神龍走風雨帝遣靈鼇戴此峯来作中吳天一柱吳王宫雉結浮雲日日西施醉歌舞春風館娃樂未終敵人隔江甞膽苦夜半越師溪上来翻手繁華化為土硯池鳥下泳青蘋樵路幽香来秋塢昔時寳屧響瑤階誰信荆榛上修廡惟有琴臺石峩峩似蒼虎吾將煉成金天髙不可補飛閣當天開五湖三江入忩户君不見鴟夷子浮沈兩國烟波裏屬鏤讒鋒固莫辭耻雪夫差肯知止肯知止今人寧無鼎鐺耳奈何古之人九泉呼不起酒盡平蕪三萬里金陵行金陵城頭生紫烟金陵水立東風前神山蜿蜒行入海白日化龍飛上天十年不見吹簫侣丹鳯深巢惜毛羽仙子天端騎鳯来衣上斑斕碧桃雨碧桃如霞浮夀觴秦淮之鯉數尺長林鳥回翔集庭樹華峯特立天中央君行出門無百里中道嗷嗷塞人耳霜風洒筆山岳搖夜半飛章奏天子八月望與項可立約游石湖是夜月蝕又雨次韻就約王山人明日同游黑雲出山雨交加太虚倐忽生疵瑕瓊樓瑤鏡不可見但覺銀海浮𤣥華長思昔年玉川子作歌發憤刳妖蟇不知三萬八千户此時何處相邀遮我欲攀天躡天柱御風飛步蓬莱家蓬莱揚塵水如墨凍蛟化魚口呀呀獬豸從来不識字努力自言能觸邪遺我白兔所搗藥酌以金尊之紫霞萬古清光終莫掩二國自戰空牆蝸酒醒忽憶五湖寺亦有中頂仙人茶明朝與君買船去上山采桂窮幽遐子晉吹簫圖仙人石上試吹簫引得青鸞下碧霄長記緱山明月夜醉歌拍手待王喬仲容摘阮圖林中常憶仲容賢水底龍吟阮上絃彈破白雲飛不去化為盤石已千年送琦元璞參雪竇客鄉送子上吳船歸心直上鄞江邉五雲中峯夏欲雪二月西陵花滿川近海家家白鷗集好山樹樹青蘿懸銘公林間紫霄鳯與我交游三十年錢塘懐古次髙則誠韻錢塘湖上海門深千古靈胥恨未沈北斗文星長黯黯内園官樹尚隂隂承華殿冷西人語太乙壇空上帝臨月黒鄂王祠下路風吹青火出山林送陶教授還台州廣文先生賦歸去天台此時花正開月行舟上山水白人散江頭風雨来燕雀争鳴碧玉樹麒麟不上黄金臺何如門前五楊栁日日青絲吹酒杯鼇峯寺石道青蓮入翠㣲金鼇海上數峯竒樓前風滿潮来急檐外山髙月到遲僧語夜深松子落客吟春盡野花知日西又立谿橋馬呼酒長亭唱栁枝石菖蒲贈胡府史九疑仙子贈靈苗兼署瑤臺水石曹人說見花能富貴誰知存節更清髙㦸髯香拂驪龍頷劍脊寒生翠鳯毛緑髪老翁多好客采根餐玉嚥松醪烏夜啼城頭烏夜啼月白薊門時朝陽借光彩翺翔鳯皇池春風黄金樹結果在髙枝中心懐返哺還向故人飛貞女吟甞聞漠宫人恩深妬還重自憐氷雪姿肯戀金屏寵春風吹倒山妾心終不動羞死王昭君玉顔沒青塚郎亡金郎亡金持者誰十年同舎難相知不疑肝膽似氷雪仰天吐氣摧雙眉古人重交情黄金棄如土奈何今之人身為黄金苦結交心不同須防未然絶何時郎得金白圭之玷乃可滅白門栁白門女郎若楊栁舞衣深勸金陵酒青絲素手結同心沈醉東風回馬首紅袖掩啼痕請君聴妾言栁色年年好玉顔豈長存柔條不忍折妾意與君恩紛紛花落青春莫雨暗長亭空斷魂歸燕曲春寒吹北風吹送青雲燕歸心與去舟乗風似飛箭愁殺倚樓人淚滴如花面烏衣自有家夢斷昭陽殿栁枝詞江頭好風日楊栁參差青柔條為君折行歌出西城江流二月碧如酒木蘭之舟天上行欲别不醉難為情妾命薄買臣昔未貴樵薪任飄泊中道行且歌安貧以為樂去婦不卹家憂怨將安托寸心難自持但恐委溝壑明年五馬還錦衣照城郭君子身已榮妾命一何薄水覆倘再收恩情豈如昨果然節義風因之日衰落相勸酒送黄進士還吳黄夫子將歸于吳聴我歌龍門緑桐之瑟酌君以蒲桃碧玉之壺西登髙臺望山氣扶桑半逐秋風枯𤣥雲如車軋層漢聞弦之雁驚相呼君不見斬衣許君命丈夫何其愚抽戈事不立枉費焚妻孥二豪已成土徒令後人吁豈如魯連蹈東海千金棄擲毋我汙昔時我亦髙陽徒相勸酒歸乎吳折楊栁送陳良還山折楊栁送君歸君心似流水栁色空依依昔時九烈君為君染裳衣黄金千萬縷難補天孫機張緒風流今白首别有新人似楊栁富貴何如早還家葛巾自漉山中酒折楊栁為君歌兩雉朝飛春日和栗里春風門巷多人生莫惜朱顔酡前有尊酒一首送朱秀才之慈谿小忩一夜梅花開天風拂拂從東来仙人乗風忽相遇飄然便欲歸蓬莱且盡花前一尊酒玉簫瑤瑟重相陪與君俱為異鄉客請君當歌共銜杯共銜杯惜君别明日西陵浪如雪聴唱吳趨曲送君慈谿去春風二三月十日慈谿路有酒且相歡毋令白日暮昔時我到天台山山中二女花如顔邀我碧桃花裏醉乃知此地非人間去君家亦不逺願寄一書謝劉阮久别離送栁韶之西安久别離長相思溪頭楊栁樹十見黄金枝枝長花飛如白雪心期暗結東風知東風吹花化為萍一夜浮游滿溪水滿溪水到天池萍亦因之幾千里何時萍實成與子乗舟泛蓬瀛玉几山月歌送映石室住育王寺我家東海頭長見東海月聞說玉几山山髙月如雪今年八月天早寒夜夜清光照人别中有桂樹之古香下有蓬莱之宫闕石室之仙人乗風汎溟渤手弄珊瑚枝長歌擊龍鉢羣龍趨還爾赤水之𤣥珠珠似月明天在水美人迢迢隔千里東湖明月隨我歸照我上山攀玉几題玉山中所藏趙千里畫金碧山水圖天上白雲滿空谷樹下三間兩間屋𤣥晏先生不出門自檢殘書手鈔讀醉翁斜帶紫綸巾過水呼童馭黄犢犢背之樂不可言王孫寫入氷綃幅君不見戎車起戰塲秦王失其鹿笑殺當時園綺翁白頭去謁隆凖公題玉山中錢舜舉畫五栁莊圖飛泉屋後銀河懸孤松屋下蒼龍眠四山無數白雲出好栁五株當門前葛巾丈人步其下悠然别有山中天題三笑圖我思廬山三十載喜見虎溪三笑圖逺公愛客不愛酒陶令愛酒無錢沽黄冠道人愛譚道握手顧盼成盧胡乃知古来賢達士出處自與常人殊君不聞東晉英雄數周顗對語新亭泣新鬼題二喬圖喬公二女如花顔玉宫仙樹參差間鳯裾鸞書明月環寳釵壓墮青雲鬟手撚丹霞染天章繡屏曉卧珊瑚牀石鏡山前瓊草香春風蕩漾紫鴛鴦嬌歌雙笑蘭烟蒼中軍留醉牙帳光回頭兩鬢飛秋霜題趙子固畫水仙花四首水仙花上雨垂垂絶似華清賜浴時况是親承恩澤後托根只合在瑤池雨氷肌冷浸六華香姑射仙人試曉粧門外玉京天咫尺金璫瓊珮謁明光雪海上羣仙駕八鸞翠華裊裊玉環寒臨風似學回波舞要博君王一笑看風仙子騎龍出水瀕雪衣飛動月為神停杯聴唱凌波曲笑醒東都夢裏人晴遊簫臺寄李五峯簫臺天髙山氣寒瓊樓倒景金沙灘露洗長松翠蛟泣曉風吹瘦青琅玕仙㳺王子今千載簫去臺空山不改石梯竒峭石蘿深東望蓬莱隔滄海華表棲塵鶴未歸燒丹竈濕蒼苔衣木落鏦錚下鐵壁紫岩桂落香風飛雲門道士相迎送五色芙蓉滿溪洞生平屐齒能幾来回首十年如一夢客鄉遲莫秋復秋故園淚滴黄花愁長繩難繫西飛日彭殤蟻垤營荒丘雪瀑洒巾清入骨烟霞杳靄孤鴻沒世人倐忽不可期獨酌芳林勸明月題南極老人像老人爾何来年貌一何古身披五雲衣徜徉步瑤圃自言南極星乗風来帝所冉冉青鬚眉玉顔如處女仙鹿御之行仙禽導之舞忻然願相從授以長生語但恐塵世中嵗月不我與何當駕飇輪與子共髙舉船上燕姬燕姬倚嬌色珠帽絡金花半醉玉盤面雙鬟雲影斜水邉忽自笑眉目艶春華芳心為誰發翠袖拂琵琶宴鄭明徳與袁子方張伯雨得落字東家白雲翁載酒青山郭相招竹林彦坐對春風酌一花飛入樓泛我銀鑿落醉步松月歸令人夢孤鶴桃塢吟與項可立寒食同游客鄉見寒食因作桃塢游桃塢年年發春色館娃香逕隨風流羅敷采桑隔緑水漁童小海歌蹋舟三五丫鬟不知醜紫花紅花簮滿頭欲開未開竹旁户見我白髭佯作羞羞顔微破背人笑自言此客曽來不側聞槖駝語此客寧爾留太白老元丹丘玉尊錦瑟春風樓南江隠者歌我見滄洲外軒忩浮碧虚初行桃源徑漸入崑崙墟松似人而偃蹇竹款客以扶疎青林樹樹白雲葉春風春水金鱗魚漁舟相問此何處乃是江南隠者之所居􅜁川圖畫滿四壁堆牀𤣥晏先生書阿㜷鶴髪坐堂上山妻勸酒兒牽裾赤脚井臼蒼頭耕鋤有田可稼有畦可蔬富雖不足樂有餘笑彼孟甞客遑遑歎無車不學郊與島衝寒出騎驢君不見鹿門老子所以不肯入城市彭澤棄官歸故廬眼中欲得如此二公者舎吾與子其誰歟贈相者薛見心門有醉李客手持一詩巻自道見心名雙眉炯如電見心須見天地心人心不同有如面且如我輩山澤人握手笑談心便見緑眼王孫作大官吾子見之心亦眩巢夷顦顇跖蹻賢安得遭逢堯舜禪勸君酒聴我言人間萬事何足論與爾且醉花前尊老馬歌花驄老病情頗惡十年不受黄金絡日挽重車筋力盡夜齧殘芻牙齒落鞭入溝中化為土駿骨崚嶒瘦如鶴牧夫垂涎葬人腹春草未青池水涸伏櫪長鳴兩行淚北風蕭蕭捲沙漠題張叔厚描夀陽公主梅妝圖正月七日含章殿落梅吹花香撲面玉人睡起猶未知重理新妝鏡中見花如玉貌多嬋娟三十六宫都學徧城中醜婦不解羞采花自㸃雙眉頭𢷬衣篇抱杵下空階凄風何弗弗丁丁石上聲愁死深閨月白露滿銀牀絡緯啼不歇青燈鑑孤幃凋盡如雲髪此時邉塞間嚴霜砭人骨妾心似重繒熨之伸復絀裁斷又縫聨短長仍彷彿雖無黻繡紅是妾手中物所思在征衣寧知衮有闕衮闕補無因沈憂遲明發再拜使者言聴妾訴幽鬱但願早休兵東南民力竭慇懃致尺書目送飛鴻沒題顧進道所藏西園雅集圖西園緬邈天中開仙山渌池異蓬莱翠葆翛翛拂花去傳迎都尉朝天回寳繪前榮日初旭一時冠盖如雲来玉案離離發天藻瑤姬催獻流霞杯松下羽衣絃似語烟霓搖艶金銀臺興酣飛筆洒元氣岩屏贔屭寒欲摧幽賞羅衆賔石牀浄如拭想像栗里人青林映顔色緇衣者誰子入竹坐深黙眼中綺麗何足珍回首秋風化榛棘君不見金谷澗龍鱗池木妖石怪中藏禍機吳歌楚舞顧影悽悲丈夫不愛士富貴空爾為徒勞玩物志但為後人嗤何如巢居抔飲得真意年年嵗嵗羲農時芭蕉士女為愛芭蕉步玉除雲根飛翠濕霞裾蘂珠宫裏歸期近懶把芳心葉上書瑤島春隂翠靄明玉顔彷彿見飛瓊幽懐自厭黄金屋閒向芭蕉花下行酬庫庫秘監青烟竹外煑金芽更對山人酌紫霞半醉東風催上馬一身香雨濕宫花太液春深緑水濵後宫新唱栁枝新黄金不買長門賦醉酒花隂睡殺人石菖蒲為子庭作氷夷出海獻珊瑚帶得鮫人數葉須今夜九疑仙客到滿衣風露濕𤣥珠洒筆能招壯士魂春風芳草憶王孫何人擊碎連城璧留得衝冠髪數根鄭元祐字明徳遂昌人書無不讀肆意詩文前不讓古雖在隠徳與館閣虞馬並稱于時予從㳺既久凡所作多得云吳桓王墓有吳桓王之墓田乃在盤門南郭邉墓中玉鳬久化土石上赤烏猶紀年寒食無人洒麥飯東風滿地飄榆錢功昭前王啟吳祚葬地合擇名山川闔閭城南不百步土薄易致耕夫穿昭紘諸臣號詳宻慮不及此寧非愆緬思山東舉義日郿炷頋已無諸賢惟王父子起相繼黄星閃避東南天假之修齡定四海許下豈容瞞著鞭鑿山掩匠等發掘朽壤一坏誰獨専白楊蕭蕭北邙路姓名能得幾人傳登鴻山弔梁伯鸞我以饑驅爰適樂土居近山麓山名孔膴問之父老曰漢伯鸞父甞登兹山覽歴平楚因以名山義匪誇詡我行山棲兹豈其所敬弔夫子願嗣徳音鳥棲擇髙魚游擇深夫子當盛時尚投朝簮顧與徳耀傭舂是任杵臼和樂雝雝瑟琴上揖唐虞下混古今而我肱折不知息心年登知命尚浮尚沈聖域緬邈世途﨑崯矢將從夫子投彼深窅既齊物我兼忘昏曉萬里非曠一隙非小毋曰昭昭示人皦皦聊從兹逝以謝膠擾夫子不我違終我身是從蠅附以驥蔦施于松有薪朝炊有稻夜礱長子老身真情是鍾優哉悠哉歌以相舂送沈仲說錢唐湖上水西頭歴歴山人舊釣游相府猶餘秋水觀酒旗多樹夕陽樓春喧車馬松間寺夜載笙歌月下舟見說東陽近消瘦須如白傅半勾留送張仲賢北上海上人家亦壯哉逺潮平處是蓬莱道人宫闕天晴見龍伯衣冠霧裏来東日欲升長照檻北辰在望每登臺鳯麟洲近天光宻鳷鵲樓髙雪霧開論治儒臣工獻納當陽聖主急賢才貢琛還見柑登爼讌席仍聞樂奏陔過雨緑蕪連地逺翻階紅藥倚雲栽故人若問滄江老為語窮愁絶可哀送達兼善祕書依天髙拱夜何其翠被初寒更漏遲上帝録書藏紫禁貴神燃火出青藜懸知策府稽諏處預想虞廷獻納時厚報函盈荼蓼頌湛恩汪濊蓼蕭詩豈徒述作矜雄艶政以都俞啟蔽虧國是每濡雙賜筆鼂光長發萬年枝從容寳録開金鏡縹緲祥烟度玉墀儒術致君還有道皇明鑒物本無私廟謨已發羣經秘巖穴寧令一士遺歌咏太平還有待腐儒頭白竟何知月氏王頭飲器歌穹廬野布諾水東大旗之下單于宫甲光五色馬如蟻列屋層氊嘶朔風月氏降王昔授首圓顱啟封出盛酒金屑闕露刀撓以留犂不停手漢國使者㰱血盟大邦氣與虹霓争當時老將天驕子控弦西射金天精數級論功濺腥血劍花交簇隂山雪飲至龍廷醉蹋舞一巵倒注陽靈穴哀王之歿同智瑤帝閽盍遣巫陽招魂招不来守之泣恨結𤣥雲貫寒日送章髙士入閩兼柬杜清碧先生風日晴繅楊栁青翩然獨鶴過南溟山中每憶羅公逺海上重逢武達靈榕葉擁雲山似簇蠣房烹玉酒初醒小冠子夏如相問為話窮愁老一經次韻陳子言花蕋迎春紅漸肥燒痕傷旱緑全稀涸陂未下雙黄鵠空谷何嫌一布衣仙掌玉腴甘露降齋房芝嫩采雲飛徳星會向良宵聚只恐山人取醉歸次韻劉憲副春日湖上有感五首庾信哀多賦漫成江南文物久晨星市衢火後蒿横目民舎春来草滿庭浪齧湖堤官栁盡沙填江浦夜潮腥歸来何異遼東客只有西山慰眼青湖水西邉舊是家春風繞屋種梅花傳聞故老談遺事愛教仙人服㓜霞鶴老離巢松化石鸞孤照水竹穿沙只今重到經行處憔悴蕭蕭兩鬢華潮落空城誰重過猶餘里耳聴鳴珂襄陽耆舊知誰在江左風流不厭多自見石麟眠枳棘長聞蜀魄叫松蘿野梅開盡西湖雪萬斛春愁奈爾何湖水荒荒寒食天相逢猶話國初年紅樓夜唱花間席翠管春吹月下船𤣥圃自應留富麗湘雲誰為惜清妍可憐頭白歸来日井邑凄涼生野烟青苔寺裏客来稀烏石岡邉僧自歸金雁嘈雲春不去玉魚衝雨夜曽飛出門每歌月皎皎製佩莫惜芳菲菲人世何由比金石嗟我欲把東皇衣次韻錢伯行游仙體律詩二首海定神風湛緑羅仙人辭藻寄来多貫珠音在雲誰遏琢玉文成手自磨憶昔絳河輕就别至今黄竹不成歌可憐人世書裙手池上猶籠道士鵞軋軋青牛擬度沙煌煌白兔豈無家肉生徐甲符難秘斧鈍吳剛桂始華諦授寳書盟刻玉醉離瑤席舞傳芭竹宫望拜真癡絶日日韶光在景霞送劉彦之髙士還江東倂柬張一無尊師劍寒秋水客東歸堂上慈親白髪稀櫑具定無璊玉璏綫痕猶是紫烟衣蜂營崖蜜花争發鹿養春茸蕨正肥自古山林有甘膬何妨物色報春暉為問京東張道士著書還了致柔篇江湖冷落番君老雲漢昭回象帝先芋火夜煨霜後葉菜庖朝汲澗中泉相依共住知何日孤鶴蹮蹮意惘然送何景文郡國推何武江湖老鄭度世儒方藴藉詩律尚清妍宰相才難得文章妙莫傳歸耕釣臺畔蚤寄白雲篇送楊季常揚子談經處吳公學道祠宫牆紅靡靡庭篠緑差差演迤詩書澤冲融雨露私草𤣥心獨苦稽古力難支二載平生學諸生去後思簡書猶可試匠石詎能遺霧豹方深隠雲鵬豈後時會看清白吏勲業著常旂催花雨陌頭㣲雨細皚皚陌上小桃紅未開盡日已催梅破蕚向陽還迫草抽荄長鑱早與栽黄獨深巷時須步緑苔只恐晴明花發盡須教梁燕早歸来生香亭方看幽草動區萌便有交枝囀谷鶯樹影齊圓日卓午蜂衙欲罷雨初晴青摹屋角山容出翠養牆根石髪生自為新来作詩瘦隠侯元不負閒情翠雨亭竹梧亭子翠珊珊人在空濛烟雨間春莫但聞鶯百囀秋隂每見鶴孤還且看樹頂停雲碧莫踏苔花滴露斑如此林廬不歸去髙情誰與共蕭閒陳栖山棲遯青山深復深尚爾跫然聞足音雞鳴樹顛客叩户水流花開風滿林身拜東皇撫玉珥首峩南冠彈素琴一聞招隠淮南賦便將飛屩度千岑贈岑醫經絡多岐脉貫身顛厓性命属誰伸如生獨得岐黄秘起死能兼郭華神龍獻祕方長繫肘虎巡熟杏不傷人懸知此道無疵吝花發鳥啼隨處春春游石湖越来溪上水融融閒驀鴟夷棹底風暖霧黄消治平寺燒痕青入館娃宫笙歌作樂年年少魚鳥闗情處處同弔古由来易興感尚循華髪繫孤篷題楊妃上馬嬌君不見華蕚樓前上馬時君王忘是夀王妃龍顔含笑待持控海棠睡美春風吹繡鞍嬌凭翠袖冷金鐙擬跨絲鞭垂宫鞾拍鞍欲馳及簌簌步搖危不知六宫窈窕千蛾眉並乗騕褭黄金羈芙蓉濯露總殊妙雜遝綺羅知謂誰獨擁玉環何所之聨鑣欲向華清池雙龍齧膝踏花去錦香覆滿紅臙脂從官車騎空瞻望並肩私語行遲遲行毋遲遲日已西漁陽鐵馬崩雲追纔出都門便别離千古萬古令人悲再拜能忘臣甫詩西馬圖西来萬里氣如雲便䇿天閑第一勲此日登歌薦清廟于今能得幾人聞仙人訪隠圖霞光樓觀仙人宅苔色林廬隠者家萬壑千岩何處是停驢試認碧桃花風林舒歗圖舒歗風林秋滿蹊白駒空谷草凄凄相逢不作蘇門聴應有長松鶴未棲溪岸濯足圖濯足清溪水已寒青山猶有此衣冠黄塵三尺烏鞾底誰與歸来把釣竿松石髙士圖松樹連山山石幽蕭然冠履白雲秋只愁畏壘無尸祝不憚長年為爾留東坡笠屐圖得嗔如屋謗如山且著蠻烟瘴雨間白月遭蟇食不盡清光依舊滿人寰山雪齋山中太古雪玉光鬱㠝岏積之非嵗月坐而閱暑寒純白既不變空明量非難懸氷松梢墮危石澗底蟠維時古真人首峩切雲冠憫世方内熱憂喜虧其完燕坐以觀復一念萬劫寛問之何因爾笑指青琅玕寄李大本兼柬理江隂不見李丹名父子澄江日日水煙中角聲古戍凄霜月暝色孤帆亂渚鴻苜蓿闌干朝采上蒹葭零落嵗華空登髙能賦陪熊軾却是窮吟倚北風送楊季民采詩還江西悲涼南國采詩歸大雅寥寥入譜稀白馬尚誰歌有客綉裳猶自賦無衣離鸞顧影秋彈瑟舞鳯銜梭夜織機緝録已成垂世教珊瑚枝上看朝暉題仙山樓觀圖嵯峨三神山仙聖之所居芝草為樓觀霞光曳衣裾渇飲碧柰漿饑食紫琳腴霓旌冉冉下八鸞馭其輿青童啟藏室帝命校寳書齋心始得讀字字皆𤣥樞朗咏以相授靈風舞神魚天逺不得聞何以能啟予空瞻珊瑚枝日照耀金衢錢氏東樓飛樓百尺堠山西長日看山不下梯簷樹午晴烏鳥噪井梧月上鳯皇棲翠娥度曲繁聲換緗帙垂籖細字題何處一聲樵子笛隂隂桃李緑成蹊送峽州學正夜雨西陵樹春風至喜亭學宫資啟迪士類仰儀刑天險開三峽人心繫六經哀猿月中嘯莫作異鄉聴題蘇武牧羊圖飛鴻歴歴度天山何處孤雲是漢闗不滴望思臺上血君王猶及見生還題梅影圖昔者山人住杭州和靖祠邉水東流先人敝廬與祠近取徑政在山之幽生平梅花三百樹無復春風一樹留荒烟野花開躑躅落日林樹啼鵂鶹黄昏娟娟湖裏月每為香影含孤愁長懐此花氷玉質無之自足令人羞眼明波間雙白鷗亦復與世相沈浮不見梅花已凄怨誰吹笛聲湖水頭青山難聞楚人調白髪易感商聲謳吾廬亦豈能自愛種梅遶屋寧嫌稠二十年間屢易主歸魂每夢花間游因觀此圖重歎息萬事何異水中漚知君斷非充隠者卜居梅花善自謀我獨漂零江海上悠悠千古一登樓送季山甫慈湖教諭季子揚舲之甬東慈湖應與暮潮通豚吹野岸楊花白鳩食桑林椹子紅遺老應傳已易說先民誰繼日鈔功悲涼古學慚頭白目送孤雲沒暮鴻答謝白馬奭公送茶玉川破屋柴門曉遣送靈苗似穀芽秀句驚看紅藥嫩狂歌起舞白題斜籃封外裹藏丹箬鼎候旁存伏火砂啜罷東風欲仙去更從何處覔三車春寒春寒肅肅過王師都出南門送鼔旗嶺海鯨鯢就誅日江湖鴻雁欲歸時參差帆葉開溪舫顛倒梅花入硯池多病杜陵頭白盡每因送客賦新詩和陳子貞見寄别来見話幽人屋此去當扶野老笻涇底魚肥春欲上牆隂薺嫩雪猶封齋庖不轢頻炊釜山屐應留醉語蹤他日孫從外家學書籖題墨寫教濃題曹松逕家譜後三逕雖荒松尚存東川遺老識清門秋香嵗發忩前桂海氣朝升屋角暾春雨丘園花結子夜潮溝洫浪留痕于今户屨知多少但說師嚴道並尊題二馬圖奚官浴馬試與騎一匹受鞍一匹嘶房星之精四飛去昭陵風雨夜凄凄沙陀義兒御兩馬正從梁晉争天下惜哉不見夾寨破楊五功名竟獨跨題許道寧溪山秋晚圖江山黄落楚雲寒野老岩棲一塢寛賣藥長安不求識如何飛墨下雲端題盧益修白描水仙花盧生吮筆寫三香海上仙人欲取將宫闕凝酥春雪霽好留屏曲寫孤芳題盤松扇頭曽障西風庾亮塵支撐根底妙輪囷屈將千丈虬龍質一握生綃敢望伸題畫山水海岳庵前萬頃雲髙深顯晦屬誰分不因此老淋漓墨那得溪山在練裙畫史誰如此老顛能融筆墨寫山川青林白石江南路何處堪耕二頃田題梅花巻此花政如黄叔度不見令人鄙吝生谷底嵗寒誰邀得白駒欹側晚烟明題柯敬仲墨竹夭矯窮鱗江海姿只今飛墨鬢如絲五雲天逺龍髯墮盡作篔簹雨後枝題趙仲穆擦痒馬啄瘡烏去夕陽西磨痒枯株振鬛嘶今日戰塲春草緑相看誰濯錦障泥題趙子昻蘭鷗波亭下楚香銷公子騎箕上泬寥縱是死灰芬酷烈巫陽誰下九重招題趙子固水仙雨帶風襟玉體寒為誰解珮在江干金支翠鈿那復得只愁歸去便乗鸞題墨山礬便面一握方諸七里香玉英如雪映春陽空山絶壑東風晚底事湘纍忘楚芳題蘭蕙便面障面無嫌京洛塵一叢蘭蕙出氷輪只疑大地山河影不照沅湘有逐臣題熊自得叢竹便面漪漪緑捲鏡中天元子何須苦惡圓萬葉千枝繁不亂化工消息儘無邉題李成枯木誰如惜墨李營丘屈鐵交柯烟雨稠記得滄江龍出蟄怒鬚捲霧拔山湫題萬竹圖逺近隂晴玉萬竿渭川何在緑雲寒硯坳飛墨如飛雨白髪蕭郎仔細看題王元章梅舊時月色有誰歌拔劍王郎鬢已皤惆悵春風舊詞筆南枝香少北枝多題顧定之竹石屋老人畫竹石後之學者森如織河源一分百派殊天下紛紛竟誰識題明雪忩蘭生公臺石比雙峩兩不為稀萬不多蘭蕙香銷荆棘裏光風流轉奈君何題趙子昻蘭石捐玦孤臣萬古愁思君日夜水東流春風開遍閒桃李却對青山泣楚囚題柯敬仲梅竹圖苔石相依保嵗寒憑誰翠袖倚闌干玉文堂上蕭蕭雨墨瀋于今尚未乾誰料丹丘不復生眼眵長向墨蹤明釣竿若拂珊瑚樹少為梅花住越城題畫抱琴船頭為誰鼔滿江秋聲荻花浦鯨魚出聴掉尾舞曲終鴻雁起江滸帝子降兮木葉下題文與可竹欲屈王郎作粲使只因蕭李與文侯尚有隂隂竹里館萬竿玉立􅜁川秋題岳家舊藏髙彦敬雲山圖千柱華榱淇渌堂只今衰草野田荒空餘寳玩誰開闔一疊雲山淚一行趙子期尚書於省幕創軒曰小瀛洲題詩要和余與玉山同賦粉署煌煌閃曙霞道山宫闕宰衡家碧梧每集朝陽鳯瑞露長滋夜合花風裏槐隂聞奏樂秋来星采驗乗槎十洲多是神仙宅誰識溪真尚浣紗玉山詩曰鳯皇池上神仙宅五色卿雲接帝家金水暖来蓬島浪紫薇香度掖垣花中天草木春霑澤滄海星辰夜掛槎聞道朝堂清議了題詩好為䕶蟬紗題鍊雪軒誰鍊紅鑪雪晴雲􅊦面旋六花吹作乳兩腋欲飛仙蒼壁龍鱗舞松風蠏眼圓如何響白石一味舌頭禪題山水扇面一握方諸鏡裏天分明雁宕石城連仙人不患蓬壺小便駐鸞笙五百年送蕭萬户還蜀四首將軍旗鼔鎮西州六詔猖狂一戰收餘墨朝猶磨盾鼻重環夜已拍刀頭歸朝却獻王褒頌去國終存季子裘醉裏相逢拔劍舞滄洲斜日水悠悠萬里乗軺出帝京涉波南海斬奔鯨回轅不困壺頭役載耒来尋谷口畊尚可班荆談智畧何嫌拾芥取功名卧吹簫管揚州去莫遣春愁白髪生總戎西蜀幾經年從事誰令爾獨賢躍馬莫矜横槊賦聞雞不道枕戈眠韜藏寳劍塵生匣愛惜琱弓夜弛弦歸到閬州三月盡江花如錦照鞍韉百丈牽江還閬州旌旗擁接舊君侯按行貔虎千年戍蹴踏魚龍萬里流奪錦亭圍花陣雨浣花溪積蘚痕秋平生謾有相如檄拏手何時作勝游楊鐵崖新居書畫船亭草𤣥心苦思如何艤岸舟輕不動波聴雨夜蓬燒燭短看雲湘竹噴愁多賦成猶夢横江鶴書罷應籠泛渚鵞想見後堂涼月白彭宣腸斷雪兒歌陳履元畫玉山草堂圖故人陳孟公辭如春風氣如虹畫法師海岳山如鶱鵬樹如龍騎箕上天二十載有子齇鼻畫極工驚蛟嘘雲海浪白離鸞照水巖花紅皴鱗聳鬱磵底松中有一畝幽人宫石牀支頤睨飛瀑意逺欲托冥飛鴻我欲從之不可得青山萬疊金芙蓉舒穆嚕萬户輓詩提師海上戮奔鯨玉帳宵寒隕大星鐵馬嘶風秋雨暗天闕斧夜潮腥常時仗鉞今傳劍前度平蠻未勒銘想見城隂練卒處三軍泪洒燒痕青寄張伯雨露冷𤣥洲草樹疎硯泉分得磵循除鉤提石記修人表筆削山經作志書丹鼎曉温松葉酒茶甌春㸃菊苖葅殘骸若有登真分亦欲西游候羽車活死人窩歌為番陽仙伯胡道𤣥作我甞夢登天身乗一片雲下視六合大死人何紛紛尸行鬼走不知醜天跳地踔無由分首戴髑髏蒿兩目膓懸骨湊空孤墳自謂䇿神智可以干明君自謂琱纂組可以成華文自謂昭旂常可以銘前勲形如枯株心强活氣如濕灰耳强聞哀哉腥腐窟何以能超羣天孫謂言此皆不足云纍纍白骨成飛塵安知中有不死人首髽兩結目如電揮呵風雷走青冥塌頞玉陛下自稱小兆臣臣之形骸與衆等久斷葷血膚肉皴言臣不死誠謬妄固有不死丹元君丹元君在何處泥丸真人且延駐一曲鸞笙五百年死人窩裏翻身去題張伯雨精舎吟翩翩風流江海姿青山滿眼空遐思圮橋授書帝者佐襄城問道天為師題扇書裙莫相惱傳符繼籙客何辭願逐秋風白雲去滄江斜日吹參差至正十年正月一日與龍門僧良琦臨海陳基聨句送匡廬道士于彦成歸越兼柬蕭元泰盧益修云嵗朝逢王春雨雪暗吳下行人明當發祐别袂慘莫把飄颻賀監舟基蹀躞靈運馬山驛梅始繁琦溪船浪仍打行紓莊舄吟祐去結逺公社禹穴紬奥編基蘭亭集羣雅神韻鶴氅朗風標鵞經寫祐雙鳬繼遐躅千秋祝純嘏基信憑回潮尾春融枯樟骻祐越臺瞰蓬瀛胥濤駕龕赭基白戰隠鞍甲緑醑酣􅊦斚祐智囊倒精悍詞鋒發侈哆琦蕭史徳符歟盧敖天游者道樞混溟涬語穽脫謑髁祐但令冠峩峩肯羨綬若若滄海等稊米黄金真土苴接䍦或露髪短褐不掩踝捷若矢離弦勇如金躍冶青雲步伊始白雪和殊寡基土膏動勾萌春情滿原野琦桂樹歌已成栁枝折難舎基别夢梁月墮清談松風洒琦蓬藋既可居安用萬間廈祐和玉山見寄扁舟不亂白鷗羣又復移家入水雲載酒可無人問字揮毫故有客書裙荒涼漢室銅盤淚剥落周宣石鼔文猶賴顧循能慰藉江河冷落見番君顧瑛詩曰我愛㕓居鄭有道屢辭徴幣卧松雲年来短髪籠紗帽客至新詩寫練裙几上只留招隠賦人前每讀送窮文清時已見文名盛日日髙車訪隠君雪槎軒崑崙河源不易窮靈槎萬里待秋風載雲欲問成都卜持節知成博望功既犯星辰上天漢盍為霖雨佐年豐如何旅泊嚴陵里只掛詩囊與釣筒送李秀才鄉舉秋風又復度宫槐文采何人似爾佳花渚飛雲迎客棹栁絲繅雨映天街寳刀必淬吳歐冶天馬還生漢渥洼俗事紛紛令我病何時髙論寫澄懐劉宗師入覲次虞學士韻暫辭白醉三峯日又御青冥萬里風月帔引朝宣徳殿雲韶賜宴集靈宫懸知漢室龍顔主似見商巖鶴髪翁便使圖形在麟閣閒心只愛白雲中送僧禮五臺飛錫曉辭師子林五臺天逺谷岩深寳光面面金銀刹天樂時時鐘磬音崖土亦知成佛貴峽泉似瀉祝堯心北歸且向皇都住莫聴西風月夜砧次倪元鎮見寄韻穴牆薜荔根株懸倒架葡萄藤蔓牽非無洛下先生屋須得邛州録事編鴻雁天髙青不雨鶺鴒沙晚白生烟松雲隠居新結構何日書来解榻眠送毛彦昭歸三衢載雪曽過太末溪天寒砂石浄無泥碓舂白粲連灘響橘熟黄香壓樹低水驛燈明驚見雁蓬忩酒醒忽聞雞龜峯記在君歸讀異日春風聴馬蹄明月鏡神工鑄明鏡持進嫦娥宫嫦娥羞鑑容暮掛扶桑東浮雲散天風照耀九海空如何萬丈光瀉入詩仙胸談𤣥走銀蟾落日驚彩虹掩却星斗文孤輝天地中送人嵗月蹉跎秋復春輪囷癭樹不求伸斧斤何待秋零落多是長松百尺身游仙煌煌珠樹四時春樹影玲瓏月滿身理罷玉笙朝斗去就中誰是避秦人栁下鍛圖何所聞而来不妨栁下鍛何所見而去魏鼎由爾換嗟哉志士千古心有鎚不鍛躍冶金題小妹巻天寳治衰妹兄出白晝宫庭馘獰獝妹時何在不佐兄靚妝自衒妖嫺質後來形見知何所百鬼尊之莫敢睹提劍躍馬從其兄每為人家守環堵老韓饑窮夜縛船送之不去今幾年小妹肯從肆屏逐我亦家富黄金錢春華蝴蝶謠華魂迷春招不歸夢騎蝴蝶江南飛碧蕤粉香酣不起卧帖芳茵唾鉛水痴娥眼嬌錯驚顧解裙戯撲沾零露折釵搔首笑相語阿誰芳心同栩栩頽雲流光空影寒氷波緘恨啼闌干次韻沈存齋見寄八詠樓前藻思新白鷗波上最情親詩盟有喜諸君在情話無如野老真歴代寳歸金匱鑰重山光吐器車銀丁寧笠澤烟波上留取珊瑚拂釣綸六月六日初度有感三十六陂空似昔荷花荷葉待誰看星辰不合躔龍􅔀性命何嫌似䑕肝扁石處卑心不轉蓼莪纔說淚難乾晚来惟有牆頭月依舊清輝照鶡冠游天平題文正公祠玉山同賦白雲鄉裏魏公祠翼翼烝嘗奠薦時廟饗百年亡國後道求千古聖人知山侵鳥道盤風磴石拔鯨牙揷羽旗更上髙亭望吳下暮田秋實正離離顧瑛詩曰魏公勲業垂前代百世髙風道並隆立廟東吳見遺像出師西夏有全功山迴鳥道千盤盡天入龍門一罅通赫赫皇元昭祀典烝嘗亦與武侯同長孫皇后免冠圖貞觀聖人還紫宫按劍欲殺田舎翁翁本帝仇今作輔逆鱗易批難論功后聞君言心慘惻自古君明則臣直劍血一濺直臣頸女範先刳賤妾臆免冠再拜明主前隂教遂並日行天異時拭目看陵樹不以大義虧其全題謝自然像老韓佶屈在世間好以險語鎪神姦上仙空飛上丹闕政自與世不相闗奚為造言極誣詆何妨月照千江水龍伯珠宫深處明鶴髪蒿歸醒時喜扶植世教須老韓天風不礙鏘鳴鸞君不見果州南充縣香火至今盟未寒題張叔厚白描麻姑像狡獪仙人来自東海波清淺日輪紅昜遷宫裏飛霞佩只在鸞笙一曲中題達監司所藏柯博士秋山圖風光南國典籖孫筆底江山妙吐吞雲湧坐隅岩木動瀑飛書屋浪花翻危橋僅尺疑虹飲怪石逾拳作獸蹲可即田廬朝掛笏只應蘿月夜窺門林深曷致巢松鶴谷響如聞嘯樹猿裹飯趁墟身欲徃擔簦陟嶠手堪捫公廷未竟東方謔畫史恒推北苑尊老矣玉文堂上客悲歌一慟為招魂桐華烟為吳國良賦桐始華桐始華開向荆溪之水涯溪聲長繞李侯廟桐隂儘覆吳生家吳生家藏燒墨訣傳自李潘語非夸掃桐華烟三萬石鬼物守䕶無疵瑕千杵萬杵白兔臼麋角搗膠無夜晝製成龍香古圭璧玉剛金純石同夀奚老然松松化石潘癡坐井井甃裂二子知掃桐華烟生也與之相後先墨成飛上通明天紅雲一朶捧宫硯試之漆墨勞磨研吳生技成等潘李肯讓諸莆先著鞭吳克恭字寅夫毘陵人好讀書以舉子業無益於學遂力意古文其為詩體格古淡為時所稱翰林老成皆與之交多㳺雲林及余草堂因得其詩云送沙子中經歴建寧武夷蒼蒼春日黄山行兠子陟炎荒故人右榜多通顯清廟遺音獨渺茫官堠縁林穿荔子人家餉客食㯽榔兼之此地多書籍公退牙籖日幾行送盛煉師游浙東胡麻飯熟氣如雲相望東西浙水分丹室赤城故通籍青鸞白鶴亦同羣須識異人多道氣還尋古跡要碑文豈無福地相逢者髙踏雲牀寫練裙送友生春風顛狂復細㣲吹波蕩槳動人衣野桃葉小流鶯至官栁條長江鱭肥稍别未嫌頻作客相逢自識固應稀腐儒竊禄真何補望望滄洲白石磯城邉栁條城邉栁條春意動近者力至復低垂須令傍水留披拂不獨撩人管别離過月即看隣綺樹卜巢還許借黄鸝荒州物色猶如此若在御溝應更竒達兼善除祕書監未上而有侍郎之命賦詩奉送幾年海内龍頭客蚤負詞塲一世豪祕監稍遷為學士侍郎即去重儀曹到京騎從看花蕋過閣朝迴拾鳯毛最憶玉堂何處所青春白日見揮毫陽羡茶南岳髙僧開道場陽羡貢茶傳四方蛇銜事載風土記客寄手題春雨香故人恵泉龍虎蹙吾兄紫笱鴻雁行安得茅齋傍青壁松風石鼎夜聨牀柬陳漢卿郎官荒土城邉草樹隣荷君詩語數相親交游豈謂尋常輩耆舊都無四五人才比阮生誰放曠賦傳庾信最清新愁深江燕銜泥急偶污牀書不忍嗔過義興周將軍廟陽羡溪邉孝侯廟陸機文字右軍書借從名士傳家後誰謂將軍亡國餘蛟虎于今正狼藉鳯麟不見謾欷歔隂隂棟宇多松檜擬欲臨流卜隠居懐杭州李二尹蘭省故人何寂寞柴門細雨獨徘徊老夫老向愁邉去春日春從病裏来王粲空傳鄴下詠山公不復習池回箧中書疏愁俱積忽到思君亦屢開贈曹仲普學省花隂覆苑牆鶯啼曙色映蒼蒼翁今拜秩少宗伯樂奏春官新太常通陛起居同典禮侍臣子弟合為郎扁舟道别江城暮錦瑟朱絃思渺茫答陳伯將見贈兼柬陳漢卿明府空山一榻坐談禪野性三生似有縁結屋幾時心可遂垂蘿百尺手須牽神交禹穴空青外情在匡廬太白前寄語江邉種桃者白頭相候看花年問郭君錫病向宿丹陽舊草堂映人嘉樹憶相將階前蕙葉幾多碧江上栁條無數長不擬得書成卧病遙知裹藥自聞香来時許我青松障莫遣雲山墮渺茫題張氏溪圖金壇縣東風日凄中有白鶴之長溪羽族相悲故巢失名字尚許幽人棲倘同芝房歌赤鴈還學草堂隣碧雞數日清秋期一到滄洲畫壁有丹梯臘月二日茅君煉丹之日是日丹光隨處發見臘月已至乃如春林下丹光復有神學道因尋許長史焚香還謁魏夫人黄精在磵秋来喫玉刻開函老去親流水長松堪坐憩儻開書甕識前身許御史示長公左丞貢院唱和詩千官寂寂漏聲遲春滿宫壺雨露低賜燭漸聞簾底給奏名還許殿前題由来騕褭驊騮並自是蘭苕翡翠棲擬踏浮槎渡河漢却從北斗望西奎恵山泉九龍之峯秀蜿蜒玉漿迸出為寒泉来歸石井僧分汲流入草堂吾獨憐暗滴洞中雲細細冷穿池上月娟娟好乞茶經與水記俟予嵗晚奉周旋送達天山應奉北上國中太史浙河游碧樹風生紫綺裘蜀郡奉祠揚子老漢廷召對賈生優金盤芍藥還相詠翠籠櫻桃亦易求幸得草堂同晚飯少陪髙論借遲留懐陳漢卿從事兩浙故人蹤跡疎汾水牛郎能遺書青鏡時時傷徃事素絲日日看新梳簾穿迸樹攅雲氣扇接飛花下雨餘爾亦官居古道院一春情思竟何如送趙志安之南康西有白鶴東青牛老夫甚欲匡廬游百花春明錦繡谷二月水深麟鳯洲予生晚識中執法子去早封萬户侯倘因衿珮来如雨仍及此時還自修用廣智禪師語意寄題仲潛上人南昌凝翠樓居智公族近院西東憶昨樓居在眼中隠隠来龍過百里團團凝翠歛諸空神交李白九江上指㸃廬山五老翁秀色待餐何日可倚闌不獨興無窮道傍古墳孤墳兩松樹風起秋隂暮月出沙草黄野烟白於霧斯人盖棺定長夜無由寤浮生竞何為陡覺傷馳騖二氣積慘悽山川莽迴互何不學神仙翰飛飲朝露悲哉茂陵骨曽為學仙誤元日試筆園風上日至盆蕙氣何清明看雪晴處還當春草生流光泛椒醑衰鬢颯華纓懐哉金石友浩蕩寄髙情昔時蘧伯玉五十始知非余今四十九懐賢寧再違匪圖慎寡過修名良可希雅道日以㣲何以寫琴徽賦翟志道家三琴翟年五十九以青陽縣令引年盖髙士也翟公家三琴粲粲金玉徽觀其記中語熟讀令人唏玉徽落將家蹴踏當牀闈齟齬蛇蚹紋手澤自淮淝金徽差小者王生舊所遺生居湖山居襜襜者深衣憶别三十年老大減腰圍又有墓中者才徳婉而㣲其初来薛氏斵者識雷威薛亦亂離得最後歸林扉公云皆我友愛比玉與璣昔公為縣令寧棄笏與緋胡此獨不釋謂是古音希我甞聴公彈空齋坐忘飢松風度落雪竹日流清霏或時作龍吟華玉吼朝曦或時嶺猿叫夜磵空霜飛或時呈瀏亮露鶴鳴江磯髙情寄絶代妙在神氣機感深動惻惻望洋見頎頎浮雲琵琶筝俗耳溷是非藉此羅酒肉識者恒諷譏倘生盜跖粟寧死首陽薇周公不可作孔子將安歸猗猗林下蘭庶草聨芳菲春天不得佩嵗晚還噍嘰請公操此曲古道資憑依公坐黙不應面牆看蛜蝛題白雲忩白雲本無心乃生忩牖間崇朝寄所託日晏澹忘還並秀緑蘿雨餘潤紫芝田悠悠將無同翳翳還自然欲得此中趣惟觀天際山獨想陶𢎞景令人心意閒倚雲樓為至上人賦至公好樓居掲以倚雲名雲虚不可倚直欲觀峥嶸歘爾山中起油然石上生濕衣沾弱絮過角弄輕英最覺凌霄迥還看映日明逶迤成故事憑藉足髙情懐哉虞太史題詩為刻楹見山亭為洞神宫主江濟川賦本是江縂宅晚為老氏宫軒豁此亭子樂哉同姓翁盤礴青溪上睥睨白門東雲林肅仙氣道徳揚清風見山便自好何必居山中悠然今古意此事將無同納交行古人已寂寞古道復久荒汲井引寒泉仰見明月光纎纎映素手轆轤轉銀牀願言持其盈得奉君子甞味清見髙潔皎皎滿中腸豈無盈尊酒合歡會蘭堂醉即捐禮法亂性恐不祥汪汪此中誼悠悠深且長君當領吾誠報以伐木章題倪幼恱西郊草堂因憶浣花杜陵老使我不樂懷成都張儀城外雪山立玉女井邉春露濡邵菴先生家本蜀恱也草堂宜有圖圖成奉公以為樂藉此名世何所無想公堂前風日腴野梅官栁一株株縣官来問禮數熟閣老出㳺孫子扶圖書琴瑟在左右游意澹蕩天為徒新書兼見公手蹟讀者愛比驪龍珠公在西郊草堂裏神交自是才情美江水娛人秋日暉雅音蕭條公老矣祕書行送達祕監天下學士聚鴻都老氏藏室仙為徒漢有石渠更天禄貞觀人才顔與虞故事星躔木天壯東壁神光如寳珠閣前芝草列五色慶雲湛露垂金鋪三皇五帝在時事蓬莱道家之所無近者委蛇行祕書蜀人邵菴目力枯迄今一代論著作先生合上明光趨二十龍頭還最貴三十豸冠名不孤敡歴中外復多載使預朝政恐所須竊當留中贊帝謨奏列學者陳區區送酒汎承光禄寺進食何止步兵厨還思晝夜延青瑣莫問君王乞鑑湖送牛彦伊湖南憲副數嵗情親託隣里飲酒自放寧拘禮城中故舊四五人與子不識何為喜前者較藝列春官今者薦名登御史蒹葭蒼蒼白露盈鳯皇飄飄赤霄起衡山諸峯雲氣髙上有朱鳥飛嗷嗷洞庭揚波瀟湘接送子百丈江中艘芙蓉此時開滿目繡衣握節巡江臯荆潭倡和得從事長江幕府待俊髦豈無他人我獨勞勤職不懈㑹見天書褒送曹徳昭入掾中臺孟秋髙飇蕩焱熱太白當頭映佳月天地始肅禾乃登長歌送君思激烈青驄馬肥青芻秣公子為郎亦材傑臺端象賢重耳目天邉北斗司喉舌大夫抗禮丞相前掾曹執法俱才賢棲烏在庭栢樹古元氣旁礴雲蒼然魯公葛藟方綿綿金鐘玉磬兩在縣快哉此行視京秩清廟之瑟朱絲絃故人濩落江海邉為君一誦秋水篇請君直上窮河源送牛彦伊之金陵兼柬曹徳昭御史苦憶茅山陶隠居此行白下子何如未須名士收通刺還有髙僧留讀書五月蘭苕棲翡翠千年桂樹傍蟾蜍紫簫聲徹臺山鳯綵筆香生墨沼魚昨喜故人来舊隠始聞御史拜新除深期古道酬家業東魯文貞諡不虚送張中丞之官翰林中丞獻納道如何内相絲綸寵莫過槐閣地聨文石陛杏園春滿曲江波隂隂雨露涵青瑣箇箇星辰濕絳河花蕋隔簾宫漏近栁條當户曉鶯多中官送酒青絲絡上苑乗驄白玉珂豈獨寸心圖補報要須元首及賡歌太常禮樂還相問閣老才名迥不磨通國此時同悵望憶公何處最委蛇鼇峯巨石森蓬島香殿㣲風拂御羅延祐得賢俱第一野人白首卧林阿送友人歸宛陵不道歸期落秋暮雙溪流水木𤓰紅相過李白題詩處莫看山濤啟事中題張氏野緑堂記得東隣移樹時草堂前後插藩籬花英藥蔓渾閒事最愛風生青桂枝次韻虞内翰寄元鎮呼吸朝陽煉日精菖蒲花氣緑熒熒幾時銀海浮雲盡蜀客相過李士寧春日映日含風白苧衣香飄晴雪弄春暉故人騎馬不相識蛺蝶自来衣上飛偶成船落黄泥與白沙春光都在棠梨花蜜蜂相喧作何語日晚松隂報午衙横塘曲妾家住横塘緑水映垂楊五月南風起荷花似藕香唐宫詠鬭草賭珠襦穿花提玉壺東頭老供奉好似執金吾蝶失意穿羅袖縁情戀繡牀妬遺衣上粉狂覔酒邉香送龍翔俊用章住吳白馬寺白馬吳中寺袈裟建業船黄花季秋月錦樹大江烟洗鉢畨僧飯䭾經漢帝年何時虎丘石共論永明禪送鄉人錢明之赴閩閫掾仗節開閩閫分曹傍省闈用人那有外觀海更無涯白露收柑子南風食荔枝未須頻會面多寄府中詩春風飄颻汎綺陌迴薄滿彤闈拂草光仍緑吹花力豈㣲細聲行寳瑟佳氣襲羅衣萬有那堪補一無何所歸送卓御史移西臺漢節楚江東堂堂御史公秦山指太白宛馬驟青驄光映長安月涼生建業風冥鴻有髙羽多在栢臺中陶巨川歸養雁過秋霜落滿衣數聲相近白雲飛寄書莫送潯陽鮓采石江頭魚最肥寄石民瞻磵泉堂上白鬚翁苦憶雲山杖屨同秋到黄花無幾日人生只合酒盃中寄曹徳昭御史昔子驅車徃河甸河水迢迢不相見侍御驄馬昔揚鑣郎君今年復為掾昨冬苦寒不可當子乃衰絰請太常禮官封諡有褒卹賜碑撰刻皆文章名駒翩翩日千里自是驊騮與騄駬范滂攬轡望澄清愛爾傳家尤繼美我宗門户真凄涼四十五十年相將數竒命薄多轗軻但恐失所纏風霜馮唐已老何由起鬷蔑不言幾失子雄飛雌伏何足論目斷秋江送雙鯉二月十九日登大茅峯夜宿元符宗壇因呈集虚真人并閒逺潘尊師大茅峯棲雲絶頂祠宫石壇秋日冷杖藜蕭條一老翁仲冬焚香謁司命石間流水俯潺湲妙意所得何能言昔聞兹山直通蜀避世何必求桃源清晨躋攀歴深窈下視諸宫樓觀小亂葉打頭風倒吹是日苦寒絶飛鳥三君弟子老奉祠清浄寡欲真吾師清酒緑液半凝脂慰我逺来還渇飢閒逺先生更竒古壁間示我虞翁詩詩中愛道李太白結巢雲松復此客九江秀色雖可餐髙隠何如煉精魄吾聞兹山到處有神仙楊許遺書倘可傳泥丸絳宫朝内景玉經𤣥文咏至言如此亦足昌吾年早行薄雲斂徂暑隂火鍊金精瞻彼河漢白林園風亦清肅肅郊雁翔嘒嘒山蜩鳴吹笳者誰子三五栁邉城城門一何髙岐路百從衡諒無楊朱泣悠然白首情惡木中園有惡木蜂蠆何其稠蛇蠍相同類大小僅不侔生性豈如斯好惡非良謀古人善比况蝴蝶夢莊周蓮葉何田田蓮葉何田田田田生緑波明朝大如盖風吹將奈何草生盤石上草生盤石上根深石不露水流盤石間風吹下山去草生盤石上似許行人坐水流盤石間不許行人過古意皎皎機上素脉脉閨中情砧杵何曽識𤣥黄遺染名裁縫為君衣妾意自分明不受青蠅汙還飄積雪輕舊歡團扇合新歡蘭蕙清非惟抱美質亦復含素誠如何梁武帝子夜換歌聲谷口歌采榮谷口歌采榮松間吹玉笙如無此時興何處有髙情唐虞讓天下巢許擅其名哀哉和氏璞獻者楚王城草生可攬結草生可攬結衣敝香不滅風吹古别離換我青青髪去年徃燕趙今年来吳越各自有情人鸞膏化為血題玉山所藏淵明歸来圖後陶令昔去官當世豈知賢杖藜柴桑里汎舟即斜川春風五栁隂秋日秫盈田嵗釀杯中物佳辰奉賔筵觴来各有趣斟酌罄交歡為生豈易老藉此一欣然咄哉羲皇人既逺身名全蛛網上落花飛花墮蛛網點綴映臨池縈空以搖曳相值竟相持不成羅綺織翻為紅素悲迥看舊時樹傷滯腹中絲送湯生茂才歸宛陵春舟度鶴觜晨鼔發龍灣軟語勞相接幽期任獨還風清建業渚雲白敬亭山自有府公薦慚無遊子顔春夏承湖南僉憲完顔子中問訊敬用酬上有客湖南去聞公憲節新坐霑梅子雨憶别栁條春衡岳瞻朱鳥湘江咏緑蘋升車訪遺逸問俗願清淳賦少尹納延元臣為東平郡王之諸孫求詩聖厯開文運王章定武功大人推部落開府冠山東日月旂常異河山帶礪同諸孫傳赤舄小雅播彤弓一命起居注載趨長樂宫掖庭官濟濟淮浙賦中中竊忌徴求急方来福禄同翺翔鸞鳯日逆順馬牛風帝力生成大人心灌溉公共圖歌政理多稼答年豐奉同楊亷夫賦簡杜原夫達兼善徴君舊住臨江宅髙世早排閶闔雲太史誰修名士傳隠居今注武夷君相逢之處歌九曲小篆以来書八分勒取山經載名刻清時白首重髙文送黄祕書歸金華作於張貞居靈石塢祕書古罍洗金玉間追琢寘之宗廟間乃復敦素樸科詔昔求賢明經以為學君雖第三甲文氣已磅礴鳯毛聨五色麟定峙一角于時日正中青冥翔寥廓迄今半臺省徃者俱館閣枚數盡英雄隠顯闗述作偉哉尚書宋繼起秋天鶚一魁四海望旋復凄夜壑盛衰互絶續天意豈厚薄吾子幸老翁掛冠彌矍鑠安居大江左杖藜名山郭清言窮理窟私淑仰先覺况及大夫公生世縻好爵述徳紀豐碑山木工則度宛宛白下虹剡剡翠螭襮無雙江左姿豫章元祐脚清標溢素羽皦若離羣鶴翕然萬里思芝草焉用啄不食固不飢風清九臯樂回首漢廷偃倒行竟前卻疏廣非甚賢知止自寛綽僕也畎畝中謳歌以耕鑿聞名三十載交誼欣所託鵬鷃各棲飛萍蓬殊依泊天寒望古栢孤翠幾巉錯深期帝子渚仿像洞庭樂餘音今在無大雅其寂寞緬懐虞閣老安問頗悠邈空花結翳業不刮金箆膜滄江落日逺一葦中流弱外史論文章譚君口諤諤語我盍賦詩持贈勒有恪君家金華隣冉冉仙意昨神光運草木白石俱起躍攤書日間帙洗盞松下酌生榮畢志願俯仰何愧怍六經聖道㣲沿流到伊洛其文有藴奥其義則博約後生待来兹前輩已零落徃徃輕師說授受工剽掠虚辭相矜誇體認迷執捉君歸善自謀何以同矩矱詩教本人心煩君曉粗畧東城行東城俯春流余昔釣游地憶甞拈落蕋相偎倚桃樹葉底避游絲叢深納飛絮同時四五輩被服俱美麗千金各有攜日暮恣游戯但道長如此焉知老將至昨日尋舊游光景徒自媚日肆江海蹤漂零復誰記非無桃與李寂寞千萬億南林翟志道以著書辭青陽縣尹作詩貽之束帶謝㕔事抱琴歸柴荆時雨適然霽田中逢耦耕繞舎桑麻交境與心跡并皤然六十叟始得佚吾生適意杯酒間天地同其情懐賢不可見掇以秋菊英嗟哉陶縣令卓彼身後名䇿馬出郭門策馬出郭門仗劒歌載馳河水北洋洋太行東巍巍風吹白日暝死者横路岐傳聞多殺傷悲愴神魂飛四方丈夫志手握千金資直前且不顧詎以禍福移人生貴同類非獨哀流離迫此苦寒節悠悠僕夫飢下馬知馬勞上馬憂馬遲雖不通馬語情事諒庶幾落日古戰塲徃徃令人悲豈意霄壤間我行今踐斯題元暉山水江上江雲漠漠寒有時帶雨過層巒只愁海岳菴前路水沒黄沙鴨嘴灘丈人行城門有丈人種𤓰緑盈園𤓰熟許隣吃偷之竟不言嵗久多感激相祈𤓰蔓繁雖有困窮去抱𤓰𤓰不寃近者天稍旱羣兒走塞門請為救𤓰活不憂井水渾深知丈人徳豈感使君恩忠信茍不渝風俗誠所敦嗟嗟復嗟嗟敢為鄙夫論寄陳仲衆供奉騎馬都下歸放船湖中賞恩沾翰林制樂奏鳯池響十年雨露間一日青冥上虞陳本同姓詞源浩沆漭他山翠琰刻别殿黄金榜諸公誦合作觀者必抵掌昨聞已超然近見益髙爽宜乎盛名下傳寫日以廣漢史奏徳星君家太丘長餘音撫廟瑟致禮張賢網吾衰竟五十所去輒尋丈雲瀑代春絃女蘿為夕幌誓掛牛角書妻子鹿門徃薄忝君子交幽期起遐想陳方字子貞題野秀堂與項可立同賦沃壤畇畇阡陌齊長林深處結幽棲草生夜雨江湖濶花發春雲鳥雀低芹葉已髙𤓰滿地蓴芽欲老芋成畦疎簾細簟宜清晝物物煩公取次題附項可立詩二首霞際浮玉青霏霏吳中景物天下稀三江入海作秋浪五湖滿地搖夕暉孤鶴忽與白鷗起神龍或挾赤鯉飛匡牀抱膝但長嘯丈夫安得為輕肥築室湖灣種花栁掃雲岩阿坐薜蘿曉雨紅披黄鳥路春風緑漾白鷗波招隠誰看大山賦叩舷自作小海歌莫收俗物掛眼底由来勝事吳中多送趙虚一還金陵中興天子潛龍地頃詔先生去祝釐舊坐風亭留御榻新題金榜出髙榱月明仙仗朱旛動雨暗江靈鐡騎馳手種青松聞有實康强却過種松時題宣和所製赤駒圖房星委地生神骨衆馬不得相儔匹千里風輕白玉蹄平淵春浴丹砂質自從長養入天閑振鬛常陪乗輿出未知赴敵見戈矛所慣承恩聞警蹕嘶當落日近尊嚴氣抹長林動蕭瑟不慙芻豆飽㣲軀尚覬朝家三品秩宣和殿裏圖書暇親見圉人事爬櫛當時青海九萬餘未有一匹當宸筆臨軒睥睨迥出羣落紙須臾歘奔逸内侍傳宣賜近臣再拜奎光欲騰室秋深沙苑多蒺蔾夜半河南吹觱篥已詔民間置牧地如此龍媒敢輕失青城道上塵眯人六宫粉黛無精神此時此馬闕不能追隨天子向南去哀哉委骨俱蒙塵送蕭天祥為蕭山縣學官儒官已在羣僚底南士尤嗟一介㣲目送青冥何漠漠手循華髪尚依依匡衡未老頥堪解阮籍多窮淚可揮雁塔近從秋草沒鴞林逺傍暮桑飛人皆雞口喧争利子獨鼇頭坐失機寂寞宫牆悲傳舎荒蕪禮樂見深衣諸生載酒同題句賢宰鳴琴共按徽緑樹雲回神禹下白蘋風起孝娥歸門當越嶺春横郭地接江潮夜撼扉定與王郎招爽氣復陪賀監倚斜暉登臨幾轉怱怱過勝絶寧教草草違端欲早收榱與桷祗愁空老故山薇華彦清登常州𤣥妙閣有詩因同韻地接三吳口人操衆楚音樹迷晴漠漠花亂夕森森碧是當時血春非徃日心翻思當矢石猶暇惜冠簮丞相戈如雪將軍志比金倉皇驚破竹踴躍念披襟壞堞仍存舊髙標獨峙今星河垂綺户雲霧出琪林鳥去蒼茫濶帆歸迤邐深諸天欣共賞勝地肅同臨突兀雄連棟依㣲隔逺岑紫霄停廣樂白日閟層隂倒影何多美空歌試一吟悠悠江海興冉冉市塵侵題割股孝女巻蜂蠆螫我手壯士須動色如何割股女引刀不愛惜見父不見肉視股如視石眼前秦越人區區較肥瘠呈王本齋尚書聖主光先業王春再至元贊襄符妙算擇選副深論衆悉推耆徳三曽鎮大藩虎珠秋月避鳥幟海雲翻藉藉番禺頌明明造化恩清標非栢府髙秩是薇垣煮海民為食經營古所敦江淮邦足賦浩汗利之源弊政思張弛長材畀輊軒光芒分八座精采送孤鶱鼎重千鈞小膠清萬丈渾龍文頒御服馬湩錫壺尊香散知心醉春回到骨温氷霜愁左去風雨命前奔竈竈連雲起船船附蟻屯絶知忘夙夜何暇覔饔飱昔也東西浙歡然逺近言市無憂折閱人不困牢盆公日唯扃户方時亦在門從容甞接語歎息每銷魂短褐形如鬼傳餐首欲髠潮乾晴沫白日淡暮烟昬卒戍春鳴柝人家月照樊鹵成俱井井地限各村村碧海浮天際黄茅暗竹根緬思多彷彿已閱十寒暄識量今逾老聲華晚更尊謬知慚骩骳甚欲寫璵璠形弔徒蕭瑟心馳正鬱煩仙花團雪浄江草亂雲繁早晚招魚艇丘墟問故園摳衣瞻管仲掃榻寄陳蕃袍笏仍圖畫山林數記存此時鷗與鷺隨意樂乾坤清閟閣詩二首門前灌木春啼鳥屋畔長松夜宿雲剪得蒲苗青似髪燒殘香篆白成文偶同杜老唯耽句遂學顔淵不茹葷境勝固應天所惜品題蕭洒最憐君湘簾半捲雲當户野鶴一聲風滿林纔立簟紋波細細乂疑牆影雪隂隂竹搖棐几常開帙花落藜牀獨抱琴不謂世間仍得此恍然飛屩駐仙岑新正獨坐栁葉參差蘭葉長西隣春酒鬱金香吾生不飲唯搔首此物多情故惱腸髪已鏡添新嵗白書仍筆㸃舊時黄向人節序年年異来徃猶煩禮數忙元日後雪年前春色惱梅花年後春寒妬栁芽半夜人間成玉宇朝元殿裏散天葩風生碧海雲無際日射藍田璧有瑕明發扁舟西郭去一溪新水漲晴沙送蔡霞外不見道人今四載疎狂猶似舊時多自言曽到神仙宅公亦須吟離别歌澗草隂隂披紫藟山花細細落青蘿只愁骨相無清氣赤水𤣥珠奈爾何寄開元和尚娑羅室内早春初經巻香花禮佛餘終日更談言外法十年不寄蜀中書夜深雪殿當空白月落風樓近竹虚若得為吾留一偈韋郎詩句豈容疎元宵留無錫有感曽聞故老說前朝今在殊方度此宵月殿不催春賜酒風檐空憶夜吹簫已無花影如雲起那有香塵作霧飄滿眼疎狂何所去青松接屋自蕭條贈茅山吕洞陽兼寄郎孤岩前代將軍五世孫華陽洞裏事茅君白虹夜隠蒼精劒紫殿晨書碧落文花滿石壇長不掃术生仙壤獨能分尊君若見郎髙士為說山靈愛白雲送王季野省父簡孫子翼處士吾廬歴歴楚江邉子渡江時暫泊船須問垣牆仍好在莫教風雨轉凄然夢成蝴蝶隨春去愁斷麒麟並塚眠若見孫登還一笑餘聲散入薜蘿烟送覺上人謁龍翔録寄子異偶聞吳下鄭居士手把新詩就我吟紙上姓名無俗氣篇中律吕有遺音鮫人淚落金盤冷木客歌傳石磴隂謄寫已堪驚老眼龍翔一宿會知心王季野由鎮江赴揚州省覲父尚書賦此以送楚楚斑衣照暮春蒲帆帶雨出西津樹迷𤓰步青如薺江漾蕪城白似銀久謂尚書安寢少不勝天子寵榮新暫時定省加懽懌枉使吹簫送客頻奉白雲鄉兄天寒客裏輕相别花落孤村喜獨来贈扇豈堪承故意徴詩徒使愧非才汀洲日逺參差樹門巷隂生宛轉苔玉珮珊珊天未曉只聞長嘯一聲回寄王仲叔陌上誰家子行春並騎来揮鞭不相問回首復疑猜二月初消雪東風尚落梅更尋禪寂地石上翫蒼苔草堂雅集卷三

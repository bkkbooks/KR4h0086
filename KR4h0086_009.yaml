body:
  text: 草堂雅集卷九元顧瑛編郭翼字熙仲姑蘇之崑山人明敏博學不屑為舉業專志為古文詩尤精悍縉紳先生無不愛重之人言婁東之能詩者必曰東郭生云題張戡畫瘦馬圖瘦骨鋒稜珠汗落卧痕半雜古苔烟未脫將軍金匼匝又䭾兒女玉嬋娟倉皇日色龍沙外慘淡秋聲雁塞前神駿只今誰貌得開圖老眼一醒然宴婁東園分得五字韻迢迢望瀛洲流雲下東渚笛教仙人借酒使文君取篔簹寫林緑菡萏發江雨煌煌金閨姿天動星文聚華辭播蘭茝繁價登璚瑀龍鍔秋濤淨鳳羽雲色五燕遨亦云暢歡集那得屢驕驄踏晚轡閣門凉月舉寄郯九成懷鐵崖且聞有挾璚花赴倪雲林之約府中從事近將書只道清狂事事無雪艇下來要陸倩雲林直去看倪迂醉時自舞鐵如意愁裏休歌玉唾壺揚子草堂頻有約速來滿擬為君酤江水辭二章江水一百里送君君去時丁寧桃葉渡莫唱渡江辭江水一百里江流七十盤初三弦上月相憶照彎環題宋髙宗便面康邸龍飛日中原不可支乘輿猶北狩淚濕畫中詩與野航泛舟綽山懷玉山綽山樹色青如薺蕩裏張帆曉鏡開烏目峰髙雲北下白沙湖濶水西來菰蔣打雨鳴還止鸂鶒迎船舞却回好入闕盡祗慚揚馬是仙才樂府十六篇江南曲江南暄新花月天美人盤游緩愁年翠鬟姣春扶上船扶上船月如水霞蓋車度花裏游女曲麝衣寶珞花氤氲芙蓉小叉金鵝裙流目艷艷思若雲思若雲可憐嬌玉條脫金步搖采蓮曲青溪小姑雙嬋娟蓬蓬荷葉金槳船含情戲采並目蓮並目蓮為郎喜刺滿莖傷玉指采菱曲湖灣小婦歌采菱蕩舟曲曲花相迎花開鏡裏搖明星搖明星妬華月郎不歸怨花發陽春曲栁色青堪把櫻花雪未乾宫中裁白紵猶怯剪刀寒鳳臺曲聞道嬴家女吹簫入紫雲如何鳳臺上不棲祖龍君淮南王曲漢武好神仙淮南去不還徒令風雨客感淚茂陵阡獨漉篇求祿求祿清白不濁清白尚可貪汙殺我明明日月麗乎太清明君當寧明臣在廷賞不虛功刑必當罰孰將溷溷我寧察察濯乎不汙皭乎不緇莫夜之金弗替於懷幸甚至哉歌以言志自君之出矣自君之出矣花開又花謝思君如日月耿耿晝復夜自君之出矣徒守零落耳思君如車輪輾轉愁不已自君之出矣琴瑟何曽御思君如落葉蕭瑟悲秋暮明鏡篇開鏡珠璣匣盤龍百鍊金使君持照妾不解照君心采蓮曲蓮子復蓮子苦心郎不嘗為郎剝蓮子蓮子憶空房汴隄樂已信隄名汴誰教栁姓楊龍舟行樂地不得復歸唐王孫曲春來百種草無那怨王孫迷却郎歸路萋萋不斷根夜夜曲蕙花空帳不生春香壁泥紅墮網塵微步姍姍燈影裏金屏夜降李夫人題柯敬仲梅花竹石圖夜寒起坐看龍影金閣罘罳小殿東夢覺香吹梅子樹玉文堂上月方中題李遵道小寒林圖寫廉夫詩後溪泉溪樹滿春青寫入桃源翡翠屏揚子風流那可得為渠安箇鐵崖亭行路難十二首贈君蒲萄之芳醇璚瑰玉珮之鏘鳴昆吾鹿盧之寶劍空桑龍門之瑟琴紅顔暉暉不長盛流光欺人忽西沈願君和樂兮欣欣聽我長歌行路吟不見陸機華亭上寥寥鶴唳詎可聞朝愁不能驅暮愁不可處中區何狹隘乘雲汗漫瑤之圃爰從王母訪井公復約元君謁東父靈桃花開銀露臺玉文棗熟青琳宇我願於焉此中息錫以遐年永終吉君不見草木榮復凋青青摧折風霜朝人生寓一世何異石火飛流猋貴賤壽夭百千殊死者前後孰可逃當年稱意即可樂烹羊炮羔召同僚莫令閒慮損汝神未老面黧毛髮焦岡頭松柏多髙墳聲譽俱隨塵壤消令人及此志沈菀上堂鼓瑟歌詩謠門前十字街車輪馬腳不可遮馳名逐勢死不畏赤手生拔鯨魚牙得之未足為身榮敗者顛倒紛若麻嗟豫無能守命分樂取意適不願奢諸君惘惘胡不思來日苦少去日多丈夫闔棺事始定何用無益長怨嗟秦女卷衣咸陽宫蘭烟桂霰茱茰芳泥金爛爛輝五采新衣新賜蘇合房朝擁羣仙行羲和御車駕飛龍莫從天女游月中吹笙鳳鳴空君恩恐移今已衰羞將淚滴紅芙蓉寧作蓬池並翼鳥飛飛到死匹雙雙離離西園草翩翩蝴蝶飛憶昔與君婚媾時年華容色兩相宜死生謂我不棄置中心不合勢必離還君金鑮畫搔頭不忍與人結相思今日復明日年年月月從此積一年三百又六旬强半夜消五十刻豫年四十貧不仕戚戚何日展顔色看花抑鬱與誰語對酒倣徉不能喫諷誦書詩百家言脣腐舌秃齒臲卼眼中靡曼盡年少靦然面目豫不識不知主之何者神彼此薄厚胡不均人言人有願願至天必成兒子長大力田穡有酒樂我平生心蹙蹙靡所騁出自城北門顧瞻荒丘中鬱鬱蹲石麟石闕字漫漫不知何代貴者墳形骸已滅魑魅跡物化盡為狐塵吁嗟漢家陵闕荒無主青山落日秦川下猶聞樗里有智人天子之宫夾其墓今日休論智與愚昔人意氣復何如願借飄颻丹鳳舄與子錬形入雲墟庭前芳樹花參差歲歲爭新滿舊枝開白開紅接芳葉撩亂二月三月時昔日美人顔似花看花暮去朝復來紅袂羅襦炫香露青天白日春風吹而今零落少顔色見花惋惋含悲思百年何人得長好歎息謂君君不知長安豪俠無所憂紅雲百尺起髙樓簾櫳玳象織為席麗服綺食擬王侯黃金買妾㺯嬌彈銀鞍走馬逐貴游不知仁義何辨為孔墨不知事業何重為伊周他人叩之無一言磈然坐待歲月遒天意茫茫胡可道夷叔餓死顔回夭君不見落葉辭故枝南東北西從風吹君不見薤露何易晞人死一去無還期君於此時坐憂老不知日月疾若馳冨貴在天那在我爭者招尤速其禍且從陳遵投轄飲適喚王戎如意舞以兹日夕意歡樂昔人愛酒苦不足達生委命皆有然君獨胡為自拘束君不見信陵君仁而下士有名聲步從毛薛游盡禮于侯嬴食客無慮三千人何况大國一個臣東閣虛席生埃塵縱使蘇秦生乎太平世閉口結舌難列陳陌頭采桑悲好春秋風落葉愁殺人豈獨推移感時序念君客游恆苦辛鴻雁秋髙斷邊色蠨蛸露寒流網塵豈無膏沐可為容愛而不見心孔癲憂來不覺沾裳衣援琴未鳴聲已悲怨妾㷀㷀而獨處羞見合歡雙鳥栖君不見流水泯泯去不還日月逐逐曽無閒人生長恐死催促富貴早來開我顔飲酒飲不多直愛美人揚美歌只今愛樂亦巳晚過眼百年能幾何題倪元鎮畫雲林圖鬱鬱倦時燠雲漢雨如洗美人既云遘胡寧不欣喜微烟朧夕樹鮮月度秋水人生豈無適所適當在爾踏踘篇和鐵崖韻四首簇花小銀雲作團雙尖繡襪星流丸金蟬束腰燕盤盤燕盤盤綵門下第一名齊雲社倡園小奴花箇箇踏踘朝朝花裏過叉墜蜻蜓髻倭墮髻倭墮玉瓏璁嬌倚樹雙臉紅緑雲草色光如苔綵樓紅扇相當開美人凌波蹴月來蹴月來不墮地袖回風動羅袂花落水流春滿路走紅踏踘羅塵步繡襦鴛鴦暖香霧暖香霧酒光獰紅映肉太嬌生和李長吉馬詩草三首騄驥連錢動金鞍鏤玉羈無人尋穆滿借與閬風騎肉礧錦纏鬃流雲汗似紅太平無戰伐驂驔走沙蓬龍性非凡質騰波出紫雲檀溪飛過日應識漢將軍繡霞橫虎脊珠汗抹龍章落日青葱嶺霜髙草色黃龍印留官字霜花剝暗毛長鳴愁顧影秪憶九方皋霞目鏤金鞍霜蹄削玉寒曉看經邏些暮已驀樓蘭瘦骨如山立臨流飲渴虹誰憐中道棄苜蓿老秋風出河氷在鬛昂首動驚飈伯樂不再活誰復振金鑣神駿知無匹驍騰絶域來流沙一丈雪夜拂白龍堆天子飛黃馬牽來賜近臣玉階新雨過風滚落花塵內廄玉花驄斑斑噴肉騣奚官新浴罷沙苑踏春風佛郎通上國萬里進龍媒曉日開閶闔虹光射玉臺天馬誰能馭和鸞駕紫微年年清暑去霹靂逐龍飛大奴司虎苑驃騎牧龍廷不擬歌秦驖重看賦魯駉騋牝三千匹雲屯十二間六飛當御駕喜色見龍顔霧漲蒼龍鬛風鳴紫玉珂駿羣空冀北天象動榮河踣闕超雲影拳毛散玉花相將馳鳳苑寧復困鹽車𤣥宗愛舞馬錦色看如雲離宫三十六樂動半天聞赤驃何神駿應憐識者稀賢材生並世騰踏看追飛莫言淹皂棧也㑹踏祥麟逐電疑無影如龍自有神煌煌金絡腦裊裊紫游韁看花不畏晚相逐過橫塘秦皇七匹馬追風箇箇輕不聞東海北采藥上蓬瀛驥子大宛種房星夜降精漢家求不得兵壓二師城題仙山樓觀圖五雲樓閣世間無日月龍光出綺疏王母衆中金羽蓋雙成扶下紫雲輿題美人圖上清宫殿五雲車降下仙人蕚緑華怪得雪衣無箇信只將條脫寄羊家題詩意圖鬱金堂上春濃否薄薄羅襦杏子紅白日繡窗鸚不語都緣詩思落花中題倪元鎮畫不見草堂榿樹西早來雲氣忽相迷野老回船怕風雨竹雞柵裏莫教啼題秋山圖山上浮雲天幾重秋髙華散玉芙蓉好擕謝朓驚人語醉裏來登落雁峰絶句沙洲蘆葦如城郭水深門前百丈洪老漁晒網卧日裏稚子捉船行水中楊栁蓋江花蓋屋就中二月覺春多一雙白鵠浮新舫窄迹紅雲踏艷歌髙桃花發江林裏蝶㺯鸚銜四散飛便開金􅊦留連看莫放青春冉冉歸可惜清明雨也晴好春須看水東亭桃花如馬斑斑色楊栁藏鴉樹樹青芣苡新生蓋地面辛夷髙開滿上頭生憎雨惡兼風惡轉益朝愁復暮愁雨多二月連正月草沒南園與北園一面無情花片片百般如怨鳥言言崑山謠送友人吳東之州婁東江民廬矗矗如蜂房官車客馬交馳橫紅塵軋投康與莊雞鳴關市森開張珠犀翠象列道旁吳艎越艦萬首驤大帆雲落如山崩舟工花股百夫雄蠻音獠語如吃羌水仙祠前海茫茫魚鱉作道虹作梁龍堂貝闕當中央靈女緩歌吹笙簧馮夷伐鼓相鏗轟或乘飛龍下滄浪大檣小檣火流光翠旗摩雲互低昂左驅勾陳右攙搶天子錫命祀南邦重臣下拜靈慈宫太平無象躋成康吾州富庶文物昌厥田下下賦下上歲貢天府民職恭君子誾誾講虞唐小人業業為工商大夫從事舉賢明堂曹僚屬登其良王郎作掾材用長理煩剸劇乃不蘉自少軒輊有父風穰穰學業盈囷倉乃翁七十鬚眉蒼二三昆季故昂藏中郎虎髯黠而彊誠心懇懇愛其兄願汝忠謇為國楨子孫慈孝百祿將願集中正以為裳願以仁義雜為珩願言揖子以為明德音秩秩亦孔章天台行送友人吾聞天台山一萬八千丈赤霞壁立百雉城閶闔天開勢摩蕩瓊臺雙闕雲幾重羣山俯伏華頂雄靈仙𤣥聖所窟宅紫氣倣佛飛遊龍滄溟直下但如沼青烟東望蓬萊小火珠光動金銀宫日月跳丸幾昏曉丹崖氣散如飛霜草木冬夏涵天香羽人霄蓋擁旌節雨衣雲帶雙翺翔石橋飄眇那可度憑雷躡雲天所怒不知方廣今有無如何絶却人間路有客有客多好奇方舟明日過靈溪青山之谷事幽討手援芝草歌古詩贈卜香印錢道人吾聞軒轅師廣成仙成騎龍鼎湖升獨遺弓劍在人世白雲冉冉連星辰崆峒洞天三十六日月珠光照龍燭何年贈汝棗木盤玉字靈香勘神卜道人十口家一船瓦盤沽酒有酒錢桃花洞洞紅滿煙塵流一隔三千年送道士游武當武當諸峰何壯哉大朵小朵青蓮開𤣥聖中居天地户赤日下照金銀臺神龜六眼電光走山鬼一足雲頭來道人再拜望北極應帶滿身星斗回奉同袁子英柬呈楊廉夫先生楊子十年官不調如此永州文力何洞庭鐵笛龍吹得天上瓊書鶴寄多車子看花將一兩雪兒行酒艷雙歌時時對客教絃索繡領單衫月色羅和讀季五峰集先生住婁八十日金石遺音手自題人物風流擬江左文章典雅重淮西鳳來山郭時稱瑞鯨破滄溟勢欲齊著作新文徵士詔天光久待照青藜桂花曲花開沓沓金為粟葉密藂藂翠蓋烟不分月中惟一樹要將秋色種諸天欸乃歌詞有序吳興卜者浮舟為家遨遊往來具能道山水之勝請豫言其狀如杜之歌䕫州禹錫之竹枝也因製欸乃新詞五章遺之言固鄙俚不能當古作者然或逺方懷其風俗使歌之亦足樂也榻頭船子小如車賣卜逺遊屬當家直到年頭與年尾不開看月即看花芙蓉秋裏繞城開溪月溪烟幾畨來駱駝橋頭有酒賣鷗波亭下棹船回道場何山山最雄辨中形勝聞吳中七十二峰菡萏緑四月五月楊梅紅上塘船行無斷頭下塘船少好安流兩岸青山天上坐看山吹笛上杭州城東城西楊栁多女郎不唱本鄉歌那箇新傳欸乃歌落花風裏奈春何江南采蓮曲涉烟采芙蓉湖波蕩秋響天開明鏡入鳥下青菰蔣佳人弭輕楫緑水歌兩兩江南有愁思落日空蒼莽春愁曲春陽動宫沼花色眀闌薄文鶯穿栁過黃蜂粘絮落霓裳久不舞叢簧愁未灼寧知色易衰秪念恩如昨媫妤怨宫雲罥珠户漢月下金掌露華生夕氣隂蟲亂秋響紈扇君不御獨夜秋恍恍佳人難再得棄捐空懷想無題和袁子英雲中錦隊衛旌幢帝子乘船思滿江不惜鳳絃閒寶瑟却教龍女護瑤窗淚花筠竹波千頃愁雨蒼梧玉一雙萬古湘南遺廟在至今清怨未能降瓊宫花發滿神皋花下吹笙紫繡袍不學鳳臺秦㺯玉也歌樂府鄭櫻桃珊瑚舊夢留春枕椒桂新香暖夜醪轆轆羊車過别院迎看星斗覺心勞繞帳犀珠星影移銅華鋪首囓雙螭守宫㸃臂斑斑血結帶同心寸寸絲機上金梭回艷錦篋中玉子卜靈棋飛花解繫相思否莫倩韓家賦栁枝紫殿長楊滿路塵驪山荒草沒麒麟伶𤣥作傳進飛燕李白歌辭忤太真舞袖夜虛金掌月香囊魂墜紫絲茵可憐傾國傾城曲一度秋風一愴神寄青龍瞿慧夫博士醉眠亭上追游日為惜髙情對物華草巷鬬飛花鴨雨竹沙深映白鷴罝叢叢山影侵雲直一一人家落路斜近報風流多述作門生若箇是侯芭次陳敬初見寄二首兼懷張仲敏至正天子明聖君早聞羔雁聘陳羣河清地應千年瑞星聚天回五色文遂有青鸞鳴桂樹也憐黃鵠伴沙雲詩筒坐得蘇臺使百過愁吟到落曛論交長歎白頭新傾蓋相知定幾人照世豈無麟閣畫買田且卜草堂鄰南州人物皆零落西漢文章尚雅馴好竹每懷張仲敏泠泠風骨水為神題娑羅室娑羅樹下幽人室山氣因之與秋碧古色猶栖竺國雲絶頂仰見扶桑日太隂垂地風雨㑹百尺撐空鬼神力醉呼北海起九原為爾重鐫青石壁書聲齊詩為姚子章賦幽人一室開風露坐想瀛洲玉為署把書夜誦秋滿空徘徊花影蟾蜍樹蓮葉艇子風泠泠太乙下照藜火青笙簧塞耳洗不醒漻哉太音誰得聽緑隂亭為顧晉道賦時與姚子章于彥成歌亭子上緑隂亭上夏五月瀛洲上客與俱來日出衆鳥繞屋語竹深好花當塢開鏡裏水涵萍似粟席間雲落酒如苔更貪賀監清狂甚艇子朝朝暮暮回次西隱寺興上人韻練折之西西隱寺開殿江波到寺前共命鳥飛花似雪多羅樹濕水生烟寄箋相憶遙憐汝把酒重來動隔年猶記别時春色裏滿城蝴蝶落花天送僧歸江隂山寺昔葛洪騎狼入此山孰知揚子江頭寺寺門髙髙樹裏開仙翁已乘白狼去古佛或騎青象來春動水流無底谷天晴雲覆散花臺山中邑子正憶汝恰得飛空一錫回寄陸良貴堂館緑隂皆面水圖書烏几喜無塵棕櫚交葉才遮井菡萏傾花故向人世事從渠寧分拙交游于爾覺情親澧蘭沅芷秋風裏明日南雲别更新送趙季文之湖州知事送子作官山水郡掾曹日日簿書稀放生池頭看花去浮玉山前載酒歸芙蓉入簾秋雨落䆉稏滿天寒雁飛即聞善政歌賢德還見清光照紫微天馬二首佛郎獻馬真龍種六尺之髙修倍之圖畫當今屬周朗歌詩傳昔敕奚斯空聞市骨千金直不羡窮荒八駿馳有客新來聞此事與君何惜滯明時四年逺涉流沙道筋骨權竒舊肉騣曉秣龍堆寒蹙雪晚經月窟怒追風漢文千里知曽却曹霸丹青貌不同拂拭金鞍被來好幸陪天廏玉花驄雜詩靡靡輕薄子沓沓肩相摩營營樊中蠅撲撲火上蛾趨利不顧生是非搆讒邪所得不既少所喪良已多凄風遍大野不久當如何滔滔夏孟月桃李春已矣庭前樹扶疏其葉互相倚梧桐一髙蓋碧氣䕃清美曨曨屋東日連隂密無比當晝無穿影西枝覆流水鋪牀終日坐兒女且歡喜有酒輒持飲聊樂我云耳貴者日以驕富者日以侈古人云已亡誰下白屋士京畿連大宅新賜公侯第桂樹夾道生臺觀迎風起歌塵玉階側棲鳳金窗裏秦娃當妙選趙舞飄輕體大兒尚書郎小兒參國議中兒權最隆出入侍天子七葉輕漢貂八達哂周士馮唐亦何命白首賤如此桓王墓客行古城下下有桓王墓古城多秋草牛羊下來暮湘絃曲竹啼非染露山眩乃疑雲靈瑟傳神語休令帝子聞起夜來秋生臨水殿月過望仙臺歌吹無聊賴愁吟起夜來陸定之印為陸仲安賦陸家漢印吁亦絶金窠籀文盤屈鐡斯人已矣世無傳千載得之名不滅何用兵家虎作符空聞澤國龍為節勗哉玩物古有言願子文章照前烈歲盡寄瞿慧夫瞿子作官無暇日南園臘盡未還家禁春微雪青青草照眼疏枝細細花五兩即看飛落日屠蘇應待酌流霞詩成無使能將意鳬雁寒雲滿白沙水閣書事寄鄭明齊方橋匼匝小如亭山色傾江滃滃青雨裏芭蕉憐畫扇花間鸚鵡惜金屏誰傳鴻寶中篇術自寫黃庭外景經練水東頭三十里何人識得伍喬星答昌維清兼柬鄭遂昌葛可久滄洲解纜不十日相憶題詩寄闔閭常怪接輿歌鳳鳥因憐爾雅注蟲魚台州司户頻相問勾漏仙人好附書况汝才華今亦盛五雲坊裏看徵車擬杜陵秋興八首露下大江江雁橫窮秋搖落喚愁生波濤百里風連海砧杵千家月滿城佩劍衝衝龍匣動巢笙夜夜鳳臺清還同使者將秋色一到銀河且濯纓東過秦皇渡海矼波聲雲影落漎漎君平漫識支機石帝子應愁鼓瑟窗鳳穴朝陽鳴好樹槎頭秋水釣空江坐來清漏荒城斷愁絶飛蓬老鬢雙海門八月雨清霜可怪殘雷未肯藏虹霓斷江將雨映駕鵝背日與風翔羅含自老黃華宅裴度重來緑野堂衰暮閉門懷故舊豈因吹笛滿山陽巍巍北斗夜闌干盛世無憂行路難轉粟帆檣遼海濶舞階干羽獠夷安黃河正道流應復白月空江卧獨看願借雙飛珠樹鶴清游一接鳳池翰灤水秋風曉夜催上京宫殿護蓬萊扶桑日近龍波湧閶闔天髙象駕回綵仗齊迎千騎發翠旗遙接五雲來揚雄漫有河東賦流落何人一薦材江上青山接甬東離離禾黍館娃宫芙蓉舊苑長洲裏麋鹿荒臺落照中銀海雁飛沈夜月金莖露冷擢秋空可憐蕭瑟江關暮詞客哀吟思不窮金陵佳麗帝王州今古登臨送客愁玉樹雲連鳷鵲觀青山日落鳳皇丘荒城併與烟蕪沒故國空餘漢水流渺渺江湖頻入夢蕭蕭天地不勝秋落日江南發棹歌楚王宫廟鬱嵯峩雨經巫峽朝雲濕木落洞庭秋水多璧月銀河空復在玉簫金管奈愁何只今文藻悲遷客何處波濤弔汨羅春閨曲緑樹鶯巢遍紅簷燕語頻所思猶逺道何用慰芳春寄衣曲蠶歲既巳畢鶯時俄復換早製邊上衣秋來愁緒亂送逺曲神京佳麗地萬户復千門看花三月裏慎莫過倡園七月發揚子八月過黃河到京書便寄北來鴻雁多送林尊師昔謁崑侖華蓋君芙蓉旌斾雨紛紛燭龍銜火朝飛海笙鳳乘風夜入雲偷得玉桃如赤日孏將瓊笈校𤣥文倘其歸去容成洞采拾金鵝幸見分次鄭明齊柬俞彥莊韻萱草羅生已滿院篔簹初種欲遮鄰廚中雙魚好作鱠階下獨鶴長比人久欽陸賈為新語况以荀卿得大醇白首相逢在江海紫微終願召絲綸題沈君錫畫木君不聞莊椿春秋八千嵗又不聞蟠桃一實三千齡不知此木歷年幾百萬雲氣下上摩空青羲和馭日海底出白銀宫闕榑桑暾嗟哉沈君筆力能扛百斛鼎旋轉造化何其神蛟螭走壁白日動列缺御氣流風霆勇如陸地蕩舟子凛若漢廷折檻臣車行下走九折坂劍化躍入延平津大枝輪囷小枝偃千千百百子若孫六月赤日天無雲珊瑚水屋常隂隂與君展席坐其下聽我醉讀南華經懷張心田若人清事也無涯客去談詩到日斜愛畫龍眠好頭赤凌霄不掃落來花題仙山圖三峰鼇背起中央繡角塗疏白璧堂秦觀東南呈海色方壺曉夜發天光五芝烟裏游羣鳳巨勝華邊卧白羊闕宴門雙玉雁憑陵八極俯茫茫館娃曲館娃催賜宴西子猶酣酒龍輿下雲旗鳳樂迎王母銀橋星似燭翠扇花連牖歡樂殊未終鴉噪城頭栁堤上行碧水樓臺三月春蠻兒箇箇唱歌新通海坊中人作市靈妃宫裏樂迎神四月南風海岸深青旗髙髙樹隂隂三江潮發來如馬五兩風搖密似林髙麗女兒珠腕繩玉環穿耳坐船棚絲為帆繂朝朝揚銅作琵琶嘖嘖鳴秋夜曲玉階月夜千愁色秋水秋波振草凉烏桕風髙吹斾斾紅蕖露冷墜房房櫂歌行春江花栁月水色碧草滋嬋媛競游盤棹歌樂芳時寶珥薰麝蘭羽蓋翔鳬鷖臨流激遺響窈窕飄鶯詞竟欲整輕橈泝洄往從之落日大江平愴然生逺思白頭吟皚皚山上雪雪積復還滅皎皎雲間月月圓有時缺周公大聖當國時流言况也讒間之結交以面心乃爾白頭不若新相知漢家宫闕長門道花發年年怨春草今朝寵固色未衰明日怨多恩反少今人輕薄懷古人古人轗軻常苦辛蘭陵廢死不歸楚嗚呼此意吾誰陳棄妾怨棄妾不足惜顧顧懷君深奉妾合歡帶繫君明日心連理樹堂前好雙樹枝合葉交遮時有鴛鴦鳥來銜並蒂花征婦怨君久戍逺磧妾愁在空幃不得如青草隨春上君衣春波曲妾家紅蕖曲緑水春滿滿鸂鶒不肯飛雙棲落花暖栁枝辭濯濯金明栁年年照妾容飛花怨春盡落日度江風精衛辭海水深無底百谷流瀰瀰精衛銜木石之死心不移蓬萊幾清淺㑹有揚塵時眼中怨與海水平鳥飛不惜翅羽垂望夫石亭亭望夫石化石石作心丈夫無死節婦人那可輕山花滿頭雲作衣日日望夫夫不歸夫不歸淚如水至今水流流不止繫子詞鄧家兒鄧家兒長繩誰繫髙樹枝父母各逃生兒死亦孔悲弟亡一息不可棄兒雖當棄忍繫之鄧家兒哭奚為天乎天乎豈無知次韻寄野航十日不見華州掾定是清迂在箇邊青壁緑雲題石閣白沙留月繫湖船娟娟酒落杯香細暗暗梅堆雪色鮮歸來且樂歲年暮何問他儂識太𤣥宴吕敬夫水閣暮春三月之佳日畫裏看花小閣杯一雙皓鶴巡池走百葉緋桃映綬開卷幔不知雲亂入題詩應怪雨相催武陵何處能忘世莫遣閒人取次來題野航壁大樹小樹屋東西癭頸鵓鴣來上啼明朝艓子坐天上野水壓江江月低吕誠字敬夫吳之東滄人幼聰敏喜讀書尤長於唐三宗師楷法時東滄之俗尚靡獨能去豪習事文雅故名士咸與之交家有來鶴亭梅雪齊日與郭羲仲陸良貴倡和其間詩意清新不為腐語東滄之人多誦之七月十五夜對月分韻樓字東池月滿重開席不減當年庾亮樓每為人生須縱飲固知物色總難留螢光過幔還星散雲氣行天似水流最憶故人秋滿眼山隂何處有行舟雜詩五首三月江南渡行春屬晚晴留連花下䑽釃酒待潮生開船收雨色新水達春江鸂鶒元無侣雎鳩自一雙青天歸雁喜密樹坐鶯深落日春愁裏懷人浩蕩心城門踏青草城下楊花度荒壠無耕人三月輸官賦近江喬木裏彊半棣花栽葉覆青青蔓相沿别樹開和陳敬初韻呈鐵崖先生洞庭山中鐵笛君詩家推激總無羣星辰鬱鬱豐城劍科斗森森孔壁文鑿垣久已思顔闔載酒應須問子雲好向水晶宫闕裏讀書結屋坐朝曛倣李商隱一首華落銅盤蠟炬融逶迤春色照芙蓉當筵行酒金叉側隔座吹笙繡幕重巳有鸞刀飛鱠縷未須翠釡出駝峰夜深環珮雲中過宛在瑤臺月下逢登澱山寺一上湖南澱山寺寺門髙開秋樹顛下界雲烟惟一氣八方樓閣駐諸天無風靈籟時生壑深夜神龍或起淵我獨題詩此臨眺寥寥宇宙幾千年懷友夏夜景幽靜齊閣臨前池當檐素月流舉扇凉颸吹參差丹棘花婀娜紅蓮枝玉人美無度耿耿勞我思江水辭送友人之龍江江水一百里南風一日程飛華多意緒相逐柁樓行江水一百里上有蘭與芷采之遺所思含情似江水采蓮曲和鐵崖先生刺船水中央櫳船乘晚凉近畨灘上過葉裏好鴛鴦盈盈藕上花采采墮清淚願將心中絲繫君雙玉佩踏踘篇和鐵崖先生江南稚女顔色新百花樓前踏繡輪紅蕖小襪不動塵不動塵放嬌態微風來舞裙帶芙蓉小踘踏曉風金璧步搖聲丁冬繡衫窄窄交斜紅交斜紅露玉腕揮紫綿浥香汗草堂紀事六月四日登草閣雲薄林深暑氣消無賴野鶯飛箇箇不知風雨一朝朝池上戎葵髙一丈白白朱朱復可憐近報彩舟來浦口頻開金􅊦向花前過沙湖賦竹枝詩白沙湖頭月色新白沙湖裏水如銀可是吳宫雙玉管聽得一聲愁殺人題萱蝶圖堂前萱草散滿地朵朵幽華也可憐絶愛篔簹相映帶生憎蛺蝶舞留連和靖看梅圖西泠橋下林家墓猶有舊時無數花孤雲何處雙飛鶴落日鵁鶄滿白沙舟中三首潮發江門百餘里曉過芙蓉湖上頭嫋嫋秋風吹櫸栁層層雲氣蓋船樓無數星光燦秋色即看露氣薄人衣逶迤流吹天頭落潑刺驚烏樹裏飛天河垂地月光白荻岸秋連野水青浪靜野鷗來片片櫓搖楓葉下冥冥渡吳淞江九月渡江江水落荻花岸岸與秋連沙橋敧側平當樹江鶴翻回巧觸船送姚子華浙東帥府掾姚郎辟舉南州掾炳炳才名蚤歲收幕府簡書閒白晝㦸門旌斾卷髙秋花開擬上瀛洲看酒熟頻為鑑曲游北來或有雙魚使煩寄新詩寫我憂草堂雅集卷九

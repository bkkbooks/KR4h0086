行路難轉粟帆檣遼海濶舞階干羽䝤夷安黄河正道流應復白月空江卧獨看願借雙飛珠樹鶴清游一接鳳池翰灤水秋風曉夜催上京宫殿䕶蓬莱扶桑日近龍波湧閶闔天髙象駕迴綵仗齊迎千騎發翠旗遙接五雲来揚雄漫有河東賦流落何人一薦材江上青山接甬東離離禾黍館娃宫芙蓉舊苑長洲裏麋鹿荒臺落照中銀海雁飛沈夜月金莖露冷擢秋空可憐蕭瑟江闗暮詞客哀吟思不窮金陵佳麗帝王州今古登臨送客愁玉樹雲連鳷鵲觀青山日落鳳皇丘荒城併與烟蕪沒故國空餘漢水流渺渺江湖頻入夢蕭蕭天地不勝秋落日江南發棹歌楚王宫廟鬱嵯峩雨經巫峡朝雲濕木落洞庭秋水多璧月銀河空復在玉簫金管奈愁何只今文藻悲遷客何䖏波濤弔汨羅春閨曲綠樹鶯巢遍紅簷燕語頻所思猶逺道何用慰芳春寄衣曲蠶歲既巳畢鶯時俄復換早製邊上衣秋来愁緒亂送逺曲神京佳麗地萬户復千門看花三月裏慎莫過倡園七月發揚子八月過黄河到京書便寄北来鴻雁多送林尊師昔謁崑侖華盖君芙蓉旌斾雨紛紛燭龍銜火朝飛海笙鳳乗風夜入雲偷得玉桃如赤日孏將瓊笈校𤣥文倘其歸去容成洞采拾金鵞幸見分次鄭明齋柬俞彦莊韻萱草羅生已滿院篔簹初種欲遮隣廚中雙魚好作鱠階下獨鶴長比人久欽陸賈為新語况以荀卿得大醇白首相逢在江海紫微終願召絲綸題沈君錫畫木君不聞莊椿春秋八千嵗又不聞蟠桃一實三千齡不知此木歴年幾百萬雲氣下上摩空青羲和馭日海底出白銀宫闕榑桑暾嗟哉沈君筆力能扛百斛鼎旋轉造化何其神蛟螭走壁白日動列缺御氣流風霆勇如陸地盪舟子凛若漢廷折檻臣車行下走九折坂劍化躍入延平津大枝輪囷小枝偃千千百百子若孫六月赤日天無雲珊瑚水屋常隂隂與君展席坐其下聴我醉讀南華經懐張心田若人清事也無涯客去談詩到日斜愛畫龍眠好頭赤凌霄不掃落来花題仙山圖三峰鼇背起中央繡角塗疎白璧堂秦觀東南呈海色方壺曉夜發天光五芝烟裏游羣鳳巨勝華邊卧白羊闕宴門雙玉雁憑陵八極俯茫茫館娃曲館娃催賜宴西子猶酣酒龍輿下雲旗鳳樂迎王母銀橋星似燭翠扇花連牖歡樂殊未終鴉噪城頭栁堤上行碧水樓臺三月春蠻兒箇箇唱歌新通海坊中人作市靈妃宫裏樂迎神四月南風海岸深青旗髙髙樹隂隂三江潮發来如馬五兩風搖宻似林髙麗女兒珠腕繩玉環穿耳坐船棚絲為帆繂朝朝颺銅作琵琶嘖嘖鳴秋夜曲玉階月夜千愁色秋水秋波振草凉烏桕風髙吹斾斾紅蕖露冷墜房房櫂歌行春江花栁月水色碧草滋嬋媛競游盤棹歌樂芳時寳珥薰麝蘭羽盖翔鳬鷖臨流激遺響窈窕飄鶯詞竟欲整輕橈泝洄往從之落日大江平愴然生逺思白頭吟皚皚山上雪雪積復還滅皎皎雲間月月圓有時缺周公大聖當國時流言况也讒間之結交以面心乃爾白頭不若新相知漢家宫闕長門道花發年年怨春草今朝寵固色未衰明日怨多恩反少今人輕薄懐古人古人轗軻常苦辛蘭陵廢死不歸楚嗚呼此意吾誰陳棄妾怨棄妾不足惜顧顧懐君深奉妾合歡帶繫君明日心連理樹堂前好雙樹枝合葉交遮時有鴛鴦鳥来銜並蒂花征婦怨君久戍逺磧妾愁在空幃不得如青草隨春上君衣春波曲妾家紅蕖曲綠水春滿滿鸂鶒不肯飛雙棲落花暖栁枝辭濯濯金明栁年年照妾容飛花怨春盡落日度江風精衛辭海水深無底百谷流瀰瀰精衛銜木石之死心不移蓬莱幾清淺㑹有揚塵時眼中怨與海水平鳥飛不惜翅羽垂望夫石亭亭望夫石化石石作心丈夫無死節婦人那可輕山花滿頭雲作衣日日望夫夫不歸夫不歸淚如水至今水流流不止繫子詞鄧家兒鄧家兒長繩誰繫髙樹枝父母各逃生兒死亦孔悲弟亡一息不可棄兒雖當棄忍繫之鄧家兒哭奚為天乎天乎豈無知次韻寄野航十日不見華州掾定是清迂在箇邊青壁綠雲題石閣白沙留月繫湖船娟娟酒落杯香細闇闇梅堆雪色鮮歸来且樂歲年暮何問他儂識太𤣥宴吕敬夫水閣暮春三月之佳日畫裏看花小閣杯一雙皓鶴巡池走百葉緋桃映綬開巻幔不知雲亂入題詩應怪雨相催武陵何處能忘世莫遣閒人取次来題野航壁大樹小樹屋東西癭頸鵓鴣来上啼明朝艓子坐天上野水壓江江月低吕誠字敬夫呉之東滄人幼聰敏喜讀書尤長於唐三宗師楷法時東滄之俗尚靡獨能去豪習事文雅故名士咸與之交家有来鶴亭梅雪齋日與郭羲仲陸良貴倡和其間詩意清新不為腐語東滄之人多誦之七月十五夜對月分韻樓字東池月滿重開席不減當年庾亮樓每為人生須縱飲固知物色總難留螢光過幔還星散雲氣行天似水流最憶故人秋滿眼山隂何處有行舟襍詩五首三月江南渡行春属晚晴留連花下䑽釃酒待潮生開船收雨色新水達春江鸂鶒元無侣雎鳩自一雙青天歸雁喜宻樹坐鶯深落日春愁裏懐人浩蕩心城門蹋青草城下楊花度荒壠無耕人三月輸官賦近江喬木裏彊半棣花栽葉覆青青蔓相沿别樹開和陳敬初韻呈鐵厓先生洞庭山中鐵笛君詩家推激總無羣星辰鬱鬱豐城劍科斗森森孔壁文鑿垣久已思顔闔載酒應須問子雲好向水晶宫闕裏讀書結屋坐朝曛倣李商隱一首華落銅盤蠟炬融逶迤春色照芙蓉當筵行酒金釵側隔座吹笙繡幕重巳有鸞刀飛鱠縷未須翠釡出駝峰夜深環珮雲中過宛在瑤臺月下逢登澱山寺一上湖南澱山寺寺門髙開秋樹顛下界雲烟惟一氣八方樓閣駐諸天無風靈籟時生壑深夜神龍或起淵我獨題詩此臨眺寥寥宇宙幾千年懐友夏夜景幽靜齋閣臨前池當檐素月流舉扇凉颸吹參差丹棘花婀娜紅蓮枝玉人美無度耿耿勞我思江水辭送友人之龍江江水一百里南風一日程飛華多意緒相逐柁樓行江水一百里上有蘭與芷采之遺所思含情似江水采蓮曲和鐵厓先生刺船水中央櫳船乗晚凉近畨灘上過葉裏好鴛鴦盈盈藕上花采采墮清淚願將心中絲繫君雙玉佩蹋踘篇和鐵厓先生江南稚女顔色新百花樓前蹋繡輪紅蕖小韈不動塵不動塵放嬌態㣲風來舞裙帶芙蓉小踘蹋曉風金璧步搖聲丁冬綉衫窄窄交斜紅交斜紅露玉腕揮紫綿浥香汗草堂紀事六月四日登草閣雲薄林深暑氣消無賴埜鶯飛箇箇不知風雨一朝朝池上戎葵髙一丈白白朱朱復可憐近報彩舟来浦口頻開金􅊦向花前過沙湖賦竹枝詩白沙湖頭月色新白沙湖裏水如銀可是吳宫雙玉管聴得一聲愁殺人題萱蝶圖堂前萱草散滿地朶朶幽華也可憐絶愛篔簹相映帶生憎蛺蝶舞留連和靖看梅圖西泠橋下林家墓猶有舊時無數花孤雲何處雙飛鶴落日鵁鶄滿白沙舟中三首潮發江門百餘里曉過芙蓉湖上頭嫋嫋秋風吹櫸栁層層雲氣盖船樓無數星光燦秋色即看露氣薄人衣逶迤流吹天頭落潑刺驚烏樹裏飛天河垂地月光白荻岸秋連野水青浪靜埜鷗来片片櫓搖楓葉下冥冥渡吳淞江九月渡江江水落荻花岸岸與秋連沙橋敧側平當樹江鶴翻迴巧觸船送姚子華浙東帥府掾姚郎辟舉南州掾炳炳才名蚤歲收幕府簡書閒白晝㦸門旌斾巻髙秋花開擬上瀛洲看酒熟頻為鑑曲游北来或有雙魚使煩寄新詩寫我憂草堂雅集巻九

body:
  text: 草堂雅集巻九元顧瑛編郭翼字熙仲姑蘇之崑山人明敏博學不屑為舉業專志為古文詩尤精悍縉紳先生無不愛重之人言婁東之能詩者必曰東郭生云題張戡畫瘦馬圖瘦骨鋒稜珠汗落卧痕半襍古苔烟未脱將軍金匼匝又䭾兒女玉嬋娟倉皇日色龍沙外慘淡秋聲雁塞前神駿只今誰貌得開圖老眼一醒然宴婁東園分得五字韻迢迢望瀛洲流雲下東渚笛教仙人借酒使文君取篔簹寫林綠菡萏發江雨煌煌金閨姿天動星文聚華辭播蘭茝繁價登璚瑀龍鍔秋濤淨鳳羽雲色五燕遨亦云暢驩集那得屢驕驄蹋晚轡閣門凉月舉寄郯九成懐鐵厓且聞有挾璚花赴倪雲林之約府中從事近將書只道清狂事事無雪艇下来要陸倩雲林直去看倪迂醉時自舞鐵如意愁裏休歌玉唾壺揚子草堂頻有約速来滿擬為君酤江水辭二章江水一百里送君君去時丁寧桃葉渡莫唱渡江辭江水一百里江流七十盤初三弦上月相憶照彎環題宋髙宗便面康邸龍飛日中原不可支乗輿猶北狩淚濕畫中詩與野航汎舟綽山懐玉山綽山樹色青如薺蕩裏張帆曉鏡開烏目峰髙雲北下白沙湖濶水西来菰蔣打雨鳴還止鸂鶒迎船舞却囘好入闕盡祗慚揚馬是仙才樂府十六篇江南曲江南暄新花月天美人盤游緩愁年翠鬟姣春扶上船扶上船月如水霞盖車度花裏游女曲麝衣寳珞花氤氲芙蓉小釵金鵞裙流目艶艶思若雲思若雲可憐嬌玉條脫金步搖采蓮曲青溪小姑雙嬋娟蓬蓬荷葉金槳船含情戲采並目蓮並目蓮為郎喜刺滿莖傷玉指采菱曲湖灣小婦歌采菱盪舟曲曲花相迎花開鏡裏搖明星搖明星妬華月郎不歸怨花發陽春曲栁色青堪把櫻花雪未乾宫中裁白紵猶怯剪刀寒鳳臺曲聞道嬴家女吹簫入紫雲如何鳳臺上不棲祖龍君淮南王曲漢武好神仙淮南去不還徒令風雨客感淚茂陵阡獨漉篇求祿求祿清白不濁清白尚可貪汙殺我明明日月麗乎太清明君當宁明臣在廷賞不虛功刑必當罰孰將溷溷我寧察察濯乎不汙皭乎不緇莫夜之金弗替於懐幸甚至哉歌以言志自君之出矣自君之出矣花開又花謝思君如日月耿耿晝復夜自君之出矣徒守零落耳思君如車輪輾轉愁不已自君之出矣琴瑟何曽御思君如落葉蕭瑟悲秋暮明鏡篇開鏡珠璣匣盤龍百鍊金使君持照妾不解照君心采蓮曲蓮子復蓮子苦心郎不嘗為郎剝蓮子蓮子憶空房汴隄樂已信隄名汴誰教栁姓楊龍舟行樂地不得復歸唐王孫曲春来百種草無那怨王孫迷却郎歸路萋萋不斷根夜夜曲蕙花空帳不生春香壁泥紅墮網塵㣲步姍姍燈影裏金屏夜降李夫人題柯敬仲梅花竹石圖夜寒起坐看龍影金閣罘罳小殿東夢覺香吹梅子樹玉文堂上月方中題李遵道小寒林圖寫廉夫詩後溪泉溪樹滿春青寫入桃源翡翠屏揚子風流那可得為渠安箇鐵厓亭行路難十二首贈君蒲萄之芳醇璚瑰玉珮之鏘鳴昆吾鹿盧之寳劍空桑龍門之瑟琴紅顔暉暉不長盛流光欺人忽西沈願君和樂兮欣欣聴我長歌行路吟不見陸機華亭上寥寥鶴唳詎可聞朝愁不能驅暮愁不可處中區何陿隘乗雲汗漫瑤之圃爰從王母訪井公復約元君謁東父靈桃花開銀露臺玉文棗熟青琳宇我願於焉此中息錫以遐年永終吉君不見草木榮復凋青青摧折風霜朝人生寓一世何異石火飛流猋貴賤壽夭百千殊死者前後孰可逃當年稱意即可樂烹羊炰羔召同僚莫令閒慮損汝神未老面黧毛髪焦岡頭松柏多髙墳聲譽俱隨塵壤消令人及此志沈菀上堂鼓瑟歌詩謠門前十字街車輪馬脚不可遮馳名逐勢死不畏赤手生拔鯨魚牙得之未足為身榮敗者顛倒紛若麻嗟予無能守命分樂取意適不願奢諸君惘惘胡不思来日苦少去日多丈夫闔棺事始定何用無益長怨嗟秦女巻衣咸陽宫蘭烟桂霰茱茰芳泥金爛爛輝五采新衣新賜蘇合房朝擁羣仙行羲和御車駕飛龍莫從天女游月中吹笙鳳鳴空君恩恐移今已衰羞將淚滴紅芙蓉寧作蓬池並翼鳥飛飛到死匹雙雙離離西園草翩翩蝴蝶飛憶昔與君婚媾時年華容色兩相宜死生謂我不棄置中心不合勢必離還君金鑮畫搔頭不忍與人結相思今日復明日年年月月從此積一年三百又六旬强半夜消五十刻予年四十貧不仕戚戚何日展顔色看花抑鬱與誰語對酒彷徉不能喫諷誦書詩百家言脣腐舌秃齒臲卼眼中靡曼盡年少靦然面目予不識不知主之何者神彼此薄厚胡不均人言人有願願至天必成兒子長大力田穡有酒樂我平生心蹙蹙靡所騁出自城北門顧瞻荒丘中鬱鬱蹲石麟石闕字漫漫不知何代貴者墳形骸已滅魑魅跡物化盡為狐塵吁嗟漢家陵闕荒無主青山落日秦川下猶聞樗里有智人天子之宫夾其墓今日休論智與愚昔人意氣復何如願借飄颻丹鳳舄與子錬形入雲墟庭前芳樹花參差歲歲爭新滿舊枝開白開紅接芳葉撩亂二月三月時昔日美人顔似花看花暮去朝復來紅袂羅襦炫香露青天白日春風吹而今零落少顔色見花惋惋含悲思百年何人得長好歎息謂君君不知長安豪俠無所憂紅雲百尺起髙樓簾櫳玳象織為蓆麗服綺食擬王侯黄金買妾㺯嬌彈銀鞍走馬逐貴游不知仁義何辨為孔墨不知事業何重為伊周他人叩之無一言磈然坐待歲月遒天意茫茫胡可道夷叔餓死顔囘夭君不見落葉辭故枝南東北西從風吹君不見薤露何易晞人死一去無還期君於此時坐憂老不知日月疾若馳冨貴在天那在我爭者招尤速其禍且從陳遵投轄飲適喚王戎如意舞以兹日夕意歡樂昔人愛酒苦不足達生委命皆有然君獨胡為自拘束君不見信陵君仁而下士有名聲步從毛薛游盡禮于侯嬴食客無慮三千人何况大國一个臣東閣虚席生埃塵縱使蘇秦生乎太平世閉口結舌難列陳陌頭采桑悲好春秋風落葉愁殺人豈獨推移感時序念君客游恒苦辛鴻雁秋髙斷邊色蠨蛸露寒流網塵豈無膏沐可為容愛而不見心孔瘨憂來不覺沾裳衣援琴未鳴聲已悲怨妾㷀㷀而獨處羞見合歡雙鳥栖君不見流水泯泯去不還日月逐逐曽無閒人生長恐死催促富貴早来開我顔飲酒飲不多直愛美人揚美歌只今愛樂亦巳晚過眼百年能幾何題倪元鎮畫雲林圖鬱鬱倦時燠雲漢雨如洗美人既云遘胡寧不忻喜㣲烟朧夕樹鮮月度秋水人生豈無適所適當在爾蹋踘篇和鐵厓韻四首簇花小銀雲作團雙尖繡襪星流丸金蟬束腰燕盤盤燕盤盤綵門下第一名齊雲社倡園小奴花箇箇蹋踘朝朝花裏過釵墜蜻蜓髻倭墮髻倭墮玉瓏璁嬌倚樹雙臉紅綠雲草色光如苔綵樓紅扇相當開美人凌波蹴月来蹴月来不墮地袖囘風動羅袂花落水流春滿路走紅蹋踘羅塵步繡襦鴛鴦暖香霧暖香霧酒光獰紅映肉太嬌生和李長吉馬詩廿三首騄驥連錢動金鞍鏤玉羈無人尋穆滿借與閬風騎肉礧錦纏鬃流雲汗似紅太平無戰伐驂驔走沙蓬龍性非凡質騰波出紫雲檀溪飛過日應識漢將軍繡霞横虎脊珠汗抹龍章落日青葱嶺霜髙草色黄龍印留官字霜花剝暗毛長鳴愁顧影秪憶九方皋霞目鏤金鞍霜蹄削玉寒曉看經邏些暮已驀樓蘭瘦骨如山立臨流飲渇虹誰憐中道棄苜蓿老秋風出河氷在鬛昂首動驚飈伯樂不再活誰復振金鑣神駿知無匹驍騰絶域来流沙一丈雪夜拂白龍堆天子飛黄馬牽来賜近臣玉堦新雨過風滚落花塵内廄玉花驄斑斑歕肉騣奚官新浴罷沙苑踏春風佛郎通上國萬里進龍媒曉日開閶闔虹光射玉臺天馬誰能馭和鸞駕紫㣲年年清暑去霹靂逐龍飛大奴司虎苑驃騎牧龍廷不擬歌秦驖重看賦魯駉騋牝三千匹雲屯十二閑六飛當御駕喜色見龍顔霧漲蒼龍鬛風鳴紫玉珂駿羣空冀北天象動榮河踣闕超雲影拳毛散玉花相將馳鳳苑寧復困鹽車𤣥宗愛舞馬錦色看如雲離宫三十六樂動半天聞赤驃何神駿應憐識者稀賢材生並世騰踏看追飛莫言淹皂棧也㑹蹋祥麟逐電疑無影如龍自有神煌煌金絡腦裊裊紫游韁看花不畏晚相逐過横塘秦皇七匹馬追風箇箇輕不聞東海北采藥上蓬瀛驥子大宛種房星夜降精漢家求不得兵壓貳師城題仙山樓觀圖五雲樓閣世間無日月龍光出綺疏王母衆中金羽盖雙成扶下紫雲轝題美人圖上清宫殿五雲車降下仙人蕚綠華怪得雪衣無箇信只將條脱寄羊家題詩意圖鬱金堂上春濃否薄薄羅襦杏子紅白日繡牕鸚不語都縁詩思落花中題倪元鎮畫不見草堂榿樹西早来雲氣忽相迷野老囘船怕風雨竹雞柵裏莫教啼題秋山圖山上浮雲天幾重秋髙華散玉芙蓉好擕謝朓驚人語醉裏来登落雁峰絶句沙洲蘆葦如城郭水深門前百丈洪老漁晒網卧日裏稚子捉船行水中楊栁盖江花盖屋就中二月覺春多一雙白鵠浮新舫窄迹紅雲踏艶歌髙桃花發江林裏蝶㺯鸚銜四散飛便開金􅊦留連看莫放青春冉冉歸可惜清明雨也晴好春須看水東亭桃花如馬斑斑色楊栁蔵鴉樹樹青芣苢新生盖地面辛夷髙開滿上頭生憎雨惡兼風惡轉益朝愁復暮愁雨多二月連正月草沒南園與北園一面無情花片片百般如怨鳥言言崑山謠送友人呉東之州婁東江民廬矗矗如蠭房官車客馬交馳横紅塵軋投康與莊雞鳴闗市森開張珠犀翠象列道旁呉艎越艦萬首驤大帆雲落如山崩舟工花股百夫雄蠻音獠語如吃羌水仙祠前海茫茫魚鼈作道虹作梁龍堂貝闕當中央靈女緩歌吹笙簧馮夷伐鼓相鏗轟或乗飛龍下滄浪大檣小檣火流光翠旗摩雲互低昂左驅勾陳右攙搶天子錫命祀南邦重臣下拜靈慈宫太平無象躋成康吾州富庶文物昌厥田下下賦下上歲貢天府民職恭君子誾誾講虞唐小人業業為工商大夫從事舉賢明堂曹僚属登其良王郎作掾材用長理煩剸劇乃不蘉自少軒輊有父風穰穰學業盈囷倉乃翁七十鬚眉蒼二三昆季故昂藏中郎虎髯黠而彊誠心懇懇愛其兄願汝忠謇為國楨子孫慈孝百祿將願集中正以為裳願以仁義襍為珩願言揖子以為明徳音秩秩亦孔章天台行送友人吾聞天台山一萬八千丈赤霞壁立百雉城閶闔天開勢摩盪瓊臺雙闕雲幾重羣山俯伏華頂雄靈仙𤣥聖所窟宅紫氣彷彿飛㳺龍滄溟直下但如沼青烟東望蓬莱小火珠光動金銀宫日月跳丸幾昏曉丹崖氣散如飛霜草木冬夏涵天香羽人霄盖擁旌節雨衣雲帶雙翺翔石橋飄緲那可度憑雷躡雲天所怒不知方廣今有無如何絶却人間路有客有客多好奇方舟明日過靈溪青山之谷事幽討手援芝草歌古詩贈卜香印錢道人吾聞軒轅師廣成仙成騎龍鼎湖升獨遺弓劍在人世白雲冉冉連星辰崆峒洞天三十六日月珠光照龍燭何年贈汝棗木盤玉字靈香勘神卜道人十口家一船瓦盤沽酒有酒錢桃花洞洞紅滿煙塵流一隔三千年送道士游武當武當諸峰何壯哉大朶小朶青蓮開𤣥聖中居天地户赤日下照金銀臺神龜六眼電光走山鬼一足雲頭来道人再拜望北極應帶滿身星斗囘奉同袁子英柬呈楊廉夫先生楊子十年官不調如此永州文力何洞庭鐵笛龍吹得天上瓊書鶴寄多車子看花將一兩雪兒行酒艶雙歌時時對客教絃索繡領單衫月色羅和讀季五峰集先生住婁八十日金石遺音手自題人物風流擬江左文章典雅重淮西鳳来山郭時稱瑞鯨破滄溟勢欲齊著作新文徵士詔天光久待照青藜桂花曲花開沓沓金為粟葉宻藂藂翠盖烟不分月中惟一樹要將秋色種諸天欸乃歌詞有序吳興卜者浮舟為家遨遊往来具能道山水之勝請予言其狀如杜之歌䕫州禹錫之竹枝也因製欸乃新詞五章遺之言固鄙俚不能當古作者然或逺方懐其風俗使歌之亦足樂也榻頭船
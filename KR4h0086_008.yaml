body:
  text: 草堂雅集卷八元顧瑛編唐棣字子華吳興人由茂才仕至吳江州知州尹休寧時有善政民為立生祠能繪事嘗畫嘉熙殿為上所知尤長於詩有集行於時潮音渡送客潮音渡飛花春又殘隔溪聞笑語倚櫂看峰巒落日漾晴彩東風生曉寒往來人似織應羡獨憑䦨寄題謝子翼晚翠亭洞庭咫尺少經過嵐翠霏霏晚更多風作雨聲鳴墜葉雲垂秋影落滄波楓林賽社聞村鼓橘岸開船發棹歌欲泛空明三萬頃恨無題詠到隂何城西閒居久欲依山每恨遲居貧難辦買山資貪收古畫人誰購愛種名花手自移近日看書愁散漫經年晒藥補清羸裁詩寄與諸朝士還道如今老更癡古詩一首上復齊郎中吳蠶繅出絲如銀頭蓬面垢忘苦辛苕溪矮桑絲更好歲歲輸官供織造不知何歲轉省輸從此居民受煩惱今年省官賢且明省中庶務多變更我公首為去兹弊誰料寒谷春風生民作歌詩感公惠公心自與民情契願言積德遺子孫贊輔皇家千萬歲慈感寺溪上前朝寺人間古道場栁垂門外緑花發殿頭香雨榻晴猶濕風廊暑亦凉經僧旋繞處清磬散還長丁復字仲容天台人有盛名往年豫訪虛一趙真士於白鶴觀時公在座間後數年君去世檜亭集始行然多所遺落今所輯録皆補其缺其出處見檜亭集中山水圖飛流怒觸青崖急倒樹斜欹白漲深峽日曉晴生雨氣石林寒色起春隂豈無百丈牽江上應有孤猿惱客吟行路人間盡艱澀未應小米亦關心賦姚氏瑞竹軒想見靈萌錦籜兼露蕤戢戢長雙尖蒼擎漢使駢頭節翠擁吳姬總角闕迭和鳳聲風及檻並回鸞影月當簷何因末客勞前席相對此君長捲簾送余遵道之當塗學録兼柬嚴教授父子李伯羽昆仲楊公晚歲多髙弟余郎妙年初試官爛熟厭聞渠手熱瘦生從笑此肩寒開窗白鳥當書几把箸青山落飯盤監郡長侯賢特地下階相接愛儒冠嚴家父子賢橋梓李氏弟兄芳桂枝大白罌來須强酒小青衣至又傳詩庭槐夾道寒垂角泮水橫橋冷見眉頗怪東頭近州縣教成何日罷榜笞送一宗上人覲師秋浦因懷舊游奉悼印江宗公兼柬季瞻仁卿子和三徵士江色遙連池口山潮痕新上石頭灣阿師棒喝機鋒疾令子棹歌心宇閒春歸芳草落花外月出白猿青樹間水車嶺頭一相憶龍河寺裏幾時還二年秋浦將諸友兩寺春林喜醉回抵掌笑談空記憶上頭尊宿已凋摧奔流歲月尋常去倒上江潮日夜來好與長歌白石爛平天水色一銜杯送璟上人之武昌就道入京弔古且過鸚鵡洲觀光還到鳳凰樓乾坤百歲易遲暮風雨幾時今蚤秋南國每逢天際雁北溟不化水中鷗黃金軟貼伽黎色却愧蘇卿尚敝裘和唐長孺致仕歸黃山三十六嵯峨江上相逢碧玉珂社稷終淹長孺直文章每患士衡多教官不足先生飯詞客曽論織女梭石田茅屋歸來好安車蒲輪奈爾何蜀山寺江月樓髙僧愛居江月樓霜飛木落蜀山秋天空直與江無底月出獨登樓上頭烏鵲自驚迷島樹魚龍不動失沙鷗江流東去日西落白髮未知人世愁送慈上人游金陵吾鄉名彥俱見之吳門留滯未云遲杯前落日當人沒笑底春雲為客披一錫先期成獨往六朝遺跡許同嬉却為蕭寺斗酒飲浩歌須君詩句奇書唐仲實寄題紫陽山興道觀詩後萬仞花屏天下奇三十六峰遞參差仙人騎鶴夜度嶺客子問龍秋上池崖根一一十洲樹丹顆明明五色芝何年却送唐君去細和山中所賦詩賦得雨花臺送勝上人歸吳雲公髙坐講貝葉天女虛空散寶花緑草漫生新雨後青臺獨上夕陽斜眼中歷歷六朝樹海上翩翩五月槎雪色鱸魚生作鱠朱涇船子釣綸車題飛霞樓仙客離居帝子家朝朝樓上看飛霞九華山頂留鳬舄五色雲中接鳳車几上珠光紅似日庭前桃子大如瓜持杯更有憑髙興直道銀河泛海槎寄題湛碧軒伯生書古道南昌湛碧軒名方西國給孤園靜臨無地天垂蓋虛動承塵月湧盆雪氣兼浮寒竹繞秋聲微動夕花翻青城樵者遺題墨紫禁通宵幾夢魂五日登賞心亭秦淮之水繞郡流誰家後園紅石榴人間五日不作飲天上浮雲空自愁白髮尊罍將稚子畫闌珠翠賞龍舟回頭楊栁生新月騎馬朱顔擁從騶送御史自湖廣按部還遷內臺驄馬巡行楚子國詔書逺召江南還要令耳目在左右用廣視聽銷回姦鵰鶚橫空霜翮徑鯨鯢落波海水閒玉帛繽紛朝萬國却從東封祀泰山夀寧寺送僧歸永嘉清凉脫衆東甌去乍暖興孤南路賒總謂龍河新作寺終憐雁宕舊為家石闕或問菩提樹海國爭看優鉢花更道本來無所住尚看鳴錫帶飛霞懷虞伯生奎章學士虞夫子老向山中卧白雲祗為盛時成瑞物鳳皇鵷鵠自成羣懷李仲公閔子十年居白下仲公文字數相看信州河下扁舟泊風雨蕭蕭獨夢寒懷祝蕃逺白衣寺裏一尊酒語坐古藤將葛彞饒州博士應相憶獨上春山采紫芝懷危太朴十五年前危處士秦淮江上忽相逢眼中一一驚奇見如上崑崙羣玉峰懷汪伯羽桂櫨楩楠未盡識草草何堪别長公喜是鳳簫吹月下髙秋日日願東風題錢舜舉畫雞花前爭雄兩角勇花後伏雌孤哺雛忘身縱欲作花伍塞耳不聽時大夫孟氏山菴和劉堯佐韻緑映春林如積苔山翁仙去客能來松根斜日停杯看無數幽蘭花自開題謫仙觀瀑圖為方逺賦三生異精爽千載獨情親已愛匡廬境更愛匡廬人謫仙騎鯨不可返香爐瀑布長在眼上人字逺非偶然前身自是東林逺往年挂席下小姑陶公社路埋春蕪定中時復一歸去石上夜發雙芙蕖却訪天門捫絶壁仙燈㸃㸃崖孤碧竦身健陟日尋覔舉頭近將天咫尺銀河倒挂三石梁錦袍宛在五老旁清風緬邈九江秀逺席依稀七寶牀即欲攬之忽不見飄然散作秋雲片笑向吳興唐子華為寫水墨裁東絹和鄭復初書懷促促夸父杖汲汲祖生鞭無繩能繫日有酒可忘天身後長千載生涯近百年時題醉中語翻解得稱憐此生非獨得與世偶相依睡帶晨烟起行將落日歸未能超有跡漸欲到無機矯首終遐漠天髙黃鵠飛送戈伯敬歸臨川江上兼旬雨山中六月秋澄潭周室下飛瀑出巖流雪氣生蘿僻隂輝動竹幽隔年懸寄幕此日上歸舟昌運難忘仕名邦自足游三神清颯爽六帝久淹留著述恢前史編題發大猷揮毫驚冠豸下馬按行騶秋剡烏臺上晨光白璧投先傳廣陵肆不待集賢讎郭相名初重王公禮更優虞翁深奬子吳子早趨摳道在珠淵媚談敷繭軸抽殷周起釣築廊廟賴謨謀自謂才須用寧知命尚仇向來聞亞聖傳食且諸侯宣惠庸非擬勛華信所侔只今同海宇不敢固林丘燕賺曽論馬齊歌或飯牛彼遺從彼耳吾出豈吾不喜色毛生檄驚心季子裘家尊臨膳憶庭稚掩書愁親戚來還廣朋儕過問稠作花燈陸續鳴樹鵲綢繆行省新官好清朝哲士收大廷陳寶器奇産尚琳球上壽登觴俎循常進瀡滫徵書應自及束帛况加修抱甕聊兹老持杯寫我憂王門裾已短那得效枚鄒寄朱以寧奏差生世若萍梗憶别悟斯言蘭舟乘趙女晴湖看文鴛作賦比黃祖下榻識陳蕃與子各試吏間隔邈攀援旅食更朝暮簿書厭啾喧念彼廊廟器為國秉要論玉堂事明主聲名照乾坤屈伸固有待奐若魯璵璠志士當守素抱德良自尊春風媚桃李松柏常髙鶱夏日過龍翔寺養䝉室問琦元璞書記因讀鄭明德詩就韻奉贈新竹滿牆雨西鄰留老翁上人虎丘虎作客龍河龍及室每愛玉樹好住屋少隔銀杏東日不得見夜作夢時一過之但恐空百年共秋草兩間同轉蓬昨日之日我髮亦已白明日之日子顔寧復紅衆皆上我固下宋石盧胡誰售價花緣梅苦暖為冬葉為松髙寒入夏南風西來即是秋商歌且爾鏘鳴球一蝸舉世兩鬬國六鼇何處三山洲須君界發白毫相放我江湖之客舟我年五十久知命我自信之誰與證君今語我我即聞我且語君君乃聽僦屋得園一畝耕煮菜作羮全無成何如寧戚叩牛角長歌夜夜逮天明李五峰題此詩云初讀新竹滿牆雨意謂類馮海粟及讀至一蝸舉世兩鬬國六鼇何處三山洲大以為好奉餞玉淵上人之湘南湘之山兮蒼梧九疑在其南君山當洞庭少平兩峰上向周遭六十里而乃逺與之相參他山霹靂感神物異朵菡萏開優曇阿大中郎道吾住滿院蒼竹秋蕭槮猶子上人别我去故山紫芝春鬱藍置酒送之與衆醵贈言有以豈我緘匡廬有峰未讓嶽彭蠡之澤何如潭佛樓行將五鳳入僧省趣至兩馬驂常家太守新作寺廣闕衲子禪為龕開堂即當龍象集說法亦遣蛟鼉諳固知近郭殿閣逺政以在水波濤涵夜宿尋汀下鳴鶴晝光入棟搖如蠶何當多寶分半塔永聽屑玉霏清談道氣迎人昔藴藉林霏送客朝􅀈毶熊繹渚梁同楚國虎關失守歎崤崡訖今諸孫散吳越猶以喬木知纓簪仲南覲母良亦好玉淵奉師尤所堪晨聲走覓鐸繞殿夕影出送經置函推門數數吃茶去寫詩往往待酒酣老草也復譽新好饌蔬每即充饞貪杜陵可以即枕簟揚雄泊如忘石甔豈不記祭酒歸來有髙致作詩送淵因寄及當時自謂蒼崖翠壁之石或者為我鑱師今之行實是歸之人其聞之亦將馳夢於春山杳靄之蒼嵐政如天台老客失二子青萊可摘赤腳可使有酒且湑無酒且酤舉杯在手念之到口不能銜天關劃開雷府疾雞肋不足虎口饞凌霄更上亦安穩抱甕竟老吾無慚送鄭䝉泉入茅山三君各上鶴背去三峰即同鼇背還遂此天家開洞府至今仙島在人間𤣥靈夜直趂虎出白氣晝擁許龍閒清秋坐嘯向髙頂處處稻田雲繞山瀛海仙翁有令子逺訪茅家三弟兄霞氣繞庭先作夢佩聲行道或來迎丹飛木末龍頷吐霧下松根虎魄成今年江上有狂客共櫂酒船歸四明項炯字可立天台臨海人端行積學為時名儒嘗居吳中甫里書院獲相與從游惜其詩不多得云宿鳳皇山上方懷古夜豁山忩坐泬寥一尊月下酹江濤縱橫龍尾霜痕斷倣佛虎牙雲氣髙誰云魂魄猶思沛細看荃蘅忍反騷百五十年真夢爾古槐殘蟻黑於毛石壁削下三千尺挂我雙屐栖林廬潮聲夜半起天末月色秋髙照雨餘禪榻了無羅綺夢酒家或見鳳鸞書塔根蘚骨化黃土寧使人間瘧鬼除江左夷吾浪得名豫州英概亦沉冥夕陽逺樹山如赭秋雨荒臺草更青漢苑玉魚誰復葬昭陵石馬已無靈可憐白髮商人婦猶向鐙前話後庭楚聲四起國殤悲運盡東南事可知塞下徑推金馬去草間俄見石鯨隳祝宗端合先祈死丞相空聞後出師落日半江秋寂寞乳鴉啼繞萬年枝即事江南水濶疑無地漢北風髙忽似秋鴻雁定應驚悄悄麒麟何許泣幽幽步兵阮籍唯耽酒隱士龎公不入州敢饜朝盤堆苜蓿封侯渾是爛羊頭送袁孟敏歸潭吳門送客折楊栁迢遞郵亭短復長五月海雲應未熱孤舟江雨定微凉春濃乳酒浮鸂鶒夜冷牙床攬鷫鸘歸到故園無限樂小山招隱莫須忙次韻鄧祭酒贈極元禪師麈尾天花灑石扉莫教五色掩摩尼峰頭笑縱金衣鶴竹裏閒尋玉版師言論每懷龍井夜扶攜渾似虎溪時芝雲更擬分蒲榻黃葉滿山題近詩題趙子固水仙龍波乍起湘雲濕帝子欲歸歸不得十二煙鬟㸃遙碧到今愁魄寄湘花畫出深愁雲繞筆題趙子固蘭菊凉雲如波散銀浦飛虹不見行天鼓野花幽草一圑春暖天相倚愁殺人空井辭石闌古蘚青連錢老梧石罅孤根懸下有一斗琉璃泉轆轤不鳴修綆斷蛛網濛濛梧葉乾江南弄篁深雨過月色青濕螢幾㸃風穿櫺秋聲滿江龍一吟江空漠漠懸疏星鳳皇城頭石花吐雷擊老樹蛇骨腥鬼雄騎黿潮際上暗藤如山走漆燈吳宫怨繡楣灑黃粉椒壁張紅青倚簷樹如鬼深草蛇夜鳴髑髏已無淚古恨埋石扄公莫舞龍蟠錦帳金奕奕虎旗無際人馬立肉林垂􅎺陵阜赤萬甕行酒晴虹濕大蛇中斷狂魄滅重瞳無光射寶玦雷憤風愁三尺鐵河山未必如瓜裂老荒辟咡語公莫頭上青天懸日月妾安所居北風玉燕落雲際曲屏夜渺紅氷碎守宫不滅腕痕香蕙帳垂垂雙錦帶杜鵑聲裏發珠林黃葉夢中行紫塞防秋舊校馬如狗繡鹿毳袍新樣製芳魂一㸃渺何棲烟雨菰蒲大江外感秋六首南風久不作囂祲曀中天龍文裹羸牸熊貙散如烟萬蟻赴墜蝶捷于下瀧船誰當昭若䝉凍雨灑枯蓮劉項龍虎爭遺民盡瘡痏故掾入收律諸將醉斫柱四老亦强出兩生終不起三王盛禮樂竟為吕政燬烏乎百代下汲汲豈無意洛陽少年人英風振四方三表與五餌可以紿中行胡為慟歲餘不一試而亡曽顔雖魯愚豈曰終荒唐天才何代無養之當有方班超負奇氣投筆西出關風塵髀肉消日月鬢毛斑茍可利吾國何必求生還偉哉馬伏波竟死壺頭山雲雨手翻覆越盟久已寒尺布與斗粟意態尤可憐狂奴豹隱霧故人龍在天鶴書訪羊裘賤貴何足言今年深入山逝將同木石時讀古人書撫髀成感激顔生雖陋巷易地亦禹稷彬彬韶輅冕損益文與質杜陵安知此妄語同盜跖哀哉疇我晤長林月如漆髙明字則誠永嘉平陽人至正五年張士堅榜中第授處州録事長才碩學為時名流往來豫草堂具雞黍談笑貞素相與淡如也題孟宗振惠麓小隱宗振孟后之裔汴水東邊楊栁花春風散入五侯家繁華一去江南逺閒汲山泉自煮茶題支離叟錢唐門裏支離叟短髮蕭疏色黧垢雪霜歲晚結輪囷風雨年深增老醜挫針治繲總無能欲與冥靈齊上壽天公怒此怪且孏敕遣靈官下搜取勾婁吉利忽飛來虎倒龍顛盡灰朽女蘿飄騰白鶴去琥珀迸裂青羊走繁隂已逐謝仙車枯幹徒存韋偃手邇來好事猶痛惜歎息形模無復有寧知百年皆夢幻靜看萬變互紛揉榮枯相尋無已時成壞有數元非偶南山誰信梓化特崑侖俄驚栁生肘朝菌何曽閲晦朔棫朴那知避薪槱全軀孰似櫟社樹潔之百圍今在否人生根蒂不可牢况為草木計近久野客空歎倚江柟老奴謾泣琅琊栁寒烟落日西湖邊衰草荒廬園數畝不見當時鐵門限春蚓秋蛇徒蚴蟉𤣥雲飛盡墨池空直寄亭前誰酹酒送蘇參政日月垂光照海濱東南聲教屬儒臣九天雨露金甌重萬里山河玉燭新田野年豐多貢賦江湖秋靜息風塵此行宣室須前席賸有嘉謨為上陳上苑東風珂珮鳴宫鶯初囀隔花聲天清北口烟塵淨雲去西山雨雪晴畿甸居民瞻奉使衣冠國子拜先生漢家張趙何須數待看臯䕫致太平天上神仙白玉京烟花繚繞鳳皇城端門日上紅雲動太液春寒緑水生封事曉當香案奏奎星夜接泰階明更看鼎鼐功成後緑野堂深遂素情趙渙字季文闕人由憲掾升湖州從事端謹廉方人見其儀表莫不興起從政之暇放情詩畫皆為時所重然不茍得也暇日同仲穆諸公游道場山和東坡韻道場山深美林麓坡老文章照巖谷簿書休暇得良朋載酒幽尋歡意足朝寒嵐重隂漫漫石頭路滑青屈盤仰瞻孤塔倚髙漢俯聽絶壑鳴飛湍老僧愛客煮茗出暫與閒雲分半席自言住山八十年夾道長松手親植宗人好事擕歌鬟為豫嘯傲泉石間壺觴到處即傾倒何必西湖與東山郡圃花開少晴旦屈指春光已過半百年行樂能幾何爛醉芳時莫長歎病後過道場山漫成愛此道場泉石好公餘每到即欣然兩山空翠疑無地一塔髙寒别有天未暇耕雲深隱遁何妨煮雨小留連賞音最重東坡老爛漫雄章萬古傳連日南山風共雨染深溪色緑依依官閒自喜詩添藁病起誰憐帶減圍柏府無才名漫在草堂有約夢頻歸足艱未快登臨興空羡雲間鴻鵠飛宋沂字子與清江人由成均諸生擢藝文監掾遷贑州從事復除常山縣尹與豫㑹于白鶴觀出示春詠亭藁因録數詩用刋于左題燕士李叔成靜怡精舍叔成故淮安郡侯子也守道豈忘世脉脉重端居曠懷不可極清風生太虛寂寂獨無營欣欣常有餘童子啓忩户晝讀孔氏書窅然在隘巷時來長者車問我何栖遲東陵未丘墟矧伊幽州士何為卧空廬答云各有志素絲尚匪汙相從賦黃鳥駕言歌白駒鳳兮或來下愧彼狂接輿題淡齊泠泠山下泉謖謖松上風松風吹我心置彼山泉中清深聊洗耳汪洋因蕩胸時時酌𤣥酒孰與甘醴同張侯坐齊閣尺宅如虛空泊然濯塵慮明德庶彌崇題聽秋軒憀栗夫何如幽齊致虛極相看數竿竹更覺萬籟寂皓景逾清曠天宇彌寥泬凉颸發金奏繁露漙玉滴髙梧庭鶴唳衰蕙候蟲唧願言凝耳韻端居以游息送趙御史仲禮之任南臺併柬兼善達公經歷元載王公用道孔公二御史天子龍沙拜法官議郎新戴辟邪冠曉辭漠北氷霜重秋到江南草樹寒諫疏頻煩明主聽題詩長共故人看應憐閭里誅求急尚布朝廷禮意寬幕下風清鳴一鶚臺端雪霽見雙鸞寥寥渡海三冬翮煜煜凌空五色翰晉代新亭蒼蘚合梁朝舊寺土花殘石城慷慨悲袁粲别墅風流憶謝安千里憑髙麾繡斧幾回攬轡並銀鞍諍臣事業須公等努力明時匪素餐奉餞御史中丞汪公大司徒致仕歸隴右仗引絳騶中執法鏡懸清鑒大司徒當今天子尊元老自昔諸侯祖二疏臘盡掛冠辭北闕春來供帳出東都魏舒就第施行馬薛廣傳家保賜車德教萬民䝉帝賚王封四世贊皇圖翰蕃方國歌周雅帶礪河山著漢書燕塞驊騮知故道隴雲鸚鵡識前驅平泉草木芳華裏終日垂紳擁玉魚東海謠奉送宋太監降香海上天妃廟東海鯉魚搖赤尾舳艫盡發江南米帆檣出沒蛟鼉窟靈雨神風勞帝子紫衣使者麾金幢麒麟暖玉隱天香元君晝下翠旗濕百靈冉冉天吳立使君騎馬歷東吳吳中父老爭迎趨自言春濤漂白骨官家下詔復征役今年隴畝粳稻空縣官索租到疲癃丁男登山拾橡栗妻孥含酸向人泣使君北來候神人應憐赤子百憂集明年海若不揚波君歸宣室當如何送逯都水赴海運萬户都水使者日邊來黃金虎符照漕臺笑持英簜入滄海不比徐福求蓬萊將軍昔騎青驄馬風采桓桓丹闕下紫髯如㦸半成霜議論精神更瀟灑今年運米發東吳三百萬石皆明珠揚旗列㦸耀雲漢伐鼓鳴金轉舳艫將軍尚文今尚武何物鯨鯢敢豫侮欃槍蕩滅凋瘵平報政歸來奏明主贈别黃德廣赴都江上相逢渾未久忽對芳尊傾别酒君向燕臺萬里餘我留吳會三春後當年曽入承明廬千官委佩侍金輿此行剩擬長楊賦何用頻封光範書白鶴觀次韻鄭䝉泉呈朱仲文陳庶子誰寫黃庭一兩章碧桃花發日初長欲求大藥黃金鼎先解明珠白玉璫漠漠春隂連海氣遲遲雲影度天光羣公共愛幽栖好芝草瑤花雜衆芳次韻答蘇昌齡二十四橋春雨晴髙齊日日讀書聲寄來滿紙闕濕想見吹簫㺯月明傾蓋清尊相為醉盍簪白髮可憐生東風三月淮隂郡寫寄綢繆故舊情寄馬易之近日淮南見馬卿新詩句句掇瓊英畫船不肯留三日先載東風過四明自是風流愛鑑湖木蘭舟上倒金壺鱸魚蓴菜戀鄉國馬湩蒲萄憶帝都草堂雅集卷八

新著書誰似赤城人一區我欲重卜宅百萬何當共買鄰蘋野呦呦鳴鹿聚榿林箇箇哺烏馴風流更愛錢公子曲几焚香寫洛神戊子嵗立春試筆今朝立春春意動便覺長河氷凍開黃道日行東陸近青旗駕擁五雲來辛盤獻壽初筵秩衮職求賢黼座陪自信融風解生物不勞羯鼓向花催春日有懷貢泰甫待制張師允修撰閶闔門深漏點稀珊珊環珮早朝歸苑中碧樹啼鶯合井上青苔乳燕飛仙仗春明宫女扇御奩香惹侍臣衣從容奏對天顏喜不覺罘罳轉夕暉送陳天民偕李侯歸澄江海風東來吹夾衣凌晨相送客帆歸水芹葉大玄鳥至官栁條長江鮆肥好覔瀼西杜陵屋莫談垓下白登圍柂樓徙倚有餘興釃酒看山歌式微小海軒舟名小海軒前水如海青山坐對清於秋夜闌華月在几席天未涼飈生柁樓芙蓉杜若傍江好鸂鶒鸕鷀衝雨浮煙波浩蕩信為樂何必東尋麟鳳洲過馬鞍山東禪寺范公讀書處范公山中讀書處雲氣亭亭如蓋遮連岡白石或化玉匝樹紫藤都著花要知奉使盡忠讜豈但賜恩為寵嘉野人生晚不並世獨倚涼飈增嘆嗟仙山樓觀圖霞光樓觀鬱嵯峩下有虹梁俯澗阿千樹松肪化神珀萬山靈籟答空歌翠鸞不寄麻姑信白鹿遙迎葛令過我欲排雲凌浩蕩仙凡未省竟如何吳桓王墓吳王城外桓王墓秋樹連雲棘樹低寶氣已隨金雁化憐光還照赤烏栖三分割據嗟何及一代英雄孰與齊下馬荒丘酹巵酒不堪風雨晚凄迷送劉庸田之福建鹽使閩南此去幾千里江轉晴灘百丈牽鹵中莎草白勝雪船尾蕉花紅欲燃秋風到官近八月水部行囊無一錢矯首涼雲望征雁賢聲又待過人傳顧定之詩來索鶴次韻戲答參軍愛鶴真成癖癡絶題詩最有情只惜壁間遺箭影莫驚夢裏度江聲孤山積蘚青錢合緱嶺調笙翠纛迎不是仙家丹檄召玄裳未省下東瀛芝秀軒以雙白鷴籠贈玉山豫賦詩偕其行云雙禽曾未換雙璧籠致草堂清絶塵李白多才今有子胡公好事豈無人竹間飲啄池臺曉花底飛鳴島嶼春更想金衣天際鶴冥冥寥廓與誰親顧瑛以詩謝云雙禽價重雙白璧素質皓皓離風塵逺煩芝軒矍鑠老獨寄草堂癡絶人琪樹花明卧白日玉潭水淨照青春已曽馴狎我所愛况復就食能相親芝秀軒主人者馮君瑞也雜興矯矯逺遊客出門樂且湛飲餞相晤言慷慨意彌深丹荑被中洲緑蘿翳髙林彼物尚有依吾寧非所任驅車望神都天風卷旌斾宫闕鬱岧嶤蓬萊儼相對矧兹時序遷獻嵗心痗痗何以發咏歌王化大無外春至氣候暄好鳥間關鳴端居濬房中夷朗神思清良人諧婉孌不念舊日情當窗織鴛綺裁縫尉帖平含愁逺相遺冀妾孤衷明于以宣鬱紆抽琴奏前庭前庭誰與偕載瞻靈雨零萋萋園中樹緑條閟前榮君子憩其下悠然動遐情遐情在天末相思邈吳越好鳥忽飛來銜書慰悄結旭日出城隅皓月射窗牖日月流耿光美人起搔首美人美如英芳潔諒自守不憂言笑暌但憂違别久湛湛天宇髙炎氛載道周斗柄應候至大火從西流載浣絺綌衣載著狐貉裘及時不豫備遂致卒嵗憂攬兹青桐樹墜葉那少留嘯歌聊自怡露下銀牀秋涼飈中夜起烏鵲向南飛耿耿河漢流煌煌星月輝悠悠具觴酌僛僛褰舞衣眷言彼美人燕鴻苦相違修名不勉旃皓首將奚為玄冬十月交蟋蟀近我牀傷彼苕之華含英委清霜丈夫四方志千金誡垂堂壯矣不奮迅老矣徒慨慷題林屋先塋圖望洞庭兮極浦長太息兮愁豫英英兮白雲乘清氣兮降時雨倚宰木兮聊淹留念我心兮孔由山有岡兮水有湫駕吾車兮泛吾舟鳥鳴兮嚶嚶鹿鳴兮呦呦激木杪兮回風奠桂漿兮髙丘髙丘兮何所邅吾道兮西顧西顧兮不忘申纘言兮遺來者萱之華并序萱之華憫孝子也孝子行役在外不得奉養其母故作此以道其志焉萱之華羅北堂我憶母兮心倣徨我出我遊縫我衣裳鬒髮如雲體力康日復日嵗復嵗定省不修兮使我心痗九日當採菊九日當採菊矧兹微霽開社燕背人去塞鴻度江來清吹任欹帽緩歌送深杯非關要愈樂良由佳景催江之水寄楊鐵崖江之水流瀰瀰蕩漾雙鳬舟涉江採蘭芷蘭芷青青露如洗下有一雙魴與鯉美人美人胡不來相思日暮江風起青青水中蒲青青水中蒲蒲柔堪織薦織薦不逺將獨卧心輾轉青青水中蒲蒲白可為食褰裳欲採之春水愁蕩滌自君之出矣自君之出矣膏沐洞房中出門若有語螮蝀在天東自君之出矣汲水得鱒魴金刀不敢剖持以奉姑嫜班婕妤春明辭步輦獨下昭陽宫團扇承落花曲裙曳回風但恐芳景歇思君恩豈終採菱曲送瞿慧夫涼飈度天漢炎氛蕩河洲銀船湛芳醴綵艦趁安流吹笛驚飛鷺彈筝起浴鷗牽條出素手弄蕊送輕謳遺響仙音暢遐觀逸思留分違乘曉發江雨浣清秋淮安忠武王祠憶昔平南日桓桓萬虎貔天心元自應市肆不曽移衮冕諸王服蒸嘗百世祠重門須下馬一讀麗牲碑夜聞古塘水聲要良貴子英同賦奔流從東來日夜聲淙淙如何勒灣洄賈勇觸石矼依稀灧澦堆倣佛岷峨江操舟欲濟之神色沮且悚而我則不然坐令相激撞乃寤道體微乃覺此心降因之遺同袍長歌倚南忩送文海屋北上磨蝎宫中星斗燦倒景下垂光爛爛至尊宿衛羅虎賁千乘萬騎若雲屯江南客子好遊衍瞻拜恩光閶闔門神飈東來黑河道野合地椒花發早車行莫待春光老宣文閣中風日麗鈴索不搖鸚鵡睡荔枝木瓜花蕊蕊把酒看花足風致江南客子挾册來閣門待士宜宏開洛陽有策賈生重甄拔要須精鑒裁只今東壁圖書府夜夜流光彌九土慚悚斯文竟何補宋姬怨并序宋姬者宋肅王女也幼戲水邊得玉印其文曰金妃之印靖康之變金主強納為妃或云得印之異徵也及金主重徙二帝于五國城姬諫弗聽因怒責金主主怒以匕首刺殺之嗚呼姬之失身固為不幸姬之殺身非不幸也印亦何預于人事哉因痛二帝之厄作宋姬怨云肅王之姬貌如花娥娥宫掖試鉛華粧成不學凌波步獨駕春風金犢車春風鬬草宜春苑歡樂未終重賜宴只知帟幕花前圍不道旌旗城上見金源虎視何驍雄一朝擁去嬋娟空恨隨青冢暝雲合怨逐黃河流水東吁嗟大內竟誰有蒼黃南渡天王狩九廟神靈煨燼中萬官車騎風塵後遙思玉印得水邊異徵之來殊未然穹廬居深思蕭索谷蠡歌罷心煩悁乘輿云胡重播越照人尚賴中天月五國城荒畫角哀赭袍拭淚都成血王姬勸諫諫雖頻敵國由來多不仁剩拚一死在匕首寧忍偷生羞懿親黃榆白草西日暮玉貌花容委塵土也勝生還逢漢君却把哀笳傳樂府君不見當時賣國茍全身于今太史書叛臣夷陵詞并序山南夷陵縣有漢景帝廟又有曹操廟而無孔子廟今閩憲僉申屠子迪掾山南時按部覩其事曰漢賊不兩立久矣遂白使者墮曹操像而為孔子像于其廟民皆駭然申屠此舉深有關於名教之重故豫韙之而係之詞且以示其民焉山之南兮夷陵邑有神兮揚靈揚靈兮要眇粵漢景之原廟嗟原廟兮云胡此邦陳牲幣兮祀事不爽龍輈鸞輅兮招搖無方焱逺舉兮爛其耿光紛黔黎兮曷為其導祀魏瞞兮復何孔照彼鬼蜮之姦雄兮載登歌而鷺翿儼華采之若英兮膺衮黻于肖貌羌偃蹇而愁豫兮衆昏昏而奚告慨伊人之康汰兮爰咨詢于芻蕘念漢賊之不兩立兮建大義之昭昭斥巫覡之駿奔兮墮像設于崇朝敞翬飛之黌宫兮來遊歌之襟佩奠玄聖於厥居兮亘萬古而攸在重曰夷之陵兮其山蒼蒼夷之水兮其流湯湯山有榛栗兮水有鱒魴采之罟之兮奉蒸嘗千秋萬年兮民毋我忘田家雜興有序積雨彌旬春色無賴呻吟之餘觸事興感雖耕鑿之樂眷眷豫懷然不假之言辭則不能宣暢厥趣因擬田家雜興凡九首且以自悅懌焉春至戴勝鳴興言事東作周覽阡陌間俯仰粗有托我胤庶且夥孳養何菲薄從兹廣沃壤卒嵗且為樂髙丘試憑眺于以感今昨遊氛軼玄宇初暾絢朱蕚逌然愜所遇長嘯倚寥廓衆皆好營營所欣競刀錐我獨好悠悠所嗜惟書詩冥心悅適會災畬乃忘怡如何紈綺徒笑我作計癡我計詎易言覽物重敖娛招要黃髮翁名酒聊共持野人念時序倐忽更代謝緯蕭聊自給日向城市賣靈雨桑穀青逝將羸牸駕適意隨所之招搖嘉樹下遙睇金張徒髙駝乘駿馬意氣凌都邑俊采動閭舍焉知務農者俯首為悲吒淮甸有遺氓被褐尚隱淪趨向與世殊他人心靡親崇朝憩東臯舒嘯岸烏巾感時良靡遑素履善自珍只知耔與耘不知窶與貧文鵷栖我梁玄鳥巢我堂結髮兩夫婦白首同糟粳所憂稂莠多不憂杼軸空故人適相慰逺道致壺漿謂我上賦寬勿令神慮傷今毋翺且翔後膺豐且穰猗猗魯桑條籊籊湘竹竿並舍掩映之各來相與看薄暮墟囿中清宴有遺歡弋鳬未用罝烹鯉且登柈靈河素魄流斗柄長闌干明朝還醉醒毋辭共盤桓晨興壠畝上獨行嗟踽踽秋氣日微肅户牖足髙致網蟲念團扇篋笥那復試離獸藪澤深冥鴻霜露至畋遊在農隙犒樂慎終始咄哉區區心踐禽詎云美釋耒仰大運云胡往交逵耕鑿弗自安馳騖將奚為不如息我心默以玄理推嘗聞姬周季七雄互相持奄忽俱淪逝空令後人嗤維南有崇山巘崿紛獻竒緑雲重延貯載攬藂桂枝粵從混沌鑿談譎啓其由逺士汗漫期胡寧咫尺謀力田未有年深入蒼山幽熊虎衛我居鸞鵠導我遊道逢一羽人相顧意彌周采珠為綴衣琢玉為飾輈於焉超鴻濛回翔崑崙丘紀夢柬陳檢討宫車轆轆過神臯五色雲中望赭袍野膳不嫌涼餅滑小奴花下剪春蒿玉闌低護繡簾垂芍藥花明蛺蝶飛鈴索不搖宫漏迥自拈金剪製春衣寶衣五色雜鳴璫羣從如雲御輦傍種得木桃和露采金盤盛却奉君王日轉罘罳綵仗移乳鶯聲在萬年枝殿頭樂奏升平曲又是宫嬪尚食時吳蠶八繭染春紅繅盡柔絲未論功若得君王一回顧不辭白髮上陽宫草堂雅集卷十三

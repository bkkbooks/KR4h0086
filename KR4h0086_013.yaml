body:
  text: 草堂雅集卷十三元顧瑛編胡助字古愚金華人性端方好讀書長遊京師受知館閣諸老辟試史館職後以太常博士致仕詩有雜興及上京汴中紀行集與鐵崖楊先生訪豫里舍其所題玉山草堂諸作别刋于精舍吟云送趙季文之湖州知事苕溪洲渚上青黛開煙鬟石色何秀潤有璧生其間四圍阻巨浸世稱浮玉山狂潦不能沒髙低依碧瀾蓮幕趙從事昔年此盤桓重來泛秋水見之發長歎美璞貴內韞升降從時觀渺渺水晶國虹光山月寒駿馬行翩翩青絲絡錦韉美人向何處言往苕之壖苕溪繞城春水發樓閣重重花漠漠釃酒哦詩掀紫髯水精宫裏芙蓉幕辨山如龍天際來七十二朵青蓮開小娃雙歌蕩舟劇鷗波滉漾青于苔君不見王孫宅百年喬木髙千尺願君種德及湖民會見髙文勒貞石送陳玉林南還黃衣道士識重瞳冠劍芒寒星斗胸赤壁月明驚夢鶴蓬萊雲起護飛龍新宫突兀三清殿故國蒼茫六代松忽憶舊遊今白髮何期共聽蔣山鐘灤陽十詠帝業龍興復古初穹隆帳幄倚空虛年年清暑大安閣巡幸山川太史書緑蘭青草玉花驄馴鹿眠遊殿閣東西梵祝釐環地坐曈曨日色綵旗風西清學士草黃麻閣老承恩扈翠華昨夜司天臺上望文奎光焰照龍沙小西門外草漫漫白露垂珠午未乾沙漠崢嶸車馬道半空秋影鐵幡竿板屋松煙染素衣天街暑雨沒青泥夜來沙磧秋風起鳴鏑雲間白雁低御天門前開詔書驛馬如飛到大都九州四海服訓誥萬年天子固皇圖斗北髙寒無點暑舉頭止見七星文玉堂近與琳宫接清夜步虛聲盡聞朝來雨過黑山雲百眼泉生水草新長夏蚊蠅俱掃迹葡萄馬湩醉南人萬騎櫜鞬列斾旌周廬嚴肅駕將興帳前月色如霜白曉汲灤河窟裏冰玉堂視草屋三間盡日鼇峰相對間身遇太平鈴索靜題名篆畢又南還右灤京十詠古愚親寫以寄雖已刋於上京紀行集中人不多見今再附于此庶以見皇元典章文物之盛事云龍門行龍門山險馬難越龍門水深馬難涉矧當六月雷雨盛洪流浩蕩漂車轍我行不敢過其下引睇雄竒心悸懾歸途却喜秋泥乾颯颯山風吹帽寒溪流曲折清可鑑萬丈蒼崖立馬看虞翰林題紀行集云集仕于朝三十年以職事至上京者凡十數驅馳之次亦時有吟諷不能如吾古愚往復次舍所遇輒賦若是其周悉者也集老且病將乞身歸田竹簟風輕茅簷日暖得此卷誦之能無天上之思邪卷中龍門後詩尤佳歐陽元功亦云至順庚午十月草八日虞集題卞思義字宜之楚州人能苦吟對客談詩終日不絶辟都水屬掾與余交遊頗密故所作為多云鐵笛詩寄楊廉夫一假清氷百鍊鋼曽翻宫徵侍虛皇裂開黃鶴磯頭石驚落青鸞鏡裏霜仙子珮環新樂府翰林風月舊文章道人清節磨礱久卻笑桓伊獨據牀和楊廉夫新居韻樓居最喜傍西河春水溶溶生緑波近市小橋雲影亂隔簾疏雨竹聲多執經弟子登金馬換帖山人贄白鵝欲向尊前吹鐵笛且聽牙板翠兒歌贈清隱楊錬師野鶴昻藏自不羣往來瀛海絶囂氛碧瞳老去照秋水石室曉來生白雲採藥每于松下見步虛時向月中聞太玄親授神仙祕霜繭淋漓舊墨紋大瀛海道院為吕嗇齋作人間咫尺大瀛海方丈蓬萊信杳然若木三更先吐日弱流萬里不通船未同徐福來求藥好訪安期且問仙聞説吕公髙隱處蛟龍常護石牀眠巢雲為吳義卿作元氣氤氲天四垂我來髙處足棲遲笑看烏鵲空三匝肯與鷦鷯共一枝露濕衣裳星斗近暖生毛骨夢魂知有時借得天風便喚取仙人白鶴騎侍宴疊嶂樓次蘇資道韻使君間暇宴髙臺珮玉珊珊得重陪無數好山成疊嶂一灣流水似天台煙中佛寺藏樓閣火後人家半草萊不用登臨增感慨春風梁燕又歸來西津渡西津渡口望瓜洲候吏歡迎使客舟天塹已無南北限江流不盡古今愁雲連巨艦來湖口風送殘潮過石頭驛舍題詩滿東壁重來還憶去年秋過邳州風雨不能渡宿州治天上黃河勢欲奔江南遊子黯銷魂隂風怒作波濤險秋雨忽來天地昏下榻可堪塵滿席開懷賴有酒盈樽曉晴又上征鞍去城下新添漲潦痕上元日侍宴疊嶂樓上使開華宴髙樓倚碧霄山如屏嶂列風逐管絃飄事簡春偏永歌長酒易消月明人散後驄馬不勝驕毗陵玄妙觀古柏青杉鎖翠霏寥陽金闕隱玄扉幡幢影動羣仙下星斗壇空獨鶴歸髙閣雲深分樹色修廊雨過濕苔衣壁間若問雙龍迹化作天池寶劍飛汗酒水火誰傳既濟方滿鐺香汗滴瓊漿開樽錯認薔薇露溜齒微沾菡萏香水泄尾閭知節候津生華蓋識溫涼千鍾魯酒空勞勸一酌端能作醉鄉題溪山煙雨圖西崦人家枕碧流屋頭髙樹近山頭短蓑煙雨歸來晚滿地落花人倚樓馬善長設宴思逺樓湖船緑野橋邊繫短蓬歸來微雨濕青驄草堂無夢尋康樂蓮社何人憶逺公海上相逢疑昨日尊前談笑自春風明朝舊約知誰問隔岸海棠花正紅容城道院聞説容城小洞天當年曽住大羅仙星壇露冷人初靜竹屋雲深鶴正眠半面好山藏石室一泓清水引蒙泉道人欲問全真訣須向純陽脈上傳過維揚露冷金盤酒價添雲埋瓊樹客愁兼竹西舊曲無人理謾捲紅樓一半簾雲龍教子圖龍公頭角何嶄然教子拏雲飛上天語之慎勿習癡懶旱水盤盤井底眠春江逸響圖黃鶴磯頭一棹還白鷗波上幾人間笛聲吹斷江南曲不見漁翁秪見山懷楊鐵笛琵琶聲斷翠鸞孤鐵笛仙人淚眼枯聞道小絃今已絶竹枝依舊唱西湖溪山春雨圖野人結屋臨溪上溪上白雲生疊嶂城中車馬自紛紜朝聽樵歌暮漁唱雲林靉靆春日低小橋流水行人稀桃花落盡春何處風雨滿山聞竹雞喜白髮白髮新添不用憂鬢邊垂領自風流一簪霜雪簾櫳曉萬古乾坤草木秋闕馬肝空拂拭底煩烏帽強遮羞憑君試問封侯者幾箇全身了黑頭過琴溪徐公釣臺芳草茸茸襯馬蹄重陪使者過琴溪東風又屬梨花月夜雨新添燕子泥石室塵空蒼蘚合釣臺人去暮雲低跛奚莫厭詩囊重多少江山未品題次王安行韻杖策來尋隱者居閉門重著絶交書入城無事不騎馬臨水有時看釣魚未羡淵明開菊徑擬從諸葛住茅廬清時羽翼知多少肯散黃金學二疏次楊廉夫韻贈歌者翡翠屏揚州曽賞瓊花宴吳下新傳翡翠屏湘水月明環珮冷巫山雲濕髻鬟青蹙金孔雀非為貴隔屋琵琶正好聽青鳥無情易飛去雕籠深鎖重丁寧題舒秀實鉏隱賔幕歸來野興濃卜居還得近城東繞籬自斸荆榛地傍屋添栽杞菊叢一钁燕泥春雨後數聲牛笛暮煙中紅塵軒冕非吾事老圃如今願已同愍忠閣登臨獨上最髙層東北闌干不敢憑雲近蓬萊連復道天低星斗挂觚稜愍忠曽葬征遼骨破暗空存供佛燈欲浣京塵振衣袂冷風蕭瑟灑炎蒸屠性字彥德會稽餘姚人明春秋學幼從晉卿黃太史遊故其詩文嚴整有法度嘉定儒學聘為經師其經由多至草堂故得詩稍多送王季野侍父入京江左風流屬過翁賦成入奏大明宫未應膝上留文度還向談邊見阿戎金縷東風歌折栁錦帆遲日帶歸鴻六龍清暑灤河上扈從應馳白玉驄館娃宫棲越歸來此築宫佳人欲與死生同鴟夷始見投江上烏喙俄聞賜甬東木落秋波環珮冷草生故國綺羅空幾回香水溪頭望飛雉猶翻夕照紅送人赴彭湖巡檢三十六島繞彭湖見説泉南天下無花時小隊旌旗出處處春風啼鷓鴣山閣幽居只在碧山阿髙閣凌虛帶女蘿門外水生春渚白窗前雲起夕隂多藏書每許鄰人借釀酒時邀野老過見説南岡千嵗柏倚闌安得眄貞柯和潘子棄韻雲林精舍傍岩阿中有行吟十二窩陸羽泉清童汲慣潘郎詩好客酬多茅山猿鶴驚春曉楚水魚龍落夜波歸去不成千里别抱琴重約聽樵歌送趙季文湖州此去百餘里公子之官是勝遊細雨淡藏城外寺垂楊齊拂水邉樓妙年未厭官曹劇大府仍聞禮數優日日髙堂具甘旨白魚須寄霅溪頭送智教授兼柬郭思道録事先生去作州博士尚憶滄浪水竹居研露自臨修禊帖閉門欲著絶交書九江城外春帆近五老峰前曉雁疏此去談經有餘暇參軍為我問何如題趙子昻墨蘭王孫宴罷碧瀾堂翠羽瓊蕤結佩裳欲寄靈均無處所至今遺恨滿瀟湘竹桃仙子吹笙處碧桃花正開花邉有竹實留待鳳歸來竹菊曽向山中住黃花爛漫栽主人緣愛竹三徑不教開竹棠梨石畔竹扶疏棠梨結子初坐來山雨過濕翠欲沾裾竹梅美人湘浦去翠袖倚琅玕橫笛吹霜曉遙知不耐寒題馬渥窪神水與天通汗血淋漓帶赤騣明日甘泉祠泰畤和鑾聲在五雲中曉來疏雨過沙隄振迅先聞栁外嘶不是圉人調未習臨流怕濕錦障泥陳秀民字庶子灤陽道中晨出建德門暮宿居庸關風鳴何蕭蕭月出何團團短轅駐空野悲笳生夕寒我本吳越人二年客幽燕幽燕非我鄉而復適烏桓前登桑乾嶺西望太行山太行何盤盤欲往愁險艱寓形天壤內忽如水上船昨日東海隅今夕西江邉役役何所求吾將返林泉吳中栁枝長洲宫苑草離離中有吳王舊沼池至今二八吳中女為人歌舞學西施館娃宫中花似雲館娃宫外酒如春花前把酒花下醉莫遣春愁惱殺人姑蘇城邊楊栁絲千絲萬絲垂參差栁絲雖長不禁手難織回文錦字詩木蘭含芳西塢西吳儂出遊知未知只恐過時不采摘零落將隨秋草萎棠梨花開郎出門宜男草生妾思君如何宜男草上露不濕棠梨花底雲白日欲暮入空房手把銀燭照西窗繡幃芙蓉開兩兩金屏翡翠立雙雙留君身上白狐裘賣妾頭上玉搔頭賣得青錢來買酒一洗從前離别愁題竹蒼林曉落天上雲萬頃瀟湘翠波冷月明葉葉秋無聲著我扁舟卧清影煙波晚棹圖東林待月月未出長江走煙波著天青山回首不可數幾點白鷗飛過船秋林平逺圖滄溟氣深秋映空髙雲晚墮玉林風金盤爛爛光出海泠然坐我蓬萊宫陪同公待制遊南城城南百花開滿洲城中主人招我遊急喚吳姬歌小曲莫令花落起春愁王鑑字明卿安平人幼侍父宦居吳中介然自處纍舉茂才不就閉户讀書非其人不交惟陸杞菊及家翁諸老成時往來實隱德君子也喬宜中邀看杏花并再和宜中劉禹疇韻朱闌曲徑春光好一樹杏花開獨早枝頭無處著風流時有幽香暗相惱畫堂簾影晝婆娑佇看嬌姿紅映縞芳心欲吐半含羞脈脈春愁倩誰掃飛來翠鳥更多情斜立花枝如畫藁主人留客客盡歡暢飲髙歌各傾倒明朝回首緑隂濃惆悵殘紅藉芳草江南二月風光好為惜花枝春起早窗前曉露濕胭脂無限嬌羞使人惱欲開未開開更妍半醉佳人衣輕縞年年消息雨聲中數點落紅和眼掃客來終日隔簾看棋罷酒闌詩上藁情懷不似少年時白髮對花嗟潦倒明朝相約抱琴來重嗅餘香步庭草當時共説梁園好過眼繁華消歇早青城有恨不可雪酒酣按劍生煩惱東風回首花滿城桃李紛紛紅間縞一枝嬌小獨堪憐翠葉纎纎眉半掃徐熙巧思妙絶倫畫出生紅留舊藁相期看花花已飄為惜春光拚醉倒酒醒不忍踏殘紅坐看佳人間鬬草送趙季文之湖州東風官栁緑生煙江上飛花送客船人醉離亭金鑿落馬嘶芳草錦鞍韉清溪繞屋渾如畫白酒盈尊不論錢遙想政成多暇日好詩隨意入新編曲江春望簷牙隱隱出層霄飛閣連楹涌翠濤花夾御城紅霧重春移仙仗綵雲髙天家日月無私照聖世山河不動搖正是太平文物盛玉笙金管進蒲萄發東滄呈伯京空江五月湖水生搖搖一舸隨潮行蘆花旋風作雪舞水氣上天侵月明白髮不禁遊子興青山忽動異鄉情天涯淪落何多幸賴有故人如弟兄題梅二首玉妃步步影毿毿燕罷瑤池酒正酣夜半不知風露冷夢隨春雨過江南右紅梅湖上無書問老逋氷霜巖壑耐清孤三更月上天全白轉首春風是畫圖右白描梅呈張貞居句曲仙人毛髮古蒼龍為劍羽衣輕道髙不入方士格海內惟聞外史名石菌依稀丹氣動玉壺瀲灧紫文生孤山祠與樓居近應傍梅花領鶴行春日草堂奎章照磨林彥廣惠酒江南三月春始足桃花杏花參差開溪雲入屋夜生雨山瀑近牀晴殷雷讀書弔古有何益行道濟時無此才多謝奎章老文伯時時擕酒草堂來柴門不起整十日溪上春風來更遲庭松自覺相忘我野花不知開向誰會須釀酒致元亮底用抱琴懷子期所喜樊山古心在相逢時許草堂資王冕字元章會稽人卓犖不羣嘗遊京汴間好為詩尤工于畫梅以胭脂作沒骨體自元章始隱居若耶山中事母盡孝道名公咸推敬之偶成四月八日風雨歇放翁宅前湖水髙典衣沽酒亦足醉騎馬看花徒爾勞海國尚聞歌蔓草山陵誰與薦櫻桃元龍本是無能者後世謾稱湖海豪歸來頭白歸來驚面生東家西家知我名友朋投老漸凋落兒女向年俱長成野梅開花尚古色山風吹雨墮寒聲最喜溪翁會真率濁酒過牆香滿罌寄徐仲幾僦得城樓枕卧龍儲無甔石是英雄吟詩不愧杜工部乞米或如顏魯公蘭省異于霄漢上草堂却在畫圖中故人相見無多論笑指松花落晚風山中答客問人間塵土苦熇煩林下清風六月寒夜半酒醒方脫屐日髙眠起不簪冠坐看遊蟻巡危磴靜聽間花落古壇老我自無軒冕意尋常豈是傲時官題金陵賞心亭前春草花賞心亭下栁生芽收功謾説韓擒虎亡國豈由張麗華江山萬古足登覽豪傑幾人過歎嗟野老相逢間指點六朝宫闕盡桑麻余日強字伯莊崑山人與余聲問久闕一日以和楊鐵崖詩來見其所學雲升川增不覺驚歎故録于此奉同鐵笛相公賦王粲登樓圖建安文章應劉陳通侻亦有王公孫長安西行白日匿漢陽人依劉俊君漢陽偷安無逺略王孫坐覺荆州窄英雄固當擇所歸作掾終慙坐上客北風蕭蕭吹素心北望杳隔荆山岑魏官牽車出關逺銅華蝕風驚春深秋來滿眼生禾黍江山重感非吾土憑軒作賦抑何心猶是黃初非典午君不見當時奴視賣履翁矯矯文舉真如龍李廷臣字仲虞台之寧海人幼從仲容丁先生遊故有聲江湖間所和余與鐵崖聨句詩尤穎脫觀者可知矣和聨句韻榑桑旭日紅半壁草色如天青滿簾入海爵羣應化蛤逐風龍唾或生鹽長雲帶水連三島落月和星轉四簷靈穴怪鰍潮捲尾中山老兔穎濡尖仙姬具飯青精細庖吏儲鮮異味厭翠釜出駝行玉碗繡幃薰麝啓銀奩吹簫公子鸞凰語擊劍將軍虎豹髯郢雪飄飄詩總好蒲萄灧灧酒頻添酣歌更上層樓頂萬頃波光上下黏和張句曲題楊鐵崖新居詩韻昔年曽向賀湖過湖上春風生緑波吹笛道人從去後抱琴客子已無多門前新栁黃于酒山下浮雲白似鵝今日姑胥懷舊隱興來時和紫芝歌宗本元字景明京口人幼好學能作詩嘗從天錫郭從仕遊其談論述作多似之今其所録皆草堂所題咏也題秋山圖南遊雁蕩北居庸歷歷青山在眼中今日不勝怊悵處馬頭黃葉又秋風題琵琶士女圖江水東流月滿船江風吹怨入氷絃何如銀燭秋堂夜一曲新聲直萬錢題墨竹可人家住篔簹谷明月清風十萬竿一自玉山相見後滿庭清影夢髙寒陸仁字良貴崑山人好古文詩不茍作為人沈靜簡默與豫有葭莩之好故舟楫時過草堂相與談詩清話終日忘歸當時館閣諸公皆重之稱為陸河南云買妾言遺妾明月珠結為雙珮璫妾身幸分明暮夜亦有光春波曲青青太湖波小小芙蓉楫舟輕弗解操水深那敢涉栁枝曲朝垂金門雨莫拂玉闌風飛絮髙髙去枝葉在深宫野田雀野雀飛在田化為田中鼠黍稌動連雲鼠食那知止缺月詞月體無虧缺日照乃自偏安得長合璧與天相周旋續弦曲麟角煮為膠續弦弦在弓但持弦上箭不射孤飛鴻精衛辭精衛兩翼大飛向海波去口銜石子不知數山髙髙海深深山髙海深石自沈招鵠辭黃鵠兮黃鵠騫翮兮扶搖一飛兮絶泰華再飛兮沖層霄鵠兮無弟與兄若將求其曹於乎鵠兮心悁勞燕雀在樊兮食且飽樂且不憂中林有木兮木有巢鵠乎歸乎無逺遨石婦辭鳥鳴孤竹岡春花復斑斑江水日東落行人殊未還妾孤處妾之心白於水水白泥可渾妾心潔且明望夫不歸那忍生精神忽通化為石千秋萬年岡上立題文海屋洛神圖神之媛兮霓裳凌長波兮回翔龍輈兮孔蓋秋之水兮如霜浦有蘭兮蘭有荑折芳馨兮遺所思揚舲兮遽逺目眇眇兮愁豫思公子寄馬希逺蟋蟀兮在户菊始花兮婀娜攬芳兮延佇思公子兮江之左荃橈兮桂旍江流兮泌清絙朱絃兮橫琴荼甘如薺兮楚酒馨宛延兮婁水蘼蕪黃兮夕雨婁之上兮有園與廬思公子兮歸乎樂只夫子去魯圖遲遲兮去魯居是邦兮爰念父與母臨沂泗兮未濟望龜山兮有淹其雨津則有舟兮車則在道先王軌轍兮孰履其武道之不行兮命矣夫周旋天下潁之水賦題劉西村卷上潁之水兮其流湯湯西匯于湖兮灌溉我稻粱我所居兮潁之旁郊原孔膴兮有棗與桑朝耕于潁兮夕誦于堂於赫在上兮如軒黃我出而仕兮遭世孔明我思潁兮靡忘潁水決兮潁善忘潁之人兮毋褻兮飲彼牛羊春還軒隂陽無停運太極體自常姤復造化樞日月天地房凝寒一已消煦煦春載陽曲塘魚上氷層漢雁北翔潛心驗物候齋居情味長容色當少壯豈不惜流光流光不待人撫時且徜徉城上烏者取晉叔向城上有烏齊師其遁之謂而作也漢桓帝時則有其謠逮梁劉孝威吳均輩比有作焉然各有託而不及此意豫方感悼其事因補其義而賦云城上烏羣相呼羣相呼護其雛公侯干城民父母官軍見賊莫遁逃叶城中之民勢亦孤安得千金覔壯夫城上烏烏有翮東西引雛飛格格胡為羣來盡紅帕驅民登城要相殺鳥啼城頭頭亦白送客一首贈凌元之别送客復送客跋馬河之津河津雪始霽細栁媚將春畫船平如屋中有白髮親嵗晏歸鄉井母子意欣欣持觴壽阿母